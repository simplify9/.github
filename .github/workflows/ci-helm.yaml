name: helm-deploy (reusable)

on:
  workflow_call:
    inputs:
      registry_profile:
        description: "Profile code for dynamic kubeconfig/registry vars & secrets (e.g., S9, WISEWELL)"
        required: false
        type: string
        default: S9
      app_name:
        description: "Application name (Helm release name)"
        required: true
        type: string
      version:
        description: "Logical version label (may be used in image tag selection)"
        required: false
        default: staging
        type: string
      namespace:
        description: "Kubernetes namespace to deploy into"
        required: true
        type: string
      chart:
        description: "Chart name (local or from repo)"
        required: false
        default: s9genericchart
        type: string
      chart_repo:
        description: "Helm repo URL providing the chart (ignored if chart is a path)"
        required: false
        default: "https://charts.sf9.io"
        type: string
      environment_label:
        description: "Value for app/environment variable passed to chart"
        required: false
        default: Staging
        type: string
      service_target_port:
        description: "Service targetPort"
        required: false
        default: '5000'
        type: string
      ingress_host:
        description: "Primary ingress host"
        required: true
        type: string
      ingress_tls_secret:
        description: "TLS secret for ingress host"
        required: true
        type: string
      ingress_cert_issuer:
        description: "cert-manager cluster issuer"
        required: false
        default: letsencrypt-nginx
        type: string
      ingress_proxy_body_size:
        description: "nginx ingress proxy body size annotation"
        required: false
        default: 50m
        type: string
      image_repo:
        description: "Container image repository (without tag)"
        required: false
        default: registry.digitalocean.com/sf9cr
        type: string
      pull_secret:
        description: "Kubernetes image pull secret name"
        required: false
        default: sf9cr
        type: string
      helm_timeout:
        description: "Helm upgrade --timeout value"
        required: false
        default: 15m
        type: string
      extra_set_values:
        description: |-
          Optional multi-line string of additional Helm --set key=value pairs (one per line).
        required: false
        default: ''
        type: string
      extra_args:
        description: "Raw extra args appended to helm upgrade (e.g. --debug)"
        required: false
        default: ''
        type: string
      ingress_paths:
        description: |-
          YAML list of ingress paths. Provide as a multi-line YAML sequence, e.g.:
            - /
            - /api
            - /docs
          Defaults to just the root path '/'. Each entry becomes --set ingress.paths[index]=<value>.
        required: false
        type: string
        default: |-
          - /

      kubeconfig_data:
        description: |-
          Raw kubeconfig YAML or base64-encoded kubeconfig data. This replaces the dynamic secret (<PROFILE>_KUBECONFIG).
          IMPORTANT: Passing sensitive data as a plain input may expose it in logs. Prefer keeping this workflow reusable only
          in controlled contexts. Provide either the full YAML (containing apiVersion, clusters, users, etc.) or a base64 string
          that decodes to the kubeconfig file contents.
        required: true
        type: string

    # No explicit secrets declared; they are resolved dynamically like <PROFILE>_KUBECONFIG.

env:
  APP_NAME: ${{ inputs.app_name }}
  VERSION: ${{ inputs.version }}
  # Values overridable by inputs but with opinionated defaults (duplicate defaults here for convenience)
  NAMESPACE: ${{ inputs.namespace }}
  CHART: ${{ inputs.chart }}
  CHART_REPO: ${{ inputs.chart_repo }}
  ENVIRONMENT_LABEL: ${{ inputs.environment_label }}
  SERVICE_TARGET_PORT: ${{ inputs.service_target_port }}
  INGRESS_HOST: ${{ inputs.ingress_host }}
  INGRESS_TLS_SECRET: ${{ inputs.ingress_tls_secret }}
  INGRESS_CERT_ISSUER: ${{ inputs.ingress_cert_issuer }}
  INGRESS_PROXY_BODY_SIZE: ${{ inputs.ingress_proxy_body_size }}
  IMAGE_REPO: ${{ inputs.image_repo }}
  PULL_SECRET: ${{ inputs.pull_secret }}
  HELM_TIMEOUT: ${{ inputs.helm_timeout }}
  EXTRA_SET_VALUES: ${{ inputs.extra_set_values }}
  EXTRA_ARGS: ${{ inputs.extra_args }}
  INGRESS_PATHS: ${{ inputs.ingress_paths }}
  # Kubeconfig provided directly as workflow input (raw or base64)
  KUBECONFIG_INPUT: ${{ inputs.kubeconfig_data }}

concurrency:
  group: helm-${{ inputs.app_name }}-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Optional environment gate: environment named after profile
    environment: ${{ inputs.registry_profile }}

    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=☸️ [HELM] Helm Deploy — Job Started::App: ${{ inputs.app_name }} | Namespace: ${{ inputs.namespace }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6

      - name: Derive sanitized branch name
        id: branch
        shell: bash
        run: |
          set -euo pipefail
          RAW_NAME="${GITHUB_REF_NAME:-}"  # Provided by Actions runtime
          if [ -z "$RAW_NAME" ]; then
            RAW_NAME="${GITHUB_REF##*/}" || RAW_NAME="detached"
          fi
            SANITIZED=$(echo "$RAW_NAME" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9._-]+/-/g; s/-{2,}/-/g; s/^-+//; s/-+$//' )
          [ -z "$SANITIZED" ] && SANITIZED="detached"
          SANITIZED=${SANITIZED:0:40}
          echo "name=$SANITIZED" >> "$GITHUB_OUTPUT"
          echo "BRANCH_SANITIZED=$SANITIZED" >> "$GITHUB_ENV"

      - name: Process kubeconfig input
        id: kube
        shell: bash
        env:
          KUBECONFIG_DATA: ${{ env.KUBECONFIG_INPUT }}
        run: |
          set -euo pipefail
          echo "::group::☸️ [CHECKPOINT 1/2] Process kubeconfig input"
          DATA="${KUBECONFIG_DATA:-}"
          if [ -z "$DATA" ]; then
            echo "kubeconfig_data input is required but empty." >&2
            exit 1
          fi
          # Detect if base64 or raw (heuristic: look for apiVersion: substring)
          if echo "$DATA" | grep -q 'apiVersion:'; then
            printf "%s" "$DATA" > kubeconfig.yaml
          else
            echo "$DATA" | base64 -d > kubeconfig.yaml || { echo "Failed to base64 decode kubeconfig_data input" >&2; exit 1; }
          fi
          chmod 600 kubeconfig.yaml
          echo "kubeconfig_path=${{ github.workspace }}/kubeconfig.yaml" >> "$GITHUB_OUTPUT"
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/2] Kubeconfig processed — PASSED"
          echo "::endgroup::"

      - name: Set KUBECONFIG env
        shell: bash
        run: echo "KUBECONFIG=${{ steps.kube.outputs.kubeconfig_path }}" >> "$GITHUB_ENV"

      - name: Install Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.0

      - name: Helm upgrade / install
        shell: bash
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
          CHART: ${{ env.CHART }}
          CHART_REPO: ${{ env.CHART_REPO }}
          ENVIRONMENT_LABEL: ${{ env.ENVIRONMENT_LABEL }}
          SERVICE_TARGET_PORT: ${{ env.SERVICE_TARGET_PORT }}
          INGRESS_HOST: ${{ env.INGRESS_HOST }}
          INGRESS_TLS_SECRET: ${{ env.INGRESS_TLS_SECRET }}
          INGRESS_CERT_ISSUER: ${{ env.INGRESS_CERT_ISSUER }}
          INGRESS_PROXY_BODY_SIZE: ${{ env.INGRESS_PROXY_BODY_SIZE }}
          IMAGE_REPO: ${{ env.IMAGE_REPO }}
          PULL_SECRET: ${{ env.PULL_SECRET }}
          HELM_TIMEOUT: ${{ env.HELM_TIMEOUT }}
          EXTRA_SET_VALUES: ${{ env.EXTRA_SET_VALUES }}
          EXTRA_ARGS: ${{ env.EXTRA_ARGS }}
          INGRESS_PATHS: ${{ env.INGRESS_PATHS }}
          BRANCH: ${{ steps.branch.outputs.name }}
        run: |
          set -euo pipefail
          REPO_ARG=""
          if [ -n "$CHART_REPO" ]; then
            # Add / update repo idempotently (use chart name as alias if not already present)
            helm repo add s9generic "$CHART_REPO" 2>/dev/null || true
            helm repo update >/dev/null
            if [ "$CHART" = "s9genericchart" ]; then
              CHART_REF="s9generic/$CHART"
            else
              CHART_REF="$CHART"
            fi
          else
            CHART_REF="$CHART"
          fi

          BASE_SET_ARGS=(
            --set service.targetPort="${SERVICE_TARGET_PORT}"
            --set app.name="${APP_NAME}"
            --set app.version="github-${BRANCH}-${GITHUB_RUN_NUMBER}"
            --set environment="${ENVIRONMENT_LABEL}"
            --set ingress.hosts[0].host="${INGRESS_HOST}"
            --set ingress.hosts[0].tlsSecret="${INGRESS_TLS_SECRET}"
            --set image.repo="${IMAGE_REPO}"
            --set image.pullSecret="${PULL_SECRET}"
            --set ingress.annotations.cert-manager\\.io/cluster-issuer="${INGRESS_CERT_ISSUER}"
            --set ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-body-size="${INGRESS_PROXY_BODY_SIZE}"
          )


          # Build path args from YAML-style list (INGRESS_PATHS). Accept lines beginning with optional '-'.
          PATH_SET_ARGS=()
          if [ -n "${INGRESS_PATHS// /}" ]; then
            INDEX=0
            # Normalize CRLF to LF to avoid hidden \r in paths. IMPORTANT: avoid using a pipe into while,
            # because that would execute the loop in a subshell and lose PATH_SET_ARGS mutations.
            CLEAN_PATHS="$(printf '%s' "$INGRESS_PATHS" | tr -d '\r')"
            while IFS= read -r line; do
              # Strip end-of-line comments (simple heuristic) then trim both ends
              line="$(printf '%s' "$line" | sed -E 's/#.*$//')"
              line="$(printf '%s' "$line" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
              [ -z "$line" ] && continue
              # Remove leading '-' and any following spaces; then unquote potential surrounding quotes
              P="$(printf '%s' "$line" | sed -E 's/^-[[:space:]]+//; s/^"//; s/"$//; s/^'\''//; s/'\''$//')"
              [ -z "$P" ] && continue
              # Append as two tokens: '--set' and 'ingress.paths[index]=value' so Helm parses correctly.
              PATH_SET_ARGS+=( --set "ingress.paths[$INDEX]=$P" )
              INDEX=$((INDEX+1))
            done <<< "$CLEAN_PATHS"
          fi

          EXTRA_SET_ARGS=""
          if [ -n "${EXTRA_SET_VALUES// /}" ]; then
            while IFS= read -r line; do
              [ -z "${line}" ] && continue
              # Trim spaces
              KV=$(echo "$line" | sed 's/^ *//;s/ *$//')
              [ -z "$KV" ] && continue
              EXTRA_SET_ARGS+=" --set $KV"
            done <<< "$EXTRA_SET_VALUES"
          fi

          echo "::group::☸️ [CHECKPOINT 2/2] Helm upgrade/install: ${APP_NAME}"
          echo "→ Namespace: ${NAMESPACE} | Chart: ${CHART_REF} | Timeout: ${HELM_TIMEOUT}"
          echo "🚀 Deploying '${APP_NAME}' to namespace '${NAMESPACE}' via chart '${CHART_REF}'..."
          helm upgrade "${APP_NAME}" "$CHART_REF" \
            --install \
            --namespace "${NAMESPACE}" \
            --create-namespace \
            "${BASE_SET_ARGS[@]}" "${PATH_SET_ARGS[@]}" ${EXTRA_SET_ARGS} \
            --timeout "${HELM_TIMEOUT}" \
            ${EXTRA_ARGS}
          echo "✅ Helm deployment of '${APP_NAME}' completed successfully."
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/2] Helm upgrade/install completed — PASSED"
          echo "::endgroup::"

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=☸️ [HELM] Deploy Job Failed::App '${{ inputs.app_name }}' failed | Namespace: ${{ inputs.namespace }}"
          echo "  Checkpoint 1 — Kubeconfig:     ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Helm deploy:     ${CHECKPOINT_2_STATUS:-❌ Not reached}"

      - name: Show release status
        if: always()
        shell: bash
        env:
          APP_NAME: ${{ env.APP_NAME }}
          NAMESPACE: ${{ env.NAMESPACE }}
        run: |
          set -euo pipefail
          echo "::group::☸️ Post-deploy release status: ${APP_NAME}"
          helm status "$APP_NAME" -n "$NAMESPACE" || true
          echo "---"
          kubectl get pods -n "$NAMESPACE" -l app.kubernetes.io/instance="$APP_NAME" || true
          echo "::endgroup::"

      - name: Notes
        run: |
          echo "Override defaults by passing inputs to the workflow_call. Provide extra --set pairs via 'extra_set_values' (newline separated). Raw flags (e.g. --atomic) via 'extra_args'."

      - name: Write job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          APP_NAME: ${{ inputs.app_name }}
          NAMESPACE: ${{ inputs.namespace }}
          CHART: ${{ inputs.chart }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## ☸️ Helm Deploy — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| App | \`${APP_NAME}\` |"
            echo "| Namespace | \`${NAMESPACE}\` |"
            echo "| Chart | \`${CHART}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
            echo "| Run | [${RUN_ID}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Kubeconfig processed | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Helm upgrade/install | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
