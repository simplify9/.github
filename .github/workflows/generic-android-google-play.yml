name: Generic Android Build and Google Play Release (reusable)

on:
  workflow_call:
    inputs:
      ubuntu-runner:
        description: GitHub-hosted Ubuntu runner label
        required: false
        type: string
        default: ubuntu-latest
      node-version:
        description: Node version for JS dependency install
        required: false
        type: string
        default: "24"
      java-version:
        description: Java version for Android builds
        required: false
        type: string
        default: "17"
      java-distribution:
        description: Java distribution for setup-java
        required: false
        type: string
        default: temurin

      app-id:
        description: Android applicationId / package name
        required: true
        type: string
      app-slug:
        description: App slug used in output AAB file naming
        required: false
        type: string
        default: app
      # Versioning inputs:
      # - version-prefix is the base release line.
      # - version-name-offset moves the run counter for versionName.
      # - version-code-offset keeps Play versionCode strictly increasing.
      version-prefix:
        description: Base version for VERSION_NAME (X.Y or X.Y.Z, for example 4.0.0)
        required: false
        type: string
        default: "1.0.0"
      version-name-override:
        description: Optional explicit VERSION_NAME; if empty uses base version + increment with single-digit carry
        required: false
        type: string
        default: ""
      version-name-offset:
        description: Numeric offset added to github.run_number when computing VERSION_NAME
        required: false
        type: string
        default: "0"
      version-code-offset:
        description: Numeric offset added to github.run_number for VERSION_CODE (set high for CI migrations)
        required: false
        type: string
        default: "80000"

      # Package manager inputs keep setup-node cache and install commands aligned.
      # Defaults preserve legacy behavior (Yarn at repository root).
      package-manager:
        description: Node package manager used for cache and default dependency commands (yarn or npm)
        required: false
        type: string
        default: yarn
      package-manager-directory:
        description: Directory containing package.json and lockfile for selected package manager
        required: false
        type: string
        default: "."
      cache-dependency-path:
        description: Optional explicit lockfile path used by setup-node cache
        required: false
        type: string
        default: ""
      # Leave install-command empty to use package-manager defaults.
      # Set this only when a caller needs a fully custom install command.
      install-command:
        description: Optional explicit dependency install command; if empty uses package-manager default
        required: false
        type: string
        default: ""
      install-jetifier:
        description: Install jetifier as dev dependency
        required: false
        type: boolean
        default: true
      run-jetifier:
        description: Run npx jetify
        required: false
        type: boolean
        default: true

      build-root-directory:
        description: Android project root for Gradle
        required: false
        type: string
        default: android
      gradle-task:
        description: Gradle task to build release artifact
        required: false
        type: string
        default: bundleRelease
      gradle-version:
        description: Gradle version input for gradle-build-action
        required: false
        type: string
        default: wrapper
      gradle-extra-arguments:
        description: Optional extra Gradle args
        required: false
        type: string
        default: ""

      keystore-output-path:
        description: Where to write decoded keystore
        required: false
        type: string
        default: android/app/release.keystore
      aab-source-path:
        description: Built AAB path to rename/upload
        required: false
        type: string
        default: android/app/build/outputs/bundle/release/app-release.aab
      aab-name-pattern:
        description: Output AAB name pattern with tokens {app_slug},{version_name},{run_number}
        required: false
        type: string
        default: "{app_slug}-release-{version_name}.aab"
      artifact-name:
        description: Artifact name for upload/download
        required: false
        type: string
        default: aab

      play-track:
        description: Google Play track (internal, alpha, beta, production)
        required: false
        type: string
        default: internal
      release-status:
        description: Google Play release status
        required: false
        type: string
        default: completed
      changes-not-sent-for-review:
        description: If true, use changesNotSentForReview
        required: false
        type: boolean
        default: false
      release-environment:
        description: Optional GitHub environment for release job
        required: false
        type: string
        default: ""
      # Build-only toggle. When true, both Google Play release jobs are skipped.
      disable-release:
        description: If true, skip Google Play release jobs and run build-only
        required: false
        type: boolean
        default: false

    secrets:
      android-keystore-base64:
        description: Base64 encoded Android keystore
        required: true
      android-keystore-password:
        description: Android keystore password
        required: true
      android-key-alias:
        description: Android signing key alias
        required: true
      android-key-password:
        description: Android signing key password
        required: true
      google-play-service-account-json:
        description: Google Play service account JSON
        required: false

    outputs:
      version-name:
        description: Version name used for this release
        value: ${{ jobs.build.outputs.version-name }}
      version-code:
        description: Version code used for this release
        value: ${{ jobs.build.outputs.version-code }}
      aab-file:
        description: Output AAB file uploaded and released
        value: ${{ jobs.build.outputs.aab-file }}

permissions:
  contents: read

jobs:
  build:
    name: Build AAB
    runs-on: ${{ inputs.ubuntu-runner }}
    outputs:
      version-name: ${{ steps.compute.outputs.version_name }}
      version-code: ${{ steps.compute.outputs.version_code }}
      aab-file: ${{ steps.rename.outputs.aab_file }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Record workflow provenance
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "## Reusable Workflow Provenance"
            echo ""
            echo "- workflow_ref: ${GITHUB_WORKFLOW_REF}"
            echo "- workflow_sha: ${GITHUB_WORKFLOW_SHA}"
            echo "- repository: ${GITHUB_REPOSITORY}"
            echo "- run_id: ${GITHUB_RUN_ID}"
            echo "- run_attempt: ${GITHUB_RUN_ATTEMPT}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Compute version values
        id: compute
        shell: bash
        run: |
          set -euo pipefail

          # versionName uses carry-based progression from base version + run count.
          # versionCode remains the Play-safe monotonic counter.
          # Keep versionName and versionCode intentionally decoupled:
          # - versionName is human-readable for release visibility.
          # - versionCode is a strictly increasing integer for Play upgrade-path checks.
          NAME_OFFSET_RAW="${{ inputs.version-name-offset }}"
          CODE_OFFSET_RAW="${{ inputs.version-code-offset }}"
          MAX_PLAY_VERSION_CODE=2100000000

          if ! [[ "${NAME_OFFSET_RAW}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: version-name-offset must be a non-negative integer. Got '${NAME_OFFSET_RAW}'."
            exit 1
          fi

          if ! [[ "${CODE_OFFSET_RAW}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: version-code-offset must be a non-negative integer. Got '${CODE_OFFSET_RAW}'."
            exit 1
          fi

          NAME_OFFSET=$((NAME_OFFSET_RAW))
          CODE_OFFSET=$((CODE_OFFSET_RAW))

          VERSION_CODE=$((GITHUB_RUN_NUMBER + CODE_OFFSET))
          INCREMENT_COUNT=$((GITHUB_RUN_NUMBER + NAME_OFFSET))
          VERSION_NAME_SOURCE="computed"
          OVERRIDE_DISPLAY="<empty>"

          if [[ -n "${{ inputs.version-name-override }}" ]]; then
            VERSION_NAME="${{ inputs.version-name-override }}"
            VERSION_NAME_SOURCE="override"
            OVERRIDE_DISPLAY="${{ inputs.version-name-override }}"
          else
            BASE_VERSION_RAW="${{ inputs.version-prefix }}"
            BASE_MAJOR=""
            BASE_MINOR=""
            BASE_PATCH=""

            if [[ "${BASE_VERSION_RAW}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              BASE_MAJOR="${BASH_REMATCH[1]}"
              BASE_MINOR="${BASH_REMATCH[2]}"
              BASE_PATCH="${BASH_REMATCH[3]}"
            elif [[ "${BASE_VERSION_RAW}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
              BASE_MAJOR="${BASH_REMATCH[1]}"
              BASE_MINOR="${BASH_REMATCH[2]}"
              BASE_PATCH="0"
            else
              echo "ERROR: version-prefix must be in X.Y or X.Y.Z format. Got '${BASE_VERSION_RAW}'."
              exit 1
            fi

            if (( BASE_MINOR > 9 || BASE_PATCH > 9 )); then
              echo "ERROR: version-prefix minor and patch must be single digits (0-9). Got '${BASE_VERSION_RAW}'."
              exit 1
            fi

            PATCH_TOTAL=$((BASE_PATCH + INCREMENT_COUNT))
            PATCH_CARRY=$((PATCH_TOTAL / 10))
            FINAL_PATCH=$((PATCH_TOTAL % 10))

            MINOR_TOTAL=$((BASE_MINOR + PATCH_CARRY))
            MINOR_CARRY=$((MINOR_TOTAL / 10))
            FINAL_MINOR=$((MINOR_TOTAL % 10))

            FINAL_MAJOR=$((BASE_MAJOR + MINOR_CARRY))
            VERSION_NAME="${FINAL_MAJOR}.${FINAL_MINOR}.${FINAL_PATCH}"
          fi

          if ! [[ "${VERSION_CODE}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: Computed VERSION_CODE must be a positive integer. Got '${VERSION_CODE}'."
            exit 1
          fi

          if (( VERSION_CODE > MAX_PLAY_VERSION_CODE )); then
            echo "ERROR: Computed VERSION_CODE '${VERSION_CODE}' exceeds Play-safe limit '${MAX_PLAY_VERSION_CODE}'."
            exit 1
          fi

          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

          {
            echo "## Android Version Computation"
            echo ""
            echo "- versionName source: ${VERSION_NAME_SOURCE}"
            echo "- base version: ${{ inputs.version-prefix }}"
            echo "- versionName override: ${OVERRIDE_DISPLAY}"
            echo "- versionName offset: ${NAME_OFFSET}"
            echo "- versionName increment count: ${INCREMENT_COUNT}"
            echo "- versionCode offset: ${CODE_OFFSET}"
            echo "- github.run_number: ${GITHUB_RUN_NUMBER}"
            echo "- final versionName: ${VERSION_NAME}"
            echo "- final versionCode: ${VERSION_CODE}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve package manager settings
        id: package_manager
        shell: bash
        run: |
          set -euo pipefail

          # Normalize inputs so package-manager value handling is case-insensitive.
          PACKAGE_MANAGER_RAW="${{ inputs.package-manager }}"
          PACKAGE_MANAGER="$(echo "${PACKAGE_MANAGER_RAW}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR_RAW="${{ inputs.package-manager-directory }}"
          PACKAGE_DIR="${PACKAGE_DIR_RAW:-.}"

          if [[ -z "${PACKAGE_DIR}" ]]; then
            PACKAGE_DIR="."
          fi

          if [[ "${PACKAGE_DIR}" == "." ]]; then
            DISPLAY_DIR="repository root"
          else
            DISPLAY_DIR="${PACKAGE_DIR}"
          fi

          # Keep cache type and install commands tied to the selected package manager.
          case "${PACKAGE_MANAGER}" in
            yarn)
              DEFAULT_LOCKFILE="yarn.lock"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="yarn"
                JETIFIER_INSTALL_COMMAND="yarn add -D jetifier"
                JETIFIER_RUN_COMMAND="npx jetify"
              else
                DEFAULT_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}'"
                JETIFIER_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}' add -D jetifier"
                JETIFIER_RUN_COMMAND="npx --yes --prefix '${PACKAGE_DIR}' jetify"
              fi
              ;;
            npm)
              DEFAULT_LOCKFILE="package-lock.json"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="npm ci"
                JETIFIER_INSTALL_COMMAND="npm install --save-dev jetifier"
                JETIFIER_RUN_COMMAND="npx jetify"
              else
                DEFAULT_INSTALL_COMMAND="npm ci --prefix '${PACKAGE_DIR}'"
                JETIFIER_INSTALL_COMMAND="npm install --save-dev jetifier --prefix '${PACKAGE_DIR}'"
                JETIFIER_RUN_COMMAND="npx --yes --prefix '${PACKAGE_DIR}' jetify"
              fi
              ;;
            *)
              echo "ERROR: Unsupported package-manager '${PACKAGE_MANAGER_RAW}'. Supported values: yarn, npm."
              exit 1
              ;;
            esac

            # Infer lockfile path from package-manager + directory when no explicit override is provided.
            CACHE_DEPENDENCY_PATH_INPUT="${{ inputs.cache-dependency-path }}"
            CACHE_DEPENDENCY_PATH="${CACHE_DEPENDENCY_PATH_INPUT}"

          if [[ -z "${CACHE_DEPENDENCY_PATH}" ]]; then
            if [[ "${PACKAGE_DIR}" == "." ]]; then
              CACHE_DEPENDENCY_PATH="${DEFAULT_LOCKFILE}"
            else
              CACHE_DEPENDENCY_PATH="${PACKAGE_DIR}/${DEFAULT_LOCKFILE}"
            fi
          fi

          # Fail fast with a clear message rather than letting setup-node fail later.
          if [[ ! -f "${CACHE_DEPENDENCY_PATH}" ]]; then
            echo "ERROR: Expected lockfile '${CACHE_DEPENDENCY_PATH}' was not found."
            echo "Set package-manager-directory or cache-dependency-path to the correct location."
            exit 1
          fi

          echo "cache=${PACKAGE_MANAGER}" >> "$GITHUB_OUTPUT"
          echo "cache_dependency_path=${CACHE_DEPENDENCY_PATH}" >> "$GITHUB_OUTPUT"
          echo "default_install_command=${DEFAULT_INSTALL_COMMAND}" >> "$GITHUB_OUTPUT"
          echo "jetifier_install_command=${JETIFIER_INSTALL_COMMAND}" >> "$GITHUB_OUTPUT"
          echo "jetifier_run_command=${JETIFIER_RUN_COMMAND}" >> "$GITHUB_OUTPUT"

          {
            echo "## Node Package Manager Resolution"
            echo ""
            echo "- package manager: ${PACKAGE_MANAGER}"
            echo "- package directory: ${DISPLAY_DIR}"
            echo "- cache dependency path: ${CACHE_DEPENDENCY_PATH}"
            echo "- default install command: ${DEFAULT_INSTALL_COMMAND}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package_manager.outputs.cache }}
          cache-dependency-path: ${{ steps.package_manager.outputs.cache_dependency_path }}

      - name: Setup Java (Android)
        uses: actions/setup-java@v4
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}
          cache: gradle

      - name: Install node dependencies
        shell: bash
        run: ${{ inputs.install-command != '' && inputs.install-command || steps.package_manager.outputs.default_install_command }}

      - name: Install jetifier
        if: ${{ inputs.install-jetifier }}
        shell: bash
        run: ${{ steps.package_manager.outputs.jetifier_install_command }}

      - name: Jetify
        if: ${{ inputs.run-jetifier }}
        shell: bash
        run: ${{ steps.package_manager.outputs.jetifier_run_command }}

      - name: Restore keystore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$(dirname '${{ inputs.keystore-output-path }}')"
          echo "${{ secrets.android-keystore-base64 }}" | base64 -d > "${{ inputs.keystore-output-path }}"

      - name: Verify keystore exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah "$(dirname '${{ inputs.keystore-output-path }}')"
          test -f "${{ inputs.keystore-output-path }}"

      - name: Build Release Bundle (AAB)
        uses: gradle/gradle-build-action@v3
        with:
          build-root-directory: ${{ inputs.build-root-directory }}
          arguments: >
            ${{ inputs.gradle-task }}
            -PversionName=${{ steps.compute.outputs.version_name }}
            -PversionCode=${{ steps.compute.outputs.version_code }}
            -PapplicationId=${{ inputs.app-id }}
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/${{ inputs.keystore-output-path }}
            -Pandroid.injected.signing.store.password=${{ secrets.android-keystore-password }}
            -Pandroid.injected.signing.key.alias=${{ secrets.android-key-alias }}
            -Pandroid.injected.signing.key.password=${{ secrets.android-key-password }}
            ${{ inputs.gradle-extra-arguments }}
          gradle-version: ${{ inputs.gradle-version }}

      - name: Rename bundle
        id: rename
        shell: bash
        run: |
          set -euo pipefail
          PATTERN='${{ inputs.aab-name-pattern }}'
          AAB_OUT="${PATTERN//\{app_slug\}/${{ inputs.app-slug }}}"
          AAB_OUT="${AAB_OUT//\{version_name\}/${VERSION_NAME}}"
          AAB_OUT="${AAB_OUT//\{run_number\}/${GITHUB_RUN_NUMBER}}"

          if [[ -z "${AAB_OUT}" ]]; then
            echo "ERROR: Resolved output AAB name is empty. Check aab-name-pattern input."
            exit 1
          fi

          SRC_DIR="$(dirname '${{ inputs.aab-source-path }}')"
          echo "Looking for built AAB in: ${SRC_DIR}"
          ls -lah "${SRC_DIR}" || true

          if [[ ! -f "${{ inputs.aab-source-path }}" ]]; then
            echo "ERROR: Expected AAB not found at '${{ inputs.aab-source-path }}'."
            exit 1
          fi

          mv "${{ inputs.aab-source-path }}" "${AAB_OUT}"

          if [[ ! -f "${AAB_OUT}" ]]; then
            echo "ERROR: Rename succeeded but output AAB '${AAB_OUT}' is missing."
            exit 1
          fi

          echo "aab_file=${AAB_OUT}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ steps.rename.outputs.aab_file }}

  release:
    name: Release to Google Play
    runs-on: ${{ inputs.ubuntu-runner }}
    needs: build
    # Release path without GitHub Environment protection.
    if: ${{ inputs.release-environment == '' && !inputs.disable-release }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve AAB path for release runner
        id: aab
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE='${{ needs.build.outputs.aab-file }}'
          AAB_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            AAB_FILE="$(basename "${CANDIDATE}")"
          fi

          # Fallback for cases where reusable output is empty or path does not match release runner context.
          if [[ -z "${AAB_FILE}" || ! -f "${AAB_FILE}" ]]; then
            AAB_FILE="$(ls -1 *.aab 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${AAB_FILE}" || ! -f "${AAB_FILE}" ]]; then
            echo "ERROR: No .aab file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=${AAB_FILE}" >> "$GITHUB_OUTPUT"

      - name: Verify AAB exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah
          test -f "${{ steps.aab.outputs.path }}"

      - name: Validate release credentials
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.google-play-service-account-json }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "ERROR: Missing required secret 'google-play-service-account-json' for release."
            echo "Set disable-release=true to run build-only without Google Play publish."
            exit 1
          fi

      - name: Upload to Google Play
        uses: simplify9/.github/.github/actions/upload-google-play-release@main
        with:
          service_account_json: ${{ secrets.google-play-service-account-json }}
          package_name: ${{ inputs.app-id }}
          aab_path: ${{ steps.aab.outputs.path }}
          track: ${{ inputs.play-track }}
          release_name: ${{ needs.build.outputs.version-name }}
          status: ${{ inputs.release-status }}
          changes_not_sent_for_review: ${{ inputs.changes-not-sent-for-review && 'true' || 'false' }}

  release_with_environment:
    name: Release to Google Play
    runs-on: ${{ inputs.ubuntu-runner }}
    needs: build
    # Release path with GitHub Environment protection/approvals.
    if: ${{ inputs.release-environment != '' && !inputs.disable-release }}
    environment: ${{ inputs.release-environment }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve AAB path for release runner
        id: aab
        shell: bash
        run: |
          set -euo pipefail
          CANDIDATE='${{ needs.build.outputs.aab-file }}'
          AAB_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            AAB_FILE="$(basename "${CANDIDATE}")"
          fi

          # Fallback for cases where reusable output is empty or path does not match release runner context.
          if [[ -z "${AAB_FILE}" || ! -f "${AAB_FILE}" ]]; then
            AAB_FILE="$(ls -1 *.aab 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${AAB_FILE}" || ! -f "${AAB_FILE}" ]]; then
            echo "ERROR: No .aab file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=${AAB_FILE}" >> "$GITHUB_OUTPUT"

      - name: Verify AAB exists
        shell: bash
        run: |
          set -euo pipefail
          ls -lah
          test -f "${{ steps.aab.outputs.path }}"

      - name: Validate release credentials
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.google-play-service-account-json }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "ERROR: Missing required secret 'google-play-service-account-json' for release."
            echo "Set disable-release=true to run build-only without Google Play publish."
            exit 1
          fi

      - name: Upload to Google Play
        uses: simplify9/.github/.github/actions/upload-google-play-release@main
        with:
          service_account_json: ${{ secrets.google-play-service-account-json }}
          package_name: ${{ inputs.app-id }}
          aab_path: ${{ steps.aab.outputs.path }}
          track: ${{ inputs.play-track }}
          release_name: ${{ needs.build.outputs.version-name }}
          status: ${{ inputs.release-status }}
          changes_not_sent_for_review: ${{ inputs.changes-not-sent-for-review && 'true' || 'false' }}
