name: 'Reusable SW CI/CD Pipeline'

on:
  workflow_call:
    inputs:
      # Version configuration
      major-version:
        description: 'Major version number'
        required: false
        default: '1'
        type: string
      minor-version:
        description: 'Minor version number'
        required: false
        default: '0'
        type: string
      
      # .NET Build configuration
      dotnet-version:
        description: 'Dotnet version to use'
        required: false
        default: '8.0.x'
        type: string
      nuget-projects:
        description: 'NuGet projects to pack and push (glob pattern). Leave empty to skip NuGet publishing.'
        required: false
        default: ''
        type: string
      test-projects:
        description: 'Test projects to run (glob pattern)'
        required: false
        default: '**/*UnitTests/*.csproj'
        type: string
      run-tests:
        description: 'Whether to run tests'
        required: false
        default: 'false'
        type: string
      
      # Docker configuration
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        default: './Dockerfile'
        type: string
      docker-context:
        description: 'Docker build context'
        required: false
        default: '.'
        type: string
      docker-platforms:
        description: 'Target platforms for Docker build'
        required: false
        default: 'linux/amd64'
        type: string
      
      # Helm configuration
      chart-path:
        description: 'Path to Helm chart directory'
        required: false
        default: './chart'
        type: string
      chart-name:
        description: 'Helm chart name'
        required: true
        type: string
      chart-publish-method:
        description: 'Chart publish method: oci or chartmuseum'
        required: false
        default: 'oci'
        type: string
      chart-repo-url:
        description: 'Helm chart repository URL (required when chart-publish-method is chartmuseum, e.g. https://charts.sf9.io)'
        required: false
        type: string
      
      # Deployment configuration
      deploy-to-development:
        description: 'Deploy to development environment'
        required: false
        default: true
        type: boolean
      development-namespace:
        description: 'Kubernetes namespace for development'
        required: false
        default: 'development'
        type: string
      
      # Registry configuration
      container-registry:
        description: 'Container registry (docker.io, ghcr.io, etc.)'
        required: false
        default: 'ghcr.io'
        type: string
      image-name:
        description: 'Docker image name (will use repository name if not provided)'
        required: false
        type: string
      
      # Deployment values
      helm-set-values:
        description: 'Additional Helm set values (comma-separated: key1=value1,key2=value2)'
        required: false
        type: string

    secrets:
      # NuGet secrets
      nuget-api-key:
        description: 'NuGet API key'
        required: false
      nuget-source:
        description: 'NuGet source URL'
        required: false
      # Registry secrets
      registry-username:
        description: 'Container registry username'
        required: false
      registry-password:
        description: 'Container registry password/token'
        required: false
      
      # Kubernetes secrets
      kubeconfig:
        description: 'Base64 encoded kubeconfig'
        required: false
      
      # GitHub token for tagging
      github-token:
        description: 'GitHub token for tagging'
        required: false
      
      # Secret deployment values
      helm-set-secret-values:
        description: 'Additional Helm set secret values (comma-separated: key1=value1,key2=value2)'
        required: false
      chartmuseum-username:
        description: 'ChartMuseum username (required when chart-publish-method is chartmuseum)'
        required: false
      chartmuseum-password:
        description: 'ChartMuseum password/token (required when chart-publish-method is chartmuseum)'
        required: false

    outputs:
      version:
        description: 'Generated semantic version'
        value: ${{ jobs.version.outputs.version }}
      docker-image:
        description: 'Built Docker image with tag'
        value: ${{ jobs.ci.outputs.docker-image }}
      helm-chart:
        description: 'Published Helm chart URL'
        value: ${{ jobs.ci.outputs.helm-chart }}

env:
  # Set default registry and image name
  CONTAINER_REGISTRY: ${{ inputs.container-registry }}
  IMAGE_NAME: ${{ inputs.image-name || github.repository }}
  CHART_PUBLISH_METHOD: ${{ inputs.chart-publish-method }}
  CHART_REPO_URL: ${{ inputs.chart-repo-url }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Announce version job
        run: |
          echo "::notice title=🏷️ [VERSION] Semver — Job Started::Major: ${{ inputs.major-version }} | Minor: ${{ inputs.minor-version }} | SHA: ${{ github.sha }} | Triggered by: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Determine semantic version
        id: semver
        uses: simplify9/.github/.github/actions/determine-semver@main
        with:
          major: ${{ inputs.major-version }}
          minor: ${{ inputs.minor-version }}
 
      - name: Tag new version on GitHub origin
        uses: simplify9/.github/.github/actions/tag-github-origin@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag: ${{ steps.semver.outputs.version }}
          sha: ${{ github.sha }}

      - name: Write version job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SEMVER_VERSION: ${{ steps.semver.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🏷️ Version Job — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Computed version | \`${SEMVER_VERSION}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| SHA | \`${COMMIT_SHA}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
          } >> "$GITHUB_STEP_SUMMARY"

  nuget:
    runs-on: ubuntu-latest
    needs: version
    if: ${{ inputs.nuget-projects != '' }}
    steps:
      - name: Announce nuget job
        run: |
          echo "::notice title=🔷 [DOTNET] NuGet Publish — Job Started::Version: ${{ needs.version.outputs.version }} | Projects: ${{ inputs.nuget-projects }} | Triggered by: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Dotnet Restore, Build, and Test
        uses: simplify9/.github/.github/actions/dotnet-build@main
        with:
          projects: "**/*.csproj"
          test-projects: ${{ inputs.test-projects }}
          configuration: "Release"
          dotnet-version: ${{ inputs.dotnet-version }}
          run-tests: ${{ inputs.run-tests }}

      - name: Pack and Push NuGet Package
        uses: simplify9/.github/.github/actions/dotnet-pack-push@main
        with:
          projects: ${{ inputs.nuget-projects }}
          configuration: "Release"
          version: ${{ needs.version.outputs.version }}
          api-key: ${{ secrets.nuget-api-key }}
          nuget-source: ${{ secrets.nuget-source || 'https://api.nuget.org/v3/index.json' }}

      - name: Write nuget job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          VERSION: ${{ needs.version.outputs.version }}
          NUGET_PROJECTS: ${{ inputs.nuget-projects }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🔷 NuGet Publish Job — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VERSION}\` |"
            echo "| Projects | \`${NUGET_PROJECTS}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
          } >> "$GITHUB_STEP_SUMMARY"

  ci:
    runs-on: ubuntu-latest
    needs: version
    outputs:
      docker-image: ${{ steps.docker.outputs.image-tags }}
      helm-chart: ${{ steps.helm_oci.outputs.chart-url || steps.helm_chartmuseum.outputs.chart-url }}
    steps:
      - name: Announce ci job
        run: |
          echo "::notice title=🐳 [DOCKER] CI Build — Job Started::Version: ${{ needs.version.outputs.version }} | Registry: ${{ inputs.container-registry }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Validate chart publish configuration
        run: |
          echo "::group::🐳 [CHECKPOINT 1/3] Validate chart publish configuration"
          echo "→ Method: ${{ inputs.chart-publish-method }}"
          case "${{ inputs.chart-publish-method }}" in
            oci)
              ;;
            chartmuseum)
              if [ -z "${{ inputs.chart-repo-url }}" ]; then
                echo "Error: chart-repo-url is required when chart-publish-method is chartmuseum."
                exit 1
              fi
              if [ -z "${{ secrets.chartmuseum-username }}" ]; then
                echo "Error: chartmuseum-username secret is required when chart-publish-method is chartmuseum."
                exit 1
              fi
              if [ -z "${{ secrets.chartmuseum-password }}" ]; then
                echo "Error: chartmuseum-password secret is required when chart-publish-method is chartmuseum."
                exit 1
              fi
              ;;
            *)
              echo "Error: Unsupported chart-publish-method '${{ inputs.chart-publish-method }}'. Use 'oci' or 'chartmuseum'."
              exit 1
              ;;
          esac
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Chart configuration validated — PASSED"
          echo "::endgroup::"

      - name: Build and push Docker image
        id: docker
        uses: simplify9/.github/.github/actions/docker-build-push@main
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          version: ${{ needs.version.outputs.version }}
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          dockerfile: ${{ inputs.dockerfile-path }}
          context: ${{ inputs.docker-context }}
          platforms: ${{ inputs.docker-platforms }}

      - name: Confirm Docker image built
        run: |
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Docker image built and pushed — PASSED"

      - name: Package and push Helm chart (OCI)
        if: inputs.chart-publish-method == 'oci'
        id: helm_oci
        uses: simplify9/.github/.github/actions/helm-package-push@main
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-path: ${{ inputs.chart-path }}
          version: ${{ needs.version.outputs.version }}
          publish-method: 'oci'
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          image-repository: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}
          image-tag: ${{ needs.version.outputs.version }}
          update-image-values: 'true'

      - name: Package and push Helm chart (ChartMuseum)
        if: inputs.chart-publish-method == 'chartmuseum'
        id: helm_chartmuseum
        uses: simplify9/.github/.github/actions/helm-package-push@main
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-path: ${{ inputs.chart-path }}
          version: ${{ needs.version.outputs.version }}
          helm-version: '3.2.4'
          update-dependencies: 'true'
          publish-method: 'chartmuseum'
          chartmuseum-url: ${{ env.CHART_REPO_URL }}
          chartmuseum-username: ${{ secrets.chartmuseum-username }}
          chartmuseum-password: ${{ secrets.chartmuseum-password }}
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          image-repository: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}
          image-tag: ${{ needs.version.outputs.version }}
          update-image-values: 'true'

      - name: Confirm Helm chart pushed
        run: |
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] Helm chart pushed — PASSED: ${{ inputs.chart-name }}@${{ needs.version.outputs.version }}"

      - name: Report ci job failure
        if: failure()
        run: |
          echo "::error title=🐳 [DOCKER] CI Job Failed::Chart: ${{ inputs.chart-name }} | Version: ${{ needs.version.outputs.version }}"
          echo "  Checkpoint 1 — Config validation: ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Docker build:     ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — Helm chart push:  ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Write ci job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          CHART_NAME: ${{ inputs.chart-name }}
          VERSION: ${{ needs.version.outputs.version }}
          REGISTRY_INPUT: ${{ inputs.container-registry }}
          CHART_METHOD: ${{ inputs.chart-publish-method }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🐳 CI Build — ${CHART_NAME} — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VERSION}\` |"
            echo "| Registry | \`${REGISTRY_INPUT}\` |"
            echo "| Chart method | ${CHART_METHOD} |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Config validated | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Docker image built | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | Helm chart pushed | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy-development:
    runs-on: ubuntu-latest
    needs: [version, ci]
    if: ${{ inputs.deploy-to-development }}
    environment: development  # linter: ignore (scalar form is valid for GitHub Actions)
    steps:
      - name: Announce deploy-development job
        run: |
          echo "::notice title=☸️ [HELM] Deploy to Development — Job Started::Chart: ${{ inputs.chart-name }} | Version: ${{ needs.version.outputs.version }} | Namespace: ${{ inputs.development-namespace }} | Triggered by: ${{ github.actor }}"

      - name: Debug secret values in workflow template
        run: |
          if [ -n "${SECRET_VAL}" ]; then
            echo "::notice::🔐 Helm secret values are configured for this deployment."
          else
            echo "::notice::ℹ️ No Helm secret values provided — deploying with public configuration only."
          fi
        env:
          SECRET_VAL: "${{ secrets.helm-set-secret-values }}"
      
      - name: Deploy to Development (OCI)
        if: inputs.chart-publish-method == 'oci'
        uses: simplify9/.github/.github/actions/helm-deploy@main
        env:
          SECRET_VALUES: "${{ secrets.helm-set-secret-values }}"
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-version: ${{ needs.version.outputs.version }}
          chart-source-type: 'oci'
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          registry-username: ${{ secrets.registry-username || github.actor }}
          registry-password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          kubeconfig: ${{ secrets.kubeconfig }}
          release-name: ${{ inputs.chart-name }}-dev
          namespace: ${{ inputs.development-namespace }}
          set-values: ${{ inputs.helm-set-values }}
          timeout: '3m'

      - name: Deploy to Development (ChartMuseum)
        if: inputs.chart-publish-method == 'chartmuseum'
        uses: simplify9/.github/.github/actions/helm-deploy@main
        env:
          SECRET_VALUES: "${{ secrets.helm-set-secret-values }}"
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-version: ${{ needs.version.outputs.version }}
          chart-source-type: 'chartmuseum'
          chart-repo-url: ${{ env.CHART_REPO_URL }}
          chart-repo-username: ${{ secrets.chartmuseum-username }}
          chart-repo-password: ${{ secrets.chartmuseum-password }}
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          registry-username: ${{ secrets.registry-username || github.actor }}
          registry-password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          kubeconfig: ${{ secrets.kubeconfig }}
          release-name: ${{ inputs.chart-name }}-dev
          namespace: ${{ inputs.development-namespace }}
          set-values: ${{ inputs.helm-set-values }}
          timeout: '3m'

      - name: Write deploy-development job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          CHART_NAME: ${{ inputs.chart-name }}
          VERSION: ${{ needs.version.outputs.version }}
          DEV_NAMESPACE: ${{ inputs.development-namespace }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## ☸️ Deploy to Development — ${CHART_NAME} — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Chart | \`${CHART_NAME}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Namespace | \`${DEV_NAMESPACE}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
          } >> "$GITHUB_STEP_SUMMARY"