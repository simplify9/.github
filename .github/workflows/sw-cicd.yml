name: 'Reusable SW CI/CD Pipeline'

on:
  workflow_call:
    inputs:
      # Version configuration
      major-version:
        description: 'Major version number'
        required: false
        default: '1'
        type: string
      minor-version:
        description: 'Minor version number'
        required: false
        default: '0'
        type: string
      
      # .NET Build configuration
      dotnet-version:
        description: 'Dotnet version to use'
        required: false
        default: '8.0.x'
        type: string
      nuget-projects:
        description: 'NuGet projects to pack and push (glob pattern). Leave empty to skip NuGet publishing.'
        required: false
        default: ''
        type: string
      test-projects:
        description: 'Test projects to run (glob pattern)'
        required: false
        default: '**/*UnitTests/*.csproj'
        type: string
      run-tests:
        description: 'Whether to run tests'
        required: false
        default: 'false'
        type: string
      
      # Docker configuration
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        default: './Dockerfile'
        type: string
      docker-context:
        description: 'Docker build context'
        required: false
        default: '.'
        type: string
      docker-platforms:
        description: 'Target platforms for Docker build'
        required: false
        default: 'linux/amd64'
        type: string
      
      # Helm configuration
      chart-path:
        description: 'Path to Helm chart directory'
        required: false
        default: './chart'
        type: string
      chart-name:
        description: 'Helm chart name'
        required: true
        type: string
      chart-publish-method:
        description: 'Chart publish method: oci or chartmuseum'
        required: false
        default: 'oci'
        type: string
      chart-repo-url:
        description: 'Helm chart repository URL (required when chart-publish-method is chartmuseum, e.g. https://charts.sf9.io)'
        required: false
        type: string
      
      # Deployment configuration
      deploy-to-development:
        description: 'Deploy to development environment'
        required: false
        default: true
        type: boolean
      development-namespace:
        description: 'Kubernetes namespace for development'
        required: false
        default: 'development'
        type: string
      
      # Registry configuration
      container-registry:
        description: 'Container registry (docker.io, ghcr.io, etc.)'
        required: false
        default: 'ghcr.io'
        type: string
      image-name:
        description: 'Docker image name (will use repository name if not provided)'
        required: false
        type: string
      
      # Deployment values
      helm-set-values:
        description: 'Additional Helm set values (comma-separated: key1=value1,key2=value2)'
        required: false
        type: string

    secrets:
      # NuGet secrets
      nuget-api-key:
        description: 'NuGet API key'
        required: false
      nuget-source:
        description: 'NuGet source URL'
        required: false
      # Registry secrets
      registry-username:
        description: 'Container registry username'
        required: false
      registry-password:
        description: 'Container registry password/token'
        required: false
      
      # Kubernetes secrets
      kubeconfig:
        description: 'Base64 encoded kubeconfig'
        required: false
      
      # GitHub token for tagging
      github-token:
        description: 'GitHub token for tagging'
        required: false
      
      # Secret deployment values
      helm-set-secret-values:
        description: 'Additional Helm set secret values (comma-separated: key1=value1,key2=value2)'
        required: false
      chartmuseum-username:
        description: 'ChartMuseum username (required when chart-publish-method is chartmuseum)'
        required: false
      chartmuseum-password:
        description: 'ChartMuseum password/token (required when chart-publish-method is chartmuseum)'
        required: false

    outputs:
      version:
        description: 'Generated semantic version'
        value: ${{ jobs.version.outputs.version }}
      docker-image:
        description: 'Built Docker image with tag'
        value: ${{ jobs.ci.outputs.docker-image }}
      helm-chart:
        description: 'Published Helm chart URL'
        value: ${{ jobs.ci.outputs.helm-chart }}

env:
  # Set default registry and image name
  CONTAINER_REGISTRY: ${{ inputs.container-registry }}
  IMAGE_NAME: ${{ inputs.image-name || github.repository }}
  CHART_PUBLISH_METHOD: ${{ inputs.chart-publish-method }}
  CHART_REPO_URL: ${{ inputs.chart-repo-url }}

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.semver.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine semantic version
        id: semver
        uses: simplify9/.github/.github/actions/determine-semver@main
        with:
          major: ${{ inputs.major-version }}
          minor: ${{ inputs.minor-version }}
 
      - name: Tag new version on GitHub origin
        uses: simplify9/.github/.github/actions/tag-github-origin@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag: ${{ steps.semver.outputs.version }}
          sha: ${{ github.sha }}

  nuget:
    runs-on: ubuntu-latest
    needs: version
    if: ${{ inputs.nuget-projects != '' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dotnet Restore, Build, and Test
        uses: simplify9/.github/.github/actions/dotnet-build@main
        with:
          projects: "**/*.csproj"
          test-projects: ${{ inputs.test-projects }}
          configuration: "Release"
          dotnet-version: ${{ inputs.dotnet-version }}
          run-tests: ${{ inputs.run-tests }}

      - name: Pack and Push NuGet Package
        uses: simplify9/.github/.github/actions/dotnet-pack-push@main
        with:
          projects: ${{ inputs.nuget-projects }}
          configuration: "Release"
          version: ${{ needs.version.outputs.version }}
          api-key: ${{ secrets.nuget-api-key }}
          nuget-source: ${{ secrets.nuget-source || 'https://api.nuget.org/v3/index.json' }}

  ci:
    runs-on: ubuntu-latest
    needs: version
    outputs:
      docker-image: ${{ steps.docker.outputs.image-tags }}
      helm-chart: ${{ steps.helm_oci.outputs.chart-url || steps.helm_chartmuseum.outputs.chart-url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate chart publish configuration
        run: |
          case "${{ inputs.chart-publish-method }}" in
            oci)
              ;;
            chartmuseum)
              if [ -z "${{ inputs.chart-repo-url }}" ]; then
                echo "Error: chart-repo-url is required when chart-publish-method is chartmuseum."
                exit 1
              fi
              if [ -z "${{ secrets.chartmuseum-username }}" ]; then
                echo "Error: chartmuseum-username secret is required when chart-publish-method is chartmuseum."
                exit 1
              fi
              if [ -z "${{ secrets.chartmuseum-password }}" ]; then
                echo "Error: chartmuseum-password secret is required when chart-publish-method is chartmuseum."
                exit 1
              fi
              ;;
            *)
              echo "Error: Unsupported chart-publish-method '${{ inputs.chart-publish-method }}'. Use 'oci' or 'chartmuseum'."
              exit 1
              ;;
          esac

      - name: Build and push Docker image
        id: docker
        uses: simplify9/.github/.github/actions/docker-build-push@main
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          version: ${{ needs.version.outputs.version }}
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          dockerfile: ${{ inputs.dockerfile-path }}
          context: ${{ inputs.docker-context }}
          platforms: ${{ inputs.docker-platforms }}

      - name: Package and push Helm chart (OCI)
        if: inputs.chart-publish-method == 'oci'
        id: helm_oci
        uses: simplify9/.github/.github/actions/helm-package-push@main
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-path: ${{ inputs.chart-path }}
          version: ${{ needs.version.outputs.version }}
          publish-method: 'oci'
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          image-repository: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}
          image-tag: ${{ needs.version.outputs.version }}
          update-image-values: 'true'

      - name: Package and push Helm chart (ChartMuseum)
        if: inputs.chart-publish-method == 'chartmuseum'
        id: helm_chartmuseum
        uses: simplify9/.github/.github/actions/helm-package-push@main
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-path: ${{ inputs.chart-path }}
          version: ${{ needs.version.outputs.version }}
          helm-version: '3.2.4'
          update-dependencies: 'true'
          publish-method: 'chartmuseum'
          chartmuseum-url: ${{ env.CHART_REPO_URL }}
          chartmuseum-username: ${{ secrets.chartmuseum-username }}
          chartmuseum-password: ${{ secrets.chartmuseum-password }}
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          image-repository: ${{ env.CONTAINER_REGISTRY }}/${{ github.repository }}
          image-tag: ${{ needs.version.outputs.version }}
          update-image-values: 'true'

  deploy-development:
    runs-on: ubuntu-latest
    needs: [version, ci]
    if: ${{ inputs.deploy-to-development }}
    environment: development  # linter: ignore (scalar form is valid for GitHub Actions)
    steps:
      - name: Debug secret values in workflow template
        run: |
          echo "=== WORKFLOW TEMPLATE DEBUG ==="
          echo "Raw secret length: ${#SECRET_VAL}"
          echo "Raw secret value: '$SECRET_VAL'"
          echo "============================"
        env:
          SECRET_VAL: "${{ secrets.helm-set-secret-values }}"
      
      - name: Deploy to Development (OCI)
        if: inputs.chart-publish-method == 'oci'
        uses: simplify9/.github/.github/actions/helm-deploy@main
        env:
          SECRET_VALUES: "${{ secrets.helm-set-secret-values }}"
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-version: ${{ needs.version.outputs.version }}
          chart-source-type: 'oci'
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          registry-username: ${{ secrets.registry-username || github.actor }}
          registry-password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          kubeconfig: ${{ secrets.kubeconfig }}
          release-name: ${{ inputs.chart-name }}-dev
          namespace: ${{ inputs.development-namespace }}
          set-values: ${{ inputs.helm-set-values }}
          timeout: '3m'

      - name: Deploy to Development (ChartMuseum)
        if: inputs.chart-publish-method == 'chartmuseum'
        uses: simplify9/.github/.github/actions/helm-deploy@main
        env:
          SECRET_VALUES: "${{ secrets.helm-set-secret-values }}"
        with:
          chart-name: ${{ inputs.chart-name }}
          chart-version: ${{ needs.version.outputs.version }}
          chart-source-type: 'chartmuseum'
          chart-repo-url: ${{ env.CHART_REPO_URL }}
          chart-repo-username: ${{ secrets.chartmuseum-username }}
          chart-repo-password: ${{ secrets.chartmuseum-password }}
          registry: ${{ env.CONTAINER_REGISTRY }}
          repository: ${{ github.repository_owner }}/charts
          registry-username: ${{ secrets.registry-username || github.actor }}
          registry-password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          kubeconfig: ${{ secrets.kubeconfig }}
          release-name: ${{ inputs.chart-name }}-dev
          namespace: ${{ inputs.development-namespace }}
          set-values: ${{ inputs.helm-set-values }}
          timeout: '3m'