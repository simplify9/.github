# =============================================================================
# Deploy-only reusable workflow.
#
# Deploys an ALREADY-PUBLISHED Helm chart from a classic Helm chart repository
# (e.g. ChartMuseum) to a Kubernetes cluster. It does not build, package, or
# publish anything — for the full build→publish→deploy pipeline use one of the
# *-cicd reusable workflows instead.
#
# The input contract mirrors the sibling templates (generic-chart-helm.yml et al)
# so callers look consistent: `environment`, multi-line `ingress-hosts` /
# `ingress-paths` / `ingress-tls-secrets`, `service-target-port`,
# `helm-set-values`, and the `helm-set-secret-values` secret. It emits the same
# chart value keys those templates use (the s9generic chart schema):
#   environment=<env>
#   ingress.hosts[i].host / ingress.hosts[i].tlsSecret   (zipped by index)
#   ingress.paths[i]
#   service.targetPort=<port>
#
# Deploy guardrails:
#   - concurrency: serializes runs per namespace+release so two deploys can't
#     race the same Helm release (cancel-in-progress: false — never cancel a
#     half-applied upgrade).
#   - timeout-minutes: bounds a hung run (helm-timeout only bounds the Helm call).
#   - gh-environment: optional GitHub Environment for approvals / deployment
#     history. NOTE: distinct from the `environment` input, which is a Helm value.
#
# The Helm logic is delegated to the shared composite action
# `simplify9/.github/.github/actions/helm-deploy` (the same action used by the
# full CI/CD pipelines), keeping deploy behaviour — Helm 3/4 atomic flag
# selection, kubeconfig handling, verification and the job summary — consistent.
# =============================================================================

name: Helm Deploy (values file) - reusable
on:
  workflow_call:
    inputs:
      release-name:
        description: Helm release name to upgrade/install.
        type: string
        required: true

      chart-name:
        description: Name of the chart to pull from the chart repository.
        type: string
        required: true

      chart-repo:
        description: Classic Helm chart repository URL (ChartMuseum-style) to 
          pull the chart from.
        type: string
        required: true

      namespace:
        description: Kubernetes namespace to deploy the release into.
        type: string
        required: true

      values-file:
        description: >-
          Path to a values file in the caller's repo, applied with `--values` only
          when present. A missing default (values.yaml) is skipped; an explicitly-set
          file that is missing fails fast.
        type: string
        required: false
        default: values.yaml

      chart-version:
        description: >-
          Chart version to deploy. Leave empty to deploy the latest version published
          in the repo; set it to pin a specific chart version.
        type: string
        required: false
        default: ""

      environment:
        description: >-
          Helm VALUE for the chart (set as `environment=<env>`). This is NOT the GitHub
          Environment — see `gh-environment` for that.
        type: string
        required: false
        default: ""

      gh-environment:
        description: >-
          Optional GitHub Environment name for deployment protection rules,
          environment-scoped secrets and deployment history. Empty = no environment
          binding.
        type: string
        required: false
        default: ""

      service-target-port:
        description: Optional service target port to set on the chart (empty = 
          chart default).
        type: string
        required: false
        default: ""

      ingress-hosts:
        description: >-
          Ingress hosts, one per line or comma-separated. Zipped with ingress-tls-secrets
          by index: host[i] <-> tls-secret[i].
        type: string
        required: false
        default: ""

      ingress-paths:
        description: Ingress paths, one per line or comma-separated (empty = 
          chart default).
        type: string
        required: false
        default: ""

      ingress-tls-secrets:
        description: TLS secret names, position-aligned with ingress-hosts.
        type: string
        required: false
        default: ""

      image-tag:
        description: Optional image tag to set on the chart (empty = chart 
          default).
        type: string
        required: false
        default: ""

      helm-set-values:
        description: Non-secret helm --set values, one key=value per line.
        type: string
        required: false
        default: ""

      helm-version:
        description: Helm CLI version to install for the deploy.
        type: string
        required: false
        default: v4.2.0

      kubectl-version:
        description: kubectl CLI version to install for the deploy.
        type: string
        required: false
        default: v1.33.0

      helm-timeout:
        description: Timeout passed to the Helm upgrade/install call.
        type: string
        required: false
        default: 10m

      atomic:
        description: Use Helm's atomic flag so a failed upgrade rolls back 
          automatically.
        type: boolean
        required: false
        default: true

      wait:
        description: Wait for resources to become ready before reporting 
          success.
        type: boolean
        required: false
        default: true

      create-namespace:
        description: Create the target namespace if it does not already exist.
        type: boolean
        required: false
        default: true

      job-timeout-minutes:
        description: >-
          Upper bound for the whole job (checkout + setup + helm). The Helm call itself
          is bounded separately by helm-timeout.
        type: number
        required: false
        default: 20

    secrets:
      # Cluster access. Accepts either a base64-encoded kubeconfig or raw YAML
      # (auto-detected). `kubeconfig` matches the sibling templates;
      # `kubeconfig64` is kept for backward compatibility. Provide one.
      kubeconfig:
        required: false
      kubeconfig64:
        required: false

      # Comma-separated key=value pairs applied as masked helm --set-string
      # values (e.g. "db=<connection>,apiKey=<token>"). Same contract as the
      # *-cicd reusable workflows. Note: values are comma-separated, so a value
      # containing a literal comma cannot be passed through this channel.
      helm-set-secret-values:
        required: false

      github-token:
        description: "Token used to query Dependabot alerts for the critical-vuln gate (defaults to the caller's GITHUB_TOKEN with security-events:read)."
        required: false

  workflow_dispatch:
permissions:
  contents: read

jobs:
  critical-vuln-gate:
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: read
    steps:
      - name: Check for open critical Dependabot alerts
        uses: simplify9/.github/.github/actions/check-critical-vulns@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🔒'
          title: Critical Dependabot Vulnerability Gate
          status: ${{ job.status }}

  deploy:
    needs: critical-vuln-gate
    if: ${{ !cancelled() && (needs.critical-vuln-gate.result == 'success' || needs.critical-vuln-gate.result == 'skipped') }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.job-timeout-minutes }}
    # Optional GitHub Environment. Empty string => no environment binding, so
    # existing callers that don't pass gh-environment are unaffected.
    environment: ${{ inputs.gh-environment }}
    # Serialize deploys to the same release/namespace. Never cancel an in-flight
    # deploy — a half-applied Helm upgrade is worse than a queued one.
    concurrency:
      group: helm-deploy-${{ inputs.namespace }}-${{ inputs.release-name }}
      cancel-in-progress: false

    steps:
      - name: Validate kubeconfig secret
        env:
          KUBECONFIG_PRIMARY: ${{ secrets.kubeconfig }}
          KUBECONFIG_LEGACY: ${{ secrets.kubeconfig64 }}
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_PRIMARY}${KUBECONFIG_LEGACY}" ]; then
            echo "::error title=Missing kubeconfig::Provide either the 'kubeconfig' or 'kubeconfig64' secret."
            exit 1
          fi
          echo "✅ Kubeconfig secret provided."

      # Only the values file is needed from the caller repo (the chart is pulled
      # remotely), so a sparse, shallow checkout keeps this fast on large repos.
      # An empty values-file makes sparse-checkout a no-op (full checkout).
      - name: Checkout (values file only)
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
          sparse-checkout: ${{ inputs.values-file }}
          sparse-checkout-cone-mode: false
          # Only the values file is read; no git writes happen, so don't leave the
          # workflow token persisted in .git/config for later steps.
          persist-credentials: false

      # Translate the friendly inputs into the s9generic chart value keys, as a
      # comma-separated --set string for the helm-deploy action. Mirrors the
      # ingress mapping used by generic-chart-helm.yml. Secret values go straight
      # through to secret-set-string-values via the helm-set-secret-values secret.
      - name: Build Helm --set values
        id: prep
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          SERVICE_TARGET_PORT: ${{ inputs.service-target-port }}
          INGRESS_HOSTS: ${{ inputs.ingress-hosts }}
          INGRESS_PATHS: ${{ inputs.ingress-paths }}
          INGRESS_TLS_SECRETS: ${{ inputs.ingress-tls-secrets }}
          HELM_SET_VALUES: ${{ inputs.helm-set-values }}
          VALUES_FILE: ${{ inputs.values-file }}
        run: |
          set -euo pipefail

          CSV=""
          add() { [ -z "$1" ] && return 0; if [ -z "$CSV" ]; then CSV="$1"; else CSV="${CSV},$1"; fi; }
          # Trim leading/trailing whitespace using bash parameter expansion only
          # (no subprocess per item); result returned in $REPLY.
          trim() { local s="$1"; s="${s#"${s%%[![:space:]]*}"}"; s="${s%"${s##*[![:space:]]}"}"; REPLY="$s"; }
          # Split newline/comma-separated text into the named array. Reading into
          # an array up front avoids running anything that consumes stdin inside a
          # read loop (which would swallow the remaining lines).
          split() { mapfile -t "$1" < <(printf '%s' "$2" | sed 's/\r//g' | tr ',' '\n'); }

          [ -n "$ENVIRONMENT" ] && add "environment=${ENVIRONMENT}"
          [ -n "$SERVICE_TARGET_PORT" ] && add "service.targetPort=${SERVICE_TARGET_PORT}"

          # Ingress hosts, zipped with TLS secrets by index (host[i] <-> tls[i]).
          split HOSTS "$INGRESS_HOSTS"
          split TLS_LIST "$INGRESS_TLS_SECRETS"
          idx=0
          for raw in "${HOSTS[@]}"; do
            trim "$raw"; host="$REPLY"
            [ -z "$host" ] && continue
            add "ingress.hosts[$idx].host=${host}"
            if [ "$idx" -lt "${#TLS_LIST[@]}" ]; then
              trim "${TLS_LIST[$idx]}"; tls="$REPLY"
              [ -n "$tls" ] && add "ingress.hosts[$idx].tlsSecret=${tls}"
            fi
            idx=$((idx + 1))
          done

          # Ingress paths.
          split PATHS "$INGRESS_PATHS"
          pidx=0
          for raw in "${PATHS[@]}"; do
            trim "$raw"; path="$REPLY"
            [ -z "$path" ] && continue
            add "ingress.paths[$pidx]=${path}"
            pidx=$((pidx + 1))
          done

          # Caller's extra non-secret --set values, one key=value per line.
          split EXTRA "$HELM_SET_VALUES"
          for raw in "${EXTRA[@]}"; do
            trim "$raw"; kv="$REPLY"
            [ -z "$kv" ] && continue
            add "$kv"
          done

          echo "set-values=${CSV}" >> "$GITHUB_OUTPUT"
          echo "Computed --set values: ${CSV:-<none>}"

          # Resolve the values file: apply it only if present. A missing DEFAULT
          # (values.yaml) is skipped; an explicitly-specified missing file fails.
          RESOLVED=""
          if [ -n "$VALUES_FILE" ]; then
            if [ -f "$VALUES_FILE" ]; then
              RESOLVED="$VALUES_FILE"
              echo "Using values file: $VALUES_FILE"
            elif [ "$VALUES_FILE" = "values.yaml" ]; then
              echo "::notice title=No values file::Default 'values.yaml' not found in the repo; deploying without --values."
            else
              echo "::error title=values-file not found::'$VALUES_FILE' was specified but is not present in the checked-out repository."
              exit 1
            fi
          fi
          echo "values-file=${RESOLVED}" >> "$GITHUB_OUTPUT"

      - name: Deploy with Helm
        uses: simplify9/.github/.github/actions/helm-deploy@main
        with:
          chart-source-type: chartmuseum
          chart-repo-url: ${{ inputs.chart-repo }}
          chart-name: ${{ inputs.chart-name }}
          chart-version: ${{ inputs.chart-version }}
          release-name: ${{ inputs.release-name }}
          namespace: ${{ inputs.namespace }}
          values-file: ${{ steps.prep.outputs.values-file }}
          set-values: ${{ steps.prep.outputs.set-values }}
          secret-set-string-values: ${{ secrets.helm-set-secret-values }}
          image-tag: ${{ inputs.image-tag }}
          create-namespace: ${{ inputs.create-namespace }}
          atomic: ${{ inputs.atomic }}
          wait: ${{ inputs.wait }}
          timeout: ${{ inputs.helm-timeout }}
          helm-version: ${{ inputs.helm-version }}
          kubectl-version: ${{ inputs.kubectl-version }}
          kubeconfig: ${{ secrets.kubeconfig || secrets.kubeconfig64 }}
