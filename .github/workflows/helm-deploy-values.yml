name: Helm Deploy (values file) - reusable

on:
  workflow_call:
    inputs:
      release-name:
        type: string
        required: true

      chart-name:
        type: string
        required: true

      chart-repo:
        type: string
        required: true

      namespace:
        type: string
        required: true

      values-file:
        type: string
        required: false
        default: values.yaml

      global-environment:
        type: string
        required: false
        default: ""

      ingress-host:
        type: string
        required: false
        default: ""

      ingress-tls-secret:
        type: string
        required: false
        default: ""

      ingress-path:
        type: string
        required: false
        default: ""

      image-tag:
        type: string
        required: false
        default: ""

      # Keep DB as a normal input (not a secret)
      db-connection:
        type: string
        required: false
        default: ""

      # One key=value per line each becomes --set <line>
      extra-set-values:
        type: string
        required: false
        default: ""

      helm-version:
        type: string
        required: false
        default: v4.2.0

      kubectl-version:
        type: string
        required: false
        default: v1.33.0

      helm-timeout:
        type: string
        required: false
        default: 10m

      atomic:
        type: boolean
        required: false
        default: true

      wait:
        type: boolean
        required: false
        default: true

      create-namespace:
        type: boolean
        required: false
        default: true

      verify-cluster:
        type: boolean
        required: false
        default: true

    secrets:
      kubeconfig64:
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=☸️ [HELM] Helm Deploy — Job Started::Release: ${{ inputs.release-name }} | Chart: ${{ inputs.chart-name }} | Namespace: ${{ inputs.namespace }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏭️ Skipped" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: ${{ inputs.kubectl-version }}

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: ${{ inputs.helm-version }}

      - name: Configure kubeconfig (from secret)
        env:
          KUBECONFIG_B64: ${{ secrets.kubeconfig64 }}
        run: |
          set -euo pipefail
          echo "::group::☸️ [CHECKPOINT 1/3] Configure kubeconfig"
          echo "→ Writing kubeconfig to: ${HOME}/.kube/config"
          mkdir -p "${HOME}/.kube"
          echo "${KUBECONFIG_B64}" | base64 -d > "${HOME}/.kube/config"
          chmod 600 "${HOME}/.kube/config"
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Kubeconfig configured — PASSED"
          echo "::endgroup::"

      - name: Verify cluster access
        if: ${{ inputs.verify-cluster }}
        run: |
          set -euo pipefail
          echo "::group::☸️ [CHECKPOINT 2/3] Verify cluster access"
          echo "→ Target namespace: ${{ inputs.namespace }}"
          kubectl version --client=true
          kubectl cluster-info
          kubectl get ns "${{ inputs.namespace }}" || true
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Cluster access verified — PASSED"
          echo "::endgroup::"

      - name: Deploy with Helm (upgrade/install)
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image-tag }}
          DB_CONNECTION: ${{ inputs.db-connection }}
          EXTRA_SET_VALUES: ${{ inputs.extra-set-values }}
          HELM_TIMEOUT: ${{ inputs.helm-timeout }}
          ATOMIC: ${{ inputs.atomic }}
          WAIT: ${{ inputs.wait }}
          CREATE_NAMESPACE: ${{ inputs.create-namespace }}
        run: |
          set -euo pipefail

          echo "::group::☸️ [CHECKPOINT 3/3] Helm upgrade/install: ${{ inputs.release-name }}"
          echo "→ Chart: ${{ inputs.chart-name }}"
          echo "→ Repo: ${{ inputs.chart-repo }}"
          echo "→ Namespace: ${{ inputs.namespace }}"
          echo "→ Timeout: ${HELM_TIMEOUT}"

          # Build helm command safely using an array (prevents word splitting and ; command breaks)
          ARGS=(
            upgrade --install
            "${{ inputs.release-name }}"
            "${{ inputs.chart-name }}"
            --repo "${{ inputs.chart-repo }}"
            --namespace "${{ inputs.namespace }}"
            --values "${{ inputs.values-file }}"
            --timeout "${HELM_TIMEOUT}"
          )

          if [ "${CREATE_NAMESPACE}" = "true" ]; then
            ARGS+=(--create-namespace)
          fi
          if [ "${ATOMIC}" = "true" ]; then
            HELM_MAJOR="$(helm version --template '{{.Version}}' 2>/dev/null | sed -E 's/^v?([0-9]+).*/\1/')"
            if [ "${HELM_MAJOR:-3}" -ge 4 ]; then
              ARGS+=(--rollback-on-failure)
            else
              ARGS+=(--atomic)
            fi
          fi
          if [ "${WAIT}" = "true" ]; then
            ARGS+=(--wait)
          fi

          if [ -n "${{ inputs.global-environment }}" ]; then
            ARGS+=(--set "global.environment=${{ inputs.global-environment }}")
          fi

          if [ -n "${{ inputs.ingress-host }}" ]; then
            ARGS+=(--set "ingress.hosts={${{ inputs.ingress-host }}}")
          fi

          if [ -n "${{ inputs.ingress-tls-secret }}" ]; then
            ARGS+=(--set "ingress.tls[0].secretName=${{ inputs.ingress-tls-secret }}")
          fi

          if [ -n "${{ inputs.ingress-path }}" ]; then
            ARGS+=(--set "ingress.path=${{ inputs.ingress-path }}")
          fi

          # Quote as one argument so spaces or semicolons don't break the command
          if [ -n "${DB_CONNECTION}" ]; then
            ARGS+=(--set-string "db=${DB_CONNECTION}")
          fi

          if [ -n "${IMAGE_TAG_INPUT}" ]; then
            ARGS+=(--set "image.tag=${IMAGE_TAG_INPUT}")
          fi

          # extra-set-values: one key=value per line
          if [ -n "${EXTRA_SET_VALUES// /}" ]; then
            while IFS= read -r line; do
              line="$(printf '%s' "$line" | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')"
              [ -z "$line" ] && continue
              ARGS+=(--set "$line")
            done <<< "${EXTRA_SET_VALUES}"
          fi

          helm "${ARGS[@]}"
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] Helm deploy completed — release: ${{ inputs.release-name }}"
          echo "::endgroup::"

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=☸️ [HELM] Deploy Job Failed::Release '${{ inputs.release-name }}' failed | Chart: ${{ inputs.chart-name }} | Namespace: ${{ inputs.namespace }}"
          echo "  Checkpoint 1 — Kubeconfig:     ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Cluster access:  ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — Helm deploy:     ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Show release status
        if: always()
        run: |
          set -euo pipefail
          echo "::group::☸️ Post-deploy release status: ${{ inputs.release-name }}"
          helm status "${{ inputs.release-name }}" --namespace "${{ inputs.namespace }}" || true
          kubectl get pods --namespace "${{ inputs.namespace }}" -l app.kubernetes.io/instance="${{ inputs.release-name }}" || true
          kubectl get ingress --namespace "${{ inputs.namespace }}" || true
          echo "::endgroup::"

      - name: Write job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          RELEASE_NAME: ${{ inputs.release-name }}
          CHART_NAME: ${{ inputs.chart-name }}
          NAMESPACE: ${{ inputs.namespace }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## ☸️ Helm Deploy — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Release | \`${RELEASE_NAME}\` |"
            echo "| Chart | \`${CHART_NAME}\` |"
            echo "| Namespace | \`${NAMESPACE}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
            echo "| Run | [${RUN_ID}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Kubeconfig configured | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Cluster access verified | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | Helm upgrade/install | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
