# =============================================================================
# Android Build and Google Play Release — Reusable Workflow
# =============================================================================
#
# PURPOSE:
#   Builds and signs a React Native Android app as an AAB using Gradle,
#   then publishes it to the Google Play Store via the Play Developer API.
#   Called by per-app caller workflows via `workflow_call`.
#
# JOBS:
#   build                    — Installs dependencies, computes version,
#                              builds and signs the AAB, renames it, and
#                              uploads the artifact for the release job.
#   release_with_environment — Downloads the AAB artifact and uploads to
#                              Google Play. Gated on a named GitHub
#                              Environment (approval gates, environment
#                              secrets). Always runs via this path.
#
# UPLOAD:
#   Uses r0adkll/upload-google-play@v1 — the community-standard MIT-licensed
#   action for Google Play uploads via the Play Developer API v3. Supports
#   all tracks (internal, alpha, beta, production) and staged rollouts.
#
# VERSIONING:
#   versionName: carry-based rollover from version-prefix + run counter.
#                version-prefix X.Y.Z + run_number.
#                Patch carries into minor at 9, minor carries into major
#                at 9 (e.g. 4.9.9 at run 1 → 5.0.0).
#                Optional version-name-override bypasses this logic.
#   versionCode: strictly monotonic integer —
#                run_number + version-code-offset.
#                Intentionally decoupled from versionName for Play
#                upgrade-path correctness.
#
# SIGNING:
#   Keystore decoded from base64 secret at build time using printf to
#   avoid newline corruption. Signing parameters passed to Gradle via
#   environment variables — never via inline template expansion.
#
# CACHING:
#   - Node modules  — via actions/setup-node cache, keyed on lockfile
#   - Gradle home   — via gradle/actions/setup-gradle@v5 (pinned; see
#                     note above Setup Gradle step re: v6 upgrade path)
#
# KNOWN LIMITATIONS:
#   - NDK version 27.1.12297006 (r27b LTS) is hardcoded for RN 0.85
#     compatibility. Update when upgrading React Native.
#   - setup-gradle@v5 is pinned. v6.1.0 introduced a free MIT-licensed
#     Basic Caching option (cache-provider: basic). Evaluate upgrade when
#     ready to move to @v6.
#   - version-code-offset default (80000) keeps Play versionCode above
#     any values set before CI migration.
# =============================================================================
name: Generic Android Build and Google Play Release (reusable)

on:
  workflow_call:
    inputs:
      ubuntu-runner:
        description: GitHub-hosted Ubuntu runner label
        required: false
        type: string
        default: ubuntu-latest
      node-version:
        description: Node version for JS dependency install
        required: false
        type: string
        default: "24"
      java-version:
        description: Java version for Android builds
        required: false
        type: string
        default: "17"
      java-distribution:
        description: Java distribution for setup-java
        required: false
        type: string
        default: temurin

      app-id:
        description: Android applicationId / package name
        required: true
        type: string
      app-slug:
        description: App slug used in output AAB file naming
        required: false
        type: string
        default: app
      # Versioning inputs:
      # - version-prefix is the base release line.
      # - version-code-offset keeps Play versionCode strictly increasing.
      version-prefix:
        description: Base version for VERSION_NAME (X.Y or X.Y.Z, for example 4.0.0)
        required: false
        type: string
        default: "1.0.0"
      version-name-override:
        description: Optional explicit VERSION_NAME; if empty uses base version + increment with single-digit carry
        required: false
        type: string
        default: ""
      version-code-offset:
        description: Numeric offset added to github.run_number for VERSION_CODE (set high for CI migrations)
        required: false
        type: string
        default: "80000"

      # Package manager inputs keep setup-node cache and install commands aligned.
      # Defaults preserve legacy behavior (Yarn at repository root).
      package-manager:
        description: Node package manager used for cache and default dependency commands (yarn or npm)
        required: false
        type: string
        default: yarn
      package-manager-directory:
        description: Directory containing package.json and lockfile for selected package manager
        required: false
        type: string
        default: "."
      cache-dependency-path:
        description: Optional explicit lockfile path used by setup-node cache
        required: false
        type: string
        default: ""
      # Leave install-command empty to use package-manager defaults.
      # Set this only when a caller needs a fully custom install command.
      install-command:
        description: Optional explicit dependency install command; if empty uses package-manager default
        required: false
        type: string
        default: ""
      use-jetifier:
        description: Install and run jetifier (npx jetify). Disable for projects that do not need AndroidX migration.
        required: false
        type: boolean
        default: true

      build-root-directory:
        description: Android project root for Gradle
        required: false
        type: string
        default: android
      gradle-task:
        description: Gradle task to build release artifact
        required: false
        type: string
        default: bundleRelease
      gradle-extra-arguments:
        description: Optional extra Gradle args
        required: false
        type: string
        default: ""
      gradle-react-native-architectures:
        description: "Android ABIs to build. Default arm64-v8a only (production devices). Override for projects needing more."
        required: false
        type: string
        default: arm64-v8a

      keystore-output-path:
        description: Where to write decoded keystore
        required: false
        type: string
        default: android/app/release.keystore
      aab-source-path:
        description: Built AAB path to rename/upload
        required: false
        type: string
        default: android/app/build/outputs/bundle/release/app-release.aab
      aab-name-pattern:
        description: Output AAB name pattern with tokens {app_slug},{version_name},{run_number}
        required: false
        type: string
        default: "{app_slug}-release-{version_name}.aab"
      artifact-name:
        description: Artifact name for upload/download
        required: false
        type: string
        default: aab

      play-track:
        description: Google Play tracks (internal, alpha, beta, production)
        required: false
        type: string
        default: internal
      release-status:
        description: Google Play release status
        required: false
        type: string
        default: completed
      changes-not-sent-for-review:
        description: If true, use changesNotSentForReview
        required: false
        type: boolean
        default: false
      release-environment:
        description: GitHub environment for release job (android-staging or android-production)
        required: false
        type: string
        default: "android-staging"
      # Build-only toggle. When true, both Google Play release jobs are skipped.
      disable-release:
        description: If true, skip Google Play release jobs and run build-only
        required: false
        type: boolean
        default: false

    secrets:
      android-keystore-base64:
        description: Base64 encoded Android keystore
        required: true
      android-keystore-password:
        description: Android keystore password
        required: true
      android-key-alias:
        description: Android signing key alias
        required: true
      android-key-password:
        description: Android signing key password
        required: true
      google-play-service-account-json:
        description: Google Play service account JSON
        required: false

    outputs:
      version-name:
        description: Version name used for this release
        value: ${{ jobs.build.outputs.version-name }}
      version-code:
        description: Version code used for this release
        value: ${{ jobs.build.outputs.version-code }}
      aab-file:
        description: Output AAB file uploaded and released
        value: ${{ jobs.build.outputs.aab-file }}

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.ubuntu-runner }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      version-name: ${{ steps.compute.outputs.version_name }}
      version-code: ${{ steps.compute.outputs.version_code }}
      aab-file: ${{ steps.rename.outputs.aab_file }}

    steps:
      - name: Announce
        shell: bash
        env:
          APP_ID: ${{ inputs.app-id }}
          VERSION_PREFIX: ${{ inputs.version-prefix }}
          PLAY_TRACK: ${{ inputs.play-track }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "::notice title=🤖 [ANDROID] Build AAB — Job Started::App: ${APP_ID} | Version prefix: ${VERSION_PREFIX} | Track: ${PLAY_TRACK} | Triggered by: ${ACTOR}"
          {
            echo "CHECKPOINT_1_STATUS=⏳ Pending"
            echo "CHECKPOINT_2_STATUS=⏳ Pending"
            echo "CHECKPOINT_3_STATUS=⏳ Pending"
          } >> "$GITHUB_ENV"

      # ── Environment Setup ───────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v7

      # ── Versioning ──────────────────────────────────────────────────────────
      - name: Compute version
        id: compute
        shell: bash
        env:
          VERSION_CODE_OFFSET: ${{ inputs.version-code-offset }}
          VERSION_NAME_OVERRIDE: ${{ inputs.version-name-override }}
          VERSION_PREFIX: ${{ inputs.version-prefix }}
        run: |
          set -euo pipefail

          # versionName uses carry-based progression from base version + run count.
          # versionCode remains the Play-safe monotonic counter.
          # Keep versionName and versionCode intentionally decoupled:
          # - versionName is human-readable for release visibility.
          # - versionCode is a strictly increasing integer for Play upgrade-path checks.
          CODE_OFFSET_RAW="${VERSION_CODE_OFFSET}"
          MAX_PLAY_VERSION_CODE=2100000000

          if ! [[ "${CODE_OFFSET_RAW}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: version-code-offset must be a non-negative integer. Got '${CODE_OFFSET_RAW}'."
            exit 1
          fi

          CODE_OFFSET=$((CODE_OFFSET_RAW))

          VERSION_CODE=$((GITHUB_RUN_NUMBER + CODE_OFFSET))
          INCREMENT_COUNT=${GITHUB_RUN_NUMBER}

          if [[ -n "${VERSION_NAME_OVERRIDE}" ]]; then
            VERSION_NAME="${VERSION_NAME_OVERRIDE}"
          else
            BASE_VERSION_RAW="${VERSION_PREFIX}"
            BASE_MAJOR=""
            BASE_MINOR=""
            BASE_PATCH=""

            if [[ "${BASE_VERSION_RAW}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              BASE_MAJOR="${BASH_REMATCH[1]}"
              BASE_MINOR="${BASH_REMATCH[2]}"
              BASE_PATCH="${BASH_REMATCH[3]}"
            elif [[ "${BASE_VERSION_RAW}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
              BASE_MAJOR="${BASH_REMATCH[1]}"
              BASE_MINOR="${BASH_REMATCH[2]}"
              BASE_PATCH="0"
            else
              echo "ERROR: version-prefix must be in X.Y or X.Y.Z format. Got '${BASE_VERSION_RAW}'."
              exit 1
            fi

            if (( BASE_MINOR > 9 || BASE_PATCH > 9 )); then
              echo "ERROR: version-prefix minor and patch must be single digits (0-9). Got '${BASE_VERSION_RAW}'."
              exit 1
            fi

            PATCH_TOTAL=$((BASE_PATCH + INCREMENT_COUNT))
            PATCH_CARRY=$((PATCH_TOTAL / 10))
            FINAL_PATCH=$((PATCH_TOTAL % 10))

            MINOR_TOTAL=$((BASE_MINOR + PATCH_CARRY))
            MINOR_CARRY=$((MINOR_TOTAL / 10))
            FINAL_MINOR=$((MINOR_TOTAL % 10))

            FINAL_MAJOR=$((BASE_MAJOR + MINOR_CARRY))
            VERSION_NAME="${FINAL_MAJOR}.${FINAL_MINOR}.${FINAL_PATCH}"
          fi

          if ! [[ "${VERSION_CODE}" =~ ^[1-9][0-9]*$ ]]; then
            echo "ERROR: Computed VERSION_CODE must be a positive integer. Got '${VERSION_CODE}'."
            exit 1
          fi

          if (( VERSION_CODE > MAX_PLAY_VERSION_CODE )); then
            echo "ERROR: Computed VERSION_CODE '${VERSION_CODE}' exceeds Play-safe limit '${MAX_PLAY_VERSION_CODE}'."
            exit 1
          fi

          echo "VERSION_CODE=${VERSION_CODE}" >> "$GITHUB_ENV"
          echo "VERSION_NAME=${VERSION_NAME}" >> "$GITHUB_ENV"

          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VERSION_CODE}" >> "$GITHUB_OUTPUT"

      # ── Node Dependencies ───────────────────────────────────────────────────
      - name: Resolve package manager
        id: package_manager
        shell: bash
        env:
          PACKAGE_MANAGER_RAW: ${{ inputs.package-manager }}
          PACKAGE_DIR_RAW: ${{ inputs.package-manager-directory }}
          CACHE_DEPENDENCY_PATH_INPUT: ${{ inputs.cache-dependency-path }}
        run: |
          set -euo pipefail

          # Normalize inputs so package-manager value handling is case-insensitive.
          PACKAGE_MANAGER="$(echo "${PACKAGE_MANAGER_RAW}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR="${PACKAGE_DIR_RAW:-.}"

          if [[ -z "${PACKAGE_DIR}" ]]; then
            PACKAGE_DIR="."
          fi

          # Keep cache type and install commands tied to the selected package manager.
          case "${PACKAGE_MANAGER}" in
            yarn)
              DEFAULT_LOCKFILE="yarn.lock"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="yarn install --frozen-lockfile"
                JETIFIER_INSTALL_COMMAND="yarn add -D jetifier"
                JETIFIER_RUN_COMMAND="npx jetify"
              else
                DEFAULT_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}' install --frozen-lockfile"
                JETIFIER_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}' add -D jetifier"
                JETIFIER_RUN_COMMAND="npx --yes --prefix '${PACKAGE_DIR}' jetify"
              fi
              ;;
            npm)
              DEFAULT_LOCKFILE="package-lock.json"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="npm ci"
                JETIFIER_INSTALL_COMMAND="npm install --save-dev jetifier"
                JETIFIER_RUN_COMMAND="npx jetify"
              else
                DEFAULT_INSTALL_COMMAND="npm ci --prefix '${PACKAGE_DIR}'"
                JETIFIER_INSTALL_COMMAND="npm install --save-dev jetifier --prefix '${PACKAGE_DIR}'"
                JETIFIER_RUN_COMMAND="npx --yes --prefix '${PACKAGE_DIR}' jetify"
              fi
              ;;
            *)
              echo "ERROR: Unsupported package-manager '${PACKAGE_MANAGER_RAW}'. Supported values: yarn, npm."
              exit 1
              ;;
          esac

          # Infer lockfile path from package-manager + directory when no explicit override is provided.
          CACHE_DEPENDENCY_PATH="${CACHE_DEPENDENCY_PATH_INPUT}"

          if [[ -z "${CACHE_DEPENDENCY_PATH}" ]]; then
            if [[ "${PACKAGE_DIR}" == "." ]]; then
              CACHE_DEPENDENCY_PATH="${DEFAULT_LOCKFILE}"
            else
              CACHE_DEPENDENCY_PATH="${PACKAGE_DIR}/${DEFAULT_LOCKFILE}"
            fi
          fi

          # Fail fast with a clear message rather than letting setup-node fail later.
          if [[ ! -f "${CACHE_DEPENDENCY_PATH}" ]]; then
            echo "ERROR: Expected lockfile '${CACHE_DEPENDENCY_PATH}' was not found."
            echo "Set package-manager-directory or cache-dependency-path to the correct location."
            exit 1
          fi

          {
            echo "cache=${PACKAGE_MANAGER}"
            echo "cache_dependency_path=${CACHE_DEPENDENCY_PATH}"
            echo "default_install_command=${DEFAULT_INSTALL_COMMAND}"
            echo "jetifier_install_command=${JETIFIER_INSTALL_COMMAND}"
            echo "jetifier_run_command=${JETIFIER_RUN_COMMAND}"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package_manager.outputs.cache }}
          cache-dependency-path: ${{ steps.package_manager.outputs.cache_dependency_path }}

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: ${{ inputs.java-distribution }}
          java-version: ${{ inputs.java-version }}

      - name: Install dependencies
        shell: bash
        env:
          INSTALL_COMMAND_INPUT: ${{ inputs.install-command }}
          DEFAULT_INSTALL_COMMAND: ${{ steps.package_manager.outputs.default_install_command }}
        run: |
          set -euo pipefail
          if [[ -n "${INSTALL_COMMAND_INPUT}" ]]; then
            eval "${INSTALL_COMMAND_INPUT}"
          else
            eval "${DEFAULT_INSTALL_COMMAND}"
          fi

      - name: Install jetifier
        if: ${{ inputs.use-jetifier }}
        shell: bash
        env:
          JETIFIER_INSTALL_CMD: ${{ steps.package_manager.outputs.jetifier_install_command }}
        run: |
          set -euo pipefail
          eval "${JETIFIER_INSTALL_CMD}"

      - name: Jetify
        if: ${{ inputs.use-jetifier }}
        shell: bash
        env:
          JETIFIER_RUN_CMD: ${{ steps.package_manager.outputs.jetifier_run_command }}
        run: |
          set -euo pipefail
          eval "${JETIFIER_RUN_CMD}"

      # ── Signing ─────────────────────────────────────────────────────────────
      - name: Restore keystore
        shell: bash
        env:
          KEYSTORE_B64: ${{ secrets.android-keystore-base64 }}
          KEYSTORE_OUTPUT_PATH: ${{ inputs.keystore-output-path }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "${KEYSTORE_OUTPUT_PATH}")"
          printf '%s' "${KEYSTORE_B64}" | base64 -d > "${KEYSTORE_OUTPUT_PATH}"
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Keystore restored — PASSED"

      - name: Verify keystore
        shell: bash
        env:
          KEYSTORE_OUTPUT_PATH: ${{ inputs.keystore-output-path }}
        run: |
          set -euo pipefail
          ls -lah "$(dirname "${KEYSTORE_OUTPUT_PATH}")"
          test -f "${KEYSTORE_OUTPUT_PATH}"

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Configure Gradle
        shell: bash
        env:
          GRADLE_PROPS_DIR: ${{ inputs.build-root-directory }}
          RN_ARCHITECTURES: ${{ inputs.gradle-react-native-architectures }}
        run: |
          set -euo pipefail
          echo "::group::⚙️ [ANDROID] Normalizing Gradle properties for CI"

          PROPS_FILE="${GRADLE_PROPS_DIR}/gradle.properties"

          if [[ ! -f "${PROPS_FILE}" ]]; then
            echo "→ No existing gradle.properties found; creating one"
            touch "${PROPS_FILE}"
          fi

          # upsert_prop KEY VALUE FILE — replace existing line or append
          upsert_prop() {
            local key="$1"
            local value="$2"
            local file="$3"
            # Escape characters significant to sed in the key
            local escaped_key
            escaped_key="$(printf '%s' "${key}" | sed 's/[.[\*^$/]/\\&/g')"
            if grep -qE "^${escaped_key}=" "${file}"; then
              # Replace the whole line; use | as delimiter to avoid clashes with / in values
              sed -i "s|^${escaped_key}=.*|${key}=${value}|" "${file}"
              echo "  ✓ replaced: ${key}=${value}"
            else
              # Ensure file ends with a newline before appending
              [[ -s "${file}" && -n "$(tail -c1 "${file}")" ]] && echo "" >> "${file}"
              echo "${key}=${value}" >> "${file}"
              echo "  ✓ appended: ${key}=${value}"
            fi
          }

          echo "→ Applying CI performance settings to ${PROPS_FILE}"
          upsert_prop "org.gradle.jvmargs" "-Xmx4g -XX:MaxMetaspaceSize=1g" "${PROPS_FILE}"
          upsert_prop "org.gradle.caching" "true" "${PROPS_FILE}"
          upsert_prop "org.gradle.parallel" "true" "${PROPS_FILE}"
          upsert_prop "reactNativeArchitectures" "${RN_ARCHITECTURES}" "${PROPS_FILE}"

          echo "→ Resulting gradle.properties performance settings:"
          grep -E "^(org\.gradle\.jvmargs|org\.gradle\.caching|org\.gradle\.parallel|reactNativeArchitectures)=" "${PROPS_FILE}" | sed 's/^/    /'

          echo "✅ Gradle properties normalized"
          echo "::endgroup::"

      - name: Install NDK
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="/usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager"
          echo "::group::📦 [ANDROID] Pre-installing NDK versions"
          echo "→ Accepting SDK licenses"
          yes | "${SDKMANAGER}" --licenses > /dev/null 2>&1 || true
          echo "→ Installing NDK 27.1.12297006"
          # NDK 27.1.12297006 = NDK r27b (LTS). Upgrade only after
          # validating CMake ABI compatibility with your RN version.
          "${SDKMANAGER}" "ndk;27.1.12297006"
          echo "✅ NDK version pre-installed"
          echo "::endgroup::"
      
      # Pinned to setup-gradle@v5 (not v6).
      # v6 (initial release) moved Gradle User Home caching to a proprietary closed-source
      # component. v6.1.0 later added a free MIT-licensed alternative via cache-provider: basic.
      # Upgrade to @v6 with cache-provider: basic to adopt the open-source caching path.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          # wrapper — always use the project's gradle-wrapper.properties.
          # All RN projects in this fleet manage their Gradle version via the wrapper.
          gradle-version: wrapper
          cache-read-only: false
          gradle-home-cache-includes: |
            caches
            notifications
            wrapper

      - name: Build
        working-directory: ${{ inputs.build-root-directory }}
        env:
          STORE_FILE: ${{ github.workspace }}/${{ inputs.keystore-output-path }}
          STORE_PASSWORD: ${{ secrets.android-keystore-password }}
          KEY_ALIAS: ${{ secrets.android-key-alias }}
          KEY_PASSWORD: ${{ secrets.android-key-password }}
          EXTRA_ARGS: ${{ inputs.gradle-extra-arguments }}
          GRADLE_TASK: ${{ inputs.gradle-task }}
          VERSION_NAME_OUT: ${{ steps.compute.outputs.version_name }}
          VERSION_CODE_OUT: ${{ steps.compute.outputs.version_code }}
          APP_ID: ${{ inputs.app-id }}
        shell: bash
        run: |
          set -euo pipefail
          # EXTRA_ARGS is intentionally unquoted to allow word splitting
          # for callers that pass multiple space-separated Gradle flags.
          # shellcheck disable=SC2086
          ./gradlew "${GRADLE_TASK}" \
            "-PversionName=${VERSION_NAME_OUT}" \
            "-PversionCode=${VERSION_CODE_OUT}" \
            "-PapplicationId=${APP_ID}" \
            -Pandroid.injected.signing.store.file="${STORE_FILE}" \
            -Pandroid.injected.signing.store.password="${STORE_PASSWORD}" \
            -Pandroid.injected.signing.key.alias="${KEY_ALIAS}" \
            -Pandroid.injected.signing.key.password="${KEY_PASSWORD}" \
            ${EXTRA_ARGS}

      - name: Confirm build
        shell: bash
        run: |
          set -euo pipefail
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Gradle bundle built — PASSED"

      # ── Artifact ────────────────────────────────────────────────────────────
      - name: Rename bundle
        id: rename
        shell: bash
        env:
          AAB_NAME_PATTERN: ${{ inputs.aab-name-pattern }}
          APP_SLUG: ${{ inputs.app-slug }}
          AAB_SOURCE_PATH: ${{ inputs.aab-source-path }}
        run: |
          set -euo pipefail
          PATTERN="${AAB_NAME_PATTERN}"
          AAB_OUT="${PATTERN//\{app_slug\}/${APP_SLUG}}"
          AAB_OUT="${AAB_OUT//\{version_name\}/${VERSION_NAME}}"
          AAB_OUT="${AAB_OUT//\{run_number\}/${GITHUB_RUN_NUMBER}}"

          if [[ -z "${AAB_OUT}" ]]; then
            echo "ERROR: Resolved output AAB name is empty. Check aab-name-pattern input."
            exit 1
          fi

          SRC_DIR="$(dirname "${AAB_SOURCE_PATH}")"
          echo "Looking for built AAB in: ${SRC_DIR}"
          ls -lah "${SRC_DIR}" || true

          if [[ ! -f "${AAB_SOURCE_PATH}" ]]; then
            echo "ERROR: Expected AAB not found at '${AAB_SOURCE_PATH}'."
            exit 1
          fi

          mv "${AAB_SOURCE_PATH}" "${AAB_OUT}"

          if [[ ! -f "${AAB_OUT}" ]]; then
            echo "ERROR: Rename succeeded but output AAB '${AAB_OUT}' is missing."
            exit 1
          fi

          echo "aab_file=${AAB_OUT}" >> "$GITHUB_OUTPUT"
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] Bundle renamed — PASSED: ${AAB_OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ steps.rename.outputs.aab_file }}
          compression-level: 0
          # Transient hand-off to the release job in the same run; 1 day (the
          # minimum) is plenty and keeps Actions storage near-zero.
          retention-days: 1

      - name: Build failure
        if: failure()
        shell: bash
        env:
          APP_ID: ${{ inputs.app-id }}
        run: |
          set -euo pipefail
          echo "::error title=🤖 [ANDROID] Build Job Failed::App: ${APP_ID}"
          echo "  Checkpoint 1 — Keystore restored: ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Bundle built:      ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — Bundle renamed:    ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Build summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🤖'
          title: Android Build
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | App | `${{ inputs.app-id }}` |
            | Version | `${{ env.VERSION_NAME || 'unknown' }}` (code: ${{ env.VERSION_CODE || 'unknown' }}) |
            | Track | ${{ inputs.play-track }} |
            | Runner | ${{ runner.os }} |
            | Branch | `${{ github.ref_name }}` |
            | Triggered by | ${{ github.actor }} |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## 📋 Build Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | Keystore restored | ${{ env.CHECKPOINT_1_STATUS || '⏭️ Not reached' }} |
            | 2 | Bundle built | ${{ env.CHECKPOINT_2_STATUS || '⏭️ Not reached' }} |
            | 3 | Bundle renamed | ${{ env.CHECKPOINT_3_STATUS || '⏭️ Not reached' }} |

  release_with_environment:
    name: Release
    runs-on: ${{ inputs.ubuntu-runner }}
    needs: build
    # Release path with GitHub Environment protection/approvals.
    if: ${{ inputs.release-environment != '' && !inputs.disable-release }}
    environment: ${{ inputs.release-environment }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Announce
        shell: bash
        env:
          APP_ID: ${{ inputs.app-id }}
          VERSION_NAME: ${{ needs.build.outputs.version-name }}
          PLAY_TRACK: ${{ inputs.play-track }}
          RELEASE_ENV: ${{ inputs.release-environment }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "::notice title=🤖 [ANDROID] Release to Google Play (env gated) — Job Started::App: ${APP_ID} | Version: ${VERSION_NAME} | Track: ${PLAY_TRACK} | Env: ${RELEASE_ENV} | Triggered by: ${ACTOR}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      # ── AAB Retrieval ───────────────────────────────────────────────────────
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve AAB path
        id: aab
        shell: bash
        env:
          CANDIDATE: ${{ needs.build.outputs.aab-file }}
        run: |
          set -euo pipefail
          AAB_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            AAB_FILE="$(basename "${CANDIDATE}")"
          fi

          # Fallback for cases where reusable output is empty or path does not match release runner context.
          if [[ -z "${AAB_FILE}" || ! -f "${AAB_FILE}" ]]; then
            AAB_FILE="$(find . -maxdepth 1 -name '*.aab' -printf '%f\n' | head -n 1 || true)"
          fi

          if [[ -z "${AAB_FILE}" || ! -f "${AAB_FILE}" ]]; then
            echo "ERROR: No .aab file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=${AAB_FILE}" >> "$GITHUB_OUTPUT"

      # ── Upload ──────────────────────────────────────────────────────────────
      - name: Validate credentials
        shell: bash
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.google-play-service-account-json }}
        run: |
          set -euo pipefail
          if [ -z "${GOOGLE_PLAY_SERVICE_ACCOUNT_JSON:-}" ]; then
            echo "ERROR: Missing required secret 'google-play-service-account-json' for release."
            echo "Set disable-release=true to run build-only without Google Play publish."
            exit 1
          fi

      - name: Upload
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.google-play-service-account-json }}
          packageName: ${{ inputs.app-id }}
          releaseFiles: ${{ steps.aab.outputs.path }}
          tracks: ${{ inputs.play-track }}
          releaseName: ${{ needs.build.outputs.version-name }}
          status: ${{ inputs.release-status }}
          changesNotSentForReview: ${{ inputs.changes-not-sent-for-review && 'true' || 'false' }}

      - name: Confirm upload
        shell: bash
        env:
          APP_ID: ${{ inputs.app-id }}
          VERSION_NAME: ${{ needs.build.outputs.version-name }}
          PLAY_TRACK: ${{ inputs.play-track }}
        run: |
          set -euo pipefail
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/1] Google Play upload completed — PASSED: ${APP_ID} v${VERSION_NAME} → ${PLAY_TRACK}"

      - name: Release failure
        if: failure()
        shell: bash
        env:
          APP_ID: ${{ inputs.app-id }}
          VERSION_NAME: ${{ needs.build.outputs.version-name }}
        run: |
          set -euo pipefail
          echo "::error title=🤖 [ANDROID] Release (env gated) Job Failed::App: ${APP_ID} | Version: ${VERSION_NAME}"
          echo "  Checkpoint 1 — Google Play upload: ${CHECKPOINT_1_STATUS:-❌ Not reached}"

      - name: Release summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🤖'
          title: Android Release to Google Play (Environment-Gated)
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | App | `${{ inputs.app-id }}` |
            | Version | `${{ needs.build.outputs.version-name }}` (code: ${{ needs.build.outputs.version-code }}) |
            | Track | ${{ inputs.play-track }} |
            | Environment | ${{ inputs.release-environment }} |
            | Branch | `${{ github.ref_name }}` |
            | Runner | ${{ runner.os }} |

            ## 📋 Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | Google Play upload | ${{ env.CHECKPOINT_1_STATUS || '⏭️ Not reached' }} |
