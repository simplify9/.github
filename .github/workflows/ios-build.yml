# =============================================================================
# iOS Build & Deploy — Reusable Workflow
# =============================================================================
#
# PURPOSE:
#   Builds, signs, and archives a React Native iOS app using xcodebuild,
#   exports an IPA, and uploads it to TestFlight via App Store Connect API.
#   Called by per-app caller workflows via `workflow_call`.
#
# JOBS:
#   build                    — Installs dependencies, sets up signing,
#                              archives via xcodebuild, exports IPA, and
#                              uploads the artifact for the release job.
#   release_with_environment — Downloads the IPA artifact and uploads to
#                              TestFlight via the App Store Connect REST API.
#                              Runs on ubuntu-latest — the REST API needs no
#                              macOS tooling, so this avoids the ~10x cost of
#                              a macOS runner. Gated on a named GitHub
#                              Environment (approval gates, environment
#                              secrets).
#
# UPLOAD TOOL:
#   appstoreapi (only)    — App Store Connect REST API via
#                           apple-actions/upload-testflight-build@v5.
#                           Requires no local Apple tooling. altool (xcrun)
#                           and iTMSTransporter were removed — both required
#                           a macOS runner and are no longer supported.
#
# SIGNING:
#   Manual signing only. Certificate (.p12) and provisioning profile are
#   installed from base64-encoded repository secrets. Team ID is extracted
#   from the provisioning profile automatically; override with `ios-team-id`
#   secret if needed.
#
# CACHING:
#   - Node modules       — via actions/setup-node cache
#   - CocoaPods spec repo — ~/.cocoapods/repos, keyed on Podfile.lock hash
#   - CocoaPods Pods dir  — ios/Pods, keyed on Podfile.lock hash
#                           (skipped when clean-reinstall-pods=true)
#   - ccache             — ~/Library/Caches/ccache, keyed on Podfile.lock
#                           hash. Speeds up ObjC/C++ pod compilation.
#                           No benefit for Swift targets.
#   - Ruby gems          — via ruby/setup-ruby bundler-cache
#
# KNOWN LIMITATIONS:
#   - App Store Connect JWT tokens expire after 20 minutes. If Apple's
#     build processing takes longer, the upload step may report 401
#     NOT_AUTHORIZED. The IPA was still delivered — check TestFlight
#     directly. Set wait-for-processing: false to avoid this.
#   - -showBuildTimingSummary is a no-op in Xcode 26 (timing table does
#     not appear regardless of flag).
#   - ccache only caches ObjC/C++ compilation. Swift targets compile fresh
#     on every ephemeral runner run.
# =============================================================================
name: iOS Build & Deploy (reusable)

on:
  workflow_call:
    inputs:
      # ── Runner & Node ───────────────────────────────────────────────────────
      macos-runner:
        description: GitHub-hosted macOS runner label
        required: false
        type: string
        default: macos-latest
      node-version:
        description: Node version for React Native dependency installation
        required: false
        type: string
        default: "24"
      # ── Package Manager ─────────────────────────────────────────────────────
      # package-manager, package-manager-directory, cache-dependency-path, and
      # install-command work together. setup-node cache type and the default
      # install command are both derived from package-manager. Set
      # install-command only when the default (yarn install --frozen-lockfile
      # or npm ci) is not suitable.
      package-manager:
        description: Node package manager used for cache and default dependency 
          commands (yarn or npm)
        required: false
        type: string
        default: yarn
      package-manager-directory:
        description: Directory containing package.json and lockfile for selected
          package manager
        required: false
        type: string
        default: "."
      cache-dependency-path:
        description: Optional explicit lockfile path used by setup-node cache
        required: false
        type: string
        default: ""
      install-command:
        description: Optional explicit dependency install command; if empty uses
          package-manager default
        required: false
        type: string
        default: ""
      # ── Xcode ───────────────────────────────────────────────────────────────
      xcode-version:
        description: "Optional Xcode major or major.minor selector (for example: 26
          or 16.4)"
        required: false
        type: string
        default: ""
      # ── CocoaPods ───────────────────────────────────────────────────────────
      clean-reinstall-pods:
        description: Perform `pod deintegrate` and `pod install --repo-update`
        required: false
        type: boolean
        default: false
      ios-dir:
        description: iOS directory used for pods operations
        required: false
        type: string
        default: ios
      # ── Pre-build Hook ──────────────────────────────────────────────────────
      # Runs before dependency install. Useful for writing .env files or
      # mutating config before yarn/npm runs. Content is passed to eval —
      # never pass untrusted input here.
      pre-build-script:
        description: Optional bash script to run before dependency install (for 
          example, env file mutation)
        required: false
        type: string
        default: ""
      pre-build-working-directory:
        description: Working directory for pre-build-script
        required: false
        type: string
        default: "."

      # ── Xcode Project ─────────────────────────────────────────────────────────────
      workspace:
        description: Path to .xcworkspace
        required: true
        type: string
      scheme:
        description: Xcode scheme to archive
        required: true
        type: string
      configuration:
        description: Build configuration
        required: false
        type: string
        default: Release
      archive-path:
        description: Output xcarchive path
        required: false
        type: string
        default: output/app.xcarchive
      export-path:
        description: IPA export directory
        required: false
        type: string
        default: output/package
      export-options-plist:
        description: Path to static exportOptions.plist. If empty and 
          generate-export-options=true, one is generated.
        required: false
        type: string
        default: ""
      generate-export-options:
        description: Generate exportOptions.plist from profile metadata
        required: false
        type: boolean
        default: false

      # ── Signing ─────────────────────────────────────────────────────────────────
      code-sign-identity:
        description: Code sign identity, for example Apple Distribution
        required: false
        type: string
        default: Apple Distribution
      build-destination:
        description: Xcode destination
        required: false
        type: string
        default: generic/platform=iOS

      # ── Versioning ───────────────────────────────────────────────────────────────
      pbxproj-path:
        description: >
          Path to project.pbxproj. If empty, auto-detected from
          ios-dir by locating the single .xcodeproj directory
          (e.g. ios/MyApp.xcodeproj/project.pbxproj).
        required: false
        type: string
        default: ""
      marketing-prefix:
        description: Marketing version start in X.Y or X.Y.Z format (for example
          1.0 or 2.3.0)
        required: false
        type: string
        default: "1.0"

      # ── Artifact ────────────────────────────────────────────────────────────────
      # ipa-name-pattern tokens: {scheme}, {version}, {build_number},
      # {run_number}
      ipa-name-pattern:
        description: Output IPA file name pattern with tokens 
          {scheme},{version},{build_number},{run_number}
        required: false
        type: string
        default: "{scheme}{run_number}.ipa"
      artifact-name:
        description: Upload artifact name
        required: false
        type: string
        default: ipa

      # ── Upload ────────────────────────────────────────────────────────────────
      # appstoreapi is the only supported tool: App Store Connect REST API,
      # no local tooling required, so the release job runs on ubuntu-latest.
      # altool and transporter were removed (both required a macOS runner).
      # The input is retained for caller compatibility; any other value is
      # rejected at runtime with a migration message.
      upload-tool:
        description: "TestFlight upload tool. Only 'appstoreapi' is supported (altool
          and transporter were removed)."
        required: false
        type: string
        default: appstoreapi

      # ── Release Gating ───────────────────────────────────────────────────────
      # Set release-environment to route through release_with_environment job,
      # which enforces GitHub Environment approval gates.
      release-environment:
        description: GitHub environment for release job (ios-staging or 
          ios-production)
        required: false
        type: string
        default: "ios-staging"
      # Build-only toggle. When true, TestFlight upload jobs are skipped.
      disable-release:
        description: If true, skip TestFlight upload jobs and run build-only
        required: false
        type: boolean
        default: false

      # ── Ruby & Bundler ──────────────────────────────────────────────────────────
      # Required when using bundler-managed CocoaPods. Set ruby-version to
      # match the version in .ruby-version or Gemfile. CFPropertyList 3.0.9
      # requires ruby < 3.2; use 3.1 for RN 0.85 projects.
      ruby-version:
        description: "Ruby version for bundler/CocoaPods setup. Empty disables Ruby
          setup."
        required: false
        type: string
        default: ""
      use-bundler:
        description: "If true and ruby-version set, install gems via bundler (requires
          a Gemfile)."
        required: false
        type: boolean
        default: false

      # ── Build Acceleration ───────────────────────────────────────────────────────
      # ccache caches ObjC/C++ compilation. No benefit for Swift targets.
      # Requires :ccache_enabled => true in Podfile react_native_post_install.
      # Cache keyed on Podfile.lock — any pod version change invalidates it.
      enable-ccache:
        description: "Enable ccache for Objective-C/C++ pod compilation (partial speedup;
          no Swift benefit)."
        required: false
        type: boolean
        default: true

    secrets:
      ios-p12-base64:
        description: Base64 encoded signing certificate (.p12)
        required: true
      ios-p12-password:
        description: Password for signing certificate
        required: true
      ios-mobileprovision-base64:
        description: Base64 encoded provisioning profile
        required: true
      ios-team-id:
        description: Optional explicit Apple Team ID for manual signing
        required: false

      appstore-api-key-id:
        description: App Store Connect API key id
        required: false
      appstore-issuer-id:
        description: App Store Connect issuer id
        required: false
      appstore-api-private-key-base64:
        description: Base64-encoded App Store Connect API private key (.p8) for 
          the appstoreapi upload
        required: false

      github-token:
        description: "Unused by this workflow -- kept only so a caller already
          passing it doesn't break with an undeclared-secret error. The critical-vuln
          gate uses dependabot-alerts-token instead (GITHUB_TOKEN cannot access the
          Dependabot Alerts API regardless of permissions granted)."
        required: false
      dependabot-alerts-token:
        description: "PAT/App token (NOT GITHUB_TOKEN) with 'Dependabot alerts: read'
          for the critical-vuln gate -- GITHUB_TOKEN cannot access this API
          regardless of granted permissions (confirmed by live testing)."
        required: false

    outputs:
      version:
        description: Marketing version used for this build
        value: ${{ jobs.build.outputs.version }}
      build-number:
        description: Build number used for this build
        value: ${{ jobs.build.outputs.build-number }}
      ipa-file:
        description: IPA file name uploaded and released
        value: ${{ jobs.build.outputs.ipa-file }}

  workflow_dispatch:
permissions:
  contents: write

  security-events: read
jobs:
  critical-vuln-gate:
    if: ${{ inputs.release-environment != '' && !inputs.disable-release }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: read
      contents: write
    steps:
      - name: Check for open critical Dependabot alerts
        uses: simplify9/.github/.github/actions/check-critical-vulns@main
        with:
          dependabot-alerts-token: ${{ secrets.dependabot-alerts-token }}
          repository: ${{ github.repository }}

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🔒'
          title: Critical Dependabot Vulnerability Gate
          status: ${{ job.status }}

  build:
    name: Build
    runs-on: ${{ inputs.macos-runner }}
    outputs:
      version: ${{ steps.final_version.outputs.version }}
      build-number: ${{ steps.final_version.outputs.build_number }}
      ipa-file: ${{ steps.rename_ipa.outputs.ipa_file }}

    steps:
      - name: Announce
        shell: bash
        env:
          WORKSPACE: ${{ inputs.workspace }}
          SCHEME: ${{ inputs.scheme }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "::notice title=🍎 [IOS] Build IPA — Job Started::Workspace: ${WORKSPACE} | Scheme: ${SCHEME} | Triggered by: ${ACTOR}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      # ── Environment Setup ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Ruby
        if: ${{ inputs.ruby-version != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: ${{ inputs.use-bundler }}

      # ── Build Acceleration (ccache) ─────────────────────────────────────────────────────
      # ccache intercepts the ObjC/C++ compiler via Homebrew libexec symlinks.
      # Cache is keyed on Podfile.lock so any pod version change invalidates it.
      # Stats are reset before archive and printed in the job summary.
      - name: Install ccache
        if: ${{ inputs.enable-ccache }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi
          ccache --version

      - name: Cache ccache
        if: ${{ inputs.enable-ccache }}
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/ccache
          key: ccache-ios-${{ runner.os }}-${{ 
            hashFiles(format('{0}/Podfile.lock', inputs.ios-dir)) }}
          restore-keys: |
            ccache-ios-${{ runner.os }}-

      - name: Configure ccache
        if: ${{ inputs.enable-ccache }}
        shell: bash
        run: |
          set -euo pipefail

          ccache --max-size=2G
          ccache --set-config=compression=true

          echo "CCACHE_DIR=$HOME/Library/Caches/ccache" >> "$GITHUB_ENV"

          if [[ -d "/opt/homebrew/opt/ccache/libexec" ]]; then
            echo "/opt/homebrew/opt/ccache/libexec" >> "$GITHUB_PATH"
          elif [[ -d "/usr/local/opt/ccache/libexec" ]]; then
            echo "/usr/local/opt/ccache/libexec" >> "$GITHUB_PATH"
          else
            echo "ERROR: Could not find ccache libexec directory."
            exit 1
          fi

          ccache --version
          ccache --show-config

      # ── Runtime Paths & Xcode ───────────────────────────────────────────────────────
      - name: Initialize paths
        shell: bash
        run: |
          set -euo pipefail
          echo "KEYCHAIN_PATH=${RUNNER_TEMP}/build.keychain-db" >> "$GITHUB_ENV"

      - name: Select Xcode
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      # ── Pre-build Hook ──────────────────────────────────────────────────────────────
      - name: Pre-build script
        if: ${{ inputs.pre-build-script != '' }}
        shell: bash
        working-directory: ${{ inputs.pre-build-working-directory }}
        env:
          PRE_BUILD_SCRIPT: ${{ inputs.pre-build-script }}
        run: |
          set -euo pipefail
          echo "Running configured pre-build script in: $PWD"
          eval "${PRE_BUILD_SCRIPT}"

      # ── Node Dependencies ───────────────────────────────────────────────────────────────
      - name: Resolve package manager
        id: package_manager
        shell: bash
        env:
          PACKAGE_MANAGER_RAW: ${{ inputs.package-manager }}
          PACKAGE_DIR_RAW: ${{ inputs.package-manager-directory }}
          CACHE_DEPENDENCY_PATH_INPUT: ${{ inputs.cache-dependency-path }}
        run: |
          set -euo pipefail

          # Normalize inputs so package-manager value handling is case-insensitive.
          PACKAGE_MANAGER="$(echo "${PACKAGE_MANAGER_RAW}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR="${PACKAGE_DIR_RAW:-.}"

          if [[ -z "${PACKAGE_DIR}" ]]; then
            PACKAGE_DIR="."
          fi

          # Keep cache type and install commands tied to the selected package manager.
          case "${PACKAGE_MANAGER}" in
            yarn)
              DEFAULT_LOCKFILE="yarn.lock"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="yarn install --frozen-lockfile"
              else
                DEFAULT_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}' install --frozen-lockfile"
              fi
              ;;
            npm)
              DEFAULT_LOCKFILE="package-lock.json"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="npm ci"
              else
                DEFAULT_INSTALL_COMMAND="npm ci --prefix '${PACKAGE_DIR}'"
              fi
              ;;
            *)
              echo "ERROR: Unsupported package-manager '${PACKAGE_MANAGER_RAW}'. Supported values: yarn, npm."
              exit 1
              ;;
          esac

          # Infer lockfile path from package-manager + directory when no explicit override is provided.
          CACHE_DEPENDENCY_PATH="${CACHE_DEPENDENCY_PATH_INPUT}"

          if [[ -z "${CACHE_DEPENDENCY_PATH}" ]]; then
            if [[ "${PACKAGE_DIR}" == "." ]]; then
              CACHE_DEPENDENCY_PATH="${DEFAULT_LOCKFILE}"
            else
              CACHE_DEPENDENCY_PATH="${PACKAGE_DIR}/${DEFAULT_LOCKFILE}"
            fi
          fi

          # Fail fast with a clear message rather than letting setup-node fail later.
          if [[ ! -f "${CACHE_DEPENDENCY_PATH}" ]]; then
            echo "ERROR: Expected lockfile '${CACHE_DEPENDENCY_PATH}' was not found."
            echo "Set package-manager-directory or cache-dependency-path to the correct location."
            exit 1
          fi

          echo "cache=${PACKAGE_MANAGER}" >> "$GITHUB_OUTPUT"
          echo "cache_dependency_path=${CACHE_DEPENDENCY_PATH}" >> "$GITHUB_OUTPUT"
          echo "default_install_command=${DEFAULT_INSTALL_COMMAND}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package_manager.outputs.cache }}
          cache-dependency-path: ${{ 
            steps.package_manager.outputs.cache_dependency_path }}

      - name: Install dependencies
        shell: bash
        env:
          INSTALL_COMMAND_INPUT: ${{ inputs.install-command }}
          DEFAULT_INSTALL_COMMAND: ${{ 
            steps.package_manager.outputs.default_install_command }}
        run: |
          set -euo pipefail
          if [[ -n "${INSTALL_COMMAND_INPUT}" ]]; then
            eval "${INSTALL_COMMAND_INPUT}"
          else
            eval "${DEFAULT_INSTALL_COMMAND}"
          fi

      # ── CocoaPods: Podfile patch ────────────────────────────────────────────────────
      # When enable-ccache=true, ensures :ccache_enabled => true is active in the
      # caller's Podfile before pod install runs. Handles four states:
      #   1. Commented out:   # :ccache_enabled => true (or => Podfile::USE_CCACHE)
      #   2. Disabled:        :ccache_enabled => false
      #   3. Already enabled: :ccache_enabled => true  (no-op)
      #   4. Absent:          key not present — injected into react_native_post_install(...)
      # Callers do not need to manually edit their Podfiles; the workflow patches at CI time.
      - name: Configure Podfile for ccache
        if: ${{ inputs.enable-ccache }}
        shell: bash
        env:
          IOS_DIR: ${{ inputs.ios-dir }}
        run: |
          set -euo pipefail
          PODFILE="${IOS_DIR}/Podfile"

          if [[ ! -f "${PODFILE}" ]]; then
            echo "ERROR: Podfile not found at '${PODFILE}'. Set ios-dir to the correct directory."
            exit 1
          fi

          if grep -qE ':ccache_enabled' "${PODFILE}"; then
            # Key exists (commented or not) — uncomment then set value to true
            sed -i '' -E 's/^([[:space:]]*)#([[:space:]]*:ccache_enabled)/\1\2/' "${PODFILE}"
            sed -i '' -E 's/(:ccache_enabled[[:space:]]*=>[[:space:]]*)[[:alnum:]:_]+/\1true/' "${PODFILE}"
            echo "→ Patched existing :ccache_enabled in ${PODFILE}"
          else
            # Key absent — inject :ccache_enabled => true into react_native_post_install(...)
            # Uses Ruby (already present for CocoaPods) for reliable multi-line AST-aware patching.
            # Indentation of the new arg matches the last existing arg in the call.
            ruby -e '
          content = File.read(ARGV[0])
          modified = content.gsub(/(\breact_native_post_install\s*\(.*?)(\n?\s*\))/m) do
            inner  = $1.rstrip.chomp(",")
            indent = inner.lines.last.to_s[/^(\s*)/, 1] || "      "
            "#{inner},\n#{indent}:ccache_enabled => true#{$2}"
          end
          abort "ERROR: react_native_post_install not found in #{ARGV[0]}" if modified == content
          File.write(ARGV[0], modified)
          ' -- "${PODFILE}"
            echo "→ Injected :ccache_enabled => true into react_native_post_install in ${PODFILE}"
          fi

          if grep -qE ':ccache_enabled[[:space:]]*=>[[:space:]]*true' "${PODFILE}"; then
            echo "✅ :ccache_enabled => true active in ${PODFILE}"
          else
            echo "ERROR: Failed to enable :ccache_enabled in ${PODFILE}."
            exit 1
          fi

          echo "→ Podfile diff:"
          git --no-pager diff -- "${PODFILE}" || true

      # ── CocoaPods ──────────────────────────────────────────────────────────────────
      # CocoaPods caching — split into two independent cache steps.
      #
      # Cache key: Podfile.lock (NOT Podfile). The lock file pins exact
      # versions and source URLs. The Podfile only declares ranges.
      # Key rotates automatically on every `pod update` commit.
      #
      # Why two steps?
      #   ~/.cocoapods/repos (global spec repo, 1-3 GB) — safe to restore
      #   even during clean reinstalls. Eliminates the dominant time cost
      #   of `pod install --repo-update`.
      #
      #   ios/Pods (project Pods dir) — only useful when NOT doing a clean
      #   reinstall. Restoring it before `pod deintegrate` adds overhead
      #   and is immediately discarded, so this cache is skipped when
      #   clean-reinstall-pods=true.
      - name: Cache pod specs
        id: cache-pods-specs
        uses: actions/cache@v5
        with:
          path: ~/.cocoapods/repos
          key: cocoapods-specs-${{ runner.os }}-${{ 
            hashFiles(format('{0}/Podfile.lock', inputs.ios-dir)) }}
          restore-keys: |
            cocoapods-specs-${{ runner.os }}-

      # Project Pods dir cache — only when NOT doing a clean reinstall.
      # A clean reinstall deletes ios/Pods, so caching it then is wasted.
      - name: Cache pods
        id: cache-pods-dir
        if: ${{ !inputs.clean-reinstall-pods }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.ios-dir }}/Pods
          key: pods-dir-${{ runner.os }}-${{ 
            hashFiles(format('{0}/Podfile.lock', inputs.ios-dir)) }}
          restore-keys: |
            pods-dir-${{ runner.os }}-

      - name: Install pods
        if: ${{ !inputs.clean-reinstall-pods }}
        shell: bash
        working-directory: ${{ inputs.ios-dir }}
        env:
          USE_BUNDLER: ${{ inputs.use-bundler }}
          RUBY_VERSION: ${{ inputs.ruby-version }}
        run: |
          set -euo pipefail
          echo "::group::📦 [IOS] Installing CocoaPods"
          if [[ "${USE_BUNDLER}" == "true" && -n "${RUBY_VERSION}" ]]; then
            echo "→ Running: bundle exec pod install"
            bundle exec pod install
          else
            echo "→ Running: pod install"
            pod install
          fi
          echo "✅ CocoaPods installed"
          echo "::endgroup::"

      # ── Versioning ──────────────────────────────────────────────────────────────────
      # Writes MARKETING_VERSION and CURRENT_PROJECT_VERSION into the
      # .pbxproj file. VERSION and BUILD_NUMBER are also exported to
      # GITHUB_ENV for use in downstream steps (IPA renaming, summaries).
      - name: Bump version
        shell: bash
        env:
          PBXPROJ_PATH: ${{ inputs.pbxproj-path }}
          IOS_DIR: ${{ inputs.ios-dir }}
          MARKETING_PREFIX: ${{ inputs.marketing-prefix }}
        run: |
          set -euo pipefail

          # Auto-detect pbxproj path when not explicitly provided.
          # Expects exactly one .xcodeproj directory inside ios-dir,
          # following the standard React Native project structure:
          #   ios/{AppName}.xcodeproj/project.pbxproj
          if [[ -z "${PBXPROJ_PATH}" ]]; then
            XCODEPROJ_DIR=$(find "${IOS_DIR}" -maxdepth 1 \
              -name "*.xcodeproj" -type d 2>/dev/null | head -n 1)
            if [[ -z "${XCODEPROJ_DIR}" ]]; then
              echo "ERROR: Could not auto-detect .xcodeproj in '${IOS_DIR}'."
              echo "Set pbxproj-path explicitly if the project structure differs."
              exit 1
            fi
            PBXPROJ_PATH="${XCODEPROJ_DIR}/project.pbxproj"
            echo "Auto-detected pbxproj path: ${PBXPROJ_PATH}"
          fi

          if [[ ! -f "${PBXPROJ_PATH}" ]]; then
            echo "ERROR: project.pbxproj not found at '${PBXPROJ_PATH}'."
            echo "Set pbxproj-path explicitly if the project structure differs."
            exit 1
          fi

          BASE_BUILD=$(
            grep -m 1 "CURRENT_PROJECT_VERSION = " "${PBXPROJ_PATH}" \
              | sed -E 's/.*CURRENT_PROJECT_VERSION = ([^;]+);.*/\1/'
          )

          if ! [[ "${BASE_BUILD}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Could not parse numeric CURRENT_PROJECT_VERSION. Got '${BASE_BUILD}'"
            exit 1
          fi

          echo "Original marketing-prefix input: ${MARKETING_PREFIX}"
          echo "github.run_number: ${GITHUB_RUN_NUMBER}"
          echo "Original CURRENT_PROJECT_VERSION in pbxproj: ${BASE_BUILD}"

          # SemVer patch-counter mode: major.minor are fixed by the developer
          # (marketing-prefix); only the patch increments — by exactly 1 per run,
          # with no carry/rollover and no upper bound (… 1.1.69 -> 1.1.70 -> …).
          PREFIX_RAW="${MARKETING_PREFIX}"
          if [[ "${PREFIX_RAW}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            BASE_MAJOR="${BASH_REMATCH[1]}"
            BASE_MINOR="${BASH_REMATCH[2]}"
            BASE_PATCH="${BASH_REMATCH[3]}"
          elif [[ "${PREFIX_RAW}" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
            BASE_MAJOR="${BASH_REMATCH[1]}"
            BASE_MINOR="${BASH_REMATCH[2]}"
            BASE_PATCH="0"
          else
            echo "ERROR: marketing-prefix must be in X.Y or X.Y.Z format. Got '${PREFIX_RAW}'."
            exit 1
          fi

          # major.minor stay exactly as set; patch = base patch + run_number
          # (monotonic, unbounded — no roll-over into minor/major).
          INCREMENT=$((GITHUB_RUN_NUMBER))
          # 10# forces decimal so a leading-zero prefix (e.g. 1.2.08) is not
          # misread as octal and aborted under set -euo pipefail.
          PATCH=$((10#${BASE_PATCH} + INCREMENT))
          FINAL_MAJOR="${BASE_MAJOR}"
          FINAL_MINOR="${BASE_MINOR}"

          NEW_MARKETING_VERSION="${FINAL_MAJOR}.${FINAL_MINOR}.${PATCH}"
          # build-number-offset is fixed at 0; formula: BASE + run_number.
          # 10# forces decimal so a leading-zero CURRENT_PROJECT_VERSION (08/09)
          # is not misread as octal and aborted under set -euo pipefail.
          NEW_BUILD_NUMBER=$((10#${BASE_BUILD} + GITHUB_RUN_NUMBER))

          echo "Base major: ${BASE_MAJOR}"
          echo "Base minor: ${BASE_MINOR}"
          echo "Base patch: ${BASE_PATCH}"
          echo "Patch increment (run_number): ${INCREMENT}"
          echo "Computed patch: ${PATCH}"
          echo "Computed MARKETING_VERSION=${NEW_MARKETING_VERSION}"
          echo "Computed CURRENT_PROJECT_VERSION=${NEW_BUILD_NUMBER}"

          perl -pi -e "s/\\bMARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${NEW_MARKETING_VERSION};/g" "${PBXPROJ_PATH}"
          perl -pi -e "s/\\bCURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${NEW_BUILD_NUMBER};/g" "${PBXPROJ_PATH}"

          echo "VERSION=${NEW_MARKETING_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${NEW_BUILD_NUMBER}" >> "$GITHUB_ENV"

          echo "Updated pbxproj (diff):"
          git --no-pager diff -- "${PBXPROJ_PATH}" || true

      - name: Reinstall pods
        if: ${{ inputs.clean-reinstall-pods }}
        shell: bash
        env:
          IOS_DIR: ${{ inputs.ios-dir }}
        run: |
          set -euo pipefail
          cd "${IOS_DIR}"
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update

      # ── Signing ──────────────────────────────────────────────────────────────────
      # Certificate (.p12) and provisioning profile are installed from
      # base64-encoded secrets. Profile metadata (UUID, name, bundle ID,
      # team ID) is extracted from the installed profile for use in the
      # archive and export steps.
      - name: Install certificate
        uses: simplify9/.github/.github/actions/ios-install-cert@main
        with:
          p12Base64: ${{ secrets.ios-p12-base64 }}
          p12Password: ${{ secrets.ios-p12-password }}

      - name: Confirm certificate
        shell: bash
        run: |
          set -euo pipefail
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Signing certificate installed — PASSED"

      - name: Install profile
        id: install_profile
        uses: simplify9/.github/.github/actions/ios-install-profile@main
        with:
          profileBase64: ${{ secrets.ios-mobileprovision-base64 }}

      - name: Extract profile metadata
        id: profile_meta
        shell: bash
        env:
          PROFILE_B64: ${{ secrets.ios-mobileprovision-base64 }}
        run: |
          set -euo pipefail

          PROFILE_PATH="${RUNNER_TEMP}/profile.mobileprovision"
          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"

          printf '%s' "${PROFILE_B64}" | base64 -D > "${PROFILE_PATH}"
          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "${PROFILE_PLIST}")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "${PROFILE_PLIST}")
          TEAM_ID_FROM_PROFILE=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "${PROFILE_PLIST}")
          TEAM_NAME=$(/usr/libexec/PlistBuddy -c 'Print :TeamName' "${PROFILE_PLIST}")
          APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "${PROFILE_PLIST}")
          BUNDLE_ID="${APP_ID#*.}"

          echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
          echo "profile_name=${PROFILE_NAME}" >> "$GITHUB_OUTPUT"
          echo "team_id=${TEAM_ID_FROM_PROFILE}" >> "$GITHUB_OUTPUT"
          echo "team_name=${TEAM_NAME}" >> "$GITHUB_OUTPUT"
          echo "bundle_id=${BUNDLE_ID}" >> "$GITHUB_OUTPUT"

          echo "IOS_PROFILE_UUID=${PROFILE_UUID}" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=${PROFILE_NAME}" >> "$GITHUB_ENV"
          echo "TEAM_ID_FROM_PROFILE=${TEAM_ID_FROM_PROFILE}" >> "$GITHUB_ENV"
          echo "TEAM_NAME=${TEAM_NAME}" >> "$GITHUB_ENV"  # informational only — not consumed downstream
          echo "IOS_BUNDLE_ID=${BUNDLE_ID}" >> "$GITHUB_ENV"

      - name: Finalize version
        id: final_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      # ── Archive ───────────────────────────────────────────────────────────────────
      # Archive flags:
      #   -parallelizeTargets            — builds independent targets in parallel
      #   COMPILER_INDEX_STORE_ENABLE=NO — disables Xcode IDE indexing (CI-only)
      #   CLANG_ENABLE_EXPLICIT_MODULES=NO
      #                                  — RN's :ccache_enabled replaces CC with
      #                                    a ccache wrapper script that Xcode's
      #                                    explicit-modules scanner cannot
      #                                    recognize, so every Pod target
      #                                    already falls back to implicit
      #                                    modules — after printing a note per
      #                                    compile task (thousands of log
      #                                    lines). Disabling explicit modules
      #                                    makes that fallback explicit and
      #                                    silences the notes; ccache hits are
      #                                    unaffected. (Diagnostic notes are
      #                                    NOT suppressed by -quiet.)
      #   -quiet                         — suppresses per-file compilation logs
      #   -hideShellScriptEnvironment    — suppresses env var dumps from
      #                                    script phases
      #   -showBuildTimingSummary        — no-op in Xcode 26 (timing table
      #                                    does not appear); retained for
      #                                    future Xcode versions
      - name: Reset ccache stats
        if: ${{ inputs.enable-ccache }}
        shell: bash
        run: |
          set -euo pipefail
          ccache --zero-stats || true

      - name: Archive
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.ios-team-id }}
          WORKSPACE: ${{ inputs.workspace }}
          SCHEME: ${{ inputs.scheme }}
          CONFIGURATION: ${{ inputs.configuration }}
          BUILD_DESTINATION: ${{ inputs.build-destination }}
          ARCHIVE_PATH: ${{ inputs.archive-path }}
          CODE_SIGN_IDENTITY: ${{ inputs.code-sign-identity }}
          PROFILE_NAME: ${{ steps.profile_meta.outputs.profile_name }}
        run: |
          set -euo pipefail
          mkdir -p output

          TEAM_ID="${IOS_TEAM_ID}"
          if [[ -z "${TEAM_ID}" ]]; then
            TEAM_ID="${TEAM_ID_FROM_PROFILE}"
          fi

          xcodebuild \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -sdk iphoneos \
            -destination "${BUILD_DESTINATION}" \
            -archivePath "${ARCHIVE_PATH}" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY}" \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            -parallelizeTargets \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_EXPLICIT_MODULES=NO \
            -quiet \
            -hideShellScriptEnvironment \
            -showBuildTimingSummary

          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Archive created (manual xcodebuild) — PASSED: ${ARCHIVE_PATH}"

      # ── Export ───────────────────────────────────────────────────────────────────
      # exportOptions.plist can be provided statically via export-options-plist
      # or generated from provisioning profile metadata when
      # generate-export-options=true. The generated plist uses
      # app-store-connect method (Xcode 26 — replaces deprecated app-store).
      - name: Generate export options
        if: ${{ inputs.generate-export-options }}
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.ios-team-id }}
          BUNDLE_ID: ${{ steps.profile_meta.outputs.bundle_id }}
          PROFILE_NAME: ${{ steps.profile_meta.outputs.profile_name }}
        run: |
          set -euo pipefail

          TEAM_ID="${IOS_TEAM_ID}"
          if [[ -z "${TEAM_ID}" ]]; then
            TEAM_ID="${TEAM_ID_FROM_PROFILE}"
          fi

          EXPORT_PLIST="${RUNNER_TEMP}/exportOptions.plist"
          cat > "${EXPORT_PLIST}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "EXPORT_PLIST=${EXPORT_PLIST}" >> "$GITHUB_ENV"
          /usr/bin/plutil -p "${EXPORT_PLIST}" >/dev/null

      - name: Resolve export options
        id: resolve_export
        shell: bash
        env:
          EXPORT_OPTIONS_PLIST: ${{ inputs.export-options-plist }}
          GENERATE_EXPORT_OPTIONS: ${{ inputs.generate-export-options }}
        run: |
          set -euo pipefail

          if [[ -n "${EXPORT_OPTIONS_PLIST}" ]]; then
            echo "EXPORT_PLIST=${EXPORT_OPTIONS_PLIST}" >> "$GITHUB_ENV"
            echo "export_plist=${EXPORT_OPTIONS_PLIST}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GENERATE_EXPORT_OPTIONS}" != "true" ]]; then
            echo "ERROR: Either export-options-plist must be provided, or generate-export-options must be true."
            exit 1
          fi

          echo "export_plist=${EXPORT_PLIST}" >> "$GITHUB_OUTPUT"

      - name: Export IPA
        uses: simplify9/.github/.github/actions/xcode-export@main
        with:
          archivePath: ${{ inputs.archive-path }}
          exportOptionsPlist: ${{ steps.resolve_export.outputs.export_plist }}
          exportPath: ${{ inputs.export-path }}

      # ── Artifact ───────────────────────────────────────────────────────────────────
      # IPA is renamed using ipa-name-pattern, then uploaded as a GitHub
      # Actions artifact. compression-level=0: IPAs are already compressed;
      # recompressing wastes runner time with no size benefit.
      - name: Rename IPA
        id: rename_ipa
        shell: bash
        env:
          EXPORT_PATH: ${{ inputs.export-path }}
          IPA_NAME_PATTERN: ${{ inputs.ipa-name-pattern }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          set -euo pipefail

          IPA_SRC="$(ls -1 "${EXPORT_PATH}"/*.ipa | head -n 1)"
          PATTERN="${IPA_NAME_PATTERN}"

          IPA_OUT="${PATTERN//\{scheme\}/${SCHEME}}"
          IPA_OUT="${IPA_OUT//\{version\}/${VERSION}}"
          IPA_OUT="${IPA_OUT//\{build_number\}/${BUILD_NUMBER}}"
          IPA_OUT="${IPA_OUT//\{run_number\}/${GITHUB_RUN_NUMBER}}"

          mv "${IPA_SRC}" "${IPA_OUT}"

          echo "ipa_file=${IPA_OUT}" >> "$GITHUB_OUTPUT"
          echo "IPA_FILE=${IPA_OUT}" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] IPA renamed — PASSED: ${IPA_OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ steps.rename_ipa.outputs.ipa_file }}
          compression-level: 0
          # Transient hand-off to the release job in the same run; 1 day (the
          # minimum) is plenty and keeps Actions storage near-zero.
          retention-days: 1

      - name: Build failure
        if: failure()
        shell: bash
        env:
          WORKSPACE: ${{ inputs.workspace }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          set -euo pipefail
          echo "::error title=🍎 [IOS] Build Job Failed::Workspace: ${WORKSPACE} | Scheme: ${SCHEME}"
          echo "  Checkpoint 1 — Signing cert installed: ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Archive created:       ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — IPA renamed:           ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Collect ccache stats
        if: ${{ always() && inputs.enable-ccache }}
        shell: bash
        run: |
          {
            echo "CCACHE_STATS_SUMMARY<<CCACHE_STATS_EOF"
            echo ""
            echo "## ⚡ ccache Stats"
            echo ""
            echo '```text'
            ccache --show-stats || true
            echo '```'
            echo "CCACHE_STATS_EOF"
          } >> "$GITHUB_ENV"

      - name: Build summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🍎'
          title: iOS Build
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Workspace | `${{ inputs.workspace }}` |
            | Scheme | `${{ inputs.scheme }}` |
            | Runner | ${{ runner.os }} (${{ inputs.macos-runner }}) |
            | Xcode | ${{ inputs.xcode-version }} |
            | Node.js | ${{ inputs.node-version }} |
            | Branch | `${{ github.ref_name }}` |
            | Triggered by | ${{ github.actor }} |

            ## 📋 Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | Signing cert installed | ${{ env.CHECKPOINT_1_STATUS || '⏭️ Not reached' }} |
            | 2 | Archive created | ${{ env.CHECKPOINT_2_STATUS || '⏭️ Not reached' }} |
            | 3 | IPA renamed | ${{ env.CHECKPOINT_3_STATUS || '⏭️ Not reached' }} |
            ${{ env.CCACHE_STATS_SUMMARY }}
  release_with_environment:
    name: Release
    # Upload is a pure App Store Connect REST API call (apple-actions with
    # backend: AppStoreAPI), so no macOS tooling is needed. ubuntu-latest is
    # ~10x cheaper than a macOS runner.
    runs-on: ubuntu-latest
    needs: [build, critical-vuln-gate]
    if: ${{ inputs.release-environment != '' && !inputs.disable-release }}
    environment: ${{ inputs.release-environment }}

    steps:
      - name: Announce
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
          RELEASE_ENV: ${{ inputs.release-environment }}
          UPLOAD_TOOL: ${{ inputs.upload-tool }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "::notice title=🍎 [IOS] Upload to TestFlight (env gated) — Job Started::Version: ${VERSION} | Build: ${BUILD_NUMBER} | Env: ${RELEASE_ENV} | Upload tool: ${UPLOAD_TOOL} | Triggered by: ${ACTOR}"
          echo "UPLOAD_CHECKPOINT_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      # ── IPA Retrieval ──────────────────────────────────────────────────────────────
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve IPA path
        id: ipa
        shell: bash
        env:
          CANDIDATE: ${{ needs.build.outputs.ipa-file }}
        run: |
          set -euo pipefail

          IPA_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            IPA_FILE="$(basename "${CANDIDATE}")"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            IPA_FILE="$(ls -1 *.ipa 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            echo "ERROR: No .ipa file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=./${IPA_FILE}" >> "$GITHUB_OUTPUT"

      # ── Credentials ─────────────────────────────────────────────────────────────────
      # App Store Connect API key is decoded from base64 into
      # $RUNNER_TEMP/appstoreapi_keys/ and written to GITHUB_ENV as
      # APPSTOREAPI_KEY_CONTENT. Each line of the decoded PEM is masked to
      # prevent it appearing in the action input block printed before
      # apple-actions runs. Note: GitHub only auto-masks declared secrets,
      # not derived env vars, so the per-line masking is required.
      - name: Validate credentials
        shell: bash
        env:
          UPLOAD_TOOL: ${{ inputs.upload-tool }}
          APPSTORE_API_KEY_ID: ${{ secrets.appstore-api-key-id }}
          APPSTORE_ISSUER_ID: ${{ secrets.appstore-issuer-id }}
        run: |
          set -euo pipefail

          if [ "${UPLOAD_TOOL}" != "appstoreapi" ]; then
            echo "ERROR: upload-tool='${UPLOAD_TOOL}' is no longer supported."
            echo "altool and transporter were removed (both required a macOS runner)."
            echo "The release job now runs on ubuntu-latest and uploads via the"
            echo "App Store Connect REST API only. Set upload-tool=appstoreapi (the default)."
            exit 1
          fi

          if [ -z "${APPSTORE_API_KEY_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-api-key-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

          if [ -z "${APPSTORE_ISSUER_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-issuer-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

      - name: Decode API key
        shell: bash
        env:
          KEY_B64: ${{ secrets.appstore-api-private-key-base64 }}
        run: |
          set -euo pipefail
          umask 077
          PRIVATE_KEYS_DIR="$RUNNER_TEMP/appstoreapi_keys"
          mkdir -p "${PRIVATE_KEYS_DIR}"
          printf '%s' "${KEY_B64}" | base64 -d > "${PRIVATE_KEYS_DIR}/AuthKey.p8"
          if [[ ! -s "${PRIVATE_KEYS_DIR}/AuthKey.p8" ]]; then
            echo "ERROR: base64 decoding produced an empty key file. Check that appstore-api-private-key-base64 is valid."
            exit 1
          fi
          # Mask each line of the private key to prevent it appearing in logs
          while IFS= read -r line; do
            if [[ -n "${line}" ]]; then
              echo "::add-mask::${line}"
            fi
          done < "${PRIVATE_KEYS_DIR}/AuthKey.p8"
          {
            echo "APPSTOREAPI_KEY_CONTENT<<APPSTOREAPI_KEY_EOF"
            cat "${PRIVATE_KEYS_DIR}/AuthKey.p8"
            printf '\n'
            echo "APPSTOREAPI_KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Prepare upload
        shell: bash
        env:
          IPA_PATH: ${{ steps.ipa.outputs.path }}
        run: |
          set -euo pipefail
          IPA="${IPA_PATH}"
          IPA_BYTES=$(stat -c%s "${IPA}")
          IPA_SIZE_MB=$(awk "BEGIN { printf \"%.2f\", ${IPA_BYTES} / 1048576 }")
          IPA_NAME="$(basename "${IPA}")"
          echo "::notice title=🍎 [IOS] TestFlight Upload Starting::File: ${IPA_NAME} | Size: ${IPA_SIZE_MB} MB | Backend: AppStoreConnectAPI | Started: $(date -u +'%H:%M:%S UTC')"
          echo "::group::🍎 [IOS] Upload details"
          echo "  → File:    ${IPA_NAME}"
          echo "  → Size:    ${IPA_SIZE_MB} MB"
          echo "  → Backend: AppStoreConnectAPI (apple-actions/upload-testflight-build@v5)"
          echo "  → Started: $(date -u +'%H:%M:%S UTC')"
          echo "::endgroup::"
          echo "APPSTOREAPI_UPLOAD_START=$(date +%s)" >> "$GITHUB_ENV"
          echo "APPSTOREAPI_IPA_SIZE_MB=${IPA_SIZE_MB}" >> "$GITHUB_ENV"
          echo "APPSTOREAPI_IPA_NAME=${IPA_NAME}" >> "$GITHUB_ENV"

      # ── Upload ───────────────────────────────────────────────────────────────────
      # Uses the App Store Connect REST API (backend: AppStoreAPI) — no local
      # Apple tooling, so this runs on ubuntu-latest. Uploads chunks then polls
      # for Apple processing confirmation.
      # KNOWN LIMITATION: App Store Connect JWT tokens expire after 20 minutes.
      # If Apple processing takes longer, the poll returns 401 NOT_AUTHORIZED.
      # The IPA was still delivered. Check TestFlight directly if this occurs.
      # Set wait-for-processing: false to skip polling (fire-and-forget).
      - name: Upload
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.appstore-issuer-id }}
          api-key-id: ${{ secrets.appstore-api-key-id }}
          api-private-key: ${{ env.APPSTOREAPI_KEY_CONTENT }}
          backend: AppStoreAPI
          wait-for-processing: 'true'

      - name: Confirm upload
        shell: bash
        run: |
          set -euo pipefail
          ELAPSED=$(( $(date +%s) - APPSTOREAPI_UPLOAD_START ))
          bar='██████████████████████████████'
          echo "::group::🍎 [IOS] Upload complete"
          echo "  [${bar}] 100% — ${APPSTOREAPI_IPA_SIZE_MB} MB in ${ELAPSED}s"
          echo "  → Completed at $(date -u +'%H:%M:%S UTC')"
          echo "::endgroup::"
          echo "UPLOAD_CHECKPOINT_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/1] TestFlight upload completed — PASSED: ${APPSTOREAPI_IPA_NAME} (${APPSTOREAPI_IPA_SIZE_MB} MB) in ${ELAPSED}s"

      - name: Release failure
        if: failure()
        shell: bash
        env:
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
          UPLOAD_TOOL: ${{ inputs.upload-tool }}
        run: |
          echo "::error title=🍎 [IOS] Release Job Failed::Version: ${VERSION} | Build: ${BUILD_NUMBER} | Upload tool: ${UPLOAD_TOOL}"
          echo "  Checkpoint 1 — TestFlight upload: ${UPLOAD_CHECKPOINT_STATUS:-❌ Not reached}"

      - name: Release summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🍎'
          title: iOS TestFlight Upload
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Version | `${{ needs.build.outputs.version }}` (build: ${{ needs.build.outputs.build-number }}) |
            | Upload tool | ${{ inputs.upload-tool }} |
            | Branch | `${{ github.ref_name }}` |
            | Triggered by | ${{ github.actor }} |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## 📋 Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | TestFlight upload | ${{ env.UPLOAD_CHECKPOINT_STATUS || '⏭️ Skipped' }} |
