name: Reusable — Deploy Next.js to Cloudflare Workers

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        required: false
        default: "24"
        type: string
      package_manager:
        description: One of npm|yarn|pnpm (used for caching + install command)
        required: false
        default: "yarn"
        type: string
      install_args:
        description: Extra args for install (e.g., --frozen-lockfile)
        required: false
        default: "--frozen-lockfile"
        type: string
      run_lint:
        description: Run `lint` step (expects a matching script)
        required: false
        default: true
        type: boolean
      build_script:
        description: Package script to build Next.js (e.g., build)
        required: false
        default: "build"
        type: string
      next_on_pages_version:
        description: Version of @cloudflare/next-on-pages to run
        required: false
        default: "latest"
        type: string
      create_assetsignore:
        description: Create .vercel/output/static/.assetsignore with _worker.js
        required: false
        default: true
        type: boolean
      compatibility_date:
        description: Cloudflare Workers compatibility_date (YYYY-MM-DD)
        required: false
        default: "2026-05-01"
        type: string
      route:
        description: Route / custom domain for the Worker (e.g., example.com)
        required: true
        type: string
      project_name:
        description: Base Worker project name (without env suffix)
        required: true
        type: string
      environment:
        description: Wrangler environment name (e.g., staging, production)
        required: true
        type: string
      assets_dir:
        description: Directory with static assets (usually .vercel/output/static)
        required: false
        default: ".vercel/output/static"
        type: string
    secrets:
      cloudflare_api_token:
        description: Cloudflare API token with Workers + DNS permissions as needed
        required: true
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=⚡ [CF-WORKERS] Next.js Static Deploy — Job Started::Project: ${{ inputs.project_name }}-${{ inputs.environment }} | Route: ${{ inputs.route }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack (pnpm)
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Install dependencies
        run: |
          echo "::group::⚡ [CHECKPOINT 1/3] Install dependencies"
          echo "→ Package manager: ${{ inputs.package_manager }}"
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn install ${{ inputs.install_args }}
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            corepack enable
            pnpm install ${{ inputs.install_args }}
          else
            npm ci
          fi
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Dependencies installed — PASSED"
          echo "::endgroup::"

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: |
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn lint
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm lint
          else
            npm run lint
          fi

      - name: Build Next.js
        run: |
          echo "::group::⚡ [CHECKPOINT 2/3] Build Next.js static export"
          echo "→ Build script: ${{ inputs.build_script }}"
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn ${{ inputs.build_script }}
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm ${{ inputs.build_script }}
          else
            npm run ${{ inputs.build_script }}
          fi
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Next.js build completed — PASSED"
          echo "::endgroup::"

      - name: Build Cloudflare Workers bundle (next-on-pages)
        run: |
          echo "::group::⚡ [CHECKPOINT 3/3] Build CF Workers bundle (next-on-pages)"
          echo "→ Using @cloudflare/next-on-pages@${{ inputs.next_on_pages_version }}"
          npx @cloudflare/next-on-pages@${{ inputs.next_on_pages_version }}
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] CF Workers bundle built — PASSED"
          echo "::endgroup::"

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=⚡ [CF-WORKERS] Deploy Job Failed::Project '${{ inputs.project_name }}-${{ inputs.environment }}' failed | Route: ${{ inputs.route }}"
          echo "  Checkpoint 1 — Dependencies:      ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Next.js build:     ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — CF Workers bundle: ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Create assets ignore file
        if: ${{ inputs.create_assetsignore }}
        run: |
          mkdir -p .vercel/output/static
          echo "_worker.js" > .vercel/output/static/.assetsignore

      - name: Generate wrangler.toml
        uses: simplify9/.github/.github/actions/generate-wrangler-config@main
        with:
          COMPATIBILITY_DATE: ${{ inputs.compatibility_date }}
          ROUTE: ${{ inputs.route }}
          PROJECT_NAME: ${{ inputs.project_name }}
          ENVIRONMENT: ${{ inputs.environment }}
          ASSETS_DIR: ${{ inputs.assets_dir }}

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env ${{ inputs.environment }}
          apiToken: ${{ secrets.cloudflare_api_token }}
          accountId: ${{ secrets.cloudflare_account_id }}

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## ⚡ Next.js Static → Cloudflare Workers Deploy — ${{ inputs.project_name }}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Project | \`${{ inputs.project_name }}-${{ inputs.environment }}\` |"
            echo "| Route | \`${{ inputs.route }}\` |"
            echo "| Environment | \`${{ inputs.environment }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Runner | ${{ runner.os }} |"
            echo "| Triggered by | ${{ github.actor }} |"
            echo "| Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Dependencies installed | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Next.js build | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | CF Workers bundle | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
