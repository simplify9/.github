name: 'Generic Chart Helm CI/CD Pipeline (reusable)'

on:
  workflow_call:
    inputs:
      # Version configuration (for version job)
      major-version:
        description: 'Major version number'
        required: false
        default: '1'
        type: string
      minor-version:
        description: 'Minor version number'
        required: false
        default: '0'
        type: string
      package-nuget:
        description: 'Whether to build and publish NuGet packages'
        required: false
        default: false
        type: boolean
      nuget-major-version:
        description: 'NuGet package major version number'
        required: false
        default: '1'
        type: string
      nuget-minor-version:
        description: 'NuGet package minor version number'
        required: false
        default: '0'
        type: string
      nuget-projects:
        description: 'NuGet projects to pack and push (glob pattern)'
        required: false
        default: '**/*.csproj'
        type: string
      dotnet-version:
        description: '.NET SDK version to use for NuGet packaging'
        required: false
        default: '8.0.x'
        type: string
      test-projects:
        description: 'Test projects to run before packing (glob pattern)'
        required: false
        default: '**/*Tests/*.csproj'
        type: string
      run-tests:
        description: 'Whether to run tests before packing'
        required: false
        default: false
        type: boolean

      # Docker configuration (for build job)
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        default: './Dockerfile'
        type: string
      docker-context:
        description: 'Docker build context'
        required: false
        default: '.'
        type: string
      docker-platforms:
        description: 'Target platforms for Docker build'
        required: false
        default: 'linux/amd64'
        type: string

      # Registry configuration (for build job)
      container-registry:
        description: 'Container registry (docker.io, ghcr.io, etc.)'
        required: false
        default: 'ghcr.io'
        type: string

      namespace:
        description: 'Kubernetes namespace for development'
        required: false
        default: 'development'
        type: string
      deploy-environment:
        description: 'GitHub Environment name for the deploy job (controls protection
          rules and scoped secrets)'
        required: false
        default: 'development'
        type: string
      helm-timeout-minutes:
        description: 'Optional Helm timeout in minutes (e.g., 15). If empty, defaults
          to 10 minutes.'
        required: false
        default: ''
        type: string
      atomic:
        description: "If true, pass --rollback-on-failure to helm upgrade so a failed
          deploy rolls back automatically (implies --wait)."
        required: false
        default: true
        type: boolean
      helm-set-values:
        description: 'Development Helm set values (comma-separated: key1=value1,key2=value2)'
        required: false
        type: string

      # Dynamic deployment value inputs (generic, not prefixed with environment)
      environment:
        description: 'Value for environment Helm set (e.g., Development, Staging)'
        required: false
        type: string
      app-name:
        description: 'Application name for app.name Helm value (overrides helm-app-name)'
        required: false
        type: string
      ingress-host:
        description: 'Primary ingress host (maps to ingress.hosts[0].host)'
        required: false
        type: string
      service-target-port:
        description: 'Service targetPort (maps to service.targetPort)'
        required: false
        type: string
      ingress-hosts:
        description: 'Comma-separated list of ingress hosts (maps to ingress.hosts[i].host)'
        required: false
        type: string
      ingress-paths:
        description: 'Comma-separated list of ingress paths (maps to ingress.paths[i])'
        required: false
        type: string
      ingress-tls-secrets:
        description: 'Comma or newline separated list of TLS secrets matching ingress-hosts
          by index; falls back to ingress-tls-secret if absent'
        required: false
        type: string
      init-job-image:
        description: |-
          If set, a Kubernetes Job is run before the Helm deploy that runs EF Core migrations.
          The image must support the '--migrate' argument (see Program.cs init container mode).
          Example: registry.digitalocean.com/mealiverycr/mealivery-api:latest
        required: false
        default: ''
        type: string
      init-job-secret-name:
        description: |-
          Name of the Kubernetes Secret (in the target namespace) containing the connection-string
          key (see init-job-secret-key) with the doadmin credentials. Required when init-job-image is set.
          Example: mealivery-db-admin-secret
        required: false
        default: ''
        type: string
      init-job-command:
        description: |-
          Command (space-separated) the migration Job runs, e.g. 'dotnet Mealivery.Api.dll --migrate'.
          Leave empty to keep the historical default ('dotnet SW.Shanap.Web.dll --migrate').
        required: false
        default: ''
        type: string
      init-job-secret-key:
        description: Key in init-job-secret-name holding the connection string 
          (default 'connection-string').
        required: false
        default: ''
        type: string
      init-job-connstring-env:
        description: Env var name the connection string is injected into 
          (default 'ConnectionStrings__ShanapDb').
        required: false
        default: ''
        type: string
      init-job-environment-env:
        description: Env var name carrying the environment name in the migration
          Job (default 'ASPNETCORE_ENVIRONMENT').
        required: false
        default: ''
        type: string
      init-job-image-pull-secret:
        description: |-
          Name of the Kubernetes imagePullSecret attached to the migration Job pod.
          Defaults to 'sf9cr' (the org-wide registry secret). Override when the migration
          image lives in a different registry — e.g. 'mealiverycr' for
          registry.digitalocean.com/mealiverycr/... images.
          Set to an empty string to attach no pull secret (public images).
        required: false
        default: 'sf9cr'
        type: string

    secrets:
      # Container registry secrets
      registry-username:
        description: 'Container registry username'
        required: false
      registry-password:
        description: 'Container registry password/token'
        required: false

      # Kubernetes secrets
      kubeconfig:
        description: 'Base64 encoded kubeconfig'
        required: false

      # GitHub token for tagging
      github-token:
        description: 'GitHub token for tagging'
        required: false
      dependabot-alerts-token:
        description: "PAT/App token (NOT GITHUB_TOKEN) with 'Dependabot alerts: read'
          for the critical-vuln gate -- GITHUB_TOKEN cannot access this API
          regardless of granted permissions (confirmed by live testing)."
        required: false
      # NuGet secrets
      NUGET_PACKAGE_PAT:
        description: 'Personal access token for GitHub Packages restores inside Docker
          builds'
        required: false
      nuget-api-key:
        description: 'NuGet API key'
        required: false
      nuget-source:
        description: 'NuGet source URL'
        required: false

      # Secret deployment values (ordered by deployment stages)
      helm-set-secret-values:
        description: 'Helm set secret values (comma-separated: key1=value1,key2=value2)'
        required: false

    outputs:
      version:
        description: 'Generated semantic version'
        value: ${{ jobs.version.outputs.version }}
      docker-image:
        description: 'Built Docker image with tag'
        value: ${{ jobs.build.outputs.docker-image }}
      nuget-version:
        description: 'Generated NuGet package version'
        value: ${{ jobs.nuget.outputs.version }}

# Deny-all by default; every job opts into exactly the scopes it needs below.
  workflow_dispatch:
permissions:
  contents: write
  security-events: read

# Serialize runs per ref so concurrent pushes cannot race the semver tag computation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  # Set default registry and image name
  CONTAINER_REGISTRY: ${{ inputs.container-registry }}
  IMAGE_NAME: ${{ inputs.app-name || github.repository }}

jobs:
  version:
    name: Versioning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      security-events: read
    outputs:
      version: ${{ steps.semver.outputs.version }}
      git-tag: ${{ steps.semver.outputs.git-tag }}
      is-release: ${{ steps.semver.outputs.is-release }}
    steps:
      - name: Announce version job
        env:
          MAJOR: ${{ inputs.major-version }}
          MINOR: ${{ inputs.minor-version }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "::notice title=🏷️ [VERSION] Semver — Job Started::Major: ${MAJOR} | Minor: ${MINOR} | SHA: ${SHA} | Triggered by: ${ACTOR}"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # Full history + all tags so determine-semver reads them locally
          # (no network fetch needed); persisted git token not required after.
          fetch-depth: 0
          persist-credentials: false

      - name: Determine semantic version
        id: semver
        uses: simplify9/.github/.github/actions/determine-semver@main
        with:
          major: ${{ inputs.major-version }}
          minor: ${{ inputs.minor-version }}
          # Only the default branch produces a clean, git-taggable release version;
          # other branches get an ephemeral prerelease (e.g. 2.0.68-staging.45) so they
          # never collide on the shared git-tag namespace.
          release-branch: ${{ github.event.repository.default_branch }}
          current-ref: ${{ github.ref_name }}
          build-id: ${{ github.run_number }}

      - name: Write version job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🏷️'
          title: Version Job
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Computed version | `${{ steps.semver.outputs.version }}` |
            | Branch | `${{ github.ref_name }}` |
            | Runner | ${{ runner.os }} |
            | Triggered by | ${{ github.actor }} |

  critical-vuln-gate:
    name: Dependabot Check
    needs: version
    if: ${{ needs.version.outputs.is-release == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: read
      contents: write
    steps:
      - name: Check for open critical Dependabot alerts
        uses: simplify9/.github/.github/actions/check-critical-vulns@main
        with:
          dependabot-alerts-token: ${{ secrets.dependabot-alerts-token }}
          repository: ${{ github.repository }}

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🔒'
          title: Critical Dependabot Vulnerability Gate
          status: ${{ job.status }}

  nuget:
    name: NuGet
    runs-on: ubuntu-latest
    if: ${{ inputs.package-nuget }}
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write   # publish to GitHub Packages feed when nuget-source targets pkg.github.com
      security-events: read
    outputs:
      version: ${{ steps.nuget-semver.outputs.version }}
      git-tag: ${{ steps.nuget-semver.outputs.git-tag }}
    env:
      GITHUB_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
      NUGET_AUTH_TOKEN: ${{ secrets.nuget-api-key }}
      NUGET_SOURCE: ${{ secrets.nuget-source }}
    steps:
      - name: Announce nuget job
        env:
          NUGET_ENABLED: ${{ inputs.package-nuget }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "::notice title=🔷 [DOTNET] NuGet Publish — Job Started::Enabled: ${NUGET_ENABLED} | Triggered by: ${ACTOR}"

      - name: Checkout code
        if: ${{ inputs.package-nuget }}
        uses: actions/checkout@v7
        with:
          # Full history + all tags so determine-semver reads them locally
          # (no network fetch needed); persisted git token not required after.
          fetch-depth: 0
          persist-credentials: false

      - name: Configure GitHub Packages feed
        if: ${{ inputs.package-nuget && env.NUGET_SOURCE != '' && 
          contains(env.NUGET_SOURCE, 'pkg.github.com') }}
        env:
          FEED_URL: ${{ env.NUGET_SOURCE }}
          FEED_USERNAME: ${{ github.actor }}
          FEED_PASSWORD: ${{ secrets.nuget-api-key }}
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source "$FEED_URL" \
            --name github \
            --username "$FEED_USERNAME" \
            --password "$FEED_PASSWORD" \
            --store-password-in-clear-text

      - name: Determine NuGet semantic version
        if: ${{ inputs.package-nuget }}
        id: nuget-semver
        uses: simplify9/.github/.github/actions/determine-semver@main
        with:
          major: ${{ inputs.nuget-major-version }}
          minor: ${{ inputs.nuget-minor-version }}
          # Same branch scoping as the image version: only the default branch yields a
          # clean, taggable/pushable NuGet version; other branches get an ephemeral
          # prerelease so they never collide on git tags or the NuGet feed.
          release-branch: ${{ github.event.repository.default_branch }}
          current-ref: ${{ github.ref_name }}
          build-id: ${{ github.run_number }}

      - name: Dotnet Restore, Build, and Test
        if: ${{ inputs.package-nuget }}
        uses: simplify9/.github/.github/actions/dotnet-build@main
        with:
          projects: '**/*.csproj'
          test-projects: ${{ inputs.test-projects }}
          configuration: 'Release'
          dotnet-version: ${{ inputs.dotnet-version }}
          run-tests: ${{ inputs.run-tests }}

      - name: Pack and Push NuGet Package
        if: ${{ inputs.package-nuget }}
        uses: simplify9/.github/.github/actions/dotnet-pack-push@main
        with:
          projects: ${{ inputs.nuget-projects }}
          configuration: 'Release'
          version: ${{ steps.nuget-semver.outputs.version }}
          api-key: ${{ secrets.nuget-api-key }}
          nuget-source: ${{ secrets.nuget-source || 
            'https://api.nuget.org/v3/index.json' }}

      - name: Write nuget job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🔷'
          title: NuGet Job
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Enabled | ${{ inputs.package-nuget }} |
            | Version | `${{ steps.nuget-semver.outputs.version }}` |
            | Branch | `${{ github.ref_name }}` |
            | Runner | ${{ runner.os }} |

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version, nuget, critical-vuln-gate]
    permissions:
      contents: write
      packages: write   # push image to ghcr.io when falling back to GITHUB_TOKEN
      security-events: read
    # critical-vuln-gate is added to needs so a critical alert blocks the build
    # itself (not just the deploy step) and CI stops wasting build time on a
    # release that can't ship. It is conditionally skipped (non-release runs),
    # so 'skipped' must be allowed here or every non-release build would break.
    if: >-
      ${{ !cancelled()
          && needs.version.result == 'success'
          && (needs.nuget.result == 'success' || needs.nuget.result == 'skipped')
          && (needs.critical-vuln-gate.result == 'success' || needs.critical-vuln-gate.result
      == 'skipped')
      }}
    outputs:
      docker-image: ${{ steps.docker.outputs.image-tags }}
    steps:
      - name: Announce build job
        env:
          VERSION: ${{ needs.version.outputs.version }}
          REGISTRY_INPUT: ${{ inputs.container-registry }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "::notice title=🐳 [DOCKER] Docker Build — Job Started::Version: ${VERSION} | Registry: ${REGISTRY_INPUT} | Triggered by: ${ACTOR}"

      - name: Checkout code
        uses: actions/checkout@v7
        with:
          # No persisted git token needed in the Docker build context.
          persist-credentials: false

      - name: Build and push Docker image
        id: docker
        uses: simplify9/.github/.github/actions/docker-build-push@main
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          version: ${{ needs.version.outputs.version }}
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          dockerfile: ${{ inputs.dockerfile-path }}
          context: ${{ inputs.docker-context }}
          platforms: ${{ inputs.docker-platforms }}
          build-args: ${{ (secrets.NUGET_PACKAGE_PAT != '') && 
            format('NUGET_PACKAGE_PAT={0}', secrets.NUGET_PACKAGE_PAT) || '' }}
          # Org requirement: EVERY pushed image carries the 'latest' tag, on any branch.
          tag-latest: 'true'

      - name: Confirm Docker image built
        env:
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "✅ Docker image built and pushed — ${VERSION}"

      - name: Write build job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🐳'
          title: Build Job
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Version | `${{ needs.version.outputs.version }}` |
            | Registry | `${{ inputs.container-registry }}` |
            | Branch | `${{ github.ref_name }}` |
            | Runner | ${{ runner.os }} |

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version, build, critical-vuln-gate]
    # Explicit guard required: without an `if`, the implicit success() evaluates the
    # whole dependency chain (deploy -> build -> nuget). A disabled nuget job
    # (package-nuget=false, result: skipped) poisons that chain and silently skips
    # deploy. Mirror the build/tag guards so a skipped nuget never blocks deploy.
    # critical-vuln-gate is likewise conditionally skipped (non-release runs), so it
    # must be allowed to be 'skipped' — but a 'failure' result (open critical alert on
    # a release run) must block deploy, which is the whole point of the gate. A custom
    # `if:` like this one replaces GitHub's implicit success()-over-all-needs check, so
    # critical-vuln-gate's result has to be spelled out here explicitly or it would be
    # a no-op scheduling dependency only.
    if: >-
      ${{ !cancelled()
          && needs.version.result == 'success'
          && needs.build.result == 'success'
          && (needs.critical-vuln-gate.result == 'success' || needs.critical-vuln-gate.result
      == 'skipped') }}
    environment: ${{ inputs.deploy-environment }}
    # Deny-all: this job only runs helm-generic against the cluster (kubeconfig
    # secret) — it never checks out code or calls the GitHub API, so it needs no
    # GITHUB_TOKEN scopes.
    permissions:
      contents: write
      security-events: read
    steps:
      - name: Announce deploy job
        env:
          DEPLOY_ENV: ${{ inputs.deploy-environment }}
          APP_NAME: ${{ inputs.app-name }}
          VERSION: ${{ needs.version.outputs.version }}
          NAMESPACE: ${{ inputs.namespace }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "::notice title=☸️ [HELM] Deploy to ${DEPLOY_ENV} — Job Started::App: ${APP_NAME} | Version: ${VERSION} | Namespace: ${NAMESPACE} | Triggered by: ${ACTOR}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Generate dynamic ingress values
        id: ingress
        shell: bash
        env:
          # Bind caller-supplied inputs to env vars so they are never interpolated
          # directly into the shell (avoids script injection via host/path/secret values).
          HOSTS_INPUT: ${{ inputs.ingress-hosts || inputs.ingress-host }}
          PATHS_INPUT: ${{ inputs.ingress-paths }}
          TLS_ARRAY_INPUT: ${{ inputs.ingress-tls-secrets }}
        run: |
          # Supports both comma-separated and multiline YAML block scalar inputs.
          # Example multiline usage:
          # ingress-hosts: |
          #   host1.example.com
          #   host2.example.com
          # ingress-paths: |
          #   /api
          #   /docs
          #   /metrics

          OUTPUT=""

          if [ -n "$HOSTS_INPUT" ]; then
            HOSTS_CLEAN=$(echo "$HOSTS_INPUT" | sed 's/\r//g' | tr ',' '\n')
            # Prepare TLS secrets list if provided
            if [ -n "$TLS_ARRAY_INPUT" ]; then
              TLS_CLEAN=$(echo "$TLS_ARRAY_INPUT" | sed 's/\r//g' | tr ',' '\n')
              mapfile -t TLS_LIST < <(echo "$TLS_CLEAN" | grep -v '^[[:space:]]*$') || true
            fi
            INDEX=0
            while IFS= read -r line; do
              host=$(echo "$line" | xargs)
              [ -z "$host" ] && continue
              OUTPUT+="ingress.hosts[$INDEX].host=$host\n"
              host_tls=""
              if [ -n "$TLS_ARRAY_INPUT" ] && [ $INDEX -lt ${#TLS_LIST[@]} ]; then
                host_tls=$(echo "${TLS_LIST[$INDEX]}" | xargs)
              fi
              if [ -n "$host_tls" ]; then
                OUTPUT+="ingress.hosts[$INDEX].tlsSecret=$host_tls\n"
              fi
              INDEX=$((INDEX+1))
            done <<< "$HOSTS_CLEAN"
          fi

          if [ -n "$PATHS_INPUT" ]; then
            PATHS_CLEAN=$(echo "$PATHS_INPUT" | sed 's/\r//g' | tr ',' '\n')
            PINDEX=0
            while IFS= read -r line; do
              path=$(echo "$line" | xargs)
              [ -z "$path" ] && continue
              OUTPUT+="ingress.paths[$PINDEX]=$path\n"
              PINDEX=$((PINDEX+1))
            done <<< "$PATHS_CLEAN"
          fi

          {
            echo "ingress-values<<EOF"
            echo -e "$OUTPUT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/2] Ingress values generated — PASSED"

      - name: Deploy to ${{ inputs.deploy-environment }} (via local composite 
          action)
        uses: simplify9/.github/.github/actions/helm-generic@main
        with:
          # Required basics
          app_name: ${{ inputs.app-name }}
          namespace: ${{ inputs.namespace }}

          # Use the downloaded chart directory/package directly
          chart: s9genericchart
          chart_repo: "https://charts.sf9.io"

          # Helm timing/flags.
          # --wait=legacy: s9genericchart renders a livenessProbe with NO startupProbe when
          # probes are enabled, which can hang/fail under Helm 4's default kstatus watcher
          # (helm/helm#31526). The legacy waiter restores the proven Helm 3 behaviour.
          helm_timeout: ${{ inputs.helm-timeout-minutes != '' && format('{0}m', 
            inputs.helm-timeout-minutes) || '10m' }}
          extra_args: "--wait=legacy"
          atomic: ${{ inputs.atomic }}

          # Translate your previous comma-joined --set into line-based entries
          extra_set_values: |
            image.repo=${{ env.CONTAINER_REGISTRY }}
            app.version=${{ needs.version.outputs.version }}
            image.overrideName=${{ inputs.app-name }}
            image.overrideVersion=${{ needs.version.outputs.version }}
            environment=${{ inputs.environment }}
            service.targetPort=${{ inputs.service-target-port }}
            ${{ steps.ingress.outputs.ingress-values }}
            image.pullSecret=sf9cr
            ingress.annotations.cert-manager\.io/cluster-issuer=letsencrypt-nginx
            ingress.annotations.nginx\.ingress\.kubernetes\.io/proxy-body-size=50m
            ${{ inputs.helm-set-values }}

          # Sensitive values: applied as masked --set-string (no type coercion), not --set.
          secret_set_values: ${{ secrets.helm-set-secret-values }}

          # Kubeconfig (raw YAML or base64; your secret works for both)
          kubeconfig_data: ${{ secrets.kubeconfig }}
          init_job_image: ${{ inputs.init-job-image }}
          init_job_secret_name: ${{ inputs.init-job-secret-name }}
          init_job_command: ${{ inputs.init-job-command }}
          init_job_secret_key: ${{ inputs.init-job-secret-key }}
          init_job_connstring_env: ${{ inputs.init-job-connstring-env }}
          init_job_environment_env: ${{ inputs.init-job-environment-env }}
          init_job_image_pull_secret: ${{ inputs.init-job-image-pull-secret }}
          environment: ${{ inputs.environment }}

      - name: Confirm Helm deployed
        env:
          APP_NAME: ${{ inputs.app-name }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/2] Helm deploy completed — PASSED: ${APP_NAME}@${VERSION}"

      - name: Report deploy failure
        if: failure()
        env:
          APP_NAME: ${{ inputs.app-name }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          echo "::error title=☸️ [HELM] Deploy Job Failed::App: ${APP_NAME} | Version: ${VERSION}"
          echo "  Checkpoint 1 — Ingress values: ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Helm deploy:    ${CHECKPOINT_2_STATUS:-❌ Not reached}"

      - name: Write deploy job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '☸️'
          title: Deploy Job — ${{ inputs.app-name }}
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | App | `${{ inputs.app-name }}` |
            | Version | `${{ needs.version.outputs.version }}` |
            | Namespace | `${{ inputs.namespace }}` |
            | Branch | `${{ github.ref_name }}` |
            | Runner | ${{ runner.os }} |
            | Triggered by | ${{ github.actor }} |

            ## 📋 Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | Ingress values generated | ${{ env.CHECKPOINT_1_STATUS || '⏭️ Not reached' }} |
            | 2 | Helm deployment | ${{ env.CHECKPOINT_2_STATUS || '⏭️ Not reached' }} |

  tag:
    name: Tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [version, nuget, build, deploy]
    # Tag only after a successful deploy so tags always reference a shipped version.
    # A disabled nuget job (result: success with skipped steps) must not block tagging.
    if: >-
      ${{ !cancelled()
          && needs.version.result == 'success'
          && needs.build.result == 'success'
          && needs.deploy.result == 'success'
          && (needs.nuget.result == 'success' || needs.nuget.result == 'skipped')
      }}
    permissions:
      contents: write
      security-events: read
    steps:
      - name: Tag new version on GitHub origin
        uses: simplify9/.github/.github/actions/tag-github-origin@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag: ${{ needs.version.outputs.git-tag }}
          sha: ${{ github.sha }}

      - name: Tag NuGet version on GitHub origin
        if: ${{ inputs.package-nuget }}
        uses: simplify9/.github/.github/actions/tag-github-origin@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag: ${{ needs.nuget.outputs.git-tag }}
          sha: ${{ github.sha }}
