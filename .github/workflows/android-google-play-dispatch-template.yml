name: Android Google Play Dispatch Template

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Migration note:
# - This template prevents Play commit upgrade-path failures by keeping versionCode strictly increasing
#   (github.run_number + version-code-offset), while versionName stays human-readable.
# - For Azure/Jenkins migration, set version-code-offset above your last shipped versionCode.
# - Example to continue after last release 4.0.225:
#   version-prefix: "4.0"
#   version-name-offset: "225"    # computed name starts at 4.0.226 on run_number=1
#   version-code-offset: "1000000" # or another safely higher baseline than legacy versionCode
# - Re-runs keep the same github.run_number (run attempt does not increment it).

jobs:
  staging:
    name: Android Staging Build and Release
    if: ${{ github.ref_name == 'staging' }}
    uses: ./.github/workflows/generic-android-google-play.yml
    with:
      ubuntu-runner: ubuntu-latest
      node-version: "24"
      java-version: "17"
      java-distribution: temurin

      app-id: com.example.app
      app-slug: app
      # versionName is human-readable and can be migrated with version-name-offset.
      # versionCode is Play-upgrade critical and should stay strictly increasing.
      version-prefix: "1.0"
      version-name-override: ""
      version-name-offset: "0"
      version-code-offset: "1000000"

      install-command: yarn
      install-jetifier: true
      run-jetifier: true

      build-root-directory: android
      gradle-task: bundleRelease
      gradle-version: wrapper

      keystore-output-path: android/app/release.keystore
      aab-source-path: android/app/build/outputs/bundle/release/app-release.aab
      aab-name-pattern: "app-release-{version_name}.aab"
      artifact-name: aab

      play-track: internal
      release-status: completed
      changes-not-sent-for-review: false
      release-environment: staging
    secrets:
      android-keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      android-keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      android-key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
      android-key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
      google-play-service-account-json: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

  production:
    name: Android Production Build and Release
    if: ${{ github.ref_name == 'main' }}
    uses: ./.github/workflows/generic-android-google-play.yml
    with:
      ubuntu-runner: ubuntu-latest
      node-version: "24"
      java-version: "17"
      java-distribution: temurin

      app-id: com.example.app
      app-slug: app
      # versionName is human-readable and can be migrated with version-name-offset.
      # versionCode is Play-upgrade critical and should stay strictly increasing.
      version-prefix: "1.0"
      version-name-override: ""
      version-name-offset: "0"
      version-code-offset: "1000000"

      install-command: yarn
      install-jetifier: true
      run-jetifier: true

      build-root-directory: android
      gradle-task: bundleRelease
      gradle-version: wrapper

      keystore-output-path: android/app/release.keystore
      aab-source-path: android/app/build/outputs/bundle/release/app-release.aab
      aab-name-pattern: "app-release-{version_name}.aab"
      artifact-name: aab

      play-track: production
      release-status: completed
      changes-not-sent-for-review: false
      release-environment: production
    secrets:
      android-keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      android-keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      android-key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
      android-key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
      google-play-service-account-json: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
