name: Reusable — Deploy Next.js to Cloudflare Workers

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        required: false
        default: "24"
        type: string
      package_manager:
        description: One of npm|yarn|pnpm (used for caching + install command)
        required: false
        default: "yarn"
        type: string
      install_args:
        description: Extra args for install (e.g., --frozen-lockfile)
        required: false
        default: "--frozen-lockfile"
        type: string
      run_lint:
        description: Run `lint` step (expects a matching script)
        required: false
        default: true
        type: boolean
      opennextjs_version:
        description: Version of OpenNext.js to run
        required: false
        default: "latest"
        type: string
      compatibility_date:
        description: Cloudflare Workers compatibility_date (YYYY-MM-DD)
        required: false
        default: "2026-05-01"
        type: string
      route:
        description: Route / custom domain for the Worker (e.g., example.com). If blank, falls back to repo vars CLOUDFLARE_ROUTE then ROUTE.
        required: false
        default: ""
        type: string
      project_name:
        description: Base Worker project name (without env suffix)
        required: true
        type: string
      environment:
        description: Wrangler environment name (e.g., staging, production)
        required: true
        type: string
      assets_dir:
        description: Directory with static assets (usually .open-next/assets)
        required: false
        default: ".open-next/assets"
        type: string
      build_script:
        description: Build command
        required: false
        default: "build"
        type: string
    secrets:
      cloudflare_api_token:
        description: Cloudflare API token with Workers + DNS permissions as needed
        required: true
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=⚡ [CF-WORKERS] Next.js Deploy — Job Started::Project: ${{ inputs.project_name }}-${{ inputs.environment }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack (pnpm)
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Install dependencies
        run: |
          echo "::group::⚡ [CHECKPOINT 1/3] Install dependencies"
          echo "→ Package manager: ${{ inputs.package_manager }}"
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn install ${{ inputs.install_args }}
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            corepack enable
            pnpm install ${{ inputs.install_args }}
          else
            npm ci
          fi
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Dependencies installed — PASSED"
          echo "::endgroup::"

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: |
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn lint
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm lint
          else
            npm run lint
          fi

      - name: Build Next.js
        run: |
          echo "::group::⚡ [CHECKPOINT 2/3] Build Next.js application"
          echo "→ Build script: ${{ inputs.build_script }}"
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn ${{ inputs.build_script }}
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm ${{ inputs.build_script }}
          else
            npm run ${{ inputs.build_script }}
          fi
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Next.js build completed — PASSED"
          echo "::endgroup::"

      - name: Validate middleware compatibility for Cloudflare
        run: |
          set -euo pipefail

          if [ -f "src/proxy.ts" ] || [ -f "proxy.ts" ]; then
            echo "::error::Node-style middleware entry detected (proxy.ts). Cloudflare/OpenNext requires middleware.ts with edge runtime."
            echo "Rename proxy.ts to middleware.ts and export config.runtime = \"edge\"."
            exit 1
          fi

          MIDDLEWARE_FILE=""
          if [ -f "src/middleware.ts" ]; then
            MIDDLEWARE_FILE="src/middleware.ts"
          elif [ -f "middleware.ts" ]; then
            MIDDLEWARE_FILE="middleware.ts"
          fi

          if [ -n "$MIDDLEWARE_FILE" ] && grep -Eq 'runtime[[:space:]]*:[[:space:]]*["'"'"']nodejs["'"'"']' "$MIDDLEWARE_FILE"; then
            echo "::error::Node.js middleware runtime detected in $MIDDLEWARE_FILE. Use runtime = \"edge\" for Cloudflare/OpenNext."
            exit 1
          fi

      - name: Create OpenNext.js configuration
        run: |
          cat > open-next.config.ts << 'EOF'
          import { defineCloudflareConfig } from "@opennextjs/cloudflare";

          export default defineCloudflareConfig();
          EOF
          
      - name: Install Wrangler
        run: npm install wrangler --no-save --legacy-peer-deps --no-package-lock

      - name: Generate wrangler.toml
        uses: simplify9/.github/.github/actions/generate-wrangler-config@main
        with:
          compatibility-date: ${{ inputs.compatibility_date }}
          route: ${{ inputs.route != '' && inputs.route || vars.CLOUDFLARE_ROUTE || vars.ROUTE }}
          project-name: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          assets-dir: ${{ inputs.assets_dir }}
          build-for-opennext: "true"

      - name: Install OpenNext.js Cloudflare adapter
        run: npm install @opennextjs/cloudflare@${{ inputs.opennextjs_version }} --no-save --force --no-package-lock

      - name: List local binaries
        run: ls -la node_modules/.bin

      - name: Build Cloudflare Workers bundle (OpenNext.js)
        run: |
          echo "::group::⚡ [CHECKPOINT 3/3] Build Cloudflare Workers bundle"
          echo "→ Using OpenNext.js Cloudflare adapter: ${{ inputs.opennextjs_version }}"
          npx opennextjs-cloudflare build
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] CF Workers bundle built — PASSED"
          echo "::endgroup::"

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=⚡ [CF-WORKERS] Deploy Job Failed::Project '${{ inputs.project_name }}-${{ inputs.environment }}' failed"
          echo "  Checkpoint 1 — Dependencies:      ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Next.js build:     ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — CF Workers bundle: ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env ${{ inputs.environment }}
          apiToken: ${{ secrets.cloudflare_api_token }}
          accountId: ${{ secrets.cloudflare_account_id }}

      - name: Write job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
          REF_NAME: ${{ github.ref_name }}
          OPENNEXT_VERSION: ${{ inputs.opennextjs_version }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## ⚡ Next.js → Cloudflare Workers Deploy — ${PROJECT_NAME} — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Project | \`${PROJECT_NAME}-${DEPLOY_ENV}\` |"
            echo "| Environment | \`${DEPLOY_ENV}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| OpenNext.js version | ${OPENNEXT_VERSION} |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
            echo "| Run | [${RUN_ID}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Dependencies installed | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Next.js build | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | CF Workers bundle | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
