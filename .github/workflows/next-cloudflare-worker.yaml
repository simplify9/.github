# =============================================================================
# Deploy Next.js to Cloudflare Workers (OpenNext.js)
# =============================================================================
# Reusable workflow that builds a Next.js application with the OpenNext.js
# Cloudflare adapter and deploys it to Cloudflare Workers.
#
# Pipeline:
#   install -> lint (optional) -> validate middleware (fail-fast, pre-build) ->
#   build Next.js -> generate OpenNext config (if absent) -> install adapter ->
#   generate & validate wrangler.toml -> build Workers bundle -> deploy.
#
# Notes:
#   - A project-provided open-next.config.{ts,js,mjs} is respected and NEVER
#     overwritten; a minimal default is generated only when none exists.
#   - The OpenNext adapter + its required Wrangler peer are installed
#     transiently (not persisted to the lockfile) so the workflow works for
#     projects that don't yet declare them. Projects that DO declare them keep
#     their own pinned versions via the normal install.
#   - .next/cache is persisted across runs to speed up incremental builds.
#
# Inputs (see `on.workflow_call.inputs` for full list, types & defaults):
#   node_version, package_manager (npm|yarn|pnpm), install_args, run_lint,
#   opennextjs_version, compatibility_date, route, project_name (required),
#   environment (required), assets_dir, build_script.
#
# Secrets:
#   cloudflare_api_token   (required)  Cloudflare API token (Workers + DNS).
#   cloudflare_account_id  (required)  Cloudflare Account ID.
#
# Usage:
#   jobs:
#     deploy:
#       uses: simplify9/.github/.github/workflows/next-cloudflare-worker.yaml@main
#       with:
#         project_name: my-app
#         environment: production
#         route: example.com
#       secrets:
#         cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
# =============================================================================
name: Reusable — Deploy Next.js to Cloudflare Workers

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        required: false
        default: "24"
        type: string
      package_manager:
        description: One of npm|yarn|pnpm (used for caching + install command)
        required: false
        default: "yarn"
        type: string
      install_args:
        description: "Extra args for install (e.g., --frozen-lockfile). Applies to
          yarn/pnpm only; npm always uses `npm ci` (which already enforces a frozen
          lockfile) and ignores this."
        required: false
        default: "--frozen-lockfile"
        type: string
      run_lint:
        description: Run `lint` step (expects a matching script)
        required: false
        default: true
        type: boolean
      opennextjs_version:
        description: "Version of the @opennextjs/cloudflare adapter to install (pinned
          for reproducible builds; set to a specific version or a tag like `latest`)."
        required: false
        default: "1.20.1"
        type: string
      compatibility_date:
        description: Cloudflare Workers compatibility_date (YYYY-MM-DD)
        required: false
        default: "2026-05-01"
        type: string
      route:
        description: Route / custom domain for the Worker (e.g., example.com). 
          If blank, falls back to repo vars CLOUDFLARE_ROUTE then ROUTE.
        required: false
        default: ""
        type: string
      project_name:
        description: Base Worker project name (without env suffix)
        required: true
        type: string
      environment:
        description: Wrangler environment name (e.g., staging, production)
        required: true
        type: string
      assets_dir:
        description: Directory with static assets (usually .open-next/assets)
        required: false
        default: ".open-next/assets"
        type: string
      build_script:
        description: Build command
        required: false
        default: "build"
        type: string
    secrets:
      cloudflare_api_token:
        description: Cloudflare API token with Workers + DNS permissions as 
          needed
        required: true
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true
      github-token:
        description: "Unused by this workflow -- kept only so a caller already
          passing it doesn't break with an undeclared-secret error. The critical-vuln
          gate uses dependabot-alerts-token instead (GITHUB_TOKEN cannot access the
          Dependabot Alerts API regardless of permissions granted)."
        required: false
      dependabot-alerts-token:
        description: "PAT/App token (NOT GITHUB_TOKEN) with 'Dependabot alerts: read'
          for the critical-vuln gate -- GITHUB_TOKEN cannot access this API
          regardless of granted permissions (confirmed by live testing)."
        required: false

  workflow_dispatch:
permissions:
  contents: write
  security-events: read
jobs:
  critical-vuln-gate:
    name: Dependabot Check
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: read
      contents: write
    steps:
      - name: Check for open critical Dependabot alerts
        uses: simplify9/.github/.github/actions/check-critical-vulns@main
        with:
          dependabot-alerts-token: ${{ secrets.dependabot-alerts-token }}
          repository: ${{ github.repository }}

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🔒'
          title: Critical Dependabot Vulnerability Gate
          status: ${{ job.status }}

  deploy:
    needs: critical-vuln-gate
    if: ${{ !cancelled() && (needs.critical-vuln-gate.result == 'success' || 
      needs.critical-vuln-gate.result == 'skipped') }}
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Prevent overlapping deploys to the same project/environment from racing.
    # Do not cancel an in-flight deploy mid-rollout.
    concurrency:
      group: deploy-${{ inputs.project_name }}-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      contents: write

      security-events: read
    steps:
      - name: Announce deploy job
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
          ACTOR: ${{ github.actor }}
        run: |
          set -euo pipefail
          echo "::notice title=⚡ [CF-WORKERS] Next.js Deploy — Job Started::Project: ${PROJECT_NAME}-${DEPLOY_ENV} | Triggered by: ${ACTOR}"
          {
            echo "CHECKPOINT_1_STATUS=⏳ Pending"
            echo "CHECKPOINT_2_STATUS=⏳ Pending"
            echo "CHECKPOINT_3_STATUS=⏳ Pending"
            echo "CHECKPOINT_4_STATUS=⏳ Pending"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          # No git writes after checkout; don't leave the token in .git/config for
          # later install/build steps.
          persist-credentials: false

      # Enable Corepack BEFORE setup-node so its pnpm cache can resolve the
      # pnpm binary. (Only needed for pnpm.)
      - name: Enable Corepack (pnpm)
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      # Resolve package-manager-specific commands once and export them so the
      # install/lint/build steps stay DRY and never interpolate untrusted
      # inputs directly into a shell.
      - name: Resolve package manager commands
        env:
          PKG_MGR: ${{ inputs.package_manager }}
        run: |
          set -euo pipefail
          # Only record the resolved tool name — install_args is NEVER baked into a
          # command string here (that would let a caller inject shell metacharacters
          # or newlines into GITHUB_ENV). It is passed as a quoted array at install time.
          case "$PKG_MGR" in
            yarn)
              echo "PM_TOOL=yarn" >> "$GITHUB_ENV"
              echo "PM_RUN=yarn" >> "$GITHUB_ENV"
              ;;
            pnpm)
              echo "PM_TOOL=pnpm" >> "$GITHUB_ENV"
              echo "PM_RUN=pnpm" >> "$GITHUB_ENV"
              ;;
            npm)
              echo "PM_TOOL=npm" >> "$GITHUB_ENV"
              echo "PM_RUN=npm run" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported package_manager '$PKG_MGR' (expected npm|yarn|pnpm)"
              exit 1
              ;;
          esac

      # Source-only check — runs before the expensive build to fail fast.
      - name: Validate middleware compatibility for Cloudflare
        run: |
          set -euo pipefail

          if [ -f "src/proxy.ts" ] || [ -f "proxy.ts" ]; then
            echo "::error::Node-style middleware entry detected (proxy.ts). Cloudflare/OpenNext requires middleware.ts with edge runtime."
            echo "Rename proxy.ts to middleware.ts and export config.runtime = \"edge\"."
            exit 1
          fi

          MIDDLEWARE_FILE=""
          if [ -f "src/middleware.ts" ]; then
            MIDDLEWARE_FILE="src/middleware.ts"
          elif [ -f "middleware.ts" ]; then
            MIDDLEWARE_FILE="middleware.ts"
          fi

          if [ -n "$MIDDLEWARE_FILE" ] && grep -Eq 'runtime[[:space:]]*:[[:space:]]*["'"'"']nodejs["'"'"']' "$MIDDLEWARE_FILE"; then
            echo "::error::Node.js middleware runtime detected in $MIDDLEWARE_FILE. Use runtime = \"edge\" for Cloudflare/OpenNext."
            exit 1
          fi

      - name: Install dependencies
        env:
          INSTALL_ARGS: ${{ inputs.install_args }}
        run: |
          set -euo pipefail
          echo "::group::⚡ [CHECKPOINT 1/4] Install dependencies"
          # Split install_args into a word array and pass each as a separate quoted
          # argument so it can never break out into the shell. npm ci enforces a
          # frozen lockfile, so extra args are intentionally not applied there.
          read -r -a EXTRA_ARGS <<< "$INSTALL_ARGS"
          case "$PM_TOOL" in
            yarn) echo "→ Install command: yarn install"; yarn install "${EXTRA_ARGS[@]}" ;;
            pnpm) echo "→ Install command: pnpm install"; pnpm install "${EXTRA_ARGS[@]}" ;;
            npm)  echo "→ Install command: npm ci"; npm ci ;;
          esac
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/4] Dependencies installed — PASSED"
          echo "::endgroup::"

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: |
          set -euo pipefail
          echo "::group::⚡ Lint"
          $PM_RUN lint
          echo "✅ Lint — PASSED"
          echo "::endgroup::"

      # Persist Next.js incremental build cache across runs for faster builds.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', 
            '**/yarn.lock', '**/pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', 
            '**/*.[jt]sx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock', '**/pnpm-lock.yaml') }}-

      - name: Build Next.js
        env:
          BUILD_SCRIPT: ${{ inputs.build_script }}
        run: |
          set -euo pipefail
          echo "::group::⚡ [CHECKPOINT 2/4] Build Next.js application"
          echo "→ Build script: $BUILD_SCRIPT"
          $PM_RUN "$BUILD_SCRIPT"
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/4] Next.js build completed — PASSED"
          echo "::endgroup::"

      - name: Create OpenNext.js configuration (if absent)
        run: |
          set -euo pipefail
          echo "::group::⚡ OpenNext.js configuration"
          if [ -f open-next.config.ts ] || [ -f open-next.config.js ] || [ -f open-next.config.mjs ]; then
            echo "→ Using project-provided OpenNext config (not overwriting)."
          else
            echo "→ No OpenNext config found; generating a default open-next.config.ts."
            cat > open-next.config.ts << 'EOF'
          import { defineCloudflareConfig } from "@opennextjs/cloudflare";

          export default defineCloudflareConfig();
          EOF
          fi
          echo "::endgroup::"

      - name: Install OpenNext.js Cloudflare adapter & Wrangler
        env:
          OPENNEXT_VERSION: ${{ inputs.opennextjs_version }}
        run: |
          set -euo pipefail
          echo "::group::⚡ Install OpenNext.js Cloudflare adapter & Wrangler"
          echo "→ Adapter: @opennextjs/cloudflare@${OPENNEXT_VERSION}"
          # Installed transiently (not saved to package.json / lockfile). Wrangler
          # is a required peer of the adapter and is needed by the bundle build.
          # --legacy-peer-deps avoids hard-failing on unrelated peer ranges
          # (replaces the previous, more aggressive --force).
          npm install --no-save --no-package-lock --legacy-peer-deps \
            "@opennextjs/cloudflare@${OPENNEXT_VERSION}" "wrangler@4"
          echo "::endgroup::"

      - name: Generate wrangler.toml
        uses: simplify9/.github/.github/actions/generate-wrangler-config@main
        with:
          compatibility-date: ${{ inputs.compatibility_date }}
          route: ${{ inputs.route != '' && inputs.route || vars.CLOUDFLARE_ROUTE
            || vars.ROUTE }}
          project-name: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          assets-dir: ${{ inputs.assets_dir }}
          build-for-opennext: "true"

      - name: Build Cloudflare Workers bundle (OpenNext.js)
        env:
          OPENNEXT_VERSION: ${{ inputs.opennextjs_version }}
        run: |
          set -euo pipefail
          echo "::group::⚡ [CHECKPOINT 3/4] Build Cloudflare Workers bundle"
          echo "→ Using OpenNext.js Cloudflare adapter: ${OPENNEXT_VERSION}"
          npx opennextjs-cloudflare build
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/4] CF Workers bundle built — PASSED"
          echo "::endgroup::"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env ${{ inputs.environment }}
          apiToken: ${{ secrets.cloudflare_api_token }}
          accountId: ${{ secrets.cloudflare_account_id }}

      - name: Mark deploy checkpoint
        run: echo "CHECKPOINT_4_STATUS=✅ PASSED" >> "$GITHUB_ENV"

      - name: Report deploy failure
        if: failure()
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
        run: |
          set -euo pipefail
          echo "::error title=⚡ [CF-WORKERS] Deploy Job Failed::Project '${PROJECT_NAME}-${DEPLOY_ENV}' failed"
          echo "  Checkpoint 1 — Dependencies:      ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Next.js build:     ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — CF Workers bundle: ${CHECKPOINT_3_STATUS:-❌ Not reached}"
          echo "  Checkpoint 4 — Deploy:            ${CHECKPOINT_4_STATUS:-❌ Not reached}"

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '⚡'
          title: Next.js → Cloudflare Workers Deploy — ${{ inputs.project_name 
            }}
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Project | `${{ inputs.project_name }}-${{ inputs.environment }}` |
            | Environment | `${{ inputs.environment }}` |
            | Branch | `${{ github.ref_name }}` |
            | OpenNext.js version | ${{ inputs.opennextjs_version }} |
            | Runner | ${{ runner.os }} |
            | Triggered by | ${{ github.actor }} |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## 📋 Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | Dependencies installed | ${{ env.CHECKPOINT_1_STATUS || '⏭️ Not reached' }} |
            | 2 | Next.js build | ${{ env.CHECKPOINT_2_STATUS || '⏭️ Not reached' }} |
            | 3 | CF Workers bundle | ${{ env.CHECKPOINT_3_STATUS || '⏭️ Not reached' }} |
            | 4 | Deploy | ${{ env.CHECKPOINT_4_STATUS || '⏭️ Not reached' }} |
