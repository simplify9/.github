name: Deploy Vite App to Cloudflare Pages

on:
  workflow_call:
    inputs:
      # Project Configuration
      project-name:
        description: 'Base Cloudflare project name (without suffix)'
        required: true
        type: string
      
      # Environment Configuration
      environment:
        description: 'Environment to deploy to (e.g., development, staging, production)'
        required: false
        type: string
        default: 'development'
      
      # Branch Configuration
      target-branch:
        description: 'Target branch for deployment'
        required: false
        type: string
        default: 'development'
      
      # Node.js Configuration
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '24'
      
      package-manager:
        description: 'Package manager to use (npm, yarn, pnpm)'
        required: false
        type: string
        default: 'npm'
      
      # Build Configuration
      build-command:
        description: 'Build command to run'
        required: false
        type: string
        default: 'npm run build'
      
      build-directory:
        description: 'Directory where build output is located'
        required: false
        type: string
        default: 'build'
      
      # Cloudflare Configuration
      project-name-suffix:
        description: 'Suffix to add to project name (e.g., -dev, -staging)'
        required: false
        type: string
        default: ''
      
      custom-domain:
        description: 'Custom domain to configure (optional)'
        required: false
        type: string
        default: ''
      
      fail-on-domain-error:
        description: 'Whether to fail deployment if custom domain setup fails'
        required: false
        type: boolean
        default: false
      
      # Additional Options
      run-tests:
        description: 'Whether to run tests before deployment'
        required: false
        type: boolean
        default: true
      
      test-command:
        description: 'Test command to run'
        required: false
        type: string
        default: 'npm test'
    
    secrets:
      CLOUDFLARE_API_TOKEN:
        description: 'Cloudflare API token (optional - uses organization secret if not provided)'
        required: false
      CLOUDFLARE_ACCOUNT_ID:
        description: 'Cloudflare account ID (optional - uses organization secret if not provided)'
        required: false

    outputs:
      deployment-url:
        description: 'URL of the deployed application'
        value: ${{ jobs.deploy.outputs.url }}
      project-name:
        description: 'Full project name used for deployment'
        value: ${{ jobs.deploy.outputs.project-name }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare Pages (${{ inputs.environment }})
    
    outputs:
      url: ${{ steps.deploy.outputs.url }}
      project-name: ${{ env.FULL_PROJECT_NAME }}
    
    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=🌐 [CF-PAGES] Cloudflare Pages Deploy — Job Started::Project: ${{ inputs.project-name }} | Environment: ${{ inputs.environment }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Enable Corepack (pnpm)
        if: ${{ inputs.package-manager == 'pnpm' }}
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Set project name
        env:
          PROJECT_NAME: ${{ inputs.project-name }}
          PROJECT_NAME_SUFFIX: ${{ inputs.project-name-suffix }}
        run: |
          FULL_NAME="${PROJECT_NAME}${PROJECT_NAME_SUFFIX}"
          echo "FULL_PROJECT_NAME=$FULL_NAME" >> $GITHUB_ENV
          echo "🏷️ Using project name: $FULL_NAME"

      - name: Install dependencies
        run: |
          case "${{ inputs.package-manager }}" in
            npm)
              npm ci
              ;;
            yarn)
              yarn install --frozen-lockfile
              ;;
            pnpm)
              pnpm install --frozen-lockfile
              ;;
            *)
              echo "❌ Unsupported package manager: ${{ inputs.package-manager }}"
              exit 1
              ;;
          esac
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Dependencies installed — PASSED"

      - name: Run tests
        if: inputs.run-tests == true
        env:
          TEST_CMD: ${{ inputs.test-command }}
        run: |
          printf '%s\n' "$TEST_CMD" > /tmp/test_cmd.sh
          bash -e /tmp/test_cmd.sh

      - name: Build application
        env:
          BUILD_CMD: ${{ inputs.build-command }}
        run: |
          echo "::group::🌐 [CHECKPOINT 2/3] Build application"
          echo "→ Command: ${BUILD_CMD}"
          printf '%s\n' "$BUILD_CMD" > /tmp/build_cmd.sh
          bash -e /tmp/build_cmd.sh
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Application built — PASSED"
          echo "::endgroup::"

      - name: Verify build output
        env:
          BUILD_DIR: ${{ inputs.build-directory }}
        run: |
          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory '$BUILD_DIR' not found!"
            echo "Contents of current directory:"
            ls -la
            exit 1
          fi
          echo "✅ Build directory found, contents:"
          ls -la "$BUILD_DIR/"

      - name: Setup Cloudflare Pages project
        uses: simplify9/.github/.github/actions/setup-cloudflare-project@main
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          project-name: ${{ env.FULL_PROJECT_NAME }}
          production-branch: ${{ inputs.target-branch }}
          build-command: ${{ inputs.build-command }}
          destination-dir: ${{ inputs.build-directory }}

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ env.FULL_PROJECT_NAME }}
          directory: ${{ inputs.build-directory }}
          # Optional: Uncomment the line below to enable GitHub integration
          # gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        env:
          NODE_ENV: ${{ inputs.environment }}
          ENVIRONMENT: ${{ inputs.environment }}

      - name: Confirm CF Pages deployed
        run: |
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] CF Pages deployed — PASSED: ${FULL_PROJECT_NAME}"

      - name: Setup custom domain
        if: inputs.custom-domain != ''
        uses: simplify9/.github/.github/actions/setup-cloudflare-domain@main
        with:
          api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          project-name: ${{ env.FULL_PROJECT_NAME }}
          domain-name: ${{ inputs.custom-domain }}
          fail-on-error: ${{ inputs.fail-on-domain-error }}

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=🌐 [CF-PAGES] Deploy Job Failed::Project '${FULL_PROJECT_NAME:-${{ inputs.project-name }}}' failed | Environment: ${{ inputs.environment }}"
          echo "  Checkpoint 1 — Dependencies:    ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Build:           ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — CF Pages deploy: ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Write job summary
        if: always()
        env:
          DEPLOY_ENV: ${{ inputs.environment }}
          TARGET_BRANCH: ${{ inputs.target-branch }}
          NODE_VERSION: ${{ inputs.node-version }}
          PACKAGE_MANAGER: ${{ inputs.package-manager }}
          BUILD_DIR: ${{ inputs.build-directory }}
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
          CUSTOM_DOMAIN: ${{ inputs.custom-domain }}
        run: |
          {
            echo "## 🌐 [CF-PAGES] Vite CI/CD — Deploy — $( [ '${{ job.status }}' = 'success' ] && echo '✅ SUCCESS' || echo '❌ FAILED' )"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Environment | ${DEPLOY_ENV:-unknown} |"
            echo "| Project | ${FULL_PROJECT_NAME:-unknown} |"
            echo "| Branch | ${TARGET_BRANCH:-unknown} |"
            echo "| Node.js | ${NODE_VERSION:-unknown} |"
            echo "| Package Manager | ${PACKAGE_MANAGER:-unknown} |"
            echo "| Build Directory | ${BUILD_DIR:-unknown} |"
            echo "| Runner | ${{ runner.os }} |"
            echo "| Triggered by | ${{ github.actor }} |"
            if [ -n "${DEPLOY_URL}" ]; then
              echo "| Deployment URL | ${DEPLOY_URL} |"
            fi
            if [ -n "${CUSTOM_DOMAIN}" ]; then
              echo "| Custom Domain | ${CUSTOM_DOMAIN} |"
            fi
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Install dependencies | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Build application | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | CF Pages deployed | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"