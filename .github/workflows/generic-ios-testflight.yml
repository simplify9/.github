# =============================================================================
# Generic iOS Build and TestFlight — Reusable Workflow
# =============================================================================
#
# PURPOSE:
#   Builds, signs, and archives a React Native iOS app using xcodebuild,
#   exports an IPA, and uploads it to TestFlight via App Store Connect API.
#   Called by per-app caller workflows via `workflow_call`.
#
# JOBS:
#   build                    — Installs dependencies, sets up signing,
#                              archives via xcodebuild, exports IPA, and
#                              uploads the artifact for the release jobs.
#   release                  — Downloads the IPA artifact and uploads to
#                              TestFlight. Runs when `release-environment`
#                              input is empty (no environment gate).
#   release_with_environment — Same as `release` but gated on a named
#                              GitHub Environment (approval gates, secrets).
#                              Runs when `release-environment` is set.
#
# UPLOAD TOOLS (`upload-tool` input):
#   appstoreapi (default) — App Store Connect REST API via
#                           apple-actions/upload-testflight-build@v4.
#                           Requires no local Apple tooling. Recommended
#                           for all projects on Xcode 26+.
#   altool                — Deprecated xcrun altool --upload-app. Retained
#                           as a fallback. iTMSTransporter (transporter) was
#                           removed from Xcode 26 and is no longer supported.
#
# ARCHIVE PATHS (`use-manual-inline-archive` input):
#   true (default) — Inline xcodebuild archive. Binds provisioning profile
#                    by NAME (PROVISIONING_PROFILE_SPECIFIER). Recommended.
#   false          — Routes through the simplify9 xcode-build composite
#                    action. Binds profile by UUID (PROVISIONING_PROFILE).
#                    Matches Azure DevOps signing behavior. No active
#                    callers use this path — use default unless migrating.
#
# SIGNING:
#   Manual signing only. Certificate (.p12) and provisioning profile are
#   installed from base64-encoded repository secrets. Team ID is extracted
#   from the provisioning profile automatically; override with `ios-team-id`
#   secret if needed.
#
# CACHING:
#   - Node modules       — via actions/setup-node cache
#   - CocoaPods spec repo — ~/.cocoapods/repos, keyed on Podfile.lock hash
#   - CocoaPods Pods dir  — ios/Pods, keyed on Podfile.lock hash
#                           (skipped when clean-reinstall-pods=true)
#   - ccache             — ~/Library/Caches/ccache, keyed on Podfile.lock
#                           hash. Speeds up ObjC/C++ pod compilation.
#                           No benefit for Swift targets.
#   - Ruby gems          — via ruby/setup-ruby bundler-cache
#
# KNOWN LIMITATIONS:
#   - App Store Connect JWT tokens expire after 20 minutes. If Apple's
#     build processing takes longer, the upload step may report 401
#     NOT_AUTHORIZED. The IPA was still delivered — check TestFlight
#     directly. Set wait-for-processing: false to avoid this.
#   - -showBuildTimingSummary is a no-op in Xcode 26 (timing table does
#     not appear regardless of flag).
#   - ccache only caches ObjC/C++ compilation. Swift targets compile fresh
#     on every ephemeral runner run.
# =============================================================================
name: Generic iOS Build and TestFlight (reusable)

on:
  workflow_call:
    inputs:
      # ── Runner & Node ───────────────────────────────────────────────────────
      macos-runner:
        description: GitHub-hosted macOS runner label
        required: false
        type: string
        default: macos-latest
      node-version:
        description: Node version for React Native dependency installation
        required: false
        type: string
        default: "24"
      # ── Package Manager ─────────────────────────────────────────────────────
      # package-manager, package-manager-directory, cache-dependency-path, and
      # install-command work together. setup-node cache type and the default
      # install command are both derived from package-manager. Set
      # install-command only when the default (yarn install --frozen-lockfile
      # or npm ci) is not suitable.
      package-manager:
        description: Node package manager used for cache and default dependency commands (yarn or npm)
        required: false
        type: string
        default: yarn
      package-manager-directory:
        description: Directory containing package.json and lockfile for selected package manager
        required: false
        type: string
        default: "."
      cache-dependency-path:
        description: Optional explicit lockfile path used by setup-node cache
        required: false
        type: string
        default: ""
      install-command:
        description: Optional explicit dependency install command; if empty uses package-manager default
        required: false
        type: string
        default: ""
      # ── React Native CLI ────────────────────────────────────────────────────
      # Legacy 2019 CLI. Disabled by default. Not required for RN 0.60+.
      install-react-native-cli:
        description: Install react-native-cli globally
        required: false
        type: boolean
        default: false
      # ── Xcode ───────────────────────────────────────────────────────────────
      xcode-version:
        description: "Optional Xcode major or major.minor selector (for example: 26 or 16.4)"
        required: false
        type: string
        default: ""
      use-simplify9-xcode-setup:
        description: Use simplify9 xcode-setup composite action (pods + selected Xcode)
        required: false
        type: boolean
        default: false
      # ── CocoaPods ───────────────────────────────────────────────────────────
      verify-cocoapods:
        description: Run `pod --version` check
        required: false
        type: boolean
        default: false
      clean-reinstall-pods:
        description: Perform `pod deintegrate` and `pod install --repo-update`
        required: false
        type: boolean
        default: false
      ios-dir:
        description: iOS directory used for pods operations
        required: false
        type: string
        default: ios
      # ── Pre-build Hook ──────────────────────────────────────────────────────
      # Runs before dependency install. Useful for writing .env files or
      # mutating config before yarn/npm runs. Content is passed to eval —
      # never pass untrusted input here.
      pre-build-script:
        description: Optional bash script to run before dependency install (for example, env file mutation)
        required: false
        type: string
        default: ""
      pre-build-working-directory:
        description: Working directory for pre-build-script
        required: false
        type: string
        default: "."

      # ── Xcode Project ─────────────────────────────────────────────────────────────
      workspace:
        description: Path to .xcworkspace
        required: true
        type: string
      scheme:
        description: Xcode scheme to archive
        required: true
        type: string
      configuration:
        description: Build configuration
        required: false
        type: string
        default: Release
      archive-path:
        description: Output xcarchive path
        required: false
        type: string
        default: output/app.xcarchive
      export-path:
        description: IPA export directory
        required: false
        type: string
        default: output/package
      export-options-plist:
        description: Path to static exportOptions.plist. If empty and generate-export-options=true, one is generated.
        required: false
        type: string
        default: ""
      generate-export-options:
        description: Generate exportOptions.plist from profile metadata
        required: false
        type: boolean
        default: false

      # ── Signing ─────────────────────────────────────────────────────────────────
      signing-style:
        description: Signing style for xcode-build action (manual or automatic)
        required: false
        type: string
        default: manual
      code-sign-identity:
        description: Code sign identity, for example Apple Distribution
        required: false
        type: string
        default: Apple Distribution
      build-destination:
        description: Xcode destination
        required: false
        type: string
        default: generic/platform=iOS
      debug-build-settings:
        description: Print selected signing build settings from xcode-build action
        required: false
        type: boolean
        default: false
      # ── Archive Path ────────────────────────────────────────────────────────────
      # use-manual-inline-archive=true (default): inline xcodebuild, profile
      # bound by NAME. use-manual-inline-archive=false: routes through
      # simplify9 xcode-build action, profile bound by UUID.
      use-manual-inline-archive:
        description: Use direct xcodebuild archive command (profile NAME) instead of simplify9 xcode-build action (profile UUID)
        required: false
        type: boolean
        default: true
      bundle-id-override:
        description: Optional bundle id override when using simplify9 xcode-build action
        required: false
        type: string
        default: ""

      # ── Versioning ───────────────────────────────────────────────────────────────
      # pbxproj-counter-rollover: marketing-prefix in X.Y or X.Y.Z format with
      # single-digit carry logic. Sets MARKETING_VERSION and
      # CURRENT_PROJECT_VERSION in the .pbxproj file on every run.
      versioning-strategy:
        description: Versioning strategy (pbxproj-counter-rollover)
        required: false
        type: string
        default: pbxproj-counter-rollover
      pbxproj-path:
        description: Path to project.pbxproj
        required: false
        type: string
        default: ""
      marketing-prefix:
        description: Marketing version start in X.Y or X.Y.Z format (for example 1.0 or 2.3.0)
        required: false
        type: string
        default: "1.0"
      build-number-offset:
        description: Offset added to CURRENT_PROJECT_VERSION when computing the new build number (default 1)
        required: false
        type: string
        default: "1"

      # ── Artifact ────────────────────────────────────────────────────────────────
      # ipa-name-pattern tokens: {scheme}, {version}, {build_number},
      # {run_number}
      ipa-name-pattern:
        description: Output IPA file name pattern with tokens {scheme},{version},{build_number},{run_number}
        required: false
        type: string
        default: "{scheme}{run_number}.ipa"
      artifact-name:
        description: Upload artifact name
        required: false
        type: string
        default: ipa

      # ── Upload ────────────────────────────────────────────────────────────────
      # appstoreapi (default): App Store Connect REST API. No local tooling
      # required. Recommended for Xcode 26+.
      # altool: deprecated xcrun altool --upload-app. Fallback only.
      # transporter: REMOVED. iTMSTransporter was removed from Xcode 26.
      upload-tool:
        description: "TestFlight upload tool: appstoreapi or altool. (transporter removed — iTMSTransporter was removed from Xcode 26)"
        required: false
        type: string
        default: appstoreapi
      appstore-key-format:
        description: "API key secret format for altool path only: raw or base64. Not used by appstoreapi."
        required: false
        type: string
        default: raw

      # ── Release Gating ───────────────────────────────────────────────────────
      # Set release-environment to route through release_with_environment job,
      # which enforces GitHub Environment approval gates. Leave empty to use
      # the ungated release job.
      release-environment:
        description: Optional GitHub environment for release job
        required: false
        type: string
        default: ""
      # Build-only toggle. When true, TestFlight upload jobs are skipped.
      disable-release:
        description: If true, skip TestFlight upload jobs and run build-only
        required: false
        type: boolean
        default: false

      # ── Ruby & Bundler ──────────────────────────────────────────────────────────
      # Required when using bundler-managed CocoaPods. Set ruby-version to
      # match the version in .ruby-version or Gemfile. CFPropertyList 3.0.9
      # requires ruby < 3.2; use 3.1 for RN 0.85 projects.
      ruby-version:
        description: "Ruby version for bundler/CocoaPods setup. Empty disables Ruby setup."
        required: false
        type: string
        default: ""
      use-bundler:
        description: "If true and ruby-version set, install gems via bundler (requires a Gemfile)."
        required: false
        type: boolean
        default: false

      # ── Build Acceleration ───────────────────────────────────────────────────────
      # ccache caches ObjC/C++ compilation. No benefit for Swift targets.
      # Requires :ccache_enabled => true in Podfile react_native_post_install.
      # Cache keyed on Podfile.lock — any pod version change invalidates it.
      enable-ccache:
        description: "Enable ccache for Objective-C/C++ pod compilation (partial speedup; no Swift benefit)."
        required: false
        type: boolean
        default: false

    secrets:
      ios-p12-base64:
        description: Base64 encoded signing certificate (.p12)
        required: true
      ios-p12-password:
        description: Password for signing certificate
        required: true
      ios-mobileprovision-base64:
        description: Base64 encoded provisioning profile
        required: true
      ios-team-id:
        description: Optional explicit Apple Team ID for manual signing
        required: false

      appstore-api-key-id:
        description: App Store Connect API key id
        required: false
      appstore-issuer-id:
        description: App Store Connect issuer id
        required: false
      appstore-api-private-key-base64:
        description: Base64 API private key for altool/base64 mode
        required: false

    outputs:
      version:
        description: Marketing version used for this build
        value: ${{ jobs.build.outputs.version }}
      build-number:
        description: Build number used for this build
        value: ${{ jobs.build.outputs.build-number }}
      ipa-file:
        description: IPA file name uploaded and released
        value: ${{ jobs.build.outputs.ipa-file }}

permissions:
  contents: read

jobs:
  build:
    name: Build IPA
    runs-on: ${{ inputs.macos-runner }}
    outputs:
      version: ${{ steps.final_version.outputs.version }}
      build-number: ${{ steps.final_version.outputs.build_number }}
      ipa-file: ${{ steps.rename_ipa.outputs.ipa_file }}

    steps:
      - name: Announce build job
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice title=🍎 [IOS] Build IPA — Job Started::Workspace: ${{ inputs.workspace }} | Scheme: ${{ inputs.scheme }} | Versioning: ${{ inputs.versioning-strategy }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      # ── Environment Setup ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Ruby (optional)
        if: ${{ inputs.ruby-version != '' }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: ${{ inputs.use-bundler }}

      # ── Build Acceleration (ccache) ─────────────────────────────────────────────────────
      # ccache intercepts the ObjC/C++ compiler via Homebrew libexec symlinks.
      # Cache is keyed on Podfile.lock so any pod version change invalidates it.
      # Stats are reset before archive and printed in the job summary.
      - name: Install ccache (optional)
        if: ${{ inputs.enable-ccache }}
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ccache >/dev/null 2>&1; then
            brew install ccache
          fi
          ccache --version

      - name: Cache ccache directory (optional)
        if: ${{ inputs.enable-ccache }}
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/ccache
          key: ccache-ios-${{ runner.os }}-${{ hashFiles(format('{0}/Podfile.lock', inputs.ios-dir)) }}
          restore-keys: |
            ccache-ios-${{ runner.os }}-

      - name: Configure ccache (optional)
        if: ${{ inputs.enable-ccache }}
        shell: bash
        run: |
          set -euo pipefail

          ccache --max-size=2G
          ccache --set-config=compression=true

          echo "CCACHE_DIR=$HOME/Library/Caches/ccache" >> "$GITHUB_ENV"

          if [[ -d "/opt/homebrew/opt/ccache/libexec" ]]; then
            echo "/opt/homebrew/opt/ccache/libexec" >> "$GITHUB_PATH"
          elif [[ -d "/usr/local/opt/ccache/libexec" ]]; then
            echo "/usr/local/opt/ccache/libexec" >> "$GITHUB_PATH"
          else
            echo "ERROR: Could not find ccache libexec directory."
            exit 1
          fi

          ccache --version
          ccache --show-config

      # ── Runtime Paths & Xcode ───────────────────────────────────────────────────────
      - name: Initialize runtime paths
        shell: bash
        run: |
          set -euo pipefail
          echo "KEYCHAIN_PATH=${RUNNER_TEMP}/build.keychain-db" >> "$GITHUB_ENV"

      - name: Select Xcode (optional)
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      # ── Pre-build Hook ──────────────────────────────────────────────────────────────
      - name: Run pre-build mutation script (optional)
        if: ${{ inputs.pre-build-script != '' }}
        shell: bash
        working-directory: ${{ inputs.pre-build-working-directory }}
        env:
          PRE_BUILD_SCRIPT: ${{ inputs.pre-build-script }}
        run: |
          set -euo pipefail
          echo "Running configured pre-build script in: $PWD"
          eval "${PRE_BUILD_SCRIPT}"

      # ── Node Dependencies ───────────────────────────────────────────────────────────────
      - name: Resolve package manager settings
        id: package_manager
        shell: bash
        env:
          PACKAGE_MANAGER_RAW: ${{ inputs.package-manager }}
          PACKAGE_DIR_RAW: ${{ inputs.package-manager-directory }}
          CACHE_DEPENDENCY_PATH_INPUT: ${{ inputs.cache-dependency-path }}
        run: |
          set -euo pipefail

          # Normalize inputs so package-manager value handling is case-insensitive.
          PACKAGE_MANAGER="$(echo "${PACKAGE_MANAGER_RAW}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR="${PACKAGE_DIR_RAW:-.}"

          if [[ -z "${PACKAGE_DIR}" ]]; then
            PACKAGE_DIR="."
          fi

          # Keep cache type and install commands tied to the selected package manager.
          case "${PACKAGE_MANAGER}" in
            yarn)
              DEFAULT_LOCKFILE="yarn.lock"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="yarn install --frozen-lockfile"
              else
                DEFAULT_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}' install --frozen-lockfile"
              fi
              ;;
            npm)
              DEFAULT_LOCKFILE="package-lock.json"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="npm ci"
              else
                DEFAULT_INSTALL_COMMAND="npm ci --prefix '${PACKAGE_DIR}'"
              fi
              ;;
            *)
              echo "ERROR: Unsupported package-manager '${PACKAGE_MANAGER_RAW}'. Supported values: yarn, npm."
              exit 1
              ;;
          esac

          # Infer lockfile path from package-manager + directory when no explicit override is provided.
          CACHE_DEPENDENCY_PATH="${CACHE_DEPENDENCY_PATH_INPUT}"

          if [[ -z "${CACHE_DEPENDENCY_PATH}" ]]; then
            if [[ "${PACKAGE_DIR}" == "." ]]; then
              CACHE_DEPENDENCY_PATH="${DEFAULT_LOCKFILE}"
            else
              CACHE_DEPENDENCY_PATH="${PACKAGE_DIR}/${DEFAULT_LOCKFILE}"
            fi
          fi

          # Fail fast with a clear message rather than letting setup-node fail later.
          if [[ ! -f "${CACHE_DEPENDENCY_PATH}" ]]; then
            echo "ERROR: Expected lockfile '${CACHE_DEPENDENCY_PATH}' was not found."
            echo "Set package-manager-directory or cache-dependency-path to the correct location."
            exit 1
          fi

          echo "cache=${PACKAGE_MANAGER}" >> "$GITHUB_OUTPUT"
          echo "cache_dependency_path=${CACHE_DEPENDENCY_PATH}" >> "$GITHUB_OUTPUT"
          echo "default_install_command=${DEFAULT_INSTALL_COMMAND}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package_manager.outputs.cache }}
          cache-dependency-path: ${{ steps.package_manager.outputs.cache_dependency_path }}

      - name: Install node dependencies
        shell: bash
        env:
          INSTALL_COMMAND_INPUT: ${{ inputs.install-command }}
          DEFAULT_INSTALL_COMMAND: ${{ steps.package_manager.outputs.default_install_command }}
        run: |
          set -euo pipefail
          if [[ -n "${INSTALL_COMMAND_INPUT}" ]]; then
            eval "${INSTALL_COMMAND_INPUT}"
          else
            eval "${DEFAULT_INSTALL_COMMAND}"
          fi

      - name: Install React Native CLI
        if: ${{ inputs.install-react-native-cli }}
        shell: bash
        run: |
          set -euo pipefail
          npm install -g react-native-cli

      # ── CocoaPods ──────────────────────────────────────────────────────────────────
      # CocoaPods caching — split into two independent cache steps.
      #
      # Cache key: Podfile.lock (NOT Podfile). The lock file pins exact
      # versions and source URLs. The Podfile only declares ranges.
      # Key rotates automatically on every `pod update` commit.
      #
      # Why two steps?
      #   ~/.cocoapods/repos (global spec repo, 1-3 GB) — safe to restore
      #   even during clean reinstalls. Eliminates the dominant time cost
      #   of `pod install --repo-update`.
      #
      #   ios/Pods (project Pods dir) — only useful when NOT doing a clean
      #   reinstall. Restoring it before `pod deintegrate` adds overhead
      #   and is immediately discarded, so this cache is skipped when
      #   clean-reinstall-pods=true.
      - name: Cache CocoaPods spec repo
        id: cache-pods-specs
        uses: actions/cache@v5
        with:
          path: ~/.cocoapods/repos
          key: cocoapods-specs-${{ runner.os }}-${{ hashFiles(format('{0}/Podfile.lock', inputs.ios-dir)) }}
          restore-keys: |
            cocoapods-specs-${{ runner.os }}-

      # Project Pods dir cache — only when NOT doing a clean reinstall.
      # A clean reinstall deletes ios/Pods, so caching it then is wasted.
      - name: Cache CocoaPods Pods directory
        id: cache-pods-dir
        if: ${{ !inputs.clean-reinstall-pods }}
        uses: actions/cache@v5
        with:
          path: ${{ inputs.ios-dir }}/Pods
          key: pods-dir-${{ runner.os }}-${{ hashFiles(format('{0}/Podfile.lock', inputs.ios-dir)) }}
          restore-keys: |
            pods-dir-${{ runner.os }}-

      - name: Install CocoaPods
        if: ${{ !inputs.clean-reinstall-pods && !inputs.use-simplify9-xcode-setup }}
        shell: bash
        working-directory: ${{ inputs.ios-dir }}
        env:
          USE_BUNDLER: ${{ inputs.use-bundler }}
          RUBY_VERSION: ${{ inputs.ruby-version }}
        run: |
          set -euo pipefail
          echo "::group::📦 [IOS] Installing CocoaPods"
          if [[ "${USE_BUNDLER}" == "true" && -n "${RUBY_VERSION}" ]]; then
            echo "→ Running: bundle exec pod install"
            bundle exec pod install
          else
            echo "→ Running: pod install"
            pod install
          fi
          echo "✅ CocoaPods installed"
          echo "::endgroup::"

      - name: Xcode setup (simplify9 action)
        if: ${{ inputs.use-simplify9-xcode-setup }}
        uses: simplify9/.github/.github/actions/xcode-setup@main
        with:
          xcodeVersion: ${{ inputs.xcode-version != '' && inputs.xcode-version || '26' }}

      - name: Verify CocoaPods
        if: ${{ inputs.verify-cocoapods }}
        shell: bash
        run: |
          set -euo pipefail
          pod --version

      # ── Versioning ──────────────────────────────────────────────────────────────────
      # Writes MARKETING_VERSION and CURRENT_PROJECT_VERSION into the
      # .pbxproj file. VERSION and BUILD_NUMBER are also exported to
      # GITHUB_ENV for use in downstream steps (IPA renaming, summaries).
      - name: Update pbxproj versions (automated)
        shell: bash
        env:
          PBXPROJ_PATH: ${{ inputs.pbxproj-path }}
          BUILD_NUMBER_OFFSET: ${{ inputs.build-number-offset }}
          MARKETING_PREFIX: ${{ inputs.marketing-prefix }}
        run: |
          set -euo pipefail

          if [[ -z "${PBXPROJ_PATH}" || ! -f "${PBXPROJ_PATH}" ]]; then
            echo "ERROR: pbxproj versioning requires a valid pbxproj-path input"
            exit 1
          fi

          BASE_BUILD=$(
            grep -m 1 "CURRENT_PROJECT_VERSION = " "${PBXPROJ_PATH}" \
              | sed -E 's/.*CURRENT_PROJECT_VERSION = ([^;]+);.*/\1/'
          )

          if ! [[ "${BASE_BUILD}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Could not parse numeric CURRENT_PROJECT_VERSION. Got '${BASE_BUILD}'"
            exit 1
          fi

          echo "Original marketing-prefix input: ${MARKETING_PREFIX}"
          echo "github.run_number: ${GITHUB_RUN_NUMBER}"
          echo "Original CURRENT_PROJECT_VERSION in pbxproj: ${BASE_BUILD}"

          # Rollover mode: marketing-prefix X.Y or X.Y.Z + run counter -> X.Y.Z with single-digit carry.
          OFFSET="${BUILD_NUMBER_OFFSET}"
          if ! [[ "${OFFSET}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: build-number-offset must be numeric. Got '${OFFSET}'"
            exit 1
          fi

          PREFIX_RAW="${MARKETING_PREFIX}"
          if [[ "${PREFIX_RAW}" =~ ^([0-9]+)\.([0-9])\.([0-9])$ ]]; then
            BASE_MAJOR="${BASH_REMATCH[1]}"
            BASE_MINOR="${BASH_REMATCH[2]}"
            BASE_PATCH="${BASH_REMATCH[3]}"
          elif [[ "${PREFIX_RAW}" =~ ^([0-9]+)\.([0-9])$ ]]; then
            BASE_MAJOR="${BASH_REMATCH[1]}"
            BASE_MINOR="${BASH_REMATCH[2]}"
            BASE_PATCH="0"
          else
            echo "ERROR: pbxproj-counter-rollover requires marketing-prefix in X.Y or X.Y.Z format with single-digit minor/patch (0-9). Got '${PREFIX_RAW}'."
            exit 1
          fi

          INCREMENT=$((GITHUB_RUN_NUMBER))
          TOTAL_PATCH=$((BASE_PATCH + INCREMENT))
          PATCH=$((TOTAL_PATCH % 10))
          MINOR_CARRY=$((TOTAL_PATCH / 10))
          TOTAL_MINOR=$((BASE_MINOR + MINOR_CARRY))
          FINAL_MINOR=$((TOTAL_MINOR % 10))
          MAJOR_CARRY=$((TOTAL_MINOR / 10))
          FINAL_MAJOR=$((BASE_MAJOR + MAJOR_CARRY))

          NEW_MARKETING_VERSION="${FINAL_MAJOR}.${FINAL_MINOR}.${PATCH}"
          NEW_BUILD_NUMBER=$((BASE_BUILD + OFFSET + GITHUB_RUN_NUMBER))

          echo "Rollover base major: ${BASE_MAJOR}"
          echo "Rollover base minor: ${BASE_MINOR}"
          echo "Rollover base patch: ${BASE_PATCH}"
          echo "Rollover increment: ${INCREMENT}"
          echo "Rollover computed patch: ${PATCH}"
          echo "Rollover computed minor carry: ${MINOR_CARRY}"
          echo "Computed MARKETING_VERSION=${NEW_MARKETING_VERSION}"
          echo "Computed CURRENT_PROJECT_VERSION=${NEW_BUILD_NUMBER}"

          perl -pi -e "s/\\bMARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${NEW_MARKETING_VERSION};/g" "${PBXPROJ_PATH}"
          perl -pi -e "s/\\bCURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${NEW_BUILD_NUMBER};/g" "${PBXPROJ_PATH}"

          echo "VERSION=${NEW_MARKETING_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${NEW_BUILD_NUMBER}" >> "$GITHUB_ENV"

          echo "Updated pbxproj (diff):"
          git --no-pager diff -- "${PBXPROJ_PATH}" || true

      - name: Clean and reinstall Pods
        if: ${{ inputs.clean-reinstall-pods }}
        shell: bash
        env:
          IOS_DIR: ${{ inputs.ios-dir }}
        run: |
          set -euo pipefail
          cd "${IOS_DIR}"
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update

      # ── Signing ──────────────────────────────────────────────────────────────────
      # Certificate (.p12) and provisioning profile are installed from
      # base64-encoded secrets. Profile metadata (UUID, name, bundle ID,
      # team ID) is extracted from the installed profile for use in the
      # archive and export steps.
      - name: Install signing certificate
        uses: simplify9/.github/.github/actions/ios-install-cert@main
        with:
          p12Base64: ${{ secrets.ios-p12-base64 }}
          p12Password: ${{ secrets.ios-p12-password }}

      - name: Confirm signing cert installed
        shell: bash
        run: |
          set -euo pipefail
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Signing certificate installed — PASSED"

      - name: Install provisioning profile
        id: install_profile
        uses: simplify9/.github/.github/actions/ios-install-profile@main
        with:
          profileBase64: ${{ secrets.ios-mobileprovision-base64 }}

      - name: Enrich profile metadata (bundle/team)
        id: profile_meta
        shell: bash
        env:
          PROFILE_B64: ${{ secrets.ios-mobileprovision-base64 }}
        run: |
          set -euo pipefail

          PROFILE_PATH="${RUNNER_TEMP}/profile.mobileprovision"
          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"

          printf '%s' "${PROFILE_B64}" | base64 -D > "${PROFILE_PATH}"
          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "${PROFILE_PLIST}")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "${PROFILE_PLIST}")
          TEAM_ID_FROM_PROFILE=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "${PROFILE_PLIST}")
          TEAM_NAME=$(/usr/libexec/PlistBuddy -c 'Print :TeamName' "${PROFILE_PLIST}")
          APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "${PROFILE_PLIST}")
          BUNDLE_ID="${APP_ID#*.}"

          echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
          echo "profile_name=${PROFILE_NAME}" >> "$GITHUB_OUTPUT"
          echo "team_id=${TEAM_ID_FROM_PROFILE}" >> "$GITHUB_OUTPUT"
          echo "team_name=${TEAM_NAME}" >> "$GITHUB_OUTPUT"
          echo "bundle_id=${BUNDLE_ID}" >> "$GITHUB_OUTPUT"

          echo "IOS_PROFILE_UUID=${PROFILE_UUID}" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=${PROFILE_NAME}" >> "$GITHUB_ENV"
          echo "TEAM_ID_FROM_PROFILE=${TEAM_ID_FROM_PROFILE}" >> "$GITHUB_ENV"
          echo "TEAM_NAME=${TEAM_NAME}" >> "$GITHUB_ENV"  # informational only — not consumed downstream
          echo "IOS_BUNDLE_ID=${BUNDLE_ID}" >> "$GITHUB_ENV"

      - name: Finalize version outputs
        id: final_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      # ── Archive ───────────────────────────────────────────────────────────────────
      # Two paths controlled by use-manual-inline-archive:
      #   true (default) — Inline xcodebuild. Binds provisioning profile
      #                    by NAME (PROVISIONING_PROFILE_SPECIFIER).
      #   false          — simplify9 xcode-build composite action. Binds
      #                    profile by UUID. No active callers use this path.
      #
      # Archive flags:
      #   -parallelizeTargets            — builds independent targets in parallel
      #   COMPILER_INDEX_STORE_ENABLE=NO — disables Xcode IDE indexing (CI-only)
      #   CLANG_ENABLE_EXPLICIT_MODULES_WITH_COMPILER_LAUNCHER=YES
      #                                  — keeps explicit modules active with
      #                                    ccache as the compiler launcher
      #   -quiet                         — suppresses per-file compilation logs
      #   -hideShellScriptEnvironment    — suppresses env var dumps from
      #                                    script phases
      #   -showBuildTimingSummary        — no-op in Xcode 26 (timing table
      #                                    does not appear); retained for
      #                                    future Xcode versions
      - name: Archive (simplify9 xcode-build action)
        if: ${{ !inputs.use-manual-inline-archive }}
        uses: simplify9/.github/.github/actions/xcode-build@main
        with:
          workspace: ${{ inputs.workspace }}
          scheme: ${{ inputs.scheme }}
          configuration: ${{ inputs.configuration }}
          archivePath: ${{ inputs.archive-path }}
          destination: ${{ inputs.build-destination }}
          signingStyle: ${{ inputs.signing-style }}
          developmentTeam: ${{ secrets.ios-team-id != '' && secrets.ios-team-id || steps.profile_meta.outputs.team_id }}
          codeSignIdentity: ${{ inputs.code-sign-identity }}
          provisioningProfileUuid: ${{ steps.profile_meta.outputs.profile_uuid }}
          bundleId: ${{ inputs.bundle-id-override }}
          keychainPath: ${{ runner.temp }}/build.keychain-db
          debugBuildSettings: ${{ inputs.debug-build-settings && 'true' || 'false' }}
      

      - name: Reset ccache stats before archive
        if: ${{ inputs.enable-ccache && inputs.use-manual-inline-archive }}
        shell: bash
        run: |
          set -euo pipefail
          ccache --zero-stats || true

      - name: Archive (manual inline xcodebuild, profile name)
        if: ${{ inputs.use-manual-inline-archive }}
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.ios-team-id }}
          WORKSPACE: ${{ inputs.workspace }}
          SCHEME: ${{ inputs.scheme }}
          CONFIGURATION: ${{ inputs.configuration }}
          BUILD_DESTINATION: ${{ inputs.build-destination }}
          ARCHIVE_PATH: ${{ inputs.archive-path }}
          CODE_SIGN_IDENTITY: ${{ inputs.code-sign-identity }}
          PROFILE_NAME: ${{ steps.profile_meta.outputs.profile_name }}
        run: |
          set -euo pipefail
          mkdir -p output

          TEAM_ID="${IOS_TEAM_ID}"
          if [[ -z "${TEAM_ID}" ]]; then
            TEAM_ID="${TEAM_ID_FROM_PROFILE}"
          fi

          xcodebuild \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -sdk iphoneos \
            -destination "${BUILD_DESTINATION}" \
            -archivePath "${ARCHIVE_PATH}" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY}" \
            PROVISIONING_PROFILE_SPECIFIER="${PROFILE_NAME}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            -parallelizeTargets \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CLANG_ENABLE_EXPLICIT_MODULES_WITH_COMPILER_LAUNCHER=YES \
            -quiet \
            -hideShellScriptEnvironment \
            -showBuildTimingSummary

          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Archive created (manual xcodebuild) — PASSED: ${ARCHIVE_PATH}"

      # ── Export ───────────────────────────────────────────────────────────────────
      # exportOptions.plist can be provided statically via export-options-plist
      # or generated from provisioning profile metadata when
      # generate-export-options=true. The generated plist uses
      # app-store-connect method (Xcode 26 — replaces deprecated app-store).
      - name: Generate exportOptions.plist
        if: ${{ inputs.generate-export-options }}
        shell: bash
        env:
          IOS_TEAM_ID: ${{ secrets.ios-team-id }}
          BUNDLE_ID: ${{ steps.profile_meta.outputs.bundle_id }}
          PROFILE_NAME: ${{ steps.profile_meta.outputs.profile_name }}
        run: |
          set -euo pipefail

          TEAM_ID="${IOS_TEAM_ID}"
          if [[ -z "${TEAM_ID}" ]]; then
            TEAM_ID="${TEAM_ID_FROM_PROFILE}"
          fi

          EXPORT_PLIST="${RUNNER_TEMP}/exportOptions.plist"
          cat > "${EXPORT_PLIST}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "EXPORT_PLIST=${EXPORT_PLIST}" >> "$GITHUB_ENV"
          /usr/bin/plutil -p "${EXPORT_PLIST}" >/dev/null

      - name: Resolve export plist
        id: resolve_export
        shell: bash
        env:
          EXPORT_OPTIONS_PLIST: ${{ inputs.export-options-plist }}
          GENERATE_EXPORT_OPTIONS: ${{ inputs.generate-export-options }}
        run: |
          set -euo pipefail

          if [[ -n "${EXPORT_OPTIONS_PLIST}" ]]; then
            echo "EXPORT_PLIST=${EXPORT_OPTIONS_PLIST}" >> "$GITHUB_ENV"
            echo "export_plist=${EXPORT_OPTIONS_PLIST}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${GENERATE_EXPORT_OPTIONS}" != "true" ]]; then
            echo "ERROR: Either export-options-plist must be provided, or generate-export-options must be true."
            exit 1
          fi

          echo "export_plist=${EXPORT_PLIST}" >> "$GITHUB_OUTPUT"

      - name: Export IPA
        uses: simplify9/.github/.github/actions/xcode-export@main
        with:
          archivePath: ${{ inputs.archive-path }}
          exportOptionsPlist: ${{ steps.resolve_export.outputs.export_plist }}
          exportPath: ${{ inputs.export-path }}

      # ── Artifact ───────────────────────────────────────────────────────────────────
      # IPA is renamed using ipa-name-pattern, then uploaded as a GitHub
      # Actions artifact. compression-level=0: IPAs are already compressed;
      # recompressing wastes runner time with no size benefit.
      - name: Rename IPA
        id: rename_ipa
        shell: bash
        env:
          EXPORT_PATH: ${{ inputs.export-path }}
          IPA_NAME_PATTERN: ${{ inputs.ipa-name-pattern }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          set -euo pipefail

          IPA_SRC="$(ls -1 "${EXPORT_PATH}"/*.ipa | head -n 1)"
          PATTERN="${IPA_NAME_PATTERN}"

          IPA_OUT="${PATTERN//\{scheme\}/${SCHEME}}"
          IPA_OUT="${IPA_OUT//\{version\}/${VERSION}}"
          IPA_OUT="${IPA_OUT//\{build_number\}/${BUILD_NUMBER}}"
          IPA_OUT="${IPA_OUT//\{run_number\}/${GITHUB_RUN_NUMBER}}"

          mv "${IPA_SRC}" "${IPA_OUT}"

          echo "ipa_file=${IPA_OUT}" >> "$GITHUB_OUTPUT"
          echo "IPA_FILE=${IPA_OUT}" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] IPA renamed — PASSED: ${IPA_OUT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ steps.rename_ipa.outputs.ipa_file }}
          compression-level: 0
          retention-days: 14

      - name: Report build failure
        if: failure()
        shell: bash
        env:
          WORKSPACE: ${{ inputs.workspace }}
          SCHEME: ${{ inputs.scheme }}
        run: |
          echo "::error title=🍎 [IOS] Build Job Failed::Workspace: ${WORKSPACE} | Scheme: ${SCHEME}"
          echo "  Checkpoint 1 — Signing cert installed: ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Archive created:       ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — IPA renamed:           ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Write build job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          WORKSPACE: ${{ inputs.workspace }}
          SCHEME: ${{ inputs.scheme }}
          VERSIONING: ${{ inputs.versioning-strategy }}
          RUNNER_OS: ${{ runner.os }}
          MACOS_RUNNER: ${{ inputs.macos-runner }}
          XCODE_VERSION: ${{ inputs.xcode-version }}
          NODE_VERSION: ${{ inputs.node-version }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          ENABLE_CCACHE: ${{ inputs.enable-ccache }}
          USE_MANUAL_INLINE_ARCHIVE: ${{ inputs.use-manual-inline-archive }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🍎 iOS Build — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Workspace | \`${WORKSPACE}\` |"
            echo "| Scheme | \`${SCHEME}\` |"
            echo "| Versioning | ${VERSIONING} |"
            echo "| Runner | ${RUNNER_OS} (${MACOS_RUNNER}) |"
            echo "| Xcode | ${XCODE_VERSION} |"
            echo "| Node.js | ${NODE_VERSION} |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Triggered by | ${ACTOR} |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Signing cert installed | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Archive created | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | IPA renamed | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [[ "${ENABLE_CCACHE}" == "true" && "${USE_MANUAL_INLINE_ARCHIVE}" == "true" ]]; then
            {
              echo ""
              echo "## ⚡ ccache Stats"
              echo ""
              echo '```text'
              ccache --show-stats || true
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi
  release:
    name: Upload to TestFlight
    runs-on: ${{ inputs.macos-runner }}
    needs: build
    if: ${{ inputs.release-environment == '' && !inputs.disable-release }}

    steps:
      - name: Announce release job
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice title=🍎 [IOS] Upload to TestFlight — Job Started::Version: ${{ needs.build.outputs.version }} | Build: ${{ needs.build.outputs.build-number }} | Upload tool: ${{ inputs.upload-tool }} | Triggered by: ${{ github.actor }}"
          echo "UPLOAD_CHECKPOINT_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      # ── Environment Setup ────────────────────────────────────────────────────────────
      - name: Select Xcode (optional)
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      # ── IPA Retrieval ──────────────────────────────────────────────────────────────
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve IPA path for release runner
        id: ipa
        shell: bash
        env:
          CANDIDATE: ${{ needs.build.outputs.ipa-file }}
        run: |
          set -euo pipefail

          CANDIDATE="${CANDIDATE}"
          IPA_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            IPA_FILE="$(basename "${CANDIDATE}")"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            IPA_FILE="$(ls -1 *.ipa 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            echo "ERROR: No .ipa file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=./${IPA_FILE}" >> "$GITHUB_OUTPUT"

      # ── Credentials ─────────────────────────────────────────────────────────────────
      # App Store Connect API key is decoded from base64 into two locations:
      #   1. $HOME/.appstoreconnect/private_keys/ — for altool path
      #   2. $RUNNER_TEMP/appstoreapi_keys/       — for appstoreapi path,
      #      written to GITHUB_ENV as APPSTOREAPI_KEY_CONTENT
      # Each line of the decoded PEM is masked to prevent it appearing
      # in the action input block printed before apple-actions runs.
      # Note: GitHub only auto-masks declared secrets, not derived env vars,
      # so the per-line masking is required.
      - name: Validate release credentials
        shell: bash
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.appstore-api-key-id }}
          APPSTORE_ISSUER_ID: ${{ secrets.appstore-issuer-id }}
        run: |
          set -euo pipefail

          if [ -z "${APPSTORE_API_KEY_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-api-key-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

          if [ -z "${APPSTORE_ISSUER_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-issuer-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

      - name: Install App Store Connect API key (base64)
        if: ${{ inputs.appstore-key-format == 'base64' }}
        shell: bash
        env:
          KEY_B64: ${{ secrets.appstore-api-private-key-base64 }}
          API_KEY_ID: ${{ secrets.appstore-api-key-id }}
        run: |
          set -euo pipefail
          umask 077

          if [[ -z "${KEY_B64}" ]]; then
            echo "ERROR: appstore-key-format=base64 requires secret appstore-api-private-key-base64"
            exit 1
          fi

          PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$PRIVATE_KEYS_DIR"

          KEY_PATH="$PRIVATE_KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          printf '%s' "${KEY_B64}" | base64 -D > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Decode App Store Connect API key (appstoreapi)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        shell: bash
        env:
          KEY_B64: ${{ secrets.appstore-api-private-key-base64 }}
        run: |
          set -euo pipefail
          umask 077
          PRIVATE_KEYS_DIR="$RUNNER_TEMP/appstoreapi_keys"
          mkdir -p "${PRIVATE_KEYS_DIR}"
          printf '%s' "${KEY_B64}" | base64 -D > "${PRIVATE_KEYS_DIR}/AuthKey.p8"
          if [[ ! -s "${PRIVATE_KEYS_DIR}/AuthKey.p8" ]]; then
            echo "ERROR: base64 decoding produced an empty key file. Check that appstore-api-private-key-base64 is valid."
            exit 1
          fi
          # Mask each line of the private key to prevent it appearing in logs
          while IFS= read -r line; do
            if [[ -n "${line}" ]]; then
              echo "::add-mask::${line}"
            fi
          done < "${PRIVATE_KEYS_DIR}/AuthKey.p8"
          {
            echo "APPSTOREAPI_KEY_CONTENT<<APPSTOREAPI_KEY_EOF"
            cat "${PRIVATE_KEYS_DIR}/AuthKey.p8"
            printf '\n'
            echo "APPSTOREAPI_KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Prepare TestFlight upload (App Store Connect API)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        shell: bash
        env:
          IPA_PATH: ${{ steps.ipa.outputs.path }}
        run: |
          set -euo pipefail
          IPA="${IPA_PATH}"
          IPA_BYTES=$(stat -f%z "${IPA}")
          IPA_SIZE_MB=$(awk "BEGIN { printf \"%.2f\", ${IPA_BYTES} / 1048576 }")
          IPA_NAME="$(basename "${IPA}")"
          echo "::notice title=🍎 [IOS] TestFlight Upload Starting::File: ${IPA_NAME} | Size: ${IPA_SIZE_MB} MB | Backend: AppStoreConnectAPI | Started: $(date -u +'%H:%M:%S UTC')"
          echo "::group::🍎 [IOS] Upload details"
          echo "  → File:    ${IPA_NAME}"
          echo "  → Size:    ${IPA_SIZE_MB} MB"
          echo "  → Backend: AppStoreConnectAPI (apple-actions/upload-testflight-build@v4)"
          echo "  → Started: $(date -u +'%H:%M:%S UTC')"
          echo "::endgroup::"
          echo "APPSTOREAPI_UPLOAD_START=$(date +%s)" >> "$GITHUB_ENV"
          echo "APPSTOREAPI_IPA_SIZE_MB=${IPA_SIZE_MB}" >> "$GITHUB_ENV"
          echo "APPSTOREAPI_IPA_NAME=${IPA_NAME}" >> "$GITHUB_ENV"

      # ── Upload ──────────────────────────────────────────────────────────────────────
      # appstoreapi path: uses App Store Connect REST API. No local tooling.
      # Uploads chunks then polls for Apple processing confirmation.
      # KNOWN LIMITATION: App Store Connect JWT tokens expire after 20 minutes.
      # If Apple processing takes longer, the poll returns 401 NOT_AUTHORIZED.
      # The IPA was still delivered. Check TestFlight directly if this occurs.
      # Set wait-for-processing: false to skip polling (fire-and-forget).
      #
      # altool path: deprecated xcrun altool --upload-app. Fire-and-forget.
      # No processing confirmation. Retained for backwards compatibility.
      - name: Upload to TestFlight (App Store Connect API)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.appstore-issuer-id }}
          api-key-id: ${{ secrets.appstore-api-key-id }}
          api-private-key: ${{ env.APPSTOREAPI_KEY_CONTENT }}
          backend: AppStoreAPI
          wait-for-processing: 'true'

      - name: Confirm TestFlight upload (App Store Connect API)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        shell: bash
        run: |
          ELAPSED=$(( $(date +%s) - APPSTOREAPI_UPLOAD_START ))
          bar='██████████████████████████████'
          echo "::group::🍎 [IOS] Upload complete"
          echo "  [${bar}] 100% — ${APPSTOREAPI_IPA_SIZE_MB} MB in ${ELAPSED}s"
          echo "  → Completed at $(date -u +'%H:%M:%S UTC')"
          echo "::endgroup::"
          echo "UPLOAD_CHECKPOINT_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/1] TestFlight upload completed — PASSED: ${APPSTOREAPI_IPA_NAME} (${APPSTOREAPI_IPA_SIZE_MB} MB) in ${ELAPSED}s"

      - name: Upload to TestFlight (altool)
        if: ${{ inputs.upload-tool == 'altool' }}
        shell: bash
        env:
          IPA_PATH: ${{ steps.ipa.outputs.path }}
          API_KEY_ID: ${{ secrets.appstore-api-key-id }}
          API_ISSUER_ID: ${{ secrets.appstore-issuer-id }}
        run: |
          set -euo pipefail

          IPA="${IPA_PATH}"
          OUTPUT_FILE="$(mktemp)"

          IPA_BYTES=$(stat -f%z "${IPA}")
          IPA_SIZE_MB=$(awk "BEGIN { printf \"%.2f\", ${IPA_BYTES} / 1048576 }")
          echo "→ IPA: ${IPA} (${IPA_SIZE_MB} MB)"
          echo "→ Upload started at $(date -u +'%H:%M:%S UTC') — altool returns no progress; please wait"
          UPLOAD_START=$(date +%s)

          set +e
          xcrun altool --upload-app \
            -f "${IPA}" \
            -t ios \
            --apiKey "${API_KEY_ID}" \
            --apiIssuer "${API_ISSUER_ID}" \
            --output-format xml 2>&1 | tee "${OUTPUT_FILE}"
          ALTOOL_EXIT=${PIPESTATUS[0]}
          set -e

          echo "→ Completed in $(( $(date +%s) - UPLOAD_START ))s"

          if [[ ${ALTOOL_EXIT} -ne 0 ]]; then
            echo "ERROR: altool upload failed with exit code ${ALTOOL_EXIT}"
            exit ${ALTOOL_EXIT}
          fi

          if grep -qiE "NOT_AUTHORIZED|failed to authenticate|Authentication credentials are missing or invalid|received status code 401|Unable to authenticate|auth issue" "${OUTPUT_FILE}"; then
            echo "ERROR: App Store authentication error detected in altool output. Failing workflow by policy."
            exit 1
          fi

          if grep -qiE "Validation failed|STATE_ERROR\.VALIDATION_ERROR|Invalid Version|CFBundleShortVersionString" "${OUTPUT_FILE}"; then
            echo "ERROR: App Store validation error detected in altool output. Failing workflow by policy."
            exit 1
          fi

          echo "UPLOAD_CHECKPOINT_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/1] TestFlight upload completed — PASSED (altool)"

      - name: Report release failure
        if: failure()
        shell: bash
        run: |
          echo "::error title=🍎 [IOS] Release Job Failed::Version: ${{ needs.build.outputs.version }} | Build: ${{ needs.build.outputs.build-number }} | Upload tool: ${{ inputs.upload-tool }}"
          echo "  Checkpoint 1 — TestFlight upload: ${UPLOAD_CHECKPOINT_STATUS:-❌ Not reached}"

      - name: Write release job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
          UPLOAD_TOOL: ${{ inputs.upload-tool }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🍎 iOS TestFlight Upload — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VERSION}\` (build: ${BUILD_NUMBER}) |"
            echo "| Upload tool | ${UPLOAD_TOOL} |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Triggered by | ${ACTOR} |"
            echo "| Run | [${RUN_ID}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | TestFlight upload | ${UPLOAD_CHECKPOINT_STATUS:-⏭️ Skipped} |"
          } >> "$GITHUB_STEP_SUMMARY"

  release_with_environment:
    name: Upload to TestFlight
    runs-on: ${{ inputs.macos-runner }}
    needs: build
    if: ${{ inputs.release-environment != '' && !inputs.disable-release }}
    environment: ${{ inputs.release-environment }}

    steps:
      - name: Announce release-with-environment job
        shell: bash
        run: |
          set -euo pipefail
          echo "::notice title=🍎 [IOS] Upload to TestFlight (env gated) — Job Started::Version: ${{ needs.build.outputs.version }} | Build: ${{ needs.build.outputs.build-number }} | Env: ${{ inputs.release-environment }} | Upload tool: ${{ inputs.upload-tool }} | Triggered by: ${{ github.actor }}"
          echo "UPLOAD_CHECKPOINT_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      # ── Environment Setup ────────────────────────────────────────────────────────────
      - name: Select Xcode (optional)
        if: ${{ inputs.xcode-version != '' }}
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ inputs.xcode-version }}

      # ── IPA Retrieval ──────────────────────────────────────────────────────────────
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve IPA path for release runner
        id: ipa
        shell: bash
        env:
          CANDIDATE: ${{ needs.build.outputs.ipa-file }}
        run: |
          set -euo pipefail

          CANDIDATE="${CANDIDATE}"
          IPA_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            IPA_FILE="$(basename "${CANDIDATE}")"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            IPA_FILE="$(ls -1 *.ipa 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            echo "ERROR: No .ipa file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=./${IPA_FILE}" >> "$GITHUB_OUTPUT"

      # ── Credentials ─────────────────────────────────────────────────────────────────
      # App Store Connect API key is decoded from base64 into two locations:
      #   1. $HOME/.appstoreconnect/private_keys/ — for altool path
      #   2. $RUNNER_TEMP/appstoreapi_keys/       — for appstoreapi path,
      #      written to GITHUB_ENV as APPSTOREAPI_KEY_CONTENT
      # Each line of the decoded PEM is masked to prevent it appearing
      # in the action input block printed before apple-actions runs.
      # Note: GitHub only auto-masks declared secrets, not derived env vars,
      # so the per-line masking is required.
      - name: Validate release credentials
        shell: bash
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.appstore-api-key-id }}
          APPSTORE_ISSUER_ID: ${{ secrets.appstore-issuer-id }}
        run: |
          set -euo pipefail

          if [ -z "${APPSTORE_API_KEY_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-api-key-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

          if [ -z "${APPSTORE_ISSUER_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-issuer-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

      - name: Install App Store Connect API key (base64)
        if: ${{ inputs.appstore-key-format == 'base64' }}
        shell: bash
        env:
          KEY_B64: ${{ secrets.appstore-api-private-key-base64 }}
          API_KEY_ID: ${{ secrets.appstore-api-key-id }}
        run: |
          set -euo pipefail
          umask 077

          if [[ -z "${KEY_B64}" ]]; then
            echo "ERROR: appstore-key-format=base64 requires secret appstore-api-private-key-base64"
            exit 1
          fi

          PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$PRIVATE_KEYS_DIR"

          KEY_PATH="$PRIVATE_KEYS_DIR/AuthKey_${API_KEY_ID}.p8"
          printf '%s' "${KEY_B64}" | base64 -D > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Decode App Store Connect API key (appstoreapi)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        shell: bash
        env:
          KEY_B64: ${{ secrets.appstore-api-private-key-base64 }}
        run: |
          set -euo pipefail
          umask 077
          PRIVATE_KEYS_DIR="$RUNNER_TEMP/appstoreapi_keys"
          mkdir -p "${PRIVATE_KEYS_DIR}"
          printf '%s' "${KEY_B64}" | base64 -D > "${PRIVATE_KEYS_DIR}/AuthKey.p8"
          if [[ ! -s "${PRIVATE_KEYS_DIR}/AuthKey.p8" ]]; then
            echo "ERROR: base64 decoding produced an empty key file. Check that appstore-api-private-key-base64 is valid."
            exit 1
          fi
          # Mask each line of the private key to prevent it appearing in logs
          while IFS= read -r line; do
            if [[ -n "${line}" ]]; then
              echo "::add-mask::${line}"
            fi
          done < "${PRIVATE_KEYS_DIR}/AuthKey.p8"
          {
            echo "APPSTOREAPI_KEY_CONTENT<<APPSTOREAPI_KEY_EOF"
            cat "${PRIVATE_KEYS_DIR}/AuthKey.p8"
            printf '\n'
            echo "APPSTOREAPI_KEY_EOF"
          } >> "$GITHUB_ENV"

      - name: Prepare TestFlight upload (App Store Connect API)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        shell: bash
        env:
          IPA_PATH: ${{ steps.ipa.outputs.path }}
        run: |
          set -euo pipefail
          IPA="${IPA_PATH}"
          IPA_BYTES=$(stat -f%z "${IPA}")
          IPA_SIZE_MB=$(awk "BEGIN { printf \"%.2f\", ${IPA_BYTES} / 1048576 }")
          IPA_NAME="$(basename "${IPA}")"
          echo "::notice title=🍎 [IOS] TestFlight Upload Starting::File: ${IPA_NAME} | Size: ${IPA_SIZE_MB} MB | Backend: AppStoreConnectAPI | Started: $(date -u +'%H:%M:%S UTC')"
          echo "::group::🍎 [IOS] Upload details"
          echo "  → File:    ${IPA_NAME}"
          echo "  → Size:    ${IPA_SIZE_MB} MB"
          echo "  → Backend: AppStoreConnectAPI (apple-actions/upload-testflight-build@v4)"
          echo "  → Started: $(date -u +'%H:%M:%S UTC')"
          echo "::endgroup::"
          echo "APPSTOREAPI_UPLOAD_START=$(date +%s)" >> "$GITHUB_ENV"
          echo "APPSTOREAPI_IPA_SIZE_MB=${IPA_SIZE_MB}" >> "$GITHUB_ENV"
          echo "APPSTOREAPI_IPA_NAME=${IPA_NAME}" >> "$GITHUB_ENV"

      # ── Upload ───────────────────────────────────────────────────────────────────
      # appstoreapi path: uses App Store Connect REST API. No local tooling.
      # Uploads chunks then polls for Apple processing confirmation.
      # KNOWN LIMITATION: App Store Connect JWT tokens expire after 20 minutes.
      # If Apple processing takes longer, the poll returns 401 NOT_AUTHORIZED.
      # The IPA was still delivered. Check TestFlight directly if this occurs.
      # Set wait-for-processing: false to skip polling (fire-and-forget).
      #
      # altool path: deprecated xcrun altool --upload-app. Fire-and-forget.
      # No processing confirmation. Retained for backwards compatibility.
      - name: Upload to TestFlight (App Store Connect API)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        uses: apple-actions/upload-testflight-build@v4
        with:
          app-path: ${{ steps.ipa.outputs.path }}
          issuer-id: ${{ secrets.appstore-issuer-id }}
          api-key-id: ${{ secrets.appstore-api-key-id }}
          api-private-key: ${{ env.APPSTOREAPI_KEY_CONTENT }}
          backend: AppStoreAPI
          wait-for-processing: 'true'

      - name: Confirm TestFlight upload (App Store Connect API)
        if: ${{ inputs.upload-tool == 'appstoreapi' }}
        shell: bash
        run: |
          ELAPSED=$(( $(date +%s) - APPSTOREAPI_UPLOAD_START ))
          bar='██████████████████████████████'
          echo "::group::🍎 [IOS] Upload complete"
          echo "  [${bar}] 100% — ${APPSTOREAPI_IPA_SIZE_MB} MB in ${ELAPSED}s"
          echo "  → Completed at $(date -u +'%H:%M:%S UTC')"
          echo "::endgroup::"
          echo "UPLOAD_CHECKPOINT_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/1] TestFlight upload completed — PASSED: ${APPSTOREAPI_IPA_NAME} (${APPSTOREAPI_IPA_SIZE_MB} MB) in ${ELAPSED}s"

      - name: Upload to TestFlight (altool)
        if: ${{ inputs.upload-tool == 'altool' }}
        shell: bash
        env:
          IPA_PATH: ${{ steps.ipa.outputs.path }}
          API_KEY_ID: ${{ secrets.appstore-api-key-id }}
          API_ISSUER_ID: ${{ secrets.appstore-issuer-id }}
        run: |
          set -euo pipefail

          IPA="${IPA_PATH}"
          OUTPUT_FILE="$(mktemp)"

          set +e
          xcrun altool --upload-app \
            -f "${IPA}" \
            -t ios \
            --apiKey "${API_KEY_ID}" \
            --apiIssuer "${API_ISSUER_ID}" \
            --output-format xml 2>&1 | tee "${OUTPUT_FILE}"
          ALTOOL_EXIT=${PIPESTATUS[0]}
          set -e

          if [[ ${ALTOOL_EXIT} -ne 0 ]]; then
            echo "ERROR: altool upload failed with exit code ${ALTOOL_EXIT}"
            exit ${ALTOOL_EXIT}
          fi

          if grep -qiE "NOT_AUTHORIZED|failed to authenticate|Authentication credentials are missing or invalid|received status code 401|Unable to authenticate|auth issue" "${OUTPUT_FILE}"; then
            echo "ERROR: App Store authentication error detected in altool output. Failing workflow by policy."
            exit 1
          fi

          if grep -qiE "Validation failed|STATE_ERROR\.VALIDATION_ERROR|Invalid Version|CFBundleShortVersionString" "${OUTPUT_FILE}"; then
            echo "ERROR: App Store validation error detected in altool output. Failing workflow by policy."
            exit 1
          fi

          echo "UPLOAD_CHECKPOINT_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/1] TestFlight upload completed — PASSED (altool)"

      - name: Report release failure
        if: failure()
        shell: bash
        run: |
          echo "::error title=🍎 [IOS] Release Job Failed::Version: ${{ needs.build.outputs.version }} | Build: ${{ needs.build.outputs.build-number }} | Upload tool: ${{ inputs.upload-tool }}"
          echo "  Checkpoint 1 — TestFlight upload: ${UPLOAD_CHECKPOINT_STATUS:-❌ Not reached}"

      - name: Write release job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          VERSION: ${{ needs.build.outputs.version }}
          BUILD_NUMBER: ${{ needs.build.outputs.build-number }}
          UPLOAD_TOOL: ${{ inputs.upload-tool }}
          REF_NAME: ${{ github.ref_name }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🍎 iOS TestFlight Upload — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VERSION}\` (build: ${BUILD_NUMBER}) |"
            echo "| Upload tool | ${UPLOAD_TOOL} |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Triggered by | ${ACTOR} |"
            echo "| Run | [${RUN_ID}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | TestFlight upload | ${UPLOAD_CHECKPOINT_STATUS:-⏭️ Skipped} |"
          } >> "$GITHUB_STEP_SUMMARY"
