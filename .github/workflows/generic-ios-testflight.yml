name: Generic iOS Build and TestFlight (reusable)

on:
  workflow_call:
    inputs:
      macos-runner:
        description: GitHub-hosted macOS runner label
        required: false
        type: string
        default: macos-latest
      node-version:
        description: Node version for React Native dependency installation
        required: false
        type: string
        default: "24"
      # Package manager inputs keep setup-node cache and install commands aligned.
      # Defaults preserve legacy behavior (Yarn at repository root).
      package-manager:
        description: Node package manager used for cache and default dependency commands (yarn or npm)
        required: false
        type: string
        default: yarn
      package-manager-directory:
        description: Directory containing package.json and lockfile for selected package manager
        required: false
        type: string
        default: "."
      cache-dependency-path:
        description: Optional explicit lockfile path used by setup-node cache
        required: false
        type: string
        default: ""
      # Leave install-command empty to use package-manager defaults.
      # Set this only when a caller needs a fully custom install command.
      install-command:
        description: Optional explicit dependency install command; if empty uses package-manager default
        required: false
        type: string
        default: ""
      install-react-native-cli:
        description: Install react-native-cli globally
        required: false
        type: boolean
        default: true
      xcode-version:
        description: "Optional Xcode major or major.minor selector (for example: 26 or 16.4)"
        required: false
        type: string
        default: ""
      use-simplify9-xcode-setup:
        description: Use simplify9 xcode-setup composite action (pods + selected Xcode)
        required: false
        type: boolean
        default: true
      verify-cocoapods:
        description: Run `pod --version` check
        required: false
        type: boolean
        default: false
      clean-reinstall-pods:
        description: Perform `pod deintegrate` and `pod install --repo-update`
        required: false
        type: boolean
        default: false
      ios-dir:
        description: iOS directory used for pods operations
        required: false
        type: string
        default: ios
      pre-build-script:
        description: Optional bash script to run before dependency install (for example, env file mutation)
        required: false
        type: string
        default: ""
      pre-build-working-directory:
        description: Working directory for pre-build-script
        required: false
        type: string
        default: "."

      workspace:
        description: Path to .xcworkspace
        required: true
        type: string
      scheme:
        description: Xcode scheme to archive
        required: true
        type: string
      configuration:
        description: Build configuration
        required: false
        type: string
        default: Release
      archive-path:
        description: Output xcarchive path
        required: false
        type: string
        default: output/app.xcarchive
      export-path:
        description: IPA export directory
        required: false
        type: string
        default: output/package
      export-options-plist:
        description: Path to static exportOptions.plist. If empty and generate-export-options=true, one is generated.
        required: false
        type: string
        default: ""
      generate-export-options:
        description: Generate exportOptions.plist from profile metadata
        required: false
        type: boolean
        default: false

      signing-style:
        description: Signing style for xcode-build action (manual or automatic)
        required: false
        type: string
        default: manual
      code-sign-identity:
        description: Code sign identity, for example Apple Distribution
        required: false
        type: string
        default: Apple Distribution
      build-destination:
        description: Xcode destination
        required: false
        type: string
        default: generic/platform=iOS
      debug-build-settings:
        description: Print selected signing build settings from xcode-build action
        required: false
        type: boolean
        default: false
      use-manual-inline-archive:
        description: Use direct xcodebuild archive command (profile NAME) instead of simplify9 xcode-build action (profile UUID)
        required: false
        type: boolean
        default: true
      bundle-id-override:
        description: Optional bundle id override when using simplify9 xcode-build action
        required: false
        type: string
        default: ""

      # Versioning modes:
      # - none: compute VERSION/BUILD_NUMBER from run number only.
      # - pbxproj-counter: write prefix.run_number into MARKETING_VERSION.
      # - pbxproj-counter-rollover: X.Y release line with run-based carry to X.Y.Z.
      # - pbxproj-auto-increment: semver-like bump from current pbxproj value.
      versioning-strategy:
        description: none, pbxproj-counter, pbxproj-counter-rollover, or pbxproj-auto-increment
        required: false
        type: string
        default: pbxproj-counter-rollover
      pbxproj-path:
        description: Path to project.pbxproj when using pbxproj-driven versioning
        required: false
        type: string
        default: ""
      # For rollover strategy, this is the manual release line in X.Y format.
      marketing-prefix:
        description: Marketing version prefix. For pbxproj-counter-rollover use X.Y as the release line.
        required: false
        type: string
        default: "1.0"
      marketing-version-bump:
        description: For pbxproj-auto-increment, which segment to bump (patch, minor, or major)
        required: false
        type: string
        default: patch
      marketing-version-floor:
        description: Optional minimum marketing version (for example 4.1 or 4.1.0)
        required: false
        type: string
        default: ""
      build-number-offset:
        description: Offset applied when computing CURRENT_PROJECT_VERSION in pbxproj-counter family modes (default 1)
        required: false
        type: string
        default: "1"

      ipa-name-pattern:
        description: Output IPA file name pattern with tokens {scheme},{version},{build_number},{run_number}
        required: false
        type: string
        default: "{scheme}{run_number}.ipa"
      artifact-name:
        description: Upload artifact name
        required: false
        type: string
        default: ipa

      upload-tool:
        description: "TestFlight upload tool: transporter or altool"
        required: false
        type: string
        default: transporter
      appstore-key-format:
        description: "API key secret format: raw or base64"
        required: false
        type: string
        default: raw

      release-environment:
        description: Optional GitHub environment for release job
        required: false
        type: string
        default: ""
      # Build-only toggle. When true, TestFlight upload jobs are skipped.
      disable-release:
        description: If true, skip TestFlight upload jobs and run build-only
        required: false
        type: boolean
        default: false

    secrets:
      ios-p12-base64:
        description: Base64 encoded signing certificate (.p12)
        required: true
      ios-p12-password:
        description: Password for signing certificate
        required: true
      ios-mobileprovision-base64:
        description: Base64 encoded provisioning profile
        required: true
      ios-team-id:
        description: Optional explicit Apple Team ID for manual signing
        required: false

      appstore-api-key-id:
        description: App Store Connect API key id
        required: false
      appstore-issuer-id:
        description: App Store Connect issuer id
        required: false
      appstore-api-private-key:
        description: Raw API private key contents (PEM) for transporter/raw mode
        required: false
      appstore-api-private-key-base64:
        description: Base64 API private key for altool/base64 mode
        required: false

    outputs:
      version:
        description: Marketing version used for this build
        value: ${{ jobs.build.outputs.version }}
      build-number:
        description: Build number used for this build
        value: ${{ jobs.build.outputs.build-number }}
      ipa-file:
        description: IPA file name uploaded and released
        value: ${{ jobs.build.outputs.ipa-file }}

permissions:
  contents: read

jobs:
  build:
    name: Build IPA
    runs-on: ${{ inputs.macos-runner }}
    outputs:
      version: ${{ steps.final_version.outputs.version }}
      build-number: ${{ steps.final_version.outputs.build_number }}
      ipa-file: ${{ steps.rename_ipa.outputs.ipa_file }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize runtime paths
        shell: bash
        run: |
          set -euo pipefail
          echo "KEYCHAIN_PATH=${RUNNER_TEMP}/build.keychain-db" >> "$GITHUB_ENV"

      - name: Select Xcode (optional)
        if: ${{ inputs.xcode-version != '' }}
        shell: bash
        run: |
          set -euo pipefail

          XCODE_VERSION="${{ inputs.xcode-version }}"
          CANDIDATES=(
            "/Applications/Xcode_${XCODE_VERSION}.app"
            "/Applications/Xcode${XCODE_VERSION}.app"
            "/Applications/Xcode-${XCODE_VERSION}.app"
            "/Applications/Xcode_${XCODE_VERSION}.0.app"
            "/Applications/Xcode${XCODE_VERSION}.0.app"
          )

          XCODE_APP=""
          for p in "${CANDIDATES[@]}"; do
            if [[ -d "$p" ]]; then
              XCODE_APP="$p"
              break
            fi
          done

          if [[ -z "${XCODE_APP}" ]]; then
            echo "ERROR: Could not find an Xcode app for version '${XCODE_VERSION}'."
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcode-select -p
          xcodebuild -version

      - name: Run pre-build mutation script (optional)
        if: ${{ inputs.pre-build-script != '' }}
        shell: bash
        working-directory: ${{ inputs.pre-build-working-directory }}
        run: |
          set -euo pipefail
          echo "Running configured pre-build script in: $PWD"
          ${{ inputs.pre-build-script }}

      - name: Resolve package manager settings
        id: package_manager
        shell: bash
        run: |
          set -euo pipefail

          # Normalize inputs so package-manager value handling is case-insensitive.
          PACKAGE_MANAGER_RAW="${{ inputs.package-manager }}"
          PACKAGE_MANAGER="$(echo "${PACKAGE_MANAGER_RAW}" | tr '[:upper:]' '[:lower:]')"
          PACKAGE_DIR_RAW="${{ inputs.package-manager-directory }}"
          PACKAGE_DIR="${PACKAGE_DIR_RAW:-.}"

          if [[ -z "${PACKAGE_DIR}" ]]; then
            PACKAGE_DIR="."
          fi

          if [[ "${PACKAGE_DIR}" == "." ]]; then
            DISPLAY_DIR="repository root"
          else
            DISPLAY_DIR="${PACKAGE_DIR}"
          fi

          # Keep cache type and install commands tied to the selected package manager.
          case "${PACKAGE_MANAGER}" in
            yarn)
              DEFAULT_LOCKFILE="yarn.lock"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="yarn"
              else
                DEFAULT_INSTALL_COMMAND="yarn --cwd '${PACKAGE_DIR}'"
              fi
              ;;
            npm)
              DEFAULT_LOCKFILE="package-lock.json"
              if [[ "${PACKAGE_DIR}" == "." ]]; then
                DEFAULT_INSTALL_COMMAND="npm ci"
              else
                DEFAULT_INSTALL_COMMAND="npm ci --prefix '${PACKAGE_DIR}'"
              fi
              ;;
            *)
              echo "ERROR: Unsupported package-manager '${PACKAGE_MANAGER_RAW}'. Supported values: yarn, npm."
              exit 1
              ;;
          esac

          # Infer lockfile path from package-manager + directory when no explicit override is provided.
          CACHE_DEPENDENCY_PATH_INPUT="${{ inputs.cache-dependency-path }}"
          CACHE_DEPENDENCY_PATH="${CACHE_DEPENDENCY_PATH_INPUT}"

          if [[ -z "${CACHE_DEPENDENCY_PATH}" ]]; then
            if [[ "${PACKAGE_DIR}" == "." ]]; then
              CACHE_DEPENDENCY_PATH="${DEFAULT_LOCKFILE}"
            else
              CACHE_DEPENDENCY_PATH="${PACKAGE_DIR}/${DEFAULT_LOCKFILE}"
            fi
          fi

          # Fail fast with a clear message rather than letting setup-node fail later.
          if [[ ! -f "${CACHE_DEPENDENCY_PATH}" ]]; then
            echo "ERROR: Expected lockfile '${CACHE_DEPENDENCY_PATH}' was not found."
            echo "Set package-manager-directory or cache-dependency-path to the correct location."
            exit 1
          fi

          echo "cache=${PACKAGE_MANAGER}" >> "$GITHUB_OUTPUT"
          echo "cache_dependency_path=${CACHE_DEPENDENCY_PATH}" >> "$GITHUB_OUTPUT"
          echo "default_install_command=${DEFAULT_INSTALL_COMMAND}" >> "$GITHUB_OUTPUT"

          {
            echo "## Node Package Manager Resolution"
            echo ""
            echo "- package manager: ${PACKAGE_MANAGER}"
            echo "- package directory: ${DISPLAY_DIR}"
            echo "- cache dependency path: ${CACHE_DEPENDENCY_PATH}"
            echo "- default install command: ${DEFAULT_INSTALL_COMMAND}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ steps.package_manager.outputs.cache }}
          cache-dependency-path: ${{ steps.package_manager.outputs.cache_dependency_path }}

      - name: Install node dependencies
        shell: bash
        run: ${{ inputs.install-command != '' && inputs.install-command || steps.package_manager.outputs.default_install_command }}

      - name: Install React Native CLI
        if: ${{ inputs.install-react-native-cli }}
        shell: bash
        run: npm install -g react-native-cli

      - name: Xcode setup (simplify9 action)
        if: ${{ inputs.use-simplify9-xcode-setup }}
        uses: simplify9/.github/.github/actions/xcode-setup@main
        with:
          xcodeVersion: ${{ inputs.xcode-version != '' && inputs.xcode-version || '26' }}

      - name: Verify CocoaPods
        if: ${{ inputs.verify-cocoapods }}
        shell: bash
        run: |
          set -euo pipefail
          pod --version

      - name: Update pbxproj versions (automated)
        if: ${{ inputs.versioning-strategy == 'pbxproj-counter' || inputs.versioning-strategy == 'pbxproj-counter-rollover' || inputs.versioning-strategy == 'pbxproj-auto-increment' }}
        shell: bash
        run: |
          set -euo pipefail

          PBXPROJ_PATH="${{ inputs.pbxproj-path }}"
          if [[ -z "${PBXPROJ_PATH}" || ! -f "${PBXPROJ_PATH}" ]]; then
            echo "ERROR: pbxproj versioning requires a valid pbxproj-path input"
            exit 1
          fi

          normalize_semver() {
            local v="$1"
            if [[ "$v" =~ ^([0-9]+)\.([0-9]+)$ ]]; then
              echo "${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.0"
              return 0
            fi
            if [[ "$v" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "$v"
              return 0
            fi
            return 1
          }

          version_lt() {
            local a="$1"
            local b="$2"
            local a1 a2 a3 b1 b2 b3
            IFS='.' read -r a1 a2 a3 <<< "$a"
            IFS='.' read -r b1 b2 b3 <<< "$b"
            if (( a1 < b1 )); then return 0; fi
            if (( a1 > b1 )); then return 1; fi
            if (( a2 < b2 )); then return 0; fi
            if (( a2 > b2 )); then return 1; fi
            if (( a3 < b3 )); then return 0; fi
            return 1
          }

          CURRENT_MARKETING_RAW=$(
            grep -m 1 "MARKETING_VERSION = " "${PBXPROJ_PATH}" \
              | sed -E 's/.*MARKETING_VERSION = ([^;]+);.*/\1/'
          )

          if [[ -z "${CURRENT_MARKETING_RAW}" ]]; then
            echo "ERROR: Could not parse MARKETING_VERSION from ${PBXPROJ_PATH}"
            exit 1
          fi

          CURRENT_MARKETING="$(normalize_semver "${CURRENT_MARKETING_RAW}")" || {
            echo "ERROR: Unsupported MARKETING_VERSION format '${CURRENT_MARKETING_RAW}'. Expected X.Y or X.Y.Z"
            exit 1
          }

          BASE_BUILD=$(
            grep -m 1 "CURRENT_PROJECT_VERSION = " "${PBXPROJ_PATH}" \
              | sed -E 's/.*CURRENT_PROJECT_VERSION = ([^;]+);.*/\1/'
          )

          if ! [[ "${BASE_BUILD}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: Could not parse numeric CURRENT_PROJECT_VERSION. Got '${BASE_BUILD}'"
            exit 1
          fi

          STRATEGY="${{ inputs.versioning-strategy }}"
          NEW_MARKETING_VERSION=""
          NEW_BUILD_NUMBER=""

          echo "Selected versioning strategy: ${STRATEGY}"
          echo "Original marketing-prefix input: ${{ inputs.marketing-prefix }}"
          echo "github.run_number: ${GITHUB_RUN_NUMBER}"
          echo "Original MARKETING_VERSION in pbxproj: ${CURRENT_MARKETING_RAW}"
          echo "Original CURRENT_PROJECT_VERSION in pbxproj: ${BASE_BUILD}"

          if [[ "${STRATEGY}" == "pbxproj-counter" ]]; then
            # Counter mode: MARKETING_VERSION = {marketing-prefix}.{run_number}
            OFFSET="${{ inputs.build-number-offset }}"
            if ! [[ "${OFFSET}" =~ ^[0-9]+$ ]]; then
              echo "ERROR: build-number-offset must be numeric. Got '${OFFSET}'"
              exit 1
            fi

            NEW_MARKETING_VERSION="${{ inputs.marketing-prefix }}.${GITHUB_RUN_NUMBER}"
            NEW_BUILD_NUMBER=$((BASE_BUILD + OFFSET + GITHUB_RUN_NUMBER))
          elif [[ "${STRATEGY}" == "pbxproj-counter-rollover" ]]; then
            # Rollover mode: marketing-prefix X.Y + run counter -> X.Y.Z with single-digit carry.
            OFFSET="${{ inputs.build-number-offset }}"
            if ! [[ "${OFFSET}" =~ ^[0-9]+$ ]]; then
              echo "ERROR: build-number-offset must be numeric. Got '${OFFSET}'"
              exit 1
            fi

            PREFIX_RAW="${{ inputs.marketing-prefix }}"
            if [[ "${PREFIX_RAW}" =~ ^([0-9]+)\.([0-9])$ ]]; then
              BASE_MAJOR="${BASH_REMATCH[1]}"
              BASE_MINOR="${BASH_REMATCH[2]}"
            else
              echo "ERROR: pbxproj-counter-rollover requires marketing-prefix in X.Y format with single-digit minor (0-9). Got '${PREFIX_RAW}'."
              exit 1
            fi

            INCREMENT=$((GITHUB_RUN_NUMBER))
            PATCH=$((INCREMENT % 10))
            MINOR_CARRY=$((INCREMENT / 10))
            TOTAL_MINOR=$((BASE_MINOR + MINOR_CARRY))
            FINAL_MINOR=$((TOTAL_MINOR % 10))
            MAJOR_CARRY=$((TOTAL_MINOR / 10))
            FINAL_MAJOR=$((BASE_MAJOR + MAJOR_CARRY))

            NEW_MARKETING_VERSION="${FINAL_MAJOR}.${FINAL_MINOR}.${PATCH}"
            NEW_BUILD_NUMBER=$((BASE_BUILD + OFFSET + GITHUB_RUN_NUMBER))

            echo "Rollover base major: ${BASE_MAJOR}"
            echo "Rollover base minor: ${BASE_MINOR}"
            echo "Rollover increment: ${INCREMENT}"
            echo "Rollover computed patch: ${PATCH}"
            echo "Rollover computed minor carry: ${MINOR_CARRY}"
          else
            # Auto-increment mode: bump current MARKETING_VERSION in pbxproj.
            CUR_NORM="${CURRENT_MARKETING}"
            IFS='.' read -r M m p <<< "${CUR_NORM}"

            BUMP="${{ inputs.marketing-version-bump }}"
            case "${BUMP}" in
              major)
                M=$((M + 1)); m=0; p=0 ;;
              minor)
                m=$((m + 1)); p=0 ;;
              patch)
                p=$((p + 1)) ;;
              *)
                echo "ERROR: Unsupported marketing-version-bump '${BUMP}'. Use patch, minor, or major."
                exit 1 ;;
            esac

            NEW_MARKETING_VERSION="${M}.${m}.${p}"

            FLOOR_RAW="${{ inputs.marketing-version-floor }}"
            if [[ -n "${FLOOR_RAW}" ]]; then
              FLOOR_NORM="$(normalize_semver "${FLOOR_RAW}")" || {
                echo "ERROR: Invalid marketing-version-floor '${FLOOR_RAW}'. Expected X.Y or X.Y.Z"
                exit 1
              }

              if version_lt "${NEW_MARKETING_VERSION}" "${FLOOR_NORM}"; then
                NEW_MARKETING_VERSION="${FLOOR_NORM}"
              fi
            fi

            NEW_BUILD_NUMBER=$((BASE_BUILD + 1))
          fi

          echo "Computed MARKETING_VERSION=${NEW_MARKETING_VERSION}"
          echo "Computed CURRENT_PROJECT_VERSION=${NEW_BUILD_NUMBER}"

          perl -pi -e "s/\\bMARKETING_VERSION = [^;]+;/MARKETING_VERSION = ${NEW_MARKETING_VERSION};/g" "${PBXPROJ_PATH}"
          perl -pi -e "s/\\bCURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = ${NEW_BUILD_NUMBER};/g" "${PBXPROJ_PATH}"

          echo "VERSION=${NEW_MARKETING_VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${NEW_BUILD_NUMBER}" >> "$GITHUB_ENV"

          echo "Updated pbxproj (diff):"
          git --no-pager diff -- "${PBXPROJ_PATH}" || true

      - name: Clean and reinstall Pods
        if: ${{ inputs.clean-reinstall-pods }}
        shell: bash
        run: |
          set -euo pipefail
          cd "${{ inputs.ios-dir }}"
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install --repo-update

      - name: Install signing certificate
        uses: simplify9/.github/.github/actions/ios-install-cert@main
        with:
          p12Base64: ${{ secrets.ios-p12-base64 }}
          p12Password: ${{ secrets.ios-p12-password }}

      - name: Install provisioning profile
        id: install_profile
        uses: simplify9/.github/.github/actions/ios-install-profile@main
        with:
          profileBase64: ${{ secrets.ios-mobileprovision-base64 }}

      - name: Enrich profile metadata (bundle/team)
        id: profile_meta
        shell: bash
        env:
          PROFILE_B64: ${{ secrets.ios-mobileprovision-base64 }}
        run: |
          set -euo pipefail

          PROFILE_PATH="${RUNNER_TEMP}/profile.mobileprovision"
          PROFILE_PLIST="${RUNNER_TEMP}/profile.plist"

          printf '%s' "${PROFILE_B64}" | base64 -D > "${PROFILE_PATH}"
          security cms -D -i "${PROFILE_PATH}" > "${PROFILE_PLIST}"

          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' "${PROFILE_PLIST}")
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' "${PROFILE_PLIST}")
          TEAM_ID_FROM_PROFILE=$(/usr/libexec/PlistBuddy -c 'Print :TeamIdentifier:0' "${PROFILE_PLIST}")
          TEAM_NAME=$(/usr/libexec/PlistBuddy -c 'Print :TeamName' "${PROFILE_PLIST}")
          APP_ID=$(/usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' "${PROFILE_PLIST}")
          BUNDLE_ID="${APP_ID#*.}"

          echo "profile_uuid=${PROFILE_UUID}" >> "$GITHUB_OUTPUT"
          echo "profile_name=${PROFILE_NAME}" >> "$GITHUB_OUTPUT"
          echo "team_id=${TEAM_ID_FROM_PROFILE}" >> "$GITHUB_OUTPUT"
          echo "team_name=${TEAM_NAME}" >> "$GITHUB_OUTPUT"
          echo "bundle_id=${BUNDLE_ID}" >> "$GITHUB_OUTPUT"

          echo "IOS_PROFILE_UUID=${PROFILE_UUID}" >> "$GITHUB_ENV"
          echo "IOS_PROFILE_NAME=${PROFILE_NAME}" >> "$GITHUB_ENV"
          echo "TEAM_ID_FROM_PROFILE=${TEAM_ID_FROM_PROFILE}" >> "$GITHUB_ENV"
          echo "TEAM_NAME=${TEAM_NAME}" >> "$GITHUB_ENV"
          echo "IOS_BUNDLE_ID=${BUNDLE_ID}" >> "$GITHUB_ENV"

      - name: Compute version variables
        id: version_vars
        # Fallback only for strategy=none. Other strategies already set VERSION/BUILD_NUMBER.
        if: ${{ inputs.versioning-strategy == 'none' }}
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${{ inputs.marketing-prefix }}.${GITHUB_RUN_NUMBER}"
          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"

          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "$GITHUB_ENV"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Finalize version outputs
        id: final_version
        shell: bash
        run: |
          set -euo pipefail
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "build_number=${BUILD_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Archive (simplify9 xcode-build action)
        if: ${{ !inputs.use-manual-inline-archive }}
        uses: simplify9/.github/.github/actions/xcode-build@main
        with:
          workspace: ${{ inputs.workspace }}
          scheme: ${{ inputs.scheme }}
          configuration: ${{ inputs.configuration }}
          archivePath: ${{ inputs.archive-path }}
          destination: ${{ inputs.build-destination }}
          signingStyle: ${{ inputs.signing-style }}
          developmentTeam: ${{ secrets.ios-team-id != '' && secrets.ios-team-id || steps.profile_meta.outputs.team_id }}
          codeSignIdentity: ${{ inputs.code-sign-identity }}
          provisioningProfileUuid: ${{ steps.profile_meta.outputs.profile_uuid }}
          bundleId: ${{ inputs.bundle-id-override }}
          keychainPath: ${{ runner.temp }}/build.keychain-db
          debugBuildSettings: ${{ inputs.debug-build-settings && 'true' || 'false' }}

      - name: Archive (manual inline xcodebuild, profile name)
        if: ${{ inputs.use-manual-inline-archive }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p output

          TEAM_ID="${{ secrets.ios-team-id }}"
          if [[ -z "${TEAM_ID}" ]]; then
            TEAM_ID="${TEAM_ID_FROM_PROFILE}"
          fi

          xcodebuild \
            -workspace "${{ inputs.workspace }}" \
            -scheme "${{ inputs.scheme }}" \
            -configuration "${{ inputs.configuration }}" \
            -sdk iphoneos \
            -destination "${{ inputs.build-destination }}" \
            -archivePath "${{ inputs.archive-path }}" \
            archive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="${TEAM_ID}" \
            CODE_SIGN_IDENTITY="${{ inputs.code-sign-identity }}" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.profile_meta.outputs.profile_name }}" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH}" \
            -verbose -showBuildTimingSummary

      - name: Generate exportOptions.plist
        if: ${{ inputs.generate-export-options }}
        shell: bash
        run: |
          set -euo pipefail

          TEAM_ID="${{ secrets.ios-team-id }}"
          if [[ -z "${TEAM_ID}" ]]; then
            TEAM_ID="${TEAM_ID_FROM_PROFILE}"
          fi

          EXPORT_PLIST="${RUNNER_TEMP}/exportOptions.plist"
          cat > "${EXPORT_PLIST}" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${{ steps.profile_meta.outputs.bundle_id }}</key>
              <string>${{ steps.profile_meta.outputs.profile_name }}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

          echo "EXPORT_PLIST=${EXPORT_PLIST}" >> "$GITHUB_ENV"
          /usr/bin/plutil -p "${EXPORT_PLIST}" >/dev/null

      - name: Resolve export plist
        id: resolve_export
        shell: bash
        run: |
          set -euo pipefail

          if [[ -n "${{ inputs.export-options-plist }}" ]]; then
            echo "EXPORT_PLIST=${{ inputs.export-options-plist }}" >> "$GITHUB_ENV"
            echo "export_plist=${{ inputs.export-options-plist }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [[ "${{ inputs.generate-export-options }}" != "true" ]]; then
            echo "ERROR: Either export-options-plist must be provided, or generate-export-options must be true."
            exit 1
          fi

          echo "export_plist=${EXPORT_PLIST}" >> "$GITHUB_OUTPUT"

      - name: Export IPA
        uses: simplify9/.github/.github/actions/xcode-export@main
        with:
          archivePath: ${{ inputs.archive-path }}
          exportOptionsPlist: ${{ steps.resolve_export.outputs.export_plist }}
          exportPath: ${{ inputs.export-path }}

      - name: Rename IPA
        id: rename_ipa
        shell: bash
        run: |
          set -euo pipefail

          IPA_SRC="$(ls -1 "${{ inputs.export-path }}"/*.ipa | head -n 1)"
          PATTERN='${{ inputs.ipa-name-pattern }}'

          IPA_OUT="${PATTERN//\{scheme\}/${{ inputs.scheme }}}"
          IPA_OUT="${IPA_OUT//\{version\}/${VERSION}}"
          IPA_OUT="${IPA_OUT//\{build_number\}/${BUILD_NUMBER}}"
          IPA_OUT="${IPA_OUT//\{run_number\}/${GITHUB_RUN_NUMBER}}"

          mv "${IPA_SRC}" "${IPA_OUT}"

          echo "ipa_file=${IPA_OUT}" >> "$GITHUB_OUTPUT"
          echo "IPA_FILE=${IPA_OUT}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ steps.rename_ipa.outputs.ipa_file }}

  release:
    name: Upload to TestFlight
    runs-on: ${{ inputs.macos-runner }}
    needs: build
    if: ${{ inputs.release-environment == '' && !inputs.disable-release }}

    steps:
      - name: Select Xcode (optional)
        if: ${{ inputs.xcode-version != '' }}
        shell: bash
        run: |
          set -euo pipefail

          XCODE_VERSION="${{ inputs.xcode-version }}"
          CANDIDATES=(
            "/Applications/Xcode_${XCODE_VERSION}.app"
            "/Applications/Xcode${XCODE_VERSION}.app"
            "/Applications/Xcode-${XCODE_VERSION}.app"
            "/Applications/Xcode_${XCODE_VERSION}.0.app"
            "/Applications/Xcode${XCODE_VERSION}.0.app"
          )

          XCODE_APP=""
          for p in "${CANDIDATES[@]}"; do
            if [[ -d "$p" ]]; then
              XCODE_APP="$p"
              break
            fi
          done

          if [[ -z "${XCODE_APP}" ]]; then
            echo "ERROR: Could not find an Xcode app for version '${XCODE_VERSION}'."
            ls -d /Applications/Xcode*.app || true
            exit 1
          fi

          sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
          xcodebuild -version

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: .

      - name: Resolve IPA path for release runner
        id: ipa
        shell: bash
        run: |
          set -euo pipefail

          CANDIDATE='${{ needs.build.outputs.ipa-file }}'
          IPA_FILE=""

          if [[ -n "${CANDIDATE}" ]]; then
            IPA_FILE="$(basename "${CANDIDATE}")"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            IPA_FILE="$(ls -1 *.ipa 2>/dev/null | head -n 1 || true)"
          fi

          if [[ -z "${IPA_FILE}" || ! -f "${IPA_FILE}" ]]; then
            echo "ERROR: No .ipa file found in release workspace."
            ls -lah
            exit 1
          fi

          echo "path=./${IPA_FILE}" >> "$GITHUB_OUTPUT"

      - name: Validate release credentials
        shell: bash
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.appstore-api-key-id }}
          APPSTORE_ISSUER_ID: ${{ secrets.appstore-issuer-id }}
        run: |
          set -euo pipefail

          if [ -z "${APPSTORE_API_KEY_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-api-key-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

          if [ -z "${APPSTORE_ISSUER_ID:-}" ]; then
            echo "ERROR: Missing required secret 'appstore-issuer-id' for TestFlight upload."
            echo "Set disable-release=true to run build-only without TestFlight upload."
            exit 1
          fi

      - name: Install App Store Connect API key (raw)
        if: ${{ inputs.appstore-key-format == 'raw' }}
        shell: bash
        run: |
          set -euo pipefail

          KEY_CONTENT='${{ secrets.appstore-api-private-key }}'
          if [[ -z "${KEY_CONTENT}" ]]; then
            echo "ERROR: appstore-key-format=raw requires secret appstore-api-private-key"
            exit 1
          fi

          mkdir -p "$HOME/private_keys"
          KEY_PATH="$HOME/private_keys/AuthKey_${{ secrets.appstore-api-key-id }}.p8"
          printf '%s' "${KEY_CONTENT}" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Install App Store Connect API key (base64)
        if: ${{ inputs.appstore-key-format == 'base64' }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077

          KEY_B64='${{ secrets.appstore-api-private-key-base64 }}'
          if [[ -z "${KEY_B64}" ]]; then
            echo "ERROR: appstore-key-format=base64 requires secret appstore-api-private-key-base64"
            exit 1
          fi

          PRIVATE_KEYS_DIR="$HOME/.appstoreconnect/private_keys"
          mkdir -p "$PRIVATE_KEYS_DIR"

          KEY_PATH="$PRIVATE_KEYS_DIR/AuthKey_${{ secrets.appstore-api-key-id }}.p8"
          printf '%s' "$KEY_B64" | base64 -D > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

      - name: Upload to TestFlight (iTMSTransporter)
        if: ${{ inputs.upload-tool == 'transporter' }}
        shell: bash
        run: |
          set -euo pipefail

          IPA='${{ steps.ipa.outputs.path }}'

          if ! command -v xcrun >/dev/null 2>&1; then
            echo "ERROR: xcrun is not available on this runner."
            exit 1
          fi

          if ! xcrun --find iTMSTransporter >/dev/null 2>&1; then
            echo "ERROR: iTMSTransporter is not available in selected Xcode on this runner."
            exit 1
          fi

          xcrun iTMSTransporter \
            -m upload \
            -assetFile "${IPA}" \
            -apiKey "${{ secrets.appstore-api-key-id }}" \
            -apiIssuer "${{ secrets.appstore-issuer-id }}" \
            -v informational

      - name: Upload to TestFlight (altool)
        if: ${{ inputs.upload-tool == 'altool' }}
        shell: bash
        run: |
          set -euo pipefail

          IPA='${{ steps.ipa.outputs.path }}'
          OUTPUT_FILE="$(mktemp)"

          set +e
          xcrun altool --upload-app \
            -f "${IPA}" \
            -t ios \
            --apiKey "${{ secrets.appstore-api-key-id }}" \
            --apiIssuer "${{ secrets.appstore-issuer-id }}" \
            --output-format xml 2>&1 | tee "${OUTPUT_FILE}"
          ALTOOL_EXIT=${PIPESTATUS[0]}
          set -e

          if [[ ${ALTOOL_EXIT} -ne 0 ]]; then
            echo "ERROR: altool upload failed with exit code ${ALTOOL_EXIT}"
            exit ${ALTOOL_EXIT}
          fi

          if grep -qiE "NOT_AUTHORIZED|failed to authenticate|Authentication credentials are missing or invalid|received status code 401|Unable to authenticate|auth issue" "${OUTPUT_FILE}"; then
            echo "ERROR: App Store authentication error detected in altool output. Failing workflow by policy."
            exit 1
          fi

          if grep -qiE "Validation failed|STATE_ERROR\.VALIDATION_ERROR|Invalid Version|CFBundleShortVersionString" "${OUTPUT_FILE}"; then
            echo "ERROR: App Store validation error detected in altool output. Failing workflow by policy."
            exit 1
          fi

