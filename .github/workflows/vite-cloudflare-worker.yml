# =============================================================================
# Deploy Vite to Cloudflare Workers (static SPA)
# =============================================================================
# Reusable workflow that builds a Vite single-page app and deploys it to
# Cloudflare Workers static assets.
#
# SPA routing is handled natively by Cloudflare via
# `not_found_handling = "single-page-application"`, so NO custom Worker script
# is generated or invoked — unmatched routes are served `index.html` straight
# from the edge (free, no Worker invocation).
#
# Pipeline:
#   install -> lint (optional) -> pre-build (optional) -> build ->
#   generate & validate wrangler.toml -> deploy.
#
# Inputs (see `on.workflow_call.inputs` for full list, types & defaults):
#   node_version, package_manager (npm|yarn|pnpm), install_args, run_lint,
#   build_script, compatibility_date, route (required), project_name (required),
#   environment (required), assets_dir, pre_build_commands.
#
# Secrets:
#   cloudflare_api_token   (required)  Cloudflare API token (Workers + DNS).
#   cloudflare_account_id  (required)  Cloudflare Account ID.
#
# Usage:
#   jobs:
#     deploy:
#       uses: simplify9/.github/.github/workflows/vite-cloudflare-worker.yml@main
#       with:
#         route: example.com
#         project_name: my-app
#         environment: production
#       secrets:
#         cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#         cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
# =============================================================================
name: Deploy Vite to Cloudflare Workers

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        required: false
        default: "24"
        type: string
      package_manager:
        description: One of npm|yarn|pnpm (used for caching + install command)
        required: false
        default: "yarn"
        type: string
      install_args:
        description: "Extra args for install (e.g., --frozen-lockfile). Applies to
          yarn/pnpm only; npm always uses `npm ci` (which already enforces a frozen
          lockfile) and ignores this."
        required: false
        default: "--frozen-lockfile"
        type: string
      run_lint:
        description: Run `lint` step (expects a matching script)
        required: false
        default: true
        type: boolean
      build_script:
        description: Package script to build Vite project (e.g., build)
        required: false
        default: "build"
        type: string
      compatibility_date:
        description: Cloudflare Workers compatibility_date (YYYY-MM-DD)
        required: false
        default: "2026-05-01"
        type: string
      route:
        description: Route / custom domain for the Worker (e.g., example.com)
        required: true
        type: string
      project_name:
        description: Base Worker project name (without env suffix)
        required: true
        type: string
      environment:
        description: Wrangler environment name (e.g., staging, production)
        required: true
        type: string
      assets_dir:
        description: "Vite build output directory (default: dist)"
        required: false
        default: "dist"
        type: string
      pre_build_commands:
        description: |-
          Optional multi-line shell commands to run before the Vite build.
          Example:
            echo "Generating assets" && ./scripts/gen-assets.sh
            yarn prisma generate
          Leave empty for no pre-build actions.
        required: false
        default: ""
        type: string
    secrets:
      cloudflare_api_token:
        description: Cloudflare API token with Workers + DNS permissions as 
          needed
        required: true
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true
      github-token:
        description: "Unused by this workflow -- kept only so a caller already
          passing it doesn't break with an undeclared-secret error. The critical-vuln
          gate uses dependabot-alerts-token instead (GITHUB_TOKEN cannot access the
          Dependabot Alerts API regardless of permissions granted)."
        required: false
      dependabot-alerts-token:
        description: "PAT/App token (NOT GITHUB_TOKEN) with 'Dependabot alerts: read'
          for the critical-vuln gate -- GITHUB_TOKEN cannot access this API
          regardless of granted permissions (confirmed by live testing)."
        required: false

  workflow_dispatch:
permissions:
  contents: write
  security-events: read
jobs:
  critical-vuln-gate:
    name: Dependabot Check
    if: ${{ github.ref_name == github.event.repository.default_branch }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      security-events: read
      contents: write
    steps:
      - name: Check for open critical Dependabot alerts
        uses: simplify9/.github/.github/actions/check-critical-vulns@main
        with:
          dependabot-alerts-token: ${{ secrets.dependabot-alerts-token }}
          repository: ${{ github.repository }}

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '🔒'
          title: Critical Dependabot Vulnerability Gate
          status: ${{ job.status }}

  deploy:
    needs: critical-vuln-gate
    if: ${{ !cancelled() && (needs.critical-vuln-gate.result == 'success' || 
      needs.critical-vuln-gate.result == 'skipped') }}
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Prevent overlapping deploys to the same project/environment from racing.
    # Do not cancel an in-flight deploy mid-rollout.
    concurrency:
      group: deploy-${{ inputs.project_name }}-${{ inputs.environment }}
      cancel-in-progress: false
    permissions:
      contents: write

      security-events: read
    steps:
      - name: Announce deploy job
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
          ROUTE: ${{ inputs.route }}
          ACTOR: ${{ github.actor }}
        run: |
          echo "::notice title=⚡ [CF-WORKERS] Cloudflare Workers Deploy — Job Started::Project: ${PROJECT_NAME}-${DEPLOY_ENV} | Route: ${ROUTE} | Triggered by: ${ACTOR}"
          {
            echo "CHECKPOINT_1_STATUS=⏳ Pending"
            echo "CHECKPOINT_2_STATUS=⏳ Pending"
            echo "CHECKPOINT_3_STATUS=⏳ Pending"
            echo "CHECKPOINT_4_STATUS=⏳ Pending"
          } >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v7
        with:
          # No git writes after checkout; don't leave the token in .git/config for
          # later install/build steps.
          persist-credentials: false

      # Enable Corepack BEFORE setup-node so its pnpm cache can resolve the
      # pnpm binary. (Only needed for pnpm.)
      - name: Enable Corepack (pnpm)
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      # Resolve package-manager-specific commands once and export them so the
      # install/lint/build steps stay DRY and never interpolate untrusted
      # inputs directly into a shell.
      - name: Resolve package manager commands
        env:
          PKG_MGR: ${{ inputs.package_manager }}
        run: |
          set -euo pipefail
          # Only record the resolved tool name — install_args is NEVER baked into a
          # command string here (that would let a caller inject shell metacharacters
          # or newlines into GITHUB_ENV). It is passed as a quoted array at install time.
          case "$PKG_MGR" in
            yarn)
              echo "PM_TOOL=yarn" >> "$GITHUB_ENV"
              echo "PM_RUN=yarn" >> "$GITHUB_ENV"
              ;;
            pnpm)
              echo "PM_TOOL=pnpm" >> "$GITHUB_ENV"
              echo "PM_RUN=pnpm" >> "$GITHUB_ENV"
              ;;
            npm)
              echo "PM_TOOL=npm" >> "$GITHUB_ENV"
              echo "PM_RUN=npm run" >> "$GITHUB_ENV"
              ;;
            *)
              echo "::error::Unsupported package_manager '$PKG_MGR' (expected npm|yarn|pnpm)"
              exit 1
              ;;
          esac

      - name: Install dependencies
        env:
          INSTALL_ARGS: ${{ inputs.install_args }}
        run: |
          set -euo pipefail
          echo "::group::⚡ [CHECKPOINT 1/4] Install dependencies"
          # Split install_args into a word array and pass each as a separate quoted
          # argument so it can never break out into the shell. npm ci enforces a
          # frozen lockfile, so extra args are intentionally not applied there.
          read -r -a EXTRA_ARGS <<< "$INSTALL_ARGS"
          case "$PM_TOOL" in
            yarn) echo "→ Install command: yarn install"; yarn install "${EXTRA_ARGS[@]}" ;;
            pnpm) echo "→ Install command: pnpm install"; pnpm install "${EXTRA_ARGS[@]}" ;;
            npm)  echo "→ Install command: npm ci"; npm ci ;;
          esac
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/4] Dependencies installed — PASSED"
          echo "::endgroup::"

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: |
          set -euo pipefail
          echo "::group::⚡ Lint"
          $PM_RUN lint
          echo "✅ Lint — PASSED"
          echo "::endgroup::"

      - name: Pre-Build Custom Commands
        if: ${{ inputs.pre_build_commands != '' }}
        env:
          PRE_BUILD_COMMANDS: ${{ inputs.pre_build_commands }}
        run: |
          set -euo pipefail
          echo "::group::⚡ Pre-build custom commands"
          SCRIPT="$(mktemp "${RUNNER_TEMP}/pre_build.XXXXXX.sh")"
          printf '%s\n' "$PRE_BUILD_COMMANDS" > "$SCRIPT"
          bash -euo pipefail "$SCRIPT"
          echo "::endgroup::"

      - name: Build Vite Project
        env:
          BUILD_SCRIPT: ${{ inputs.build_script }}
          ASSETS_DIR: ${{ inputs.assets_dir }}
        run: |
          set -euo pipefail
          echo "::group::⚡ [CHECKPOINT 2/4] Build Vite project"
          echo "→ Build script: $BUILD_SCRIPT | Assets dir: $ASSETS_DIR"
          $PM_RUN "$BUILD_SCRIPT"
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/4] Vite build completed — PASSED"
          echo "::endgroup::"

      # No custom worker.js: Cloudflare serves the SPA fallback natively via
      # not_found_handling = "single-page-application" (see the action call).
      - name: Generate wrangler.toml
        uses: simplify9/.github/.github/actions/generate-wrangler-config@main
        with:
          compatibility-date: ${{ inputs.compatibility_date }}
          route: ${{ inputs.route }}
          project-name: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          assets-dir: ${{ inputs.assets_dir }}
          not-found-handling: "single-page-application"
          # Pure static assets: no Worker entry, no ASSETS binding, no flags.
          compatibility-flags: ""

      - name: Validate generated wrangler.toml for Vite static SPA
        shell: bash
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
          COMPAT_DATE: ${{ inputs.compatibility_date }}
          ASSETS_DIR: ${{ inputs.assets_dir }}
        run: |
          set -euo pipefail

          test -f wrangler.toml
          grep -F "name = \"${PROJECT_NAME}\"" wrangler.toml
          grep -F "compatibility_date = \"${COMPAT_DATE}\"" wrangler.toml
          grep -F "[env.${DEPLOY_ENV}]" wrangler.toml
          grep -F "name = \"${PROJECT_NAME}-${DEPLOY_ENV}\"" wrangler.toml
          grep -F "pattern = \"" wrangler.toml
          grep -F "custom_domain = true" wrangler.toml
          grep -F "directory = \"./${ASSETS_DIR}\"" wrangler.toml
          grep -F 'not_found_handling = "single-page-application"' wrangler.toml
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/4] wrangler.toml validated — PASSED"

      # Wrangler is installed and managed by wrangler-action; no global install.
      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env ${{ inputs.environment }}
          apiToken: ${{ secrets.cloudflare_api_token }}
          accountId: ${{ secrets.cloudflare_account_id }}

      - name: Mark deploy checkpoint
        run: echo "CHECKPOINT_4_STATUS=✅ PASSED" >> "$GITHUB_ENV"

      - name: Report deploy failure
        if: failure()
        env:
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
          ROUTE: ${{ inputs.route }}
        run: |
          echo "::error title=⚡ [CF-WORKERS] Deploy Job Failed::Project '${PROJECT_NAME}-${DEPLOY_ENV}' failed | Route: ${ROUTE}"
          echo "  Checkpoint 1 — Dependencies:      ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Vite build:        ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — wrangler.toml:     ${CHECKPOINT_3_STATUS:-❌ Not reached}"
          echo "  Checkpoint 4 — Deploy:            ${CHECKPOINT_4_STATUS:-❌ Not reached}"

      - name: Write job summary
        if: always()
        uses: simplify9/.github/.github/actions/write-job-summary@main
        with:
          icon: '⚡'
          title: Cloudflare Workers Deploy — ${{ inputs.project_name }}
          status: ${{ job.status }}
          details: |
            | Field | Value |
            |-------|-------|
            | Project | `${{ inputs.project_name }}-${{ inputs.environment }}` |
            | Route | `${{ inputs.route }}` |
            | Environment | `${{ inputs.environment }}` |
            | Branch | `${{ github.ref_name }}` |
            | Runner | ${{ runner.os }} |
            | Triggered by | ${{ github.actor }} |
            | Run | [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

            ## 📋 Checkpoint Summary

            | # | Checkpoint | Status |
            |---|------------|--------|
            | 1 | Dependencies installed | ${{ env.CHECKPOINT_1_STATUS || '⏭️ Not reached' }} |
            | 2 | Vite build | ${{ env.CHECKPOINT_2_STATUS || '⏭️ Not reached' }} |
            | 3 | wrangler.toml validated | ${{ env.CHECKPOINT_3_STATUS || '⏭️ Not reached' }} |
            | 4 | Deploy | ${{ env.CHECKPOINT_4_STATUS || '⏭️ Not reached' }} |
