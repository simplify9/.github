name: Deploy Vite to Cloudflare Workers

on:
  workflow_call:
    inputs:
      node_version:
        description: Node.js version to use
        required: false
        default: "24"
        type: string
      package_manager:
        description: One of npm|yarn|pnpm (used for caching + install command)
        required: false
        default: "yarn"
        type: string
      install_args:
        description: Extra args for install (e.g., --frozen-lockfile)
        required: false
        default: "--frozen-lockfile"
        type: string
      run_lint:
        description: Run `lint` step (expects a matching script)
        required: false
        default: true
        type: boolean
      build_script:
        description: Package script to build Vite project (e.g., build)
        required: false
        default: "build"
        type: string
      compatibility_date:
        description: Cloudflare Workers compatibility_date (YYYY-MM-DD)
        required: false
        default: "2026-05-01"
        type: string
      route:
        description: Route / custom domain for the Worker (e.g., example.com)
        required: true
        type: string
      project_name:
        description: Base Worker project name (without env suffix)
        required: true
        type: string
      environment:
        description: Wrangler environment name (e.g., staging, production)
        required: true
        type: string
      assets_dir:
        description: "Vite build output directory (default: dist)"
        required: false
        default: "dist"
        type: string
      pre_build_commands:
        description: |-
          Optional multi-line shell commands to run before the Vite build.
          Example:
            echo "Generating assets" && ./scripts/gen-assets.sh
            yarn prisma generate
          Leave empty for no pre-build actions.
        required: false
        default: ""
        type: string
    secrets:
      cloudflare_api_token:
        description: Cloudflare API token with Workers + DNS permissions as needed
        required: true
      cloudflare_account_id:
        description: Cloudflare Account ID
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.environment }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=⚡ [CF-WORKERS] Cloudflare Workers Deploy — Job Started::Project: ${{ inputs.project_name }}-${{ inputs.environment }} | Route: ${{ inputs.route }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_3_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Enable Corepack (pnpm)
        if: ${{ inputs.package_manager == 'pnpm' }}
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ inputs.node_version }}
          cache: ${{ inputs.package_manager }}

      - name: Install dependencies
        run: |
          echo "::group::⚡ [CHECKPOINT 1/3] Install dependencies"
          echo "→ Package manager: ${{ inputs.package_manager }}"
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn install ${{ inputs.install_args }}
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            corepack enable
            pnpm install ${{ inputs.install_args }}
          else
            npm ci
          fi
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/3] Dependencies installed — PASSED"
          echo "::endgroup::"

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: |
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn lint
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm lint
          else
            npm run lint
          fi

      - name: Pre-Build Custom Commands
        if: ${{ inputs.pre_build_commands != '' }}
        env:
          PRE_BUILD_COMMANDS: ${{ inputs.pre_build_commands }}
        run: |
          echo "Running custom pre-build commands"
          printf '%s\n' "$PRE_BUILD_COMMANDS" > /tmp/pre_build.sh
          bash -e /tmp/pre_build.sh

      - name: Build Vite Project
        run: |
          echo "::group::⚡ [CHECKPOINT 2/3] Build Vite project"
          echo "→ Build script: ${{ inputs.build_script }} | Assets dir: ${{ inputs.assets_dir }}"
          if [ "${{ inputs.package_manager }}" = "yarn" ]; then
            yarn ${{ inputs.build_script }}
          elif [ "${{ inputs.package_manager }}" = "pnpm" ]; then
            pnpm ${{ inputs.build_script }}
          else
            npm run ${{ inputs.build_script }}
          fi
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/3] Vite build completed — PASSED"
          echo "::endgroup::"

      - name: Generate worker.js for static Vite app
        run: |
          cat > worker.js << 'EOF'
          export default {
            async fetch(request, env, ctx) {
              const url = new URL(request.url);

              // 1) Try to serve the static asset first
              let response = await env.ASSETS.fetch(request);

              // 2) If the asset wasn't found *and* this looks like a browser navigation,
              //    fall back to index.html so the client-side router can take over.
              if (
                response.status === 404 &&
                request.method === 'GET' &&
                (request.headers.get('accept') || '').includes('text/html')
              ) {
                const indexUrl = new URL('/', url);
                const indexRequest = new Request(indexUrl.toString(), request);
                response = await env.ASSETS.fetch(indexRequest);
              }

              return response;
            },
          };

          EOF

      - name: Generate wrangler.toml
        uses: simplify9/.github/.github/actions/generate-wrangler-config@main
        with:
          compatibility-date: ${{ inputs.compatibility_date }}
          route: ${{ inputs.route }}
          project-name: ${{ inputs.project_name }}
          environment: ${{ inputs.environment }}
          assets-dir: ${{ inputs.assets_dir }}
          main-entry: "worker.js"
          add-assets-binding: "true"

      - name: Validate generated wrangler.toml for Vite static worker
        shell: bash
        run: |
          set -euo pipefail

          test -f wrangler.toml
          grep -F "name = \"${{ inputs.project_name }}\"" wrangler.toml
          grep -F "main = \"worker.js\"" wrangler.toml
          grep -F "compatibility_date = \"${{ inputs.compatibility_date }}\"" wrangler.toml
          grep -F "[env.${{ inputs.environment }}]" wrangler.toml
          grep -F "name = \"${{ inputs.project_name }}-${{ inputs.environment }}\"" wrangler.toml
          grep -F "pattern = \"" wrangler.toml
          grep -F "custom_domain = true" wrangler.toml
          grep -F "directory = \"./${{ inputs.assets_dir }}\"" wrangler.toml
          grep -F "binding = \"ASSETS\"" wrangler.toml
          echo "CHECKPOINT_3_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 3/3] wrangler.toml validated — PASSED"

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=⚡ [CF-WORKERS] Deploy Job Failed::Project '${{ inputs.project_name }}-${{ inputs.environment }}' failed | Route: ${{ inputs.route }}"
          echo "  Checkpoint 1 — Dependencies:      ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Vite build:        ${CHECKPOINT_2_STATUS:-❌ Not reached}"
          echo "  Checkpoint 3 — wrangler.toml:     ${CHECKPOINT_3_STATUS:-❌ Not reached}"

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v4
        with:
          command: deploy --env ${{ inputs.environment }}
          apiToken: ${{ secrets.cloudflare_api_token }}
          accountId: ${{ secrets.cloudflare_account_id }}

      - name: Write job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          PROJECT_NAME: ${{ inputs.project_name }}
          DEPLOY_ENV: ${{ inputs.environment }}
          ROUTE: ${{ inputs.route }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## ⚡ Cloudflare Workers Deploy — ${PROJECT_NAME} — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Project | \`${PROJECT_NAME}-${DEPLOY_ENV}\` |"
            echo "| Route | \`${ROUTE}\` |"
            echo "| Environment | \`${DEPLOY_ENV}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
            echo "| Run | [${RUN_ID}](${SERVER_URL}/${REPOSITORY}/actions/runs/${RUN_ID}) |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Dependencies installed | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Vite build | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
            echo "| 3 | wrangler.toml validated | ${CHECKPOINT_3_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"
