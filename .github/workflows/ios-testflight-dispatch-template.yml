name: iOS TestFlight Dispatch Template

on:
  workflow_dispatch:
    inputs:
      disable_release:
        description: Build IPA only and skip TestFlight upload jobs
        required: false
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: ios-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  staging:
    name: iOS Staging Build and Release
    if: ${{ github.ref_name == 'staging' }}
    uses: ./.github/workflows/generic-ios-testflight.yml
    with:
      macos-runner: macos-latest
      node-version: "24"
      xcode-version: "26"

      use-simplify9-xcode-setup: false
      verify-cocoapods: true
      clean-reinstall-pods: true

      workspace: ios/App.xcworkspace
      scheme: App
      configuration: Release
      archive-path: output/App.xcarchive
      export-path: output/package

      # MARKETING_VERSION strategy:
      # - marketing-prefix is the manually controlled X.Y release line.
      # - patch comes from github.run_number with carry (..9 then minor+1).
      # - minor carry at 9 rolls into major (for example 4.9.9 -> 5.0.0).
      versioning-strategy: pbxproj-counter-rollover
      pbxproj-path: ios/App.xcodeproj/project.pbxproj
      marketing-prefix: "1.0"
      build-number-offset: "1"

      use-manual-inline-archive: true
      generate-export-options: true

      ipa-name-pattern: "app-{version}({build_number}).ipa"
      artifact-name: ipa

      upload-tool: altool
      appstore-key-format: base64
      release-environment: ios-staging
      disable-release: ${{ inputs.disable_release }}
    secrets:
      ios-p12-base64: ${{ secrets.IOS_P12_BASE64 }}
      ios-p12-password: ${{ secrets.IOS_P12_PASSWORD }}
      ios-mobileprovision-base64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      ios-team-id: ${{ secrets.IOS_TEAM_ID }}

      appstore-api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
      appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
      appstore-api-private-key-base64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}

  production:
    name: iOS Production Build and Release
    if: ${{ github.ref_name == 'main' }}
    uses: ./.github/workflows/generic-ios-testflight.yml
    with:
      macos-runner: macos-latest
      node-version: "24"
      xcode-version: "26"

      use-simplify9-xcode-setup: false
      verify-cocoapods: true
      clean-reinstall-pods: true

      workspace: ios/App.xcworkspace
      scheme: App
      configuration: Release
      archive-path: output/App.xcarchive
      export-path: output/package

      # MARKETING_VERSION strategy:
      # - marketing-prefix is the manually controlled X.Y release line.
      # - patch comes from github.run_number with carry (..9 then minor+1).
      # - minor carry at 9 rolls into major (for example 4.9.9 -> 5.0.0).
      versioning-strategy: pbxproj-counter-rollover
      pbxproj-path: ios/App.xcodeproj/project.pbxproj
      marketing-prefix: "1.0"
      build-number-offset: "1"

      use-manual-inline-archive: true
      generate-export-options: true

      ipa-name-pattern: "app-{version}({build_number}).ipa"
      artifact-name: ipa

      upload-tool: altool
      appstore-key-format: base64
      release-environment: ios-production
      disable-release: ${{ inputs.disable_release }}
    secrets:
      ios-p12-base64: ${{ secrets.IOS_P12_BASE64 }}
      ios-p12-password: ${{ secrets.IOS_P12_PASSWORD }}
      ios-mobileprovision-base64: ${{ secrets.IOS_MOBILEPROVISION_BASE64 }}
      ios-team-id: ${{ secrets.IOS_TEAM_ID }}

      appstore-api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
      appstore-issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
      appstore-api-private-key-base64: ${{ secrets.APPSTORE_API_PRIVATE_KEY_BASE64 }}
