name: API CI/CD Pipeline (Gateway-First Reusable)

on:
  workflow_call:
    inputs:
      major-version:
        description: Major version number
        required: false
        default: '1'
        type: string
      minor-version:
        description: Minor version number
        required: false
        default: '0'
        type: string
      package-nuget:
        description: Whether to build and publish NuGet packages
        required: false
        default: false
        type: boolean
      nuget-major-version:
        description: NuGet package major version number
        required: false
        default: '1'
        type: string
      nuget-minor-version:
        description: NuGet package minor version number
        required: false
        default: '0'
        type: string
      nuget-projects:
        description: NuGet projects to pack and push glob
        required: false
        default: '**/*.csproj'
        type: string
      dotnet-version:
        description: Dotnet SDK version for nuget packaging
        required: false
        default: 8.0.x
        type: string
      test-projects:
        description: Test projects glob
        required: false
        default: '**/*Tests/*.csproj'
        type: string
      run-tests:
        description: Whether to run tests before packing
        required: false
        default: 'false'
        type: string

      dockerfile-path:
        description: Path to Dockerfile
        required: false
        default: ./Dockerfile
        type: string
      docker-context:
        description: Docker build context
        required: false
        default: .
        type: string
      docker-platforms:
        description: Target platforms for Docker build
        required: false
        default: linux/amd64
        type: string
      container-registry:
        description: Container registry name
        required: false
        default: ghcr.io
        type: string

      namespace:
        description: Kubernetes namespace for deployment
        required: false
        default: development
        type: string
      environment:
        description: Environment value for Helm set
        required: false
        default: Development
        type: string
      app-name:
        description: Application name for app.name
        required: false
        type: string
      service-target-port:
        description: Service targetPort
        required: false
        default: '80'
        type: string
      service-port:
        description: Service port
        required: false
        default: '80'
        type: string
      image-pull-secret:
        description: Kubernetes imagePullSecret name
        required: false
        default: sf9cr
        type: string

      chart-name:
        description: Helm chart name in chart repository
        required: false
        default: s9genericchart-v2
        type: string
      chart-repo:
        description: Helm chart repository URL
        required: false
        default: https://charts.sf9.io
        type: string
      helm-timeout-minutes:
        description: Helm timeout minutes defaults to 10
        required: false
        default: ''
        type: string
      atomic:
        description: "If 'true', pass --rollback-on-failure to helm upgrade so a failed deploy rolls back automatically (implies --wait)."
        required: false
        default: 'true'
        type: string
      helm-set-values:
        description: Additional Helm set values line or comma separated
        required: false
        type: string

      routing-mode:
        description: Routing mode gateway ingress or dual
        required: false
        default: gateway
        type: string

      gateway-parent-name:
        description: Gateway parentRef name
        required: false
        default: public-gateway
        type: string
      gateway-parent-namespace:
        description: Gateway parentRef namespace
        required: false
        default: s9-dev-edge
        type: string
      gateway-section-name:
        description: |
          Optional Gateway sectionName override for the Helm chart parentRef.
          When set, the auto-onboarding step runs in SHARED LISTENER MODE:
          per-host listener and certificate provisioning is skipped entirely.
          The named listener is expected to already exist on the gateway
          (e.g. 'https-wildcard-sf9-io'). The step validates it exists and
          exits cleanly. Use this for all apps on *.sf9.io, *.talmaro.com, etc.
        required: false
        default: ''
        type: string
      gateway-section-names:
        description: |
          Per-hostname section name overrides — one entry per line, aligned by
          position with gateway-hostnames. An empty line means DEDICATED mode
          for that host (full cert + listener provisioning). A non-empty line
          means SHARED mode (the named listener must already exist; no cert or
          listener is created for that host).

          Example — two hostnames, first dedicated, second shared:
            gateway-hostnames: |
              api-stg.zeenah.io
              zeenah-api.sf9.io
            gateway-section-names: |
                                    # blank  → dedicated for api-stg.zeenah.io
              https-wildcard-sf9-io # shared → for zeenah-api.sf9.io

          When this input is set it takes precedence over gateway-section-name
          (the singular form) and generates one parentRef per hostname instead
          of a single shared parentRef. Leave unset to use the legacy behaviour.
        required: false
        default: ''
        type: string
      gateway-hostnames:
        description: Gateway hostnames comma or newline
        required: false
        default: ''
        type: string
      gateway-paths:
        description: Gateway paths comma or newline
        required: false
        default: ''
        type: string
      gateway-path-type:
        description: Gateway route path type
        required: false
        default: PathPrefix
        type: string
      gateway-backend-service-name:
        description: Optional gateway backend service override
        required: false
        default: ''
        type: string
      gateway-backend-port:
        description: Gateway backend service port
        required: false
        default: '80'
        type: string

      ingress-hosts:
        description: Ingress hosts comma or newline
        required: false
        default: ''
        type: string
      ingress-paths:
        description: Ingress paths comma or newline
        required: false
        default: ''
        type: string
      ingress-tls-secrets:
        description: TLS secrets matching ingress hosts
        required: false
        default: ''
        type: string
      ingress-class-name:
        description: Ingress class name
        required: false
        default: nginx
        type: string
      ingress-path-type:
        description: Ingress pathType
        required: false
        default: Prefix
        type: string
      ingress-tls-enabled:
        description: Ingress tlsEnabled
        required: false
        default: true
        type: boolean
      ingress-cluster-issuer:
        description: Optional ingress cert-manager issuer annotation
        required: false
        default: letsencrypt-nginx
        type: string
      ingress-proxy-body-size:
        description: Optional nginx proxy body size annotation
        required: false
        default: 50m
        type: string

      configmap-enabled:
        description: Enable configmap rendering
        required: false
        default: false
        type: boolean

      gateway-auto-onboarding:
        description: Automatically ensure Gateway listeners and certificates
        required: false
        default: true
        type: boolean
      gateway-class-name:
        description: GatewayClass used when creating missing Gateway
        required: false
        default: cilium
        type: string
      gateway-cert-issuer-name:
        description: cert-manager issuer name for gateway domains
        required: false
        default: letsencrypt-production-gateway
        type: string
      gateway-cert-issuer-kind:
        description: cert-manager issuer kind
        required: false
        default: ClusterIssuer
        type: string
      gateway-cert-wait:
        description: Wait for cert readiness during onboarding
        required: false
        default: true
        type: boolean
      gateway-cert-wait-timeout-seconds:
        description: Certificate wait timeout seconds
        required: false
        default: '600'
        type: string

      init-job-image:
        description: Optional migration init Job image
        required: false
        default: ''
        type: string
      init-job-secret-name:
        description: Secret containing migration connection string key
        required: false
        default: ''
        type: string
      init-job-command:
        description: |-
          Command (space-separated) the migration Job runs. Leave empty to keep the
          historical default ('dotnet SW.Shanap.Web.dll --migrate').
        required: false
        default: ''
        type: string
      init-job-secret-key:
        description: Key in init-job-secret-name holding the connection string (default 'connection-string').
        required: false
        default: ''
        type: string
      init-job-connstring-env:
        description: Env var name the connection string is injected into (default 'ConnectionStrings__ShanapDb').
        required: false
        default: ''
        type: string
      init-job-environment-env:
        description: Env var name carrying the environment name in the migration Job (default 'ASPNETCORE_ENVIRONMENT').
        required: false
        default: ''
        type: string
      init-job-image-pull-secret:
        description: |-
          Name of the Kubernetes imagePullSecret attached to the migration Job pod.
          Defaults to 'sf9cr' (the org-wide registry secret). Override when the migration
          image lives in a different registry — e.g. 'mealiverycr' for
          registry.digitalocean.com/mealiverycr/... images.
          Set to an empty string to attach no pull secret (public images).
        required: false
        default: 'sf9cr'
        type: string

    secrets:
      registry-username:
        description: Container registry username
        required: false
      registry-password:
        description: Container registry password token
        required: false
      kubeconfig:
        description: Base64 kubeconfig or raw kubeconfig content
        required: false
      github-token:
        description: GitHub token for tagging
        required: false
      NUGET_PACKAGE_PAT:
        description: GitHub Packages token for docker builds
        required: false
      nuget-api-key:
        description: NuGet API key
        required: false
      nuget-source:
        description: NuGet source URL
        required: false
      helm-set-secret-values:
        description: Sensitive Helm set values
        required: false

    outputs:
      version:
        description: Generated semantic version
        value: ${{ jobs.version.outputs.version }}
      docker-image:
        description: Built Docker image with tag
        value: ${{ jobs.build.outputs.docker-image }}
      helm-chart:
        description: Chart reference used for deployment
        value: ${{ jobs.deploy.outputs.helm-chart }}
      nuget-version:
        description: Generated NuGet package version
        value: ${{ jobs.nuget.outputs.version }}

# Serialize runs per ref so concurrent pushes cannot race the semver tag computation.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  CONTAINER_REGISTRY: ${{ inputs.container-registry }}
  IMAGE_NAME: ${{ inputs.app-name || github.repository }}

jobs:
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      version: ${{ steps.semver.outputs.version }}
      git-tag: ${{ steps.semver.outputs.git-tag }}
      is-release: ${{ steps.semver.outputs.is-release }}
    steps:
      - name: Announce version job
        run: |
          echo "::notice title=🏷️ [VERSION] Semver — Job Started::Major: ${{ inputs.major-version }} | Minor: ${{ inputs.minor-version }} | SHA: ${{ github.sha }} | Triggered by: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # Full history + all tags so determine-semver reads them locally
          # (no network fetch needed); persisted git token not required after.
          fetch-depth: 0
          persist-credentials: false

      - name: Determine semantic version
        id: semver
        uses: simplify9/.github/.github/actions/determine-semver@main
        with:
          major: ${{ inputs.major-version }}
          minor: ${{ inputs.minor-version }}
          # Only the default branch produces a clean, git-taggable release version;
          # other branches get an ephemeral prerelease (e.g. 2.0.68-staging.45) so they
          # never collide on the shared git-tag namespace.
          release-branch: ${{ github.event.repository.default_branch }}
          current-ref: ${{ github.ref_name }}
          build-id: ${{ github.run_number }}

      - name: Write version job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          SEMVER_VERSION: ${{ steps.semver.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🏷️ Version Job — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Computed version | \`${SEMVER_VERSION}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
          } >> "$GITHUB_STEP_SUMMARY"

  nuget:
    runs-on: ubuntu-latest
    if: ${{ inputs.package-nuget }}
    timeout-minutes: 30
    outputs:
      version: ${{ steps.nuget-semver.outputs.version }}
      git-tag: ${{ steps.nuget-semver.outputs.git-tag }}
    env:
      GITHUB_TOKEN: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
      NUGET_AUTH_TOKEN: ${{ secrets.nuget-api-key }}
      NUGET_SOURCE: ${{ secrets.nuget-source }}
    steps:
      - name: Announce nuget job
        run: |
          echo "::notice title=🔷 [DOTNET] NuGet Publish — Job Started::Enabled: ${{ inputs.package-nuget }} | Triggered by: ${{ github.actor }}"

      - name: Checkout code
        if: ${{ inputs.package-nuget }}
        uses: actions/checkout@v6
        with:
          # Full history + all tags so determine-semver reads them locally
          # (no network fetch needed); persisted git token not required after.
          fetch-depth: 0
          persist-credentials: false

      - name: Configure GitHub Packages feed
        if: ${{ inputs.package-nuget && env.NUGET_SOURCE != '' && contains(env.NUGET_SOURCE, 'pkg.github.com') }}
        env:
          FEED_URL: ${{ env.NUGET_SOURCE }}
          FEED_USERNAME: ${{ github.actor }}
          FEED_PASSWORD: ${{ secrets.nuget-api-key }}
        run: |
          dotnet nuget remove source github || true
          dotnet nuget add source "$FEED_URL" \
            --name github \
            --username "$FEED_USERNAME" \
            --password "$FEED_PASSWORD" \
            --store-password-in-clear-text

      - name: Determine NuGet semantic version
        if: ${{ inputs.package-nuget }}
        id: nuget-semver
        uses: simplify9/.github/.github/actions/determine-semver@main
        with:
          major: ${{ inputs.nuget-major-version }}
          minor: ${{ inputs.nuget-minor-version }}
          # Same branch scoping as the image version: only the default branch yields a
          # clean, taggable/pushable NuGet version; other branches get an ephemeral
          # prerelease so they never collide on git tags or the NuGet feed.
          release-branch: ${{ github.event.repository.default_branch }}
          current-ref: ${{ github.ref_name }}
          build-id: ${{ github.run_number }}

      - name: Dotnet Restore Build and Test
        if: ${{ inputs.package-nuget }}
        uses: simplify9/.github/.github/actions/dotnet-build@main
        with:
          projects: '**/*.csproj'
          test-projects: ${{ inputs.test-projects }}
          configuration: Release
          dotnet-version: ${{ inputs.dotnet-version }}
          run-tests: ${{ inputs.run-tests }}

      - name: Pack and Push NuGet Package
        if: ${{ inputs.package-nuget }}
        uses: simplify9/.github/.github/actions/dotnet-pack-push@main
        with:
          projects: ${{ inputs.nuget-projects }}
          configuration: Release
          version: ${{ steps.nuget-semver.outputs.version }}
          api-key: ${{ secrets.nuget-api-key }}
          nuget-source: ${{ secrets.nuget-source || 'https://api.nuget.org/v3/index.json' }}

      - name: Write nuget job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          NUGET_ENABLED: ${{ inputs.package-nuget }}
          NUGET_VERSION: ${{ steps.nuget-semver.outputs.version }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🔷 NuGet Job — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Enabled | ${NUGET_ENABLED} |"
            echo "| Version | \`${NUGET_VERSION}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version, nuget]
    if: >-
      ${{ !cancelled()
          && needs.version.result == 'success'
          && (needs.nuget.result == 'success' || needs.nuget.result == 'skipped') }}
    outputs:
      docker-image: ${{ steps.docker.outputs.image-tags }}
    steps:
      - name: Announce build job
        run: |
          echo "::notice title=🐳 [DOCKER] Docker Build — Job Started::Version: ${{ needs.version.outputs.version }} | Registry: ${{ inputs.container-registry }} | Triggered by: ${{ github.actor }}"

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and push Docker image
        id: docker
        uses: simplify9/.github/.github/actions/docker-build-push@main
        with:
          registry: ${{ env.CONTAINER_REGISTRY }}
          image-name: ${{ env.IMAGE_NAME }}
          version: ${{ needs.version.outputs.version }}
          username: ${{ secrets.registry-username || github.actor }}
          password: ${{ secrets.registry-password || secrets.GITHUB_TOKEN }}
          dockerfile: ${{ inputs.dockerfile-path }}
          context: ${{ inputs.docker-context }}
          platforms: ${{ inputs.docker-platforms }}
          build-args: ${{ (secrets.NUGET_PACKAGE_PAT != '') && format('NUGET_PACKAGE_PAT={0}', secrets.NUGET_PACKAGE_PAT) || '' }}
          # Org requirement: EVERY pushed image carries the 'latest' tag, on any branch.
          tag-latest: 'true'

      - name: Confirm Docker image built
        run: |
          echo "✅ Docker image built and pushed — ${{ needs.version.outputs.version }}"

      - name: Write build job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          VERSION: ${{ needs.version.outputs.version }}
          REGISTRY_INPUT: ${{ inputs.container-registry }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## 🐳 Build Job — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Version | \`${VERSION}\` |"
            echo "| Registry | \`${REGISTRY_INPUT}\` |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [version, build]
    # Explicit guard required: without an `if`, the implicit success() evaluates the
    # whole dependency chain (deploy -> build -> nuget). A disabled nuget job
    # (package-nuget=false, result: skipped) poisons that chain and silently skips
    # deploy. Mirror the build/tag guards so a skipped nuget never blocks deploy.
    if: >-
      ${{ !cancelled()
          && needs.version.result == 'success'
          && needs.build.result == 'success' }}
    outputs:
      helm-chart: ${{ steps.chartmeta.outputs.helm-chart }}
    steps:
      - name: Announce deploy job
        run: |
          echo "::notice title=☸️ [HELM] Gateway Deploy — Job Started::App: ${{ inputs.app-name }} | Version: ${{ needs.version.outputs.version }} | Namespace: ${{ inputs.namespace }} | Routing: ${{ inputs.routing-mode }} | Triggered by: ${{ github.actor }}"
          echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
          echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

      - name: Generate routing and config values
        id: routing
        shell: bash
        env:
          ROUTING_MODE: ${{ inputs.routing-mode }}
          CONFIGMAP_ENABLED: ${{ inputs.configmap-enabled }}
          GATEWAY_PARENT_NAME: ${{ inputs.gateway-parent-name }}
          GATEWAY_PARENT_NAMESPACE: ${{ inputs.gateway-parent-namespace }}
          GATEWAY_SECTION_NAME: ${{ inputs.gateway-section-name }}
          GATEWAY_SECTION_NAMES_RAW: ${{ inputs.gateway-section-names }}
          GATEWAY_HOSTNAMES_RAW: ${{ inputs.gateway-hostnames }}
          GATEWAY_PATHS_RAW: ${{ inputs.gateway-paths }}
          GATEWAY_PATH_TYPE: ${{ inputs.gateway-path-type }}
          GATEWAY_BACKEND_SERVICE_NAME: ${{ inputs.gateway-backend-service-name }}
          GATEWAY_BACKEND_PORT: ${{ inputs.gateway-backend-port }}
          INGRESS_HOSTS: ${{ inputs.ingress-hosts }}
          INGRESS_PATHS: ${{ inputs.ingress-paths }}
          INGRESS_TLS_SECRETS: ${{ inputs.ingress-tls-secrets }}
          INGRESS_CLASS_NAME: ${{ inputs.ingress-class-name }}
          INGRESS_PATH_TYPE: ${{ inputs.ingress-path-type }}
          INGRESS_TLS_ENABLED: ${{ inputs.ingress-tls-enabled }}
          INGRESS_CLUSTER_ISSUER: ${{ inputs.ingress-cluster-issuer }}
          INGRESS_PROXY_BODY_SIZE: ${{ inputs.ingress-proxy-body-size }}
        run: |
          set -euo pipefail

          mode=$(echo "$ROUTING_MODE" | tr '[:upper:]' '[:lower:]')
          gateway_enabled=false
          ingress_enabled=false

          case "$mode" in
            gateway)
              gateway_enabled=true
              ;;
            ingress)
              ingress_enabled=true
              ;;
            dual)
              gateway_enabled=true
              ingress_enabled=true
              ;;
            *)
              echo "Unknown routing-mode '$ROUTING_MODE'. Falling back to gateway."
              gateway_enabled=true
              ;;
          esac

          gateway_hosts_input="$GATEWAY_HOSTNAMES_RAW"
          gateway_paths_input="$GATEWAY_PATHS_RAW"

          # Backward compatibility: when gateway host/path are omitted, fall back to ingress-style inputs.
          if [ -z "$(echo "$gateway_hosts_input" | tr -d '[:space:],\r\n')" ] && [ -n "$(echo "$INGRESS_HOSTS" | tr -d '[:space:],\r\n')" ]; then
            gateway_hosts_input="$INGRESS_HOSTS"
          fi
          if [ -z "$(echo "$gateway_paths_input" | tr -d '[:space:],\r\n')" ] && [ -n "$(echo "$INGRESS_PATHS" | tr -d '[:space:],\r\n')" ]; then
            gateway_paths_input="$INGRESS_PATHS"
          fi
          if [ -z "$(echo "$gateway_paths_input" | tr -d '[:space:],\r\n')" ]; then
            gateway_paths_input='/'
          fi

          host_list=""
          host_count=0
          while IFS= read -r host; do
            host=$(echo "$host" | xargs)
            [ -z "$host" ] && continue
            host_list+="$host"$'\n'
            host_count=$((host_count + 1))
          done < <(echo "$gateway_hosts_input" | sed 's/\r//g' | tr ',' '\n')

          output=""
          output+="gateway.enabled=${gateway_enabled}\\n"
          output+="ingress.enabled=${ingress_enabled}\\n"
          output+="config.enabled=${CONFIGMAP_ENABLED}\\n"

          # Per-hostname section names list — populated only when gateway-section-names
          # (plural) is used; remains empty in legacy mode. Passed to the onboarding
          # step so it knows which hosts need dedicated provisioning vs shared listeners.
          section_names_list=""

          if [ "$gateway_enabled" = "true" ]; then
            if [ -n "$(echo "${GATEWAY_SECTION_NAMES_RAW:-}" | tr -d '[:space:]\r\n')" ]; then
              # Per-hostname mode: one parentRef per host, section name resolved from
              # gateway-section-names by position (empty entry = auto-slug for dedicated).
              mapfile -t _raw_sections < <(echo "${GATEWAY_SECTION_NAMES_RAW}" | sed 's/\r//g')
              _pref_idx=0
              _sn_pos=0
              while IFS= read -r _h; do
                _h=$(echo "$_h" | xargs)
                [ -z "$_h" ] && continue
                _sn=""
                if [ "$_sn_pos" -lt "${#_raw_sections[@]}" ]; then
                  # Strip shell-style comments so callers can annotate lines
                  # (e.g. "  # blank → dedicated" or "https-wildcard-sf9-io # shared").
                  _sn=$(echo "${_raw_sections[$_sn_pos]}" | xargs | sed 's/#.*//' | xargs)
                fi
                _sn_pos=$((_sn_pos + 1))
                output+="gateway.parentRefs[$_pref_idx].name=${GATEWAY_PARENT_NAME}\\n"
                output+="gateway.parentRefs[$_pref_idx].namespace=${GATEWAY_PARENT_NAMESPACE}\\n"
                if [ -n "$_sn" ]; then
                  # Shared mode: use the explicit section name directly.
                  output+="gateway.parentRefs[$_pref_idx].sectionName=${_sn}\\n"
                  section_names_list+="${_sn}"$'\n'
                else
                  # Dedicated mode: auto-slug the hostname into a section name so
                  # the HTTPRoute is pinned to this host's own HTTPS listener.
                  _slug=$(echo "$_h" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
                  _auto_sn=$(echo "https-${_slug}" | cut -c1-63 | sed 's/-$//')
                  output+="gateway.parentRefs[$_pref_idx].sectionName=${_auto_sn}\\n"
                  section_names_list+=''$'\n'
                fi
                _pref_idx=$((_pref_idx + 1))
              done < <(echo "$gateway_hosts_input" | sed 's/\r//g' | tr ',' '\n')
            else
              # Legacy single-parentRef mode — fully backwards compatible.
              output+="gateway.parentRefs[0].name=${GATEWAY_PARENT_NAME}\\n"
              output+="gateway.parentRefs[0].namespace=${GATEWAY_PARENT_NAMESPACE}\\n"
              effective_section="${GATEWAY_SECTION_NAME}"
              if [ -z "$effective_section" ] && [ "$host_count" -eq 1 ]; then
                first_host=$(echo "$host_list" | head -n1)
                slug=$(echo "$first_host" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//')
                effective_section=$(echo "https-${slug}" | cut -c1-63 | sed 's/-$//')
              fi
              if [ -n "$effective_section" ]; then
                output+="gateway.parentRefs[0].sectionName=${effective_section}\\n"
              fi
            fi

            hidx=0
            while IFS= read -r host; do
              host=$(echo "$host" | xargs)
              [ -z "$host" ] && continue
              output+="gateway.hostnames[$hidx]=$host\\n"
              hidx=$((hidx + 1))
            done < <(printf "%s" "$host_list")

            pidx=0
            while IFS= read -r path; do
              path=$(echo "$path" | xargs)
              [ -z "$path" ] && continue
              output+="gateway.routes[$pidx].path=$path\\n"
              output+="gateway.routes[$pidx].pathType=${GATEWAY_PATH_TYPE}\\n"
              if [ -n "$GATEWAY_BACKEND_SERVICE_NAME" ]; then
                output+="gateway.routes[$pidx].backendRef.name=${GATEWAY_BACKEND_SERVICE_NAME}\\n"
              fi
              if [ -n "$GATEWAY_BACKEND_PORT" ]; then
                output+="gateway.routes[$pidx].backendRef.port=${GATEWAY_BACKEND_PORT}\\n"
              fi
              pidx=$((pidx + 1))
            done < <(echo "$gateway_paths_input" | sed 's/\r//g' | tr ',' '\n')
          fi

          if [ "$ingress_enabled" = "true" ]; then
            output+="ingress.ingressClassName=${INGRESS_CLASS_NAME}\\n"
            output+="ingress.pathType=${INGRESS_PATH_TYPE}\\n"
            output+="ingress.tlsEnabled=${INGRESS_TLS_ENABLED}\\n"

            if [ -n "$INGRESS_CLUSTER_ISSUER" ]; then
              output+="ingress.annotations.cert-manager\\.io/cluster-issuer=${INGRESS_CLUSTER_ISSUER}\\n"
            fi
            if [ -n "$INGRESS_PROXY_BODY_SIZE" ]; then
              output+="ingress.annotations.nginx\\.ingress\\.kubernetes\\.io/proxy-body-size=${INGRESS_PROXY_BODY_SIZE}\\n"
            fi

            tls_input=$(echo "$INGRESS_TLS_SECRETS" | sed 's/\r//g' | tr ',' '\n')
            mapfile -t tls_list < <(echo "$tls_input" | grep -v '^[[:space:]]*$' || true)

            iidx=0
            while IFS= read -r host; do
              host=$(echo "$host" | xargs)
              [ -z "$host" ] && continue
              output+="ingress.hosts[$iidx].host=$host\\n"

              tls_secret=""
              if [ ${#tls_list[@]} -gt $iidx ]; then
                tls_secret=$(echo "${tls_list[$iidx]}" | xargs)
              fi
              if [ -n "$tls_secret" ]; then
                output+="ingress.hosts[$iidx].tlsSecret=$tls_secret\\n"
              fi
              iidx=$((iidx + 1))
            done < <(echo "$INGRESS_HOSTS" | sed 's/\r//g' | tr ',' '\n')

            pidx=0
            while IFS= read -r path; do
              path=$(echo "$path" | xargs)
              [ -z "$path" ] && continue
              output+="ingress.paths[$pidx]=$path\\n"
              pidx=$((pidx + 1))
            done < <(echo "$INGRESS_PATHS" | sed 's/\r//g' | tr ',' '\n')
          fi

          {
            echo "routing-values<<EOF"
            echo -e "$output"
            echo "EOF"
            echo "gateway-host-list<<EOF"
            printf "%s" "$host_list"
            echo
            echo "EOF"
            echo "gateway-section-names-list<<EOF"
            printf "%s" "$section_names_list"
            echo
            echo "EOF"
          } >> "$GITHUB_OUTPUT"
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 1/2] Routing values generated — mode: ${mode}"
      - name: Auto-onboard gateway hostnames
        if: ${{ (inputs.routing-mode == 'gateway' || inputs.routing-mode == 'dual') && inputs.gateway-auto-onboarding }}
        shell: bash
        env:
          KUBECONFIG_DATA: ${{ secrets.kubeconfig }}
          DEPLOY_NAMESPACE: ${{ inputs.namespace }}
          GATEWAY_NAME: ${{ inputs.gateway-parent-name }}
          GATEWAY_NAMESPACE: ${{ inputs.gateway-parent-namespace }}
          GATEWAY_CLASS_NAME: ${{ inputs.gateway-class-name }}
          GATEWAY_CERT_ISSUER_NAME: ${{ inputs.gateway-cert-issuer-name }}
          GATEWAY_CERT_ISSUER_KIND: ${{ inputs.gateway-cert-issuer-kind }}
          GATEWAY_CERT_WAIT: ${{ inputs.gateway-cert-wait }}
          GATEWAY_CERT_WAIT_TIMEOUT: ${{ inputs.gateway-cert-wait-timeout-seconds }}
          HOST_LIST: ${{ steps.routing.outputs.gateway-host-list }}
          GATEWAY_SECTION_NAME: ${{ inputs.gateway-section-name }}
          SECTION_NAMES_LIST: ${{ steps.routing.outputs.gateway-section-names-list }}
        run: |
          set -euo pipefail

          if [ -z "${KUBECONFIG_DATA}" ]; then
            echo "kubeconfig secret is required for gateway auto-onboarding"
            exit 1
          fi

          KCFG_PATH="$RUNNER_TEMP/kubeconfig"
          # Remove the decoded kubeconfig when this step exits so the credential does not linger
          # (matters on self-hosted/reused runners).
          trap 'rm -f "$KCFG_PATH"' EXIT
          if echo "$KUBECONFIG_DATA" | grep -q 'apiVersion:'; then
            printf "%s" "$KUBECONFIG_DATA" > "$KCFG_PATH"
          else
            if printf "%s" "$KUBECONFIG_DATA" | base64 -d > "$KCFG_PATH" 2>/dev/null; then
              true
            else
              printf "%s" "$KUBECONFIG_DATA" > "$KCFG_PATH"
            fi
          fi
          export KUBECONFIG="$KCFG_PATH"

          if [ -z "$(echo "$HOST_LIST" | tr -d '[:space:]\r\n')" ]; then
            echo "No gateway hosts were provided. Skipping gateway auto-onboarding."
            exit 0
          fi

          # ---------------------------------------------------------------------------
          # Shared listener mode: when gateway-section-name is explicitly provided,
          # the app is attaching to a pre-existing shared/wildcard listener.
          # Skip all per-host listener and cert provisioning — just validate that
          # the named listener exists on the gateway, then exit cleanly.
          # ---------------------------------------------------------------------------
          if [ -n "${GATEWAY_SECTION_NAME:-}" ]; then
            echo "Shared listener mode: gateway-section-name='${GATEWAY_SECTION_NAME}' is set."
            echo "Skipping per-host listener and cert provisioning."

            KCFG_PATH="$RUNNER_TEMP/kubeconfig"
            if echo "$KUBECONFIG_DATA" | grep -q 'apiVersion:'; then
              printf "%s" "$KUBECONFIG_DATA" > "$KCFG_PATH"
            else
              if printf "%s" "$KUBECONFIG_DATA" | base64 -d > "$KCFG_PATH" 2>/dev/null; then
                true
              else
                printf "%s" "$KUBECONFIG_DATA" > "$KCFG_PATH"
              fi
            fi
            export KUBECONFIG="$KCFG_PATH"

            existing=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" \
              -o jsonpath='{range .spec.listeners[*]}{.name}{"\n"}{end}' 2>/dev/null || true)
            if ! echo "$existing" | grep -Fxq "${GATEWAY_SECTION_NAME}"; then
              echo "❌ Shared listener '${GATEWAY_SECTION_NAME}' does not exist on gateway '${GATEWAY_NAME}' in '${GATEWAY_NAMESPACE}'."
              echo "   Available listeners:"
              echo "$existing" | sed 's/^/     /'
              exit 1
            fi
            echo "✅ Shared listener '${GATEWAY_SECTION_NAME}' confirmed present on gateway. Onboarding complete."
            exit 0
          fi

          kubectl create namespace "$GATEWAY_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace "$DEPLOY_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

          to_slug() {
            echo "$1" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g; s/-\+/-/g; s/^-//; s/-$//'
          }

          trim63() {
            echo "$1" | cut -c1-63 | sed 's/-$//'
          }

          ensure_gateway_exists() {
            local host="$1"
            local slug http_listener https_listener secret_name
            slug=$(to_slug "$host")
            http_listener=$(trim63 "http-${slug}")
            https_listener=$(trim63 "https-${slug}")
            secret_name="$slug"

            if kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" >/dev/null 2>&1; then
              return 0
            fi

            kubectl apply -f <(printf '%s\n' \
              "apiVersion: gateway.networking.k8s.io/v1" \
              "kind: Gateway" \
              "metadata:" \
              "  name: ${GATEWAY_NAME}" \
              "  namespace: ${GATEWAY_NAMESPACE}" \
              "spec:" \
              "  gatewayClassName: ${GATEWAY_CLASS_NAME}" \
              "  listeners:" \
              "    - name: ${http_listener}" \
              "      protocol: HTTP" \
              "      port: 80" \
              "      hostname: ${host}" \
              "      allowedRoutes:" \
              "        namespaces:" \
              "          from: All" \
              "    - name: ${https_listener}" \
              "      protocol: HTTPS" \
              "      port: 443" \
              "      hostname: ${host}" \
              "      tls:" \
              "        mode: Terminate" \
              "        certificateRefs:" \
              "          - kind: Secret" \
              "            name: ${secret_name}" \
              "      allowedRoutes:" \
              "        namespaces:" \
              "          from: All")
          }

          # ---------------------------------------------------------------------------
          # Pre-flight: check gateway listener capacity before touching anything.
          # The Gateway API hard limit is 64 listeners. Each new hostname needs 2
          # (HTTP + HTTPS). If adding the next host would exceed 64 we abort with a
          # clear, actionable message — no partial state is ever written.
          # ---------------------------------------------------------------------------
          preflight_capacity_check() {
            local current_count needed="$1"
            current_count=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" \
              -o jsonpath='{.spec.listeners}' 2>/dev/null \
              | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))' 2>/dev/null || echo 0)
            if (( current_count + needed > 64 )); then
              echo "❌ GATEWAY CAPACITY ERROR: '${GATEWAY_NAME}' in '${GATEWAY_NAMESPACE}' currently has ${current_count}/64 listeners."
              echo "   Adding ${needed} listener(s) for this host would reach $((current_count + needed)) — exceeding the hard Gateway API limit of 64."
              echo "   ACTION REQUIRED: Prune stale listeners from the gateway before redeploying."
              echo "   Run: kubectl get gateway ${GATEWAY_NAME} -n ${GATEWAY_NAMESPACE} -o jsonpath='{range .status.listeners[*]}{.name}: attachedRoutes={.attachedRoutes}{\"\\n\"}{end}'"
              echo "   Remove any listener with attachedRoutes=0 that has no active HTTPRoute."
              exit 1
            fi
            echo "Capacity check passed: ${current_count}/64 listeners in use, ${needed} needed."
          }

          # ---------------------------------------------------------------------------
          # add_listener_if_missing: adds a single listener to the gateway.
          # Returns exit code 0 on success or skip, non-zero on patch failure.
          # Sets the caller-scoped variable _listener_was_added=true when a NEW
          # listener is actually patched in (not when skipped). Used for rollback.
          # ---------------------------------------------------------------------------
          _listener_was_added=false

          add_listener_if_missing() {
            local listener_name="$1"
            local listener_protocol="$2"
            local listener_host="$3"
            local listener_secret="$4"
            local listener_port existing conflict

            if [ "$listener_protocol" = "HTTP" ]; then
              listener_port=80
            else
              listener_port=443
            fi

            # Guard 1: listener with this exact name already registered
            existing=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" \
              -o jsonpath='{range .spec.listeners[*]}{.name}{"\n"}{end}')
            if echo "$existing" | grep -Fxq "$listener_name"; then
              echo "Listener '${listener_name}' already exists by name; skipping."
              _listener_was_added=false
              return 0
            fi

            # Guard 2: any listener with the same hostname+port+protocol triplet
            # (the Gateway API uniqueness constraint — different name, same triplet still fails)
            conflict=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" -o json \
              | jq -r --arg host "$listener_host" --arg proto "$listener_protocol" \
                       --argjson port "$listener_port" \
                '.spec.listeners[]
                 | select(.hostname == $host and .protocol == $proto and .port == $port)
                 | .name' 2>/dev/null || true)
            if [ -n "$conflict" ]; then
              echo "A ${listener_protocol} listener for '${listener_host}:${listener_port}' already exists (name: '${conflict}'); skipping."
              _listener_was_added=false
              return 0
            fi

            if [ "$listener_protocol" = "HTTP" ]; then
              kubectl -n "$GATEWAY_NAMESPACE" patch gateway "$GATEWAY_NAME" --type='json' -p="[
                {\"op\":\"add\",\"path\":\"/spec/listeners/-\",\"value\":{
                  \"name\":\"${listener_name}\",
                  \"protocol\":\"HTTP\",
                  \"port\":80,
                  \"hostname\":\"${listener_host}\",
                  \"allowedRoutes\":{\"namespaces\":{\"from\":\"All\"}}
                }}
              ]"
            else
              kubectl -n "$GATEWAY_NAMESPACE" patch gateway "$GATEWAY_NAME" --type='json' -p="[
                {\"op\":\"add\",\"path\":\"/spec/listeners/-\",\"value\":{
                  \"name\":\"${listener_name}\",
                  \"protocol\":\"HTTPS\",
                  \"port\":443,
                  \"hostname\":\"${listener_host}\",
                  \"tls\":{\"mode\":\"Terminate\",\"certificateRefs\":[{\"kind\":\"Secret\",\"name\":\"${listener_secret}\"}]},
                  \"allowedRoutes\":{\"namespaces\":{\"from\":\"All\"}}
                }}
              ]"
            fi
            _listener_was_added=true
          }

          # ---------------------------------------------------------------------------
          # remove_listener_by_name: removes a listener from the gateway by name.
          # Used for atomic rollback: if HTTP was added but HTTPS fails, the HTTP
          # listener is removed so no half-baked state is left behind.
          # ---------------------------------------------------------------------------
          remove_listener_by_name() {
            local target_name="$1" idx
            idx=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" \
              -o jsonpath='{range .spec.listeners[*]}{.name}{"\n"}{end}' \
              | grep -n "^${target_name}$" | cut -d: -f1)
            if [ -z "$idx" ]; then
              echo "Rollback: listener '${target_name}' not found — nothing to remove."
              return 0
            fi
            local zero_idx=$(( idx - 1 ))
            kubectl -n "$GATEWAY_NAMESPACE" patch gateway "$GATEWAY_NAME" --type='json' \
              -p="[{\"op\":\"remove\",\"path\":\"/spec/listeners/${zero_idx}\"}]"
            echo "Rollback: removed listener '${target_name}' (index ${zero_idx})."
          }

          # Parse per-hostname section names aligned with HOST_LIST.
          # Empty array (legacy mode) means every host runs in dedicated mode.
          mapfile -t _per_host_sections < <(printf "%s" "${SECTION_NAMES_LIST:-}")
          _host_idx=0

          while IFS= read -r host; do
            host=$(echo "$host" | xargs)
            [ -z "$host" ] && continue

            # Resolve the section name for this specific host position.
            _per_host_sn=""
            if [ "${#_per_host_sections[@]}" -gt 0 ] && [ "$_host_idx" -lt "${#_per_host_sections[@]}" ]; then
              _per_host_sn=$(echo "${_per_host_sections[$_host_idx]}" | xargs)
            fi
            _host_idx=$((_host_idx + 1))

            if [ -n "$_per_host_sn" ]; then
              # Shared listener mode for this specific host: validate the named
              # listener exists on the gateway; no cert or listener is created.
              echo "Shared listener mode for '${host}': section-name='${_per_host_sn}'."
              _existing_listeners=$(kubectl -n "$GATEWAY_NAMESPACE" get gateway "$GATEWAY_NAME" \
                -o jsonpath='{range .spec.listeners[*]}{.name}{"\n"}{end}' 2>/dev/null || true)
              if ! echo "$_existing_listeners" | grep -Fxq "${_per_host_sn}"; then
                echo "❌ Shared listener '${_per_host_sn}' does not exist on gateway '${GATEWAY_NAME}' in '${GATEWAY_NAMESPACE}' for host '${host}'."
                echo "   Available listeners:"
                echo "$_existing_listeners" | sed 's/^/     /'
                exit 1
              fi
              echo "✅ Shared listener '${_per_host_sn}' confirmed for '${host}'."
              continue
            fi

            slug=$(to_slug "$host")
            cert_name="$slug"
            secret_name="$slug"
            http_listener=$(trim63 "http-${slug}")
            https_listener=$(trim63 "https-${slug}")

            ensure_gateway_exists "$host"

            # Pre-flight capacity check: count how many listeners this host actually
            # needs to add (0, 1, or 2 — guards may skip some). We conservatively
            # check for 2 slots needed regardless of guard outcomes, since we cannot
            # know which guards will fire without querying the live state twice.
            preflight_capacity_check 2

            # Read cert readiness once — shared by the DNS pre-flight and the
            # Order purge below so both conditions pay one kubectl call.
            cert_ready_now=$(kubectl get certificate "${cert_name}" -n "${GATEWAY_NAMESPACE}" \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "")

            # ---------------------------------------------------------------------------
            # DNS pre-flight: only runs when the cert is not already Ready.
            # A valid cert means no issuance is needed this run, so DNS reachability
            # is irrelevant — orange-cloud Cloudflare proxy is fine in that case.
            # When the cert IS absent or stuck, a proxy or wrong A record causes
            # cert-manager's HTTP-01 self-check to time out (600s hang); fail fast.
            # ---------------------------------------------------------------------------
            if [ "${cert_ready_now}" != "True" ]; then
              gateway_ip=$(kubectl -n "${GATEWAY_NAMESPACE}" get gateway "${GATEWAY_NAME}" \
                -o jsonpath='{.status.addresses[0].value}' 2>/dev/null || echo "")
              if [ -n "${gateway_ip}" ]; then
                resolved=$(dig +short "${host}" 2>/dev/null \
                  | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' \
                  | head -5 || echo "")
                if [ -z "${resolved}" ]; then
                  echo "❌ DNS pre-flight failed: '${host}' has no A record."
                  echo "   Create an A record: ${host} → ${gateway_ip}"
                  exit 1
                fi
                if ! echo "${resolved}" | grep -Fxq "${gateway_ip}"; then
                  echo "❌ DNS pre-flight failed: '${host}' does not resolve to the gateway IP."
                  echo "   Resolved to: $(echo "${resolved}" | tr '\n' ' ')"
                  echo "   Gateway IP:  ${gateway_ip} (${GATEWAY_NAME} in ${GATEWAY_NAMESPACE})"
                  echo "   HTTP-01 ACME requires DNS to point directly to the gateway — not through a proxy."
                  echo "   If using Cloudflare: set the record to DNS-only mode (grey cloud) for this hostname."
                  exit 1
                fi
                echo "✅ DNS pre-flight passed: '${host}' → ${gateway_ip}"
              fi
            fi

            kubectl apply -f <(printf '%s\n' \
              "apiVersion: cert-manager.io/v1" \
              "kind: Certificate" \
              "metadata:" \
              "  name: ${cert_name}" \
              "  namespace: ${GATEWAY_NAMESPACE}" \
              "spec:" \
              "  secretName: ${secret_name}" \
              "  issuerRef:" \
              "    name: ${GATEWAY_CERT_ISSUER_NAME}" \
              "    kind: ${GATEWAY_CERT_ISSUER_KIND}" \
              "  dnsNames:" \
              "    - ${host}")

            # Purge any failed ACME Orders so cert-manager retries immediately
            # rather than waiting out exponential backoff. kubectl apply on an
            # existing Certificate is a no-op when the spec is unchanged, so a
            # re-run after a late DNS update leaves the cert stuck in backoff
            # until the failed Orders are deleted. Only errored/invalid Orders
            # are removed — pending Orders on a freshly created cert are untouched.
            if [ "${cert_ready_now}" != "True" ]; then
              orders_output=$(kubectl get orders -n "${GATEWAY_NAMESPACE}" \
                -l "cert-manager.io/certificate-name=${cert_name}" \
                -o jsonpath='{range .items[*]}{.metadata.name}{"\t"}{.status.state}{"\n"}{end}' \
                2>/dev/null || echo "")
              while IFS=$'\t' read -r order_name order_state; do
                [ -z "$order_name" ] && continue
                case "$order_state" in
                  errored|invalid)
                    echo "⚠️  Purging failed ACME Order '${order_name}' (state: ${order_state}) — cert-manager will retry immediately."
                    kubectl delete order "${order_name}" -n "${GATEWAY_NAMESPACE}" --ignore-not-found
                    ;;
                esac
              done <<< "${orders_output}"
            fi

            # Add HTTP listener, track whether it was newly created.
            _listener_was_added=false
            add_listener_if_missing "$http_listener" "HTTP" "$host" "$secret_name"
            http_was_new="$_listener_was_added"

            # Add HTTPS listener. On failure, atomically roll back the HTTP listener
            # if we added it in this run — prevents the half-baked HTTP-only state
            # that caused the original overflow incident.
            _listener_was_added=false
            if ! add_listener_if_missing "$https_listener" "HTTPS" "$host" "$secret_name"; then
              if [ "$http_was_new" = "true" ]; then
                echo "⚠️  HTTPS listener patch failed. Rolling back HTTP listener '${http_listener}' added in this run..."
                remove_listener_by_name "$http_listener"
              fi
              echo "❌ Failed to add HTTPS listener for host '${host}'. Aborting."
              exit 1
            fi

            if [ "$GATEWAY_CERT_WAIT" = "true" ]; then
              kubectl wait --for=condition=Ready=True "certificate/${cert_name}" -n "$GATEWAY_NAMESPACE" --timeout="${GATEWAY_CERT_WAIT_TIMEOUT}s"
            fi
          done < <(printf "%s" "$HOST_LIST")
          echo "✅ Gateway hostnames onboarded — PASSED"

      - name: Deploy with Helm gateway-first chart
        uses: simplify9/.github/.github/actions/helm-generic@main
        with:
          app_name: ${{ inputs.app-name || github.repository }}
          namespace: ${{ inputs.namespace }}
          chart: ${{ inputs.chart-name }}
          chart_repo: ${{ inputs.chart-repo }}
          helm_timeout: ${{ inputs.helm-timeout-minutes != '' && format('{0}m', inputs.helm-timeout-minutes) || '10m' }}
          # --wait (Helm 4 kstatus watcher): safe here because s9genericchart-v2 defines a
          # startupProbe, so it is not subject to the liveness-without-startup hang (helm/helm#31526).
          extra_args: --wait
          atomic: ${{ inputs.atomic }}
          extra_set_values: |
            image.repo=${{ env.CONTAINER_REGISTRY }}
            app.version=${{ needs.version.outputs.version }}
            image.overrideName=${{ inputs.app-name }}
            image.overrideVersion=${{ needs.version.outputs.version }}
            image.pullSecret=${{ inputs.image-pull-secret }}
            environment=${{ inputs.environment }}
            service.targetPort=${{ inputs.service-target-port }}
            service.port=${{ inputs.service-port }}
            ${{ steps.routing.outputs.routing-values }}
            ${{ inputs.helm-set-values }}
          # Sensitive values: applied as masked --set-string (no type coercion), not --set.
          secret_set_values: ${{ secrets.helm-set-secret-values }}
          kubeconfig_data: ${{ secrets.kubeconfig }}
          init_job_image: ${{ inputs.init-job-image }}
          init_job_secret_name: ${{ inputs.init-job-secret-name }}
          init_job_command: ${{ inputs.init-job-command }}
          init_job_secret_key: ${{ inputs.init-job-secret-key }}
          init_job_connstring_env: ${{ inputs.init-job-connstring-env }}
          init_job_environment_env: ${{ inputs.init-job-environment-env }}
          init_job_image_pull_secret: ${{ inputs.init-job-image-pull-secret }}
          environment: ${{ inputs.environment }}

      - name: Confirm Helm deployed
        run: |
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ [CHECKPOINT 2/2] Helm deploy completed — PASSED: ${{ inputs.app-name }} in ${{ inputs.namespace }}"

      - name: Expose chart metadata output
        id: chartmeta
        shell: bash
        run: |
          echo "helm-chart=${{ inputs.chart-repo }}/${{ inputs.chart-name }}" >> "$GITHUB_OUTPUT"
          echo "✅ Deploy complete — ${{ inputs.app-name }}@${{ needs.version.outputs.version }} in ${{ inputs.namespace }}"

      - name: Report deploy failure
        if: failure()
        run: |
          echo "::error title=☸️ [HELM] Deploy Job Failed::App: ${{ inputs.app-name }} | Version: ${{ needs.version.outputs.version }} | Namespace: ${{ inputs.namespace }}"
          echo "  Checkpoint 1 — Routing values: ${CHECKPOINT_1_STATUS:-❌ Not reached}"
          echo "  Checkpoint 2 — Helm deploy:    ${CHECKPOINT_2_STATUS:-❌ Not reached}"

      - name: Write deploy job summary
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
          APP_NAME: ${{ inputs.app-name }}
          VERSION: ${{ needs.version.outputs.version }}
          NAMESPACE: ${{ inputs.namespace }}
          ROUTING_MODE: ${{ inputs.routing-mode }}
          CHART_NAME: ${{ inputs.chart-name }}
          REF_NAME: ${{ github.ref_name }}
          RUNNER_OS: ${{ runner.os }}
          ACTOR: ${{ github.actor }}
        run: |
          STATUS=$( [ "${JOB_STATUS}" = "success" ] \
            && echo "✅ SUCCESS" || echo "❌ FAILED" )
          {
            echo "## ☸️ Gateway Deploy — ${APP_NAME} — ${STATUS}"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| App | \`${APP_NAME}\` |"
            echo "| Version | \`${VERSION}\` |"
            echo "| Namespace | \`${NAMESPACE}\` |"
            echo "| Routing mode | ${ROUTING_MODE} |"
            echo "| Chart | ${CHART_NAME} |"
            echo "| Branch | \`${REF_NAME}\` |"
            echo "| Runner | ${RUNNER_OS} |"
            echo "| Triggered by | ${ACTOR} |"
            echo ""
            echo "## 📋 Checkpoint Summary"
            echo ""
            echo "| # | Checkpoint | Status |"
            echo "|---|------------|--------|"
            echo "| 1 | Routing values generated | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |"
            echo "| 2 | Helm deployment | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |"
          } >> "$GITHUB_STEP_SUMMARY"

  tag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [version, nuget, build, deploy]
    # Tag only after a successful deploy so tags always reference a shipped version.
    # A disabled nuget job (result: success with skipped steps) must not block tagging.
    if: >-
      ${{ !cancelled()
          && needs.version.result == 'success'
          && needs.build.result == 'success'
          && needs.deploy.result == 'success'
          && (needs.nuget.result == 'success' || needs.nuget.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - name: Tag new version on GitHub origin
        uses: simplify9/.github/.github/actions/tag-github-origin@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag: ${{ needs.version.outputs.git-tag }}
          sha: ${{ github.sha }}

      - name: Tag NuGet version on GitHub origin
        if: ${{ inputs.package-nuget }}
        uses: simplify9/.github/.github/actions/tag-github-origin@main
        with:
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          tag: ${{ needs.nuget.outputs.git-tag }}
          sha: ${{ github.sha }}
