# =============================================================================
# Simplify9 Xcode Export
# =============================================================================
# Exports a signed IPA from an existing .xcarchive using xcodebuild
# -exportArchive driven by an exportOptions.plist.
#
# Behaviour:
#   - Verifies the archive exists, creates the output directory, then runs
#     xcodebuild -exportArchive with the provided export options plist.
#
# Inputs:
#   archivePath         (required)  Path to the .xcarchive to export.
#   exportOptionsPlist  (required)  Path to exportOptions.plist.
#   exportPath          (required)  Output directory for the exported IPA.
#
# Usage:
#   - name: Export IPA
#     uses: simplify9/.github/.github/actions/xcode-export@main
#     with:
#       archivePath: build/App.xcarchive
#       exportOptionsPlist: ExportOptions.plist
#       exportPath: build/export
# =============================================================================
name: Simplify9 Xcode Export
author: 'Simplify9'
description: Export an IPA from an Xcode archive using export options.

inputs:
  archivePath:
    required: true
    description: Path to the .xcarchive to export.
  exportOptionsPlist:
    required: true
    description: Path to exportOptions.plist.
  exportPath:
    required: true
    description: Output directory for the exported IPA.
runs:
  using: composite
  steps:
    - name: Initialize IPA export
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "XCODE_EXPORT_CP1_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Export IPA
      shell: bash
      env:
        ARCHIVE_PATH: ${{ inputs.archivePath }}
        EXPORT_PLIST: ${{ inputs.exportOptionsPlist }}
        EXPORT_PATH: ${{ inputs.exportPath }}
      run: |
        set -euo pipefail
        echo "::group::🍎 [CHECKPOINT 1/1] Export IPA"
        if [[ ! -d "${ARCHIVE_PATH}" ]]; then
          echo "ERROR: Archive not found at '${ARCHIVE_PATH}'"
          exit 1
        fi
        mkdir -p "${EXPORT_PATH}"
        xcodebuild \
          -exportArchive \
          -archivePath "${ARCHIVE_PATH}" \
          -exportOptionsPlist "${EXPORT_PLIST}" \
          -exportPath "${EXPORT_PATH}"
        echo "XCODE_EXPORT_CP1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ IPA exported — Output: ${EXPORT_PATH}"
        echo "::endgroup::"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        ARCHIVE_PATH: ${{ inputs.archivePath }}
      run: |
        set -euo pipefail
        echo "::error title=❌ [IOS] IPA export failed::xcodebuild -exportArchive failed for archive '${ARCHIVE_PATH}'. Check exportOptionsPlist path and signing configuration."

branding:
  icon: 'upload'
  color: 'blue'