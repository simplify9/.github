name: Simplify9 Xcode Export
description: Export an IPA from an Xcode archive using export options.
author: simplify9
inputs:
  archivePath:
    required: true
    description: Path to the .xcarchive to export.
  exportOptionsPlist:
    required: true
    description: Path to exportOptions.plist.
  exportPath:
    required: true
    description: Output directory for the exported IPA.
runs:
  using: composite
  steps:
    - name: Announce IPA export
      shell: bash
      run: |
        echo "::notice title=🍎 [IOS] Export IPA::Exporting archive to IPA — archive: ${{ inputs.archivePath }}, output: ${{ inputs.exportPath }}"
        echo "📋 [IOS] Export options: ${{ inputs.exportOptionsPlist }}"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Export IPA
      shell: bash
      run: |
        echo "::group::🍎 [CHECKPOINT 1/1] Export IPA"
        mkdir -p "${{ inputs.exportPath }}"
        xcodebuild \
          -exportArchive \
          -archivePath "${{ inputs.archivePath }}" \
          -exportOptionsPlist "${{ inputs.exportOptionsPlist }}" \
          -exportPath "${{ inputs.exportPath }}"
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [IOS] IPA exported::Output: ${{ inputs.exportPath }}"
        echo "::endgroup::"

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [CHECKPOINT 1/1] FAILED — Export IPA::xcodebuild -exportArchive failed for archive '${{ inputs.archivePath }}'. Check exportOptionsPlist path and signing configuration."

    - name: Write action summary
      if: always()
      shell: bash
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        cat >> "$GITHUB_STEP_SUMMARY" << "$EOF"
        ## 🍎 Xcode Export IPA

        | Field | Value |
        |-------|-------|
        | Archive | \`${{ inputs.archivePath }}\` |
        | Export options | \`${{ inputs.exportOptionsPlist }}\` |
        | Output path | \`${{ inputs.exportPath }}\` |

        ## 📋 Checkpoint Summary

        | # | Checkpoint | Status |
        |---|------------|--------|
        | 1 | Export IPA | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |
        $EOF
