name: Simplify9 Xcode Export
description: Export an IPA from an Xcode archive using export options.
author: simplify9
inputs:
  archivePath:
    required: true
    description: Path to the .xcarchive to export.
  exportOptionsPlist:
    required: true
    description: Path to exportOptions.plist.
  exportPath:
    required: true
    description: Output directory for the exported IPA.
runs:
  using: composite
  steps:
    - name: Announce IPA export
      shell: bash
      run: |
        echo "::notice title=🍎 [IOS] Export IPA::Exporting archive to IPA — archive: ${{ inputs.archivePath }}, output: ${{ inputs.exportPath }}"
        echo "📋 [IOS] Export options: ${{ inputs.exportOptionsPlist }}"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Export IPA
      shell: bash
      run: |
        echo "::group::🍎 [CHECKPOINT 1/1] Export IPA"
        mkdir -p "${{ inputs.exportPath }}"
        xcodebuild \
          -exportArchive \
          -archivePath "${{ inputs.archivePath }}" \
          -exportOptionsPlist "${{ inputs.exportOptionsPlist }}" \
          -exportPath "${{ inputs.exportPath }}"
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [IOS] IPA exported::Output: ${{ inputs.exportPath }}"
        echo "::endgroup::"

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [IOS] IPA export failed::xcodebuild -exportArchive failed for archive '${{ inputs.archivePath }}'. Check exportOptionsPlist path and signing configuration."
