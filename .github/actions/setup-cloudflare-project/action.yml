# =============================================================================
# Setup Cloudflare Pages Project
# =============================================================================
# Creates or verifies a Cloudflare Pages project via the Cloudflare REST API
# (GET/POST /accounts/{account_id}/pages/projects), with the supplied build
# configuration.
#
# Behaviour:
#   - Idempotent — the project is checked first via GET; if it already exists no
#     create is attempted. If a create races and the API reports the project
#     already exists, that is also treated as success. Safe for re-runs.
#   - Resilient — every Cloudflare API call retries transient network/5xx errors
#     with a timeout (-sS --max-time 30 --retry 3 --retry-connrefused).
#   - Secret-safe — the API token is passed via an env var (never the command
#     line) and re-masked in logs.
#
# Inputs:
#   api-token          (required)  Cloudflare API token with Pages edit permission.
#   account-id         (required)  Cloudflare account ID.
#   project-name       (required)  Name of the Cloudflare Pages project.
#   production-branch  (optional)  Production branch. Default 'main'.
#   build-command      (optional)  Build command. Default 'npm run build'.
#   destination-dir    (optional)  Build output directory. Default 'build'.
#   root-dir           (optional)  Root directory for the project. Default ''.
#
# Outputs (set only on success paths):
#   project-exists  'true' if the project already existed, 'false' otherwise.
#   project-url     URL of the created project (only set when a project is
#                   created in this run).
#
# Usage:
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       steps:
#         - name: Setup Cloudflare Pages project
#           uses: simplify9/.github/.github/actions/setup-cloudflare-project@main
#           with:
#             api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
#             account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
#             project-name: ${{ env.FULL_PROJECT_NAME }}
#             production-branch: ${{ inputs.target-branch }}
#             build-command: ${{ inputs.build-command }}
#             destination-dir: ${{ inputs.build-directory }}
# =============================================================================
name: 'Setup Cloudflare Pages Project'
author: 'Simplify9'
description: 'Creates or verifies a Cloudflare Pages project exists with the specified configuration. Idempotent: an existing project is treated as success, not failure.'

inputs:
  api-token:
    description: 'Cloudflare API token'
    required: true
  account-id:
    description: 'Cloudflare account ID'
    required: true
  project-name:
    description: 'Name of the Cloudflare Pages project'
    required: true
  production-branch:
    description: 'Production branch for the project'
    required: false
    default: 'main'
  build-command:
    description: 'Build command for the project'
    required: false
    default: 'npm run build'
  destination-dir:
    description: 'Build output directory'
    required: false
    default: 'build'
  root-dir:
    description: 'Root directory for the project'
    required: false
    default: ''

outputs:
  project-exists:
    description: 'Whether the project already existed'
    value: ${{ steps.check-project.outputs.exists }}
  project-url:
    description: 'URL of the created/existing project'
    value: ${{ steps.create-project.outputs.url }}

runs:
  using: 'composite'
  steps:
    - name: Mask sensitive inputs
      shell: bash
      env:
        API_TOKEN: ${{ inputs.api-token }}
        ACCOUNT_ID: ${{ inputs.account-id }}
      run: |
        set -euo pipefail
        echo "::add-mask::$API_TOKEN"
        echo "::add-mask::$ACCOUNT_ID"

    - name: Initialize project setup
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CHECKPOINT_1_STATUS=⏳ Pending"
          echo "CHECKPOINT_2_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Install jq for JSON parsing
      shell: bash
      run: |
        set -euo pipefail
        if ! command -v jq &> /dev/null; then
          sudo apt-get update && sudo apt-get install -y jq
        fi

    - name: Check if Cloudflare Pages project exists
      id: check-project
      shell: bash
      env:
        API_TOKEN: ${{ inputs.api-token }}
        ACCOUNT_ID: ${{ inputs.account-id }}
        PROJECT_NAME: ${{ inputs.project-name }}
      run: |
        set -euo pipefail
        echo "::add-mask::$API_TOKEN"
        echo "Checking if project '$PROJECT_NAME' exists..."

        response_file="$(mktemp)"
        http_code="$(curl -sS \
          --max-time 30 \
          --retry 3 \
          --retry-connrefused \
          -o "$response_file" \
          -w '%{http_code}' \
          -X GET "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects/$PROJECT_NAME" \
          -H "Authorization: Bearer $API_TOKEN" \
          -H "Content-Type: application/json")"
        RESPONSE="$(cat "$response_file")"
        rm -f "$response_file"

        SUCCESS="$(printf '%s' "$RESPONSE" | jq -r '.success')"

        if [ "$SUCCESS" = "true" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
          echo "✅ Project '$PROJECT_NAME' already exists"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "📝 Project '$PROJECT_NAME' does not exist"
        fi
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"

    - name: Create Cloudflare Pages project
      id: create-project
      if: steps.check-project.outputs.exists == 'false'
      shell: bash
      env:
        API_TOKEN: ${{ inputs.api-token }}
        ACCOUNT_ID: ${{ inputs.account-id }}
        PROJECT_NAME: ${{ inputs.project-name }}
        PRODUCTION_BRANCH: ${{ inputs.production-branch }}
        BUILD_COMMAND: ${{ inputs.build-command }}
        DESTINATION_DIR: ${{ inputs.destination-dir }}
        ROOT_DIR: ${{ inputs.root-dir }}
      run: |
        set -euo pipefail
        echo "::add-mask::$API_TOKEN"
        echo "Creating Cloudflare Pages project '$PROJECT_NAME'..."

        # Build the JSON body with jq so values are escaped correctly.
        payload="$(jq -nc \
          --arg name "$PROJECT_NAME" \
          --arg production_branch "$PRODUCTION_BRANCH" \
          --arg build_command "$BUILD_COMMAND" \
          --arg destination_dir "$DESTINATION_DIR" \
          --arg root_dir "$ROOT_DIR" \
          '{name: $name, production_branch: $production_branch, build_config: {build_command: $build_command, destination_dir: $destination_dir, root_dir: $root_dir}}')"

        response_file="$(mktemp)"
        http_code="$(curl -sS \
          --max-time 30 \
          --retry 3 \
          --retry-connrefused \
          -o "$response_file" \
          -w '%{http_code}' \
          -X POST "https://api.cloudflare.com/client/v4/accounts/$ACCOUNT_ID/pages/projects" \
          -H "Authorization: Bearer $API_TOKEN" \
          -H "Content-Type: application/json" \
          --data "$payload")"
        RESPONSE="$(cat "$response_file")"
        rm -f "$response_file"

        SUCCESS="$(printf '%s' "$RESPONSE" | jq -r '.success')"

        if [ "$SUCCESS" = "true" ]; then
          PROJECT_URL="$(printf '%s' "$RESPONSE" | jq -r '.result.subdomain')"
          echo "url=https://${PROJECT_URL}.pages.dev" >> "$GITHUB_OUTPUT"
          echo "✅ Project '$PROJECT_NAME' created successfully"
          echo "🌐 Project URL: https://${PROJECT_URL}.pages.dev"
          echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "✅ Project created — $PROJECT_NAME → https://${PROJECT_URL}.pages.dev"
        else
          ERROR_MSG="$(printf '%s' "$RESPONSE" | jq -r '.errors[0].message // "Unknown error"')"

          # Idempotent: an already-existing project is treated as success.
          if [[ "$ERROR_MSG" == *"already exists"* ]] || [[ "$ERROR_MSG" == *"duplicate"* ]]; then
            echo "ℹ️ Project '$PROJECT_NAME' already exists — nothing to do"
            echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
            echo "✅ Project configured — $PROJECT_NAME"
          else
            echo "❌ Failed to create project (HTTP $http_code): $ERROR_MSG"
            echo "Response: $RESPONSE"
            exit 1
          fi
        fi

    - name: Project setup complete
      if: steps.check-project.outputs.exists == 'true'
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
      run: |
        set -euo pipefail
        echo "✅ Using existing Cloudflare Pages project: $PROJECT_NAME"
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.project-name }}
      run: |
        echo "::error title=❌ [CF-PAGES] Project setup failed::project: $PROJECT_NAME. Checkpoints — 1) Project check: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Project configured: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}."

branding:
  icon: 'cloud'
  color: 'orange'
