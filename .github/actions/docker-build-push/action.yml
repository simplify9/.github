# Usage:
#   - name: Build and push Docker image
#     uses: simplify9/.github/.github/actions/docker-build-push@main
#     with:
#       registry: registry.digitalocean.com
#       image-name: my-org/my-app
#       version: ${{ needs.version.outputs.version }}
#       username: ${{ secrets.DO_REGISTRY_TOKEN }}
#       password: ${{ secrets.DO_REGISTRY_TOKEN }}
#       dockerfile: ./Dockerfile
#       context: .
#       platforms: linux/amd64

name: 'Docker Build and Push'
description: 'Build and push Docker image to container registry'
author: 'Simplify9'

inputs:
  registry:
    description: 'Container registry URL (e.g., docker.io, registry.digitalocean.com, myregistry.azurecr.io)'
    required: false
    default: 'docker.io'
  image-name:
    description: 'Docker image name (e.g., simplify9/sw-surl-api, my-app)'
    required: true
  version:
    description: 'Version tag for the Docker image'
    required: true
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password or token'
    required: true
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: './Dockerfile'
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  # Note: emulated arm64 builds on x86 runners are slow — this is inherent to QEMU, not this action.
  # Mitigation (native arm64 runners, remote builders) is infrastructure scope, not template scope.
  platforms:
    description: 'Target platforms for build'
    required: false
    default: 'linux/amd64'
  push:
    description: 'Push image to registry'
    required: false
    default: 'true'
  # GHA cache notes:
  # (1) Legacy GHA cache backend shut down 2025-04-15; only Cache Service API v2 is supported.
  #     Staying on current action versions handles this automatically — no config change needed.
  # (2) GHA cache has a ~10 GB/repo limit with LRU + inactivity eviction; can thrash on
  #     large/multi-arch images (limit became raisable Nov 2025, at storage cost).
  # (3) Fallback for large/cross-repo caching: type=registry,ref=<image>:buildcache,mode=max
  #     — not subject to GHA quota, shareable across repos; set cache-from/cache-to manually if needed.
  cache:
    description: 'Enable build cache'
    required: false
    default: 'true'
  build-args:
    description: 'Newline-separated Docker build arguments (KEY=VALUE)'
    required: false
    default: ''
  build-secrets:
    description: 'Newline-separated Docker build secrets (KEY=VALUE) for BuildKit'
    required: false
    default: ''

outputs:
  image-tags:
    description: 'Generated image tags'
    value: ${{ steps.meta.outputs.tags }}
  image-digest:
    description: 'Image digest'
    value: ${{ steps.build.outputs.digest }}

runs:
  using: 'composite'
  steps:
    - name: Initialize Docker build
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        VERSION: ${{ inputs.version }}
        REGISTRY: ${{ inputs.registry }}
        PLATFORMS: ${{ inputs.platforms }}
      run: |
        echo "::group::🐳 Docker build context"
        printf '%-12s%s\n' 'Image'     "${IMAGE_NAME}:${VERSION}"
        printf '%-12s%s\n' 'Registry'  "${REGISTRY}"
        printf '%-12s%s\n' 'Platforms' "${PLATFORMS}"
        echo "::endgroup::"
        {
          echo "CHECKPOINT_1_STATUS=⏳ Pending"
          echo "CHECKPOINT_2_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Set up QEMU
      # Only needed for non-native/multi-arch builds; skip for the single-arch linux/amd64 default to save setup time.
      if: ${{ inputs.platforms != 'linux/amd64' }}
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry != 'docker.io' && inputs.registry || '' }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Confirm registry auth
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
      run: |
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ [1/2] Registry auth — ${REGISTRY}"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ inputs.registry != 'docker.io' && format('{0}/{1}', inputs.registry, inputs.image-name) || inputs.image-name }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=raw,value=latest,enable={{is_default_branch}}
        flavor: |
          latest=false

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        # push and cache are string inputs (composite-action inputs are always strings);
        # comparing with == 'true' ensures unexpected values (e.g. True, 1) degrade predictably.
        push: ${{ inputs.push == 'true' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ inputs.platforms }}
        cache-from: ${{ inputs.cache == 'true' && 'type=gha' || '' }}
        cache-to: ${{ inputs.cache == 'true' && 'type=gha,mode=max' || '' }}
        # provenance: false — deliberate DOCR compatibility choice. DOCR surfaces attestation manifests as
        # phantom unknown/unknown platform entries, interfering with the registry UI and GC.
        # Docker Hub and GHCR support attestations natively; re-enable if targeting those registries.
        provenance: false
        sbom: false
        build-args: ${{ inputs.build-args }}
        secrets: ${{ inputs.build-secrets }}

    - name: Confirm image built and pushed
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        VERSION: ${{ inputs.version }}
        DIGEST: ${{ steps.build.outputs.digest }}
      run: |
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ [2/2] Image pushed — ${IMAGE_NAME}:${VERSION} (${DIGEST})"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        IMAGE_NAME: ${{ inputs.image-name }}
        VERSION: ${{ inputs.version }}
        REGISTRY: ${{ inputs.registry }}
      run: |
        echo "::error title=Docker build failed for ${IMAGE_NAME}:${VERSION}::Registry ${REGISTRY} — auth: ${CHECKPOINT_1_STATUS:-❌ Not reached} | build/push: ${CHECKPOINT_2_STATUS:-❌ Not reached}"
