name: 'Docker Build and Push'
description: 'Build and push Docker image to container registry'
author: 'Simplify9'

inputs:
  registry:
    description: 'Container registry URL (e.g., docker.io, registry.digitalocean.com, myregistry.azurecr.io)'
    required: false
    default: 'docker.io'
  image-name:
    description: 'Docker image name (e.g., simplify9/sw-surl-api, my-app)'
    required: true
  version:
    description: 'Version tag for the Docker image'
    required: true
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password or token'
    required: true
  dockerfile:
    description: 'Path to Dockerfile'
    required: false
    default: './Dockerfile'
  context:
    description: 'Docker build context'
    required: false
    default: '.'
  platforms:
    description: 'Target platforms for build'
    required: false
    default: 'linux/amd64'
  push:
    description: 'Push image to registry'
    required: false
    default: 'true'
  cache:
    description: 'Enable build cache'
    required: false
    default: 'true'
  build-args:
    description: 'Newline-separated Docker build arguments (KEY=VALUE)'
    required: false
    default: ''
  build-secrets:
    description: 'Newline-separated Docker build secrets (KEY=VALUE) for BuildKit'
    required: false
    default: ''

outputs:
  image-tags:
    description: 'Generated image tags'
    value: ${{ steps.meta.outputs.tags }}
  image-digest:
    description: 'Image digest'
    value: ${{ steps.build.outputs.digest }}

runs:
  using: 'composite'
  steps:
    - name: Announce Docker build
      shell: bash
      run: |
        echo "::notice title=🐳 [DOCKER] Docker Build and Push::Building image — ${{ inputs.image-name }}:${{ inputs.version }}, registry: ${{ inputs.registry }}, platforms: ${{ inputs.platforms }}"
        echo "📋 [DOCKER] Dockerfile: ${{ inputs.dockerfile }}, context: ${{ inputs.context }}, push: ${{ inputs.push }}, cache: ${{ inputs.cache }}"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
        echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
      with:
        platforms: ${{ inputs.platforms }}

    - name: Log in to Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.registry != 'docker.io' && inputs.registry || '' }}
        username: ${{ inputs.username }}
        password: ${{ inputs.password }}

    - name: Confirm registry auth
      shell: bash
      run: |
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ [CHECKPOINT 1/2] Registry Authentication — PASSED (registry: ${{ inputs.registry }})"

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v6
      with:
        images: |
          ${{ inputs.registry != 'docker.io' && format('{0}/{1}', inputs.registry, inputs.image-name) || inputs.image-name }}
        tags: |
          type=raw,value=${{ inputs.version }}
          type=raw,value=latest
        flavor: |
          latest=false

    - name: Build and push Docker image
      id: build
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        push: ${{ inputs.push }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: ${{ inputs.platforms }}
        cache-from: ${{ inputs.cache == 'true' && 'type=gha' || '' }}
        cache-to: ${{ inputs.cache == 'true' && 'type=gha,mode=max' || '' }}
        provenance: false
        sbom: false
        build-args: ${{ inputs.build-args }}
        secrets: ${{ inputs.build-secrets }}

    - name: Confirm image built and pushed
      shell: bash
      run: |
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [DOCKER] Image built and pushed::${{ inputs.image-name }}:${{ inputs.version }} — digest: ${{ steps.build.outputs.digest }}"

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [DOCKER] Build failed::Docker build/push failed for ${{ inputs.image-name }}:${{ inputs.version }} on ${{ inputs.registry }}. Checkpoints — 1) Registry auth: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Build+push: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}"
