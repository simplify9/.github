# =============================================================================
# Simplify9 Xcode Build
# =============================================================================
# Builds and archives an iOS app with xcodebuild, defaulting to CI-safe manual
# signing. Assembles xcodebuild arguments in a bash array so values are passed
# safely, and supports both manual and automatic signing styles.
#
# Behaviour:
#   - Manual signing (default): requires developmentTeam; optionally sets the
#     code-sign identity, provisioning profile UUID, bundle id, and keychain.
#   - Automatic signing: passes -allowProvisioningUpdates.
#   - Optionally prints a filtered build-settings summary before archiving and
#     pipes output through xcpretty when available (raw output otherwise).
#
# Inputs:
#   workspace               (required)  Path to the .xcworkspace.
#   scheme                  (required)  Xcode scheme to build.
#   configuration           (required)  Build configuration (e.g. Release).
#   archivePath             (required)  Output path for the generated .xcarchive.
#   destination             (optional)  Xcode destination. Default generic/platform=iOS.
#   signingStyle            (optional)  manual or automatic. Default manual.
#   developmentTeam         (optional)  Apple Developer Team ID (required for manual).
#   codeSignIdentity        (optional)  Code signing identity for manual signing.
#   provisioningProfileUuid (optional)  Provisioning profile UUID.
#   bundleId                (optional)  PRODUCT_BUNDLE_IDENTIFIER override.
#   keychainPath            (optional)  Keychain containing the signing identity.
#   derivedDataPath         (optional)  Derived data path.
#   debugBuildSettings      (optional)  true/false: print build settings before archive.
#
# Usage:
#   - name: Build and archive
#     uses: simplify9/.github/.github/actions/xcode-build@main
#     with:
#       workspace: App.xcworkspace
#       scheme: App
#       configuration: Release
#       archivePath: build/App.xcarchive
#       developmentTeam: ABCDE12345
# =============================================================================
name: Simplify9 Xcode Build
author: 'Simplify9'
description: Build and archive an iOS app using xcodebuild (CI-safe manual signing).

inputs:
  workspace:
    required: true
    description: Path to the Xcode workspace (.xcworkspace).
  scheme:
    required: true
    description: Xcode scheme to build.
  configuration:
    required: true
    description: Build configuration (e.g., Release).
  archivePath:
    required: true
    description: Output path for the generated .xcarchive.
  destination:
    required: false
    description: Xcode destination (e.g., generic/platform=iOS).
    default: generic/platform=iOS
  signingStyle:
    required: false
    description: "manual or automatic"
    default: manual
  developmentTeam:
    required: false
    description: Apple Developer Team ID. Required for manual signing.
  codeSignIdentity:
    required: false
    description: Code signing identity for manual signing.
  provisioningProfileUuid:
    required: false
    description: Provisioning profile UUID.
  bundleId:
    required: false
    description: Bundle identifier override (PRODUCT_BUNDLE_IDENTIFIER), optional.
  keychainPath:
    required: false
    description: Path to keychain that contains signing identity.
  derivedDataPath:
    required: false
    description: Optional derived data path.
    default: ""
  debugBuildSettings:
    required: false
    description: "true/false: print build settings before archive"
    default: "false"

runs:
  using: composite
  steps:
    - name: Initialize Xcode build
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "XCODE_BUILD_CP1_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Build and archive
      shell: bash
      env:
        WORKSPACE: ${{ inputs.workspace }}
        SCHEME: ${{ inputs.scheme }}
        CONFIGURATION: ${{ inputs.configuration }}
        DESTINATION: ${{ inputs.destination }}
        ARCHIVE_PATH: ${{ inputs.archivePath }}
        SIGNING_STYLE: ${{ inputs.signingStyle }}
        DEVELOPMENT_TEAM: ${{ inputs.developmentTeam }}
        CODE_SIGN_IDENTITY_INPUT: ${{ inputs.codeSignIdentity }}
        PROVISIONING_PROFILE_UUID: ${{ inputs.provisioningProfileUuid }}
        BUNDLE_ID: ${{ inputs.bundleId }}
        KEYCHAIN_PATH_INPUT: ${{ inputs.keychainPath }}
        DERIVED_DATA_PATH: ${{ inputs.derivedDataPath }}
        DEBUG_BUILD_SETTINGS: ${{ inputs.debugBuildSettings }}
      run: |
        set -euo pipefail
        echo "::group::🍎 [CHECKPOINT 1/1] Build and Archive"

        ARGS=(
          -workspace "${WORKSPACE}"
          -scheme "${SCHEME}"
          -configuration "${CONFIGURATION}"
          -sdk iphoneos
          -destination "${DESTINATION}"
          -archivePath "${ARCHIVE_PATH}"
          archive
          -parallelizeTargets
          COMPILER_INDEX_STORE_ENABLE=NO
          -hideShellScriptEnvironment
          -showBuildTimingSummary
        )

        if [[ -n "${DERIVED_DATA_PATH}" ]]; then
          ARGS+=(-derivedDataPath "${DERIVED_DATA_PATH}")
        fi

        if [[ "${SIGNING_STYLE}" == "automatic" ]]; then
          ARGS+=(-allowProvisioningUpdates)
        else
          if [[ -z "${DEVELOPMENT_TEAM}" ]]; then
            echo "ERROR: developmentTeam is required for manual signing"
            exit 1
          fi

          ARGS+=(
            CODE_SIGN_STYLE=Manual
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}"
          )

          if [[ -n "${CODE_SIGN_IDENTITY_INPUT}" ]]; then
            ARGS+=(CODE_SIGN_IDENTITY="${CODE_SIGN_IDENTITY_INPUT}")
          fi

          if [[ -n "${PROVISIONING_PROFILE_UUID}" ]]; then
            ARGS+=(PROVISIONING_PROFILE="${PROVISIONING_PROFILE_UUID}")
          fi

          if [[ -n "${BUNDLE_ID}" ]]; then
            ARGS+=(PRODUCT_BUNDLE_IDENTIFIER="${BUNDLE_ID}")
          fi

          if [[ -n "${KEYCHAIN_PATH_INPUT}" ]]; then
            ARGS+=(OTHER_CODE_SIGN_FLAGS="--keychain ${KEYCHAIN_PATH_INPUT}")
          fi
        fi

        if [[ "${DEBUG_BUILD_SETTINGS}" == "true" ]]; then
          echo "=== Build settings (summary) ==="
          xcodebuild \
            -workspace "${WORKSPACE}" \
            -scheme "${SCHEME}" \
            -configuration "${CONFIGURATION}" \
            -sdk iphoneos \
            -showBuildSettings | grep -Ei \
            'CODE_SIGN|DEVELOPMENT_TEAM|PROVISION|PRODUCT_BUNDLE_IDENTIFIER' || true
        fi

        echo "🔨 Starting xcodebuild archive for scheme '${SCHEME}' (configuration: ${CONFIGURATION})..."

        if command -v xcpretty >/dev/null 2>&1; then
          xcodebuild "${ARGS[@]}" | xcpretty --color
          exit "${PIPESTATUS[0]}"
        else
          echo "::warning title=xcpretty missing::xcpretty not found; falling back to raw xcodebuild output"
          xcodebuild "${ARGS[@]}"
        fi

        echo "XCODE_BUILD_CP1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Archive created — ${ARCHIVE_PATH}"
        echo "::endgroup::"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        SCHEME: ${{ inputs.scheme }}
        CONFIGURATION: ${{ inputs.configuration }}
        SIGNING_STYLE: ${{ inputs.signingStyle }}
      run: |
        set -euo pipefail
        echo "::error title=❌ [IOS] Build failed::scheme: ${SCHEME}, config: ${CONFIGURATION}, signing: ${SIGNING_STYLE}. Checkpoints — 1) Archive: ${XCODE_BUILD_CP1_STATUS:-⏭️ Not reached}. Check provisioning profile UUID and keychain path."

branding:
  icon: 'box'
  color: 'blue'