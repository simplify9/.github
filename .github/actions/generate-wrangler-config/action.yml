# =============================================================================
# Generate wrangler.toml
# =============================================================================
# Dynamically generates a wrangler.toml file for deploying Cloudflare Workers.
# Supports plain Workers, OpenNext builds, and configurable static assets.
#
# Behaviour:
#   - Writes wrangler.toml into the current working directory.
#   - ROUTE accepts a single pattern or a newline-separated list; each becomes a
#     custom-domain route under [[env.<environment>.routes]].
#   - main entry: ".open-next/worker.js" when BUILD_FOR_OPENNEXT=true, otherwise
#     MAIN_ENTRY if provided, otherwise no main line (backwards compatible).
#   - [assets] binding = "ASSETS" is added when BUILD_FOR_OPENNEXT=true or
#     ADD_ASSETS_BINDING=true.
#
# Inputs:
#   COMPATIBILITY_DATE   (required)  Wrangler compatibility_date (e.g. 2024-10-20).
#   ROUTE                (required)  Route pattern or newline-separated list.
#   PROJECT_NAME         (required)  General project name.
#   ENVIRONMENT          (optional)  Deployment environment name (default production).
#   ASSETS_DIR           (optional)  Static assets directory (default .vercel/output/static).
#   BUILD_FOR_OPENNEXT   (optional)  Build for OpenNext (default false).
#   MAIN_ENTRY           (optional)  Explicit Worker main entry; empty = none unless OpenNext.
#   ADD_ASSETS_BINDING   (optional)  Add binding = "ASSETS" under [assets] (default false).
#
# Outputs:
#   (none) — the action's effect is the generated wrangler.toml on disk.
#
# Usage:
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v4
#         - name: Generate wrangler.toml
#           uses: simplify9/.github/.github/actions/generate-wrangler-config@main
#           with:
#             COMPATIBILITY_DATE: '2024-10-20'
#             ROUTE: example.com/*
#             PROJECT_NAME: my-worker
# =============================================================================
name: "Generate wrangler.toml"
author: 'Simplify9'
description: "Generates a wrangler.toml file dynamically for Cloudflare Workers"

inputs:
  COMPATIBILITY_DATE:
    description: "Wrangler compatibility_date (e.g. 2024-10-20)"
    required: true
    default: "2024-10-20"
  ROUTE:
    description: "Route pattern or newline-separated list (e.g. example.com/*)"
    required: true
  PROJECT_NAME:
    description: "General Project Name"
    required: true
  ENVIRONMENT:
    description: "Deployment environment name (e.g. production, staging)"
    required: false
    default: "production"
  ASSETS_DIR:
    description: "Directory for static assets served (wrangler [assets] directory)"
    required: false
    default: ".vercel/output/static"
  BUILD_FOR_OPENNEXT:
    description: "Build for OpenNext (uses .open-next/worker.js as main and adds ASSETS binding)"
    required: false
    default: "false"
  MAIN_ENTRY:
    description: "Optional explicit Worker main entry (e.g. worker.js). If empty, no main is written unless BUILD_FOR_OPENNEXT=true."
    required: false
    default: ""
  ADD_ASSETS_BINDING:
    description: "If true, add binding = \"ASSETS\" under [assets] (in addition to OpenNext behavior)."
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Initialize wrangler.toml generation
      shell: bash
      run: |
        {
          echo "CHECKPOINT_1_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Generate wrangler.toml
      shell: bash
      env:
        COMPATIBILITY_DATE: ${{ inputs.COMPATIBILITY_DATE }}
        ROUTE: ${{ inputs.ROUTE }}
        PROJECT_NAME: ${{ inputs.PROJECT_NAME }}
        ENVIRONMENT: ${{ inputs.ENVIRONMENT }}
        ASSETS_DIR: ${{ inputs.ASSETS_DIR }}
        BUILD_FOR_OPENNEXT: ${{ inputs.BUILD_FOR_OPENNEXT }}
        MAIN_ENTRY: ${{ inputs.MAIN_ENTRY }}
        ADD_ASSETS_BINDING: ${{ inputs.ADD_ASSETS_BINDING }}
      run: |
        set -euo pipefail
        echo "::group::⚡ [CHECKPOINT 1/1] Generate wrangler.toml"

        # Values come from env (never interpolated into the script).
        COMPAT_DATE="$COMPATIBILITY_DATE"
        ROUTE_INPUT="$ROUTE"
        PROJECT_NAME="$PROJECT_NAME"
        ENVIRONMENT="$ENVIRONMENT"
        ASSETS_DIR="$ASSETS_DIR"
        BUILD_FOR_OPENNEXT="$BUILD_FOR_OPENNEXT"
        MAIN_ENTRY_INPUT="$MAIN_ENTRY"
        ADD_ASSETS_BINDING="$ADD_ASSETS_BINDING"

        [ -z "$COMPAT_DATE" ] && echo "Missing COMPATIBILITY_DATE" && exit 1
        [ -z "$ROUTE_INPUT" ] && echo "Missing ROUTE" && exit 1
        [ -z "$PROJECT_NAME" ] && echo "Missing PROJECT_NAME" && exit 1

        ROUTES=()
        while IFS= read -r raw_route; do
          TRIMMED_ROUTE="$(echo "$raw_route" | xargs)"
          [ -z "$TRIMMED_ROUTE" ] && continue
          ROUTES+=("$TRIMMED_ROUTE")
        done <<< "$ROUTE_INPUT"

        if [ "${#ROUTES[@]}" -eq 0 ]; then
          echo "No valid ROUTE entries provided" >&2
          exit 1
        fi

        ROUTE_BLOCKS=""
        for ROUTE in "${ROUTES[@]}"; do
          ROUTE_BLOCK="[[env.${ENVIRONMENT}.routes]]"$'\n'"pattern = \"${ROUTE}\""$'\n'"custom_domain = true"
          if [ -z "$ROUTE_BLOCKS" ]; then
            ROUTE_BLOCKS="$ROUTE_BLOCK"
          else
            ROUTE_BLOCKS="${ROUTE_BLOCKS}"$'\n'"$ROUTE_BLOCK"
          fi
        done

        # Decide main entry:
        # - If BUILD_FOR_OPENNEXT=true: keep previous behavior -> .open-next/worker.js
        # - Else if MAIN_ENTRY is set: use that
        # - Else: no main line (backwards compatible for non-OpenNext callers)
        MAIN_LINE=""
        if [ "$BUILD_FOR_OPENNEXT" = "true" ]; then
          MAIN_LINE='main = ".open-next/worker.js"'
        elif [ -n "$MAIN_ENTRY_INPUT" ]; then
          MAIN_LINE="main = \"${MAIN_ENTRY_INPUT}\""
        fi

        # Decide assets binding:
        # - Previously only added when BUILD_FOR_OPENNEXT=true
        # - Now can also be added when ADD_ASSETS_BINDING=true
        ASSETS_BINDING_LINE=""
        if [ "$BUILD_FOR_OPENNEXT" = "true" ] || [ "$ADD_ASSETS_BINDING" = "true" ]; then
          ASSETS_BINDING_LINE='binding = "ASSETS"'
        fi

        cat > wrangler.toml <<EOF
        name = "${PROJECT_NAME}"
        ${MAIN_LINE}
        compatibility_date = "${COMPAT_DATE}"
        compatibility_flags = ["nodejs_compat"]

        [env.${ENVIRONMENT}]
        name = "${PROJECT_NAME}-${ENVIRONMENT}"
        ${ROUTE_BLOCKS}

        [assets]
        directory = "./${ASSETS_DIR}"
        ${ASSETS_BINDING_LINE}
        EOF

        echo "Generated wrangler.toml:"
        echo "---------------------------"
        cat wrangler.toml
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ wrangler.toml generated — project: ${PROJECT_NAME}, env: ${ENVIRONMENT}, routes: ${#ROUTES[@]}"
        echo "::endgroup::"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        PROJECT_NAME: ${{ inputs.PROJECT_NAME }}
      run: |
        echo "::error title=❌ [CF-WORKERS] wrangler.toml generation failed::Config generation failed for project '$PROJECT_NAME'. Check that ROUTE, PROJECT_NAME, and COMPATIBILITY_DATE inputs are valid."

branding:
  icon: 'settings'
  color: 'orange'
