name: 'Helm Deploy to Kubernetes'
description: 'Deploy Helm chart from OCI registry or ChartMuseum to Kubernetes cluster'
author: 'Simplify9'

inputs:
  chart-name:
    description: 'Name of the Helm chart'
    required: true
  chart-version:
    description: 'Version of the Helm chart to deploy'
    required: true
  registry:
    description: 'OCI registry URL where the chart is stored'
    required: false
    default: 'docker.io'
  repository:
    description: 'Repository path in the registry'
    required: true
  registry-username:
    description: 'Registry username for authentication'
    required: true
  registry-password:
    description: 'Registry password or token for authentication'
    required: true
  kubeconfig:
    description: 'Base64 encoded kubeconfig for cluster access'
    required: true
  release-name:
    description: 'Helm release name'
    required: false
    default: 'app'
  namespace:
    description: 'Kubernetes namespace to deploy to'
    required: false
    default: 'default'
  image-repository:
    description: 'Docker image repository (for --set image.repository)'
    required: false
  image-tag:
    description: 'Docker image tag (for --set image.tag)'
    required: false
  values-file:
    description: 'Path to values file (relative to chart)'
    required: false
  values:
    description: 'Additional Helm values as YAML string'
    required: false
  set-values:
    description: 'Additional --set values (comma-separated: key1=value1,key2=value2)'
    required: false
  set-string-values:
    description: 'Additional --set-string values (comma-separated: key1=value1,key2=value2)'
    required: false
  chart-source-type:
    description: 'Chart source type: oci or chartmuseum'
    required: false
    default: 'oci'
  chart-repo-url:
    description: 'Helm chart repository URL (required when chart-source-type is chartmuseum)'
    required: false
  chart-repo-username:
    description: 'Helm chart repository username (optional for private chart repositories)'
    required: false
  chart-repo-password:
    description: 'Helm chart repository password/token (optional for private chart repositories)'
    required: false
  timeout:
    description: 'Helm deployment timeout'
    required: false
    default: '10m'
  wait:
    description: 'Wait for deployment to complete'
    required: false
    default: 'true'
  create-namespace:
    description: 'Create namespace if it does not exist'
    required: false
    default: 'true'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'latest'
  kubectl-version:
    description: 'kubectl version to install'
    required: false
    default: 'latest'

outputs:
  release-status:
    description: 'Status of the Helm release'
    value: ${{ steps.deploy.outputs.status }}
  chart-url:
    description: 'Source chart URL used for deployment'
    value: ${{ steps.deploy.outputs.chart-url }}
  namespace:
    description: 'Namespace where the release was deployed'
    value: ${{ inputs.namespace }}

runs:
  using: 'composite'
  steps:
    - name: Announce Helm deployment
      shell: bash
      run: |
        echo "::notice title=☸️ [HELM] Deploy Chart::Release: ${{ inputs.release-name }}, chart: ${{ inputs.chart-name }}:${{ inputs.chart-version }}, namespace: ${{ inputs.namespace }}, source: ${{ inputs.chart-source-type }}"
        echo "🌍 [HELM] Target namespace: ${{ inputs.namespace }}, wait: ${{ inputs.wait }}, timeout: ${{ inputs.timeout }}"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
        echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: ${{ inputs.kubectl-version }}

    - name: Configure Kubernetes context
      shell: bash
      run: |
        echo "::group::☸️ [CHECKPOINT 1/2] Configure Kubernetes Context"
        echo "Configuring Kubernetes context..."
        mkdir -p ~/.kube
        echo "${{ inputs.kubeconfig }}" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config
        
        echo "Current context:"
        kubectl config current-context
        
        echo "Cluster info:"
        kubectl cluster-info
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [HELM] Kubernetes context configured::namespace: ${{ inputs.namespace }}"
        echo "::endgroup::"

    - name: Create namespace
      if: inputs.create-namespace == 'true'
      shell: bash
      run: |
        echo "Creating namespace: ${{ inputs.namespace }}"
        kubectl create namespace ${{ inputs.namespace }} --dry-run=client -o yaml | kubectl apply -f -

    - name: Validate chart source inputs
      shell: bash
      run: |
        chart_source_type="${{ inputs.chart-source-type }}"
        case "$chart_source_type" in
          oci)
            if [ -z "${{ inputs.repository }}" ]; then
              echo "Error: repository is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "${{ inputs.registry-username }}" ]; then
              echo "Error: registry-username is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "${{ inputs.registry-password }}" ]; then
              echo "Error: registry-password is required when chart-source-type is oci."
              exit 1
            fi
            ;;
          chartmuseum)
            if [ -z "${{ inputs.chart-repo-url }}" ]; then
              echo "Error: chart-repo-url is required when chart-source-type is chartmuseum."
              exit 1
            fi
            ;;
          *)
            echo "Error: Unsupported chart-source-type '$chart_source_type'. Use 'oci' or 'chartmuseum'."
            exit 1
            ;;
        esac

    - name: Configure Helm registry authentication
      if: inputs.chart-source-type == 'oci'
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.registry-password }}"
        echo "Configuring Helm registry authentication for ${{ inputs.registry }}"
        registry_host="${{ inputs.registry }}"
        if [ "$registry_host" = "docker.io" ]; then
          # Docker Hub's Helm/OCI endpoint requires this hostname for registry login.
          registry_host="registry-1.docker.io"
        fi
        helm registry login "$registry_host" -u ${{ inputs.registry-username }} -p ${{ inputs.registry-password }}

    - name: Prepare values file
      if: inputs.values != ''
      shell: bash
      run: |
        echo "Creating temporary values file..."
        cat > /tmp/custom-values.yaml << 'EOF'
        ${{ inputs.values }}
        EOF
        echo "Custom values file created."

    - name: Deploy Helm chart
      id: deploy
      shell: bash
      run: |
        chart_source_type="${{ inputs.chart-source-type }}"
        CHART_SOURCE=""
        CHART_URL=""

        if [ "$chart_source_type" = "oci" ]; then
          # Construct OCI chart URL
          if [ "${{ inputs.registry }}" != "docker.io" ]; then
            CHART_URL="oci://${{ inputs.registry }}/${{ inputs.repository }}/${{ inputs.chart-name }}:${{ inputs.chart-version }}"
          else
            CHART_URL="oci://${{ inputs.repository }}/${{ inputs.chart-name }}:${{ inputs.chart-version }}"
          fi
          CHART_SOURCE="${CHART_URL}"
        else
          # Deploy from a classic Helm chart repository (e.g., ChartMuseum)
          CHART_SOURCE="${{ inputs.chart-name }}"
          CHART_URL="${{ inputs.chart-repo-url }}"
        fi
        
        echo "chart-url=${CHART_URL}" >> $GITHUB_OUTPUT
        
        echo "Deploying Helm chart..."
        echo "Chart source type: ${chart_source_type}"
        echo "Chart URL: ${CHART_URL}"
        echo "Release name: ${{ inputs.release-name }}"
        echo "Namespace: ${{ inputs.namespace }}"
        
        # Build helm command as array to properly handle arguments with spaces and special characters
        HELM_ARGS=("helm" "upgrade" "--install" "${{ inputs.release-name }}" "${CHART_SOURCE}" "--namespace" "${{ inputs.namespace }}")

        if [ "$chart_source_type" = "chartmuseum" ]; then
          HELM_ARGS+=("--repo" "${{ inputs.chart-repo-url }}")
          HELM_ARGS+=("--version" "${{ inputs.chart-version }}")
          if [ -n "${{ inputs.chart-repo-username }}" ]; then
            HELM_ARGS+=("--username" "${{ inputs.chart-repo-username }}")
          fi
          if [ -n "${{ inputs.chart-repo-password }}" ]; then
            HELM_ARGS+=("--password" "${{ inputs.chart-repo-password }}")
          fi
        fi
        
        # Add timeout and wait options
        if [ "${{ inputs.wait }}" == "true" ]; then
          HELM_ARGS+=("--wait")
        fi
        HELM_ARGS+=("--timeout" "${{ inputs.timeout }}")
        
        # Add image repository and tag if provided
        if [ -n "${{ inputs.image-repository }}" ]; then
          HELM_ARGS+=("--set" "image.repository=${{ inputs.image-repository }}")
        fi
        if [ -n "${{ inputs.image-tag }}" ]; then
          HELM_ARGS+=("--set" "image.tag=${{ inputs.image-tag }}")
        fi
        
        # Add values file if provided
        if [ -n "${{ inputs.values-file }}" ]; then
          HELM_ARGS+=("--values" "${{ inputs.values-file }}")
        fi
        if [ "${{ inputs.values }}" != "" ]; then
          HELM_ARGS+=("--values" "/tmp/custom-values.yaml")
        fi
        
        # Add custom set values (regular values)
        if [ -n "${{ inputs.set-values }}" ]; then
          IFS=',' read -ra VALUES <<< "${{ inputs.set-values }}"
          for value in "${VALUES[@]}"; do
            HELM_ARGS+=("--set" "${value}")
          done
        fi
        
        # Add custom set-string values (secret values)
        # First try the environment variable (preferred), then fall back to input parameter
        secret_values=""
        if [ -n "$SECRET_VALUES" ]; then
          secret_values="$SECRET_VALUES"
        elif [ -n "${{ inputs.set-string-values }}" ]; then
          secret_values="${{ inputs.set-string-values }}"
        fi
        
        if [ -n "$secret_values" ]; then
          echo "Processing secret values..."
          
          # Only process if we have actual content (not just whitespace)
          if [ -n "$(echo "$secret_values" | tr -d '[:space:]')" ]; then
            while [[ "$secret_values" == *","* ]]; do
              value="${secret_values%%,*}"
              if [ -n "$value" ]; then
                HELM_ARGS+=("--set-string" "$value")
              fi
              secret_values="${secret_values#*,}"
            done
            # Handle the last value (or only value if no commas)
            if [ -n "$secret_values" ]; then
              HELM_ARGS+=("--set-string" "$secret_values")
            fi
          else
            echo "No secret values to process"
          fi
        else
          echo "No secret values provided"
        fi
        
        echo "Running Helm upgrade/install..."
        "${HELM_ARGS[@]}"
        
        echo "status=deployed" >> $GITHUB_OUTPUT
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [HELM] Chart deployed::Release: ${{ inputs.release-name }}, namespace: ${{ inputs.namespace }}"

    - name: Verify deployment
      shell: bash
      run: |
        echo "Verifying deployment..."
        
        echo "Helm release status:"
        helm status ${{ inputs.release-name }} --namespace ${{ inputs.namespace }}
        
        echo "Checking pods in namespace ${{ inputs.namespace }}:"
        kubectl get pods -n ${{ inputs.namespace }} -l app.kubernetes.io/instance=${{ inputs.release-name }}
        
        echo "Checking services:"
        kubectl get services -n ${{ inputs.namespace }} -l app.kubernetes.io/instance=${{ inputs.release-name }}
        
        echo "Deployment verification completed!"

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [HELM] Deploy failed::Release '${{ inputs.release-name }}' in namespace '${{ inputs.namespace }}'. Checkpoints — 1) K8s context: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Helm deploy: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}. Check chart source (${{ inputs.chart-source-type }}), image tag, and resource quotas."

    - name: Write action summary
      if: always()
      shell: bash
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        cat >> "$GITHUB_STEP_SUMMARY" << "$EOF"
        ## ☸️ Helm Deploy to Kubernetes

        | Field | Value |
        |-------|-------|
        | Release | \`${{ inputs.release-name }}\` |
        | Chart | \`${{ inputs.chart-name }}:${{ inputs.chart-version }}\` |
        | Namespace | ${{ inputs.namespace }} |
        | Source type | ${{ inputs.chart-source-type }} |
        | Timeout | ${{ inputs.timeout }} |
        | Triggered by | ${{ github.actor }} |

        ## 📋 Checkpoint Summary

        | # | Checkpoint | Status |
        |---|------------|--------|
        | 1 | Kubernetes Context | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |
        | 2 | Helm Chart Deployed | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |
        $EOF