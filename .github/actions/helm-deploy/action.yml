# =============================================================================
# Helm Deploy to Kubernetes
# =============================================================================
# Deploys a Helm chart to a Kubernetes cluster, sourcing the chart from either
# an OCI registry or a classic Helm chart repository (e.g. ChartMuseum), then
# verifies the resulting release.
#
# Behaviour:
#   - Idempotent — uses `helm upgrade --install`, so re-runs converge the release
#     rather than failing on an existing one. Safe for repeated deploys.
#   - Secret-safe — the kubeconfig and all registry/repository passwords are
#     passed via env vars (never inline ${{ }}). Both the OCI registry password
#     and the ChartMuseum repository password are fed over stdin (never the
#     command line / process list) and re-masked in logs.
#   - Resilient — when `atomic` is enabled, a failed deploy is automatically
#     rolled back to the previous release. The correct flag is selected per Helm
#     major version: `--atomic` on Helm 3, `--rollback-on-failure` on Helm 4+
#     (where `--atomic` is deprecated/removed).
#   - Flexible — supports OCI or ChartMuseum sources, custom values files, inline
#     values, and arbitrary --set / --set-string overrides.
#
# Inputs (see the `inputs:` block below for the full list and defaults). Key ones:
#   chart-name, chart-version  (required)  Chart to deploy.
#   repository                 (required)  Repository path in the registry.
#   registry-username/password (required)  OCI registry credentials.
#   kubeconfig                 (required)  Raw YAML or base64-encoded kubeconfig.
#   release-name, namespace               Helm release name and target namespace.
#   chart-source-type                     'oci' (default) or 'chartmuseum'.
#   atomic                                Roll back automatically on failure.
#   secret-set-string-values              Secret --set-string pairs (preferred).
#
# Secret --set-string values can be supplied three ways, in precedence order:
#   1. `secret-set-string-values` input          (preferred, explicit)
#   2. `SECRET_VALUES` step-level env var         (legacy contract, still honored)
#   3. `set-string-values` input                  (fallback)
# The first non-empty source wins; all are applied as `helm --set-string`.
# The legacy `SECRET_VALUES` env path is retained for backward compatibility
# with existing callers that set it as step-level `env:` on the `uses:` step.
#
# Outputs:
#   chart-url       Source chart URL used for the deployment. Set only after the
#                   Helm upgrade/install succeeds (empty on failure).
#
# Usage:
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       steps:
#         - name: Deploy Helm chart
#           id: deploy
#           uses: simplify9/.github/.github/actions/helm-deploy@main
#           with:
#             chart-name: myapp
#             chart-version: 1.2.3
#             repository: myorg/charts
#             registry-username: ${{ secrets.REGISTRY_USERNAME }}
#             registry-password: ${{ secrets.REGISTRY_PASSWORD }}
#             kubeconfig: ${{ secrets.KUBECONFIG }}
#             namespace: production
#             atomic: 'true'
# =============================================================================
name: 'Helm Deploy to Kubernetes'
author: 'Simplify9'
description: 'Deploy Helm chart from OCI registry or ChartMuseum to Kubernetes cluster'

inputs:
  chart-name:
    description: 'Name of the Helm chart'
    required: true
  chart-version:
    description: "Version of the Helm chart to deploy. Required for OCI sources. For chartmuseum sources it is optional — leave empty to deploy the latest version published in the repository."
    required: false
    default: ''
  registry:
    description: 'OCI registry URL where the chart is stored'
    required: false
    default: 'docker.io'
  repository:
    description: 'Repository path in the registry'
    required: true
  registry-username:
    description: 'Registry username for authentication'
    required: true
  registry-password:
    description: 'Registry password or token for authentication'
    required: true
  kubeconfig:
    description: 'Kubeconfig for cluster access. Accepts either a base64-encoded kubeconfig or raw YAML (auto-detected).'
    required: true
  release-name:
    description: 'Helm release name'
    required: false
    default: 'app'
  namespace:
    description: 'Kubernetes namespace to deploy to'
    required: false
    default: 'default'
  image-repository:
    description: 'Docker image repository (for --set image.repository)'
    required: false
  image-tag:
    description: 'Docker image tag (for --set image.tag)'
    required: false
  values-file:
    description: 'Path to values file (relative to chart)'
    required: false
  values:
    description: 'Additional Helm values as YAML string'
    required: false
  set-values:
    description: 'Additional --set values (comma-separated: key1=value1,key2=value2)'
    required: false
  set-string-values:
    description: 'Additional --set-string values (comma-separated: key1=value1,key2=value2). Fallback source for secret string values.'
    required: false
  secret-set-string-values:
    description: 'Secret --set-string values (comma-separated: key1=value1,key2=value2). Preferred, explicit replacement for the legacy SECRET_VALUES env var. Applied as helm --set-string.'
    required: false
  chart-source-type:
    description: 'Chart source type: oci or chartmuseum'
    required: false
    default: 'oci'
  chart-repo-url:
    description: 'Helm chart repository URL (required when chart-source-type is chartmuseum)'
    required: false
  chart-repo-username:
    description: 'Helm chart repository username (optional for private chart repositories)'
    required: false
  chart-repo-password:
    description: 'Helm chart repository password/token (optional for private chart repositories)'
    required: false
  timeout:
    description: 'Helm deployment timeout'
    required: false
    default: '10m'
  wait:
    description: 'Wait for deployment to complete'
    required: false
    default: 'true'
  atomic:
    description: "If 'true', roll back automatically when the deploy fails (--atomic on Helm 3, --rollback-on-failure on Helm 4+). Implies --wait. Default 'false' preserves the historical no-rollback behaviour; 'true' is recommended for production."
    required: false
    default: 'true'
  create-namespace:
    description: 'Create namespace if it does not exist'
    required: false
    default: 'true'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'latest'
  kubectl-version:
    description: 'kubectl version to install'
    required: false
    default: 'latest'

outputs:
  chart-url:
    description: 'Source chart URL used for deployment. Set only after a successful deploy.'
    value: ${{ steps.deploy.outputs.chart-url }}

runs:
  using: 'composite'
  steps:
    - name: Initialize Helm deployment
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "HELM_DEPLOY_CP1_STATUS=⏳ Pending"
          echo "HELM_DEPLOY_CP2_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: ${{ inputs.kubectl-version }}

    - name: Configure Kubernetes context
      shell: bash
      env:
        # Pass the kubeconfig via env (not inline ${{ }}) so its contents never
        # render into the script; printf '%s' keeps the bytes exact.
        KUBECONFIG_DATA: ${{ inputs.kubeconfig }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "::group::☸️ [CHECKPOINT 1/2] Configure Kubernetes Context"
        echo "Configuring Kubernetes context..."
        mkdir -p ~/.kube

        # Accept the kubeconfig as raw YAML or base64-encoded (auto-detected,
        # mirroring the reusable workflow's gateway-onboarding step). A raw
        # kubeconfig is written through as-is; otherwise we base64-decode, falling
        # back to raw if the value turns out not to be valid base64.
        if printf '%s' "$KUBECONFIG_DATA" | grep -q 'apiVersion:'; then
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        else
          printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config 2>/dev/null \
            || printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        fi
        chmod 600 ~/.kube/config

        echo "Current context:"
        kubectl config current-context

        echo "Cluster info:"
        kubectl cluster-info
        echo "HELM_DEPLOY_CP1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Kubernetes context configured — namespace: $NAMESPACE"
        echo "::endgroup::"

    - name: Validate chart source inputs
      shell: bash
      env:
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
        REPOSITORY: ${{ inputs.repository }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        CHART_REPO_URL: ${{ inputs.chart-repo-url }}
        CHART_VERSION: ${{ inputs.chart-version }}
      run: |
        set -euo pipefail
        echo "::group::🔎 Validate chart source inputs"
        case "$CHART_SOURCE_TYPE" in
          oci)
            if [ -z "$REPOSITORY" ]; then
              echo "Error: repository is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "$CHART_VERSION" ]; then
              echo "Error: chart-version is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "$REGISTRY_USERNAME" ]; then
              echo "Error: registry-username is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "$REGISTRY_PASSWORD" ]; then
              echo "Error: registry-password is required when chart-source-type is oci."
              exit 1
            fi
            ;;
          chartmuseum)
            if [ -z "$CHART_REPO_URL" ]; then
              echo "Error: chart-repo-url is required when chart-source-type is chartmuseum."
              exit 1
            fi
            ;;
          *)
            echo "Error: Unsupported chart-source-type '$CHART_SOURCE_TYPE'. Use 'oci' or 'chartmuseum'."
            exit 1
            ;;
        esac
        echo "✅ Chart source inputs valid ($CHART_SOURCE_TYPE)"
        echo "::endgroup::"

    - name: Configure Helm registry authentication
      if: inputs.chart-source-type == 'oci'
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
      run: |
        set -euo pipefail
        echo "::group::🔑 Configure Helm OCI registry authentication"
        echo "::add-mask::$REGISTRY_PASSWORD"
        echo "Configuring Helm registry authentication for $REGISTRY"
        registry_host="$REGISTRY"
        if [ "$registry_host" = "docker.io" ]; then
          # Docker Hub's Helm/OCI endpoint requires this hostname for registry login.
          registry_host="registry-1.docker.io"
        fi
        # Feed the password over stdin so it never appears on the command line.
        printf '%s' "$REGISTRY_PASSWORD" | helm registry login "$registry_host" -u "$REGISTRY_USERNAME" --password-stdin
        echo "::endgroup::"

    - name: Configure Helm chart repository
      if: inputs.chart-source-type == 'chartmuseum'
      shell: bash
      env:
        CHART_REPO_URL: ${{ inputs.chart-repo-url }}
        CHART_REPO_USERNAME: ${{ inputs.chart-repo-username }}
        CHART_REPO_PASSWORD: ${{ inputs.chart-repo-password }}
      run: |
        set -euo pipefail
        echo "::group::📦 Configure Helm chart repository (ChartMuseum)"
        # Register the chart repository under a fixed internal alias. The password
        # is masked and fed over stdin (never on the command line / process list),
        # matching the OCI path's secret hygiene.
        add_args=(helm repo add s9-chart-src "$CHART_REPO_URL")
        if [ -n "$CHART_REPO_USERNAME" ]; then
          add_args+=(--username "$CHART_REPO_USERNAME")
        fi
        if [ -n "$CHART_REPO_PASSWORD" ]; then
          echo "::add-mask::$CHART_REPO_PASSWORD"
          add_args+=(--password-stdin)
          printf '%s' "$CHART_REPO_PASSWORD" | "${add_args[@]}"
        else
          "${add_args[@]}"
        fi
        helm repo update s9-chart-src
        echo "✅ Chart repository configured"
        echo "::endgroup::"

    - name: Deploy Helm chart
      id: deploy
      shell: bash
      env:
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        CHART_NAME: ${{ inputs.chart-name }}
        CHART_VERSION: ${{ inputs.chart-version }}
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        CHART_REPO_URL: ${{ inputs.chart-repo-url }}
        WAIT: ${{ inputs.wait }}
        ATOMIC: ${{ inputs.atomic }}
        CREATE_NAMESPACE: ${{ inputs.create-namespace }}
        TIMEOUT: ${{ inputs.timeout }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        VALUES_FILE: ${{ inputs.values-file }}
        VALUES: ${{ inputs.values }}
        SET_VALUES: ${{ inputs.set-values }}
        SET_STRING_VALUES: ${{ inputs.set-string-values }}
        # New explicit input for secret --set-string values. NOTE: the legacy
        # SECRET_VALUES env var is intentionally NOT declared here so that a
        # caller's inherited step-level SECRET_VALUES is not shadowed (it is read
        # directly from the environment below for backward compatibility).
        SECRET_SET_STRING_VALUES: ${{ inputs.secret-set-string-values }}
      run: |
        set -euo pipefail
        echo "::group::🚀 [CHECKPOINT 2/2] Deploy Helm chart"

        # Clean up any temporary values file on exit (success or failure).
        VALUES_TMP=""
        cleanup() { [ -n "${VALUES_TMP:-}" ] && rm -f "$VALUES_TMP" || true; }
        trap cleanup EXIT

        # Append comma-separated key=value pairs to HELM_ARGS under the given
        # flag. Used for both --set and --set-string so the two paths share one
        # implementation. Empty / whitespace-only fragments (e.g. trailing
        # commas) are skipped so we never emit a bare `--set ""`.
        append_set_args() {
          local flag="$1" csv="$2" pair
          [ -z "$csv" ] && return 0
          local IFS=','
          read -ra _pairs <<< "$csv"
          for pair in "${_pairs[@]}"; do
            [ -z "${pair//[[:space:]]/}" ] && continue
            HELM_ARGS+=("$flag" "$pair")
          done
        }

        CHART_SOURCE=""
        CHART_URL=""

        if [ "$CHART_SOURCE_TYPE" = "oci" ]; then
          # Construct OCI chart URL
          if [ "$REGISTRY" != "docker.io" ]; then
            CHART_URL="oci://$REGISTRY/$REPOSITORY/$CHART_NAME:$CHART_VERSION"
          else
            CHART_URL="oci://$REPOSITORY/$CHART_NAME:$CHART_VERSION"
          fi
          CHART_SOURCE="${CHART_URL}"
        else
          # Deploy from a classic Helm chart repository (e.g., ChartMuseum). The
          # repo was registered under the s9-chart-src alias in the previous step.
          CHART_SOURCE="s9-chart-src/$CHART_NAME"
          CHART_URL="$CHART_REPO_URL"
        fi

        echo "Deploying Helm chart..."
        echo "Chart source type: ${CHART_SOURCE_TYPE}"
        echo "Chart URL: ${CHART_URL}"
        echo "Release name: $RELEASE_NAME"
        echo "Namespace: $NAMESPACE"

        # Build helm command as array to properly handle arguments with spaces and special characters
        HELM_ARGS=("helm" "upgrade" "--install" "$RELEASE_NAME" "${CHART_SOURCE}" "--namespace" "$NAMESPACE")

        if [ "$CREATE_NAMESPACE" = "true" ]; then
          HELM_ARGS+=("--create-namespace")
        fi

        # Pin the version only when one is supplied. An empty chart-version on a
        # chartmuseum source means "deploy the latest published version".
        if [ "$CHART_SOURCE_TYPE" = "chartmuseum" ] && [ -n "$CHART_VERSION" ]; then
          HELM_ARGS+=("--version" "$CHART_VERSION")
        fi

        # Add wait / timeout options
        if [ "$WAIT" = "true" ]; then
          HELM_ARGS+=("--wait")
        fi
        HELM_ARGS+=("--timeout" "$TIMEOUT")

        # Roll back automatically on failure. The flag was renamed in Helm 4
        # (--atomic -> --rollback-on-failure), so select it per major version.
        if [ "$ATOMIC" = "true" ]; then
          HELM_MAJOR="$(helm version --template '{{.Version}}' 2>/dev/null | sed -E 's/^v?([0-9]+).*/\1/')"
          if [ "${HELM_MAJOR:-3}" -ge 4 ]; then
            HELM_ARGS+=("--rollback-on-failure")
          else
            HELM_ARGS+=("--atomic")
          fi
        fi

        # Add image repository and tag if provided
        if [ -n "$IMAGE_REPOSITORY" ]; then
          HELM_ARGS+=("--set" "image.repository=$IMAGE_REPOSITORY")
        fi
        if [ -n "$IMAGE_TAG" ]; then
          HELM_ARGS+=("--set" "image.tag=$IMAGE_TAG")
        fi

        # Add values file(s). A file path is referenced as-is; inline `values`
        # YAML is written to a private temp file (mode 600) that is removed on
        # exit by the cleanup trap above.
        if [ -n "$VALUES_FILE" ]; then
          HELM_ARGS+=("--values" "$VALUES_FILE")
        fi
        if [ -n "$VALUES" ]; then
          VALUES_TMP="$(mktemp)"
          chmod 600 "$VALUES_TMP"
          printf '%s\n' "$VALUES" > "$VALUES_TMP"
          HELM_ARGS+=("--values" "$VALUES_TMP")
        fi

        # Add custom --set values (non-secret)
        append_set_args "--set" "$SET_VALUES"

        # Add secret --set-string values. Precedence (first non-empty wins):
        #   1) secret-set-string-values input  2) legacy SECRET_VALUES env
        #   3) set-string-values input
        secret_values="${SECRET_SET_STRING_VALUES:-}"
        [ -z "$secret_values" ] && secret_values="${SECRET_VALUES:-}"
        [ -z "$secret_values" ] && secret_values="${SET_STRING_VALUES:-}"
        if [ -n "${secret_values//[[:space:]]/}" ]; then
          echo "Processing secret values..."
          append_set_args "--set-string" "$secret_values"
        else
          echo "No secret values provided"
        fi

        echo "Running Helm upgrade/install..."
        "${HELM_ARGS[@]}"

        # Output is set only after a successful deploy (empty on failure).
        echo "chart-url=${CHART_URL}" >> "$GITHUB_OUTPUT"

        echo "HELM_DEPLOY_CP2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Chart deployed — release: $RELEASE_NAME, namespace: $NAMESPACE"
        echo "::endgroup::"

    - name: Verify deployment
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "::group::🔍 Verify deployment"
        echo "Verifying deployment..."

        echo "Helm release status:"
        helm status "$RELEASE_NAME" --namespace "$NAMESPACE"

        echo "Checking pods in namespace $NAMESPACE:"
        kubectl get pods -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"

        echo "Checking services:"
        kubectl get services -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"

        echo "Deployment verification completed!"
        echo "::endgroup::"

    - name: Write deployment summary
      if: always()
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        CHART_NAME: ${{ inputs.chart-name }}
        CHART_VERSION: ${{ inputs.chart-version }}
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
        CHART_URL: ${{ steps.deploy.outputs.chart-url }}
        DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
      run: |
        set -euo pipefail
        if [ "$DEPLOY_OUTCOME" = "success" ]; then
          status="✅ Succeeded"
        else
          status="❌ Failed"
        fi
        {
          echo "## ☸️ Helm Deploy"
          echo ""
          echo "| Field | Value |"
          echo "| --- | --- |"
          echo "| Status | ${status} |"
          echo "| Release | \`${RELEASE_NAME}\` |"
          echo "| Namespace | \`${NAMESPACE}\` |"
          echo "| Chart | \`${CHART_NAME}:${CHART_VERSION}\` |"
          echo "| Source type | ${CHART_SOURCE_TYPE} |"
          echo "| Chart URL | \`${CHART_URL:-n/a}\` |"
          echo "| K8s context | ${HELM_DEPLOY_CP1_STATUS:-⏭️ Not reached} |"
          echo "| Helm deploy | ${HELM_DEPLOY_CP2_STATUS:-⏭️ Not reached} |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
      run: |
        echo "::error title=❌ [HELM] Deploy failed::Release '$RELEASE_NAME' in namespace '$NAMESPACE'. Checkpoints — 1) K8s context: ${HELM_DEPLOY_CP1_STATUS:-⏭️ Not reached} | 2) Helm deploy: ${HELM_DEPLOY_CP2_STATUS:-⏭️ Not reached}. Check chart source ($CHART_SOURCE_TYPE), image tag, and resource quotas."

branding:
  icon: 'anchor'
  color: 'blue'
