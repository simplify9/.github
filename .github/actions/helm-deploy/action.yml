# =============================================================================
# Helm Deploy to Kubernetes
# =============================================================================
# Deploys a Helm chart to a Kubernetes cluster, sourcing the chart from either
# an OCI registry or a classic Helm chart repository (e.g. ChartMuseum), then
# verifies the resulting release.
#
# Behaviour:
#   - Idempotent — uses `helm upgrade --install`, so re-runs converge the release
#     rather than failing on an existing one. Safe for repeated deploys.
#   - Secret-safe — the kubeconfig and registry password are passed via env vars
#     (never the command line). The registry password is fed to `helm registry
#     login` over stdin and re-masked in logs.
#   - Flexible — supports OCI or ChartMuseum sources, custom values files, inline
#     values, and arbitrary --set / --set-string overrides.
#
# Inputs (see the `inputs:` block below for the full list and defaults). Key ones:
#   chart-name, chart-version  (required)  Chart to deploy.
#   repository                 (required)  Repository path in the registry.
#   registry-username/password (required)  OCI registry credentials.
#   kubeconfig                 (required)  Raw YAML or base64-encoded kubeconfig.
#   release-name, namespace               Helm release name and target namespace.
#   chart-source-type                     'oci' (default) or 'chartmuseum'.
#
# Outputs (set only on the success path):
#   chart-url       Source chart URL used for the deployment.
#
# Usage:
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       steps:
#         - name: Deploy Helm chart
#           id: deploy
#           uses: simplify9/.github/.github/actions/helm-deploy@main
#           with:
#             chart-name: myapp
#             chart-version: 1.2.3
#             repository: myorg/charts
#             registry-username: ${{ secrets.REGISTRY_USERNAME }}
#             registry-password: ${{ secrets.REGISTRY_PASSWORD }}
#             kubeconfig: ${{ secrets.KUBECONFIG }}
#             namespace: production
# =============================================================================
name: 'Helm Deploy to Kubernetes'
author: 'Simplify9'
description: 'Deploy Helm chart from OCI registry or ChartMuseum to Kubernetes cluster'

inputs:
  chart-name:
    description: 'Name of the Helm chart'
    required: true
  chart-version:
    description: 'Version of the Helm chart to deploy'
    required: true
  registry:
    description: 'OCI registry URL where the chart is stored'
    required: false
    default: 'docker.io'
  repository:
    description: 'Repository path in the registry'
    required: true
  registry-username:
    description: 'Registry username for authentication'
    required: true
  registry-password:
    description: 'Registry password or token for authentication'
    required: true
  kubeconfig:
    description: 'Kubeconfig for cluster access. Accepts either a base64-encoded kubeconfig or raw YAML (auto-detected).'
    required: true
  release-name:
    description: 'Helm release name'
    required: false
    default: 'app'
  namespace:
    description: 'Kubernetes namespace to deploy to'
    required: false
    default: 'default'
  image-repository:
    description: 'Docker image repository (for --set image.repository)'
    required: false
  image-tag:
    description: 'Docker image tag (for --set image.tag)'
    required: false
  values-file:
    description: 'Path to values file (relative to chart)'
    required: false
  values:
    description: 'Additional Helm values as YAML string'
    required: false
  set-values:
    description: 'Additional --set values (comma-separated: key1=value1,key2=value2)'
    required: false
  set-string-values:
    description: 'Additional --set-string values (comma-separated: key1=value1,key2=value2)'
    required: false
  chart-source-type:
    description: 'Chart source type: oci or chartmuseum'
    required: false
    default: 'oci'
  chart-repo-url:
    description: 'Helm chart repository URL (required when chart-source-type is chartmuseum)'
    required: false
  chart-repo-username:
    description: 'Helm chart repository username (optional for private chart repositories)'
    required: false
  chart-repo-password:
    description: 'Helm chart repository password/token (optional for private chart repositories)'
    required: false
  timeout:
    description: 'Helm deployment timeout'
    required: false
    default: '10m'
  wait:
    description: 'Wait for deployment to complete'
    required: false
    default: 'true'
  create-namespace:
    description: 'Create namespace if it does not exist'
    required: false
    default: 'true'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'latest'
  kubectl-version:
    description: 'kubectl version to install'
    required: false
    default: 'latest'

outputs:
  chart-url:
    description: 'Source chart URL used for deployment. Set only on success.'
    value: ${{ steps.deploy.outputs.chart-url }}

runs:
  using: 'composite'
  steps:
    - name: Initialize Helm deployment
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CHECKPOINT_1_STATUS=⏳ Pending"
          echo "CHECKPOINT_2_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: ${{ inputs.kubectl-version }}

    - name: Configure Kubernetes context
      shell: bash
      env:
        # Pass the kubeconfig via env (not inline ${{ }}) so its contents never
        # render into the script; printf '%s' keeps the bytes exact.
        KUBECONFIG_DATA: ${{ inputs.kubeconfig }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "::group::☸️ [CHECKPOINT 1/2] Configure Kubernetes Context"
        echo "Configuring Kubernetes context..."
        mkdir -p ~/.kube

        # Accept the kubeconfig as raw YAML or base64-encoded (auto-detected,
        # mirroring the reusable workflow's gateway-onboarding step). A raw
        # kubeconfig is written through as-is; otherwise we base64-decode, falling
        # back to raw if the value turns out not to be valid base64.
        if printf '%s' "$KUBECONFIG_DATA" | grep -q 'apiVersion:'; then
          printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        else
          printf '%s' "$KUBECONFIG_DATA" | base64 -d > ~/.kube/config 2>/dev/null \
            || printf '%s' "$KUBECONFIG_DATA" > ~/.kube/config
        fi
        chmod 600 ~/.kube/config

        echo "Current context:"
        kubectl config current-context

        echo "Cluster info:"
        kubectl cluster-info
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Kubernetes context configured — namespace: $NAMESPACE"
        echo "::endgroup::"

    - name: Create namespace
      if: inputs.create-namespace == 'true'
      shell: bash
      env:
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "Creating namespace: $NAMESPACE"
        kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

    - name: Validate chart source inputs
      shell: bash
      env:
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
        REPOSITORY: ${{ inputs.repository }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
        CHART_REPO_URL: ${{ inputs.chart-repo-url }}
      run: |
        set -euo pipefail
        case "$CHART_SOURCE_TYPE" in
          oci)
            if [ -z "$REPOSITORY" ]; then
              echo "Error: repository is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "$REGISTRY_USERNAME" ]; then
              echo "Error: registry-username is required when chart-source-type is oci."
              exit 1
            fi
            if [ -z "$REGISTRY_PASSWORD" ]; then
              echo "Error: registry-password is required when chart-source-type is oci."
              exit 1
            fi
            ;;
          chartmuseum)
            if [ -z "$CHART_REPO_URL" ]; then
              echo "Error: chart-repo-url is required when chart-source-type is chartmuseum."
              exit 1
            fi
            ;;
          *)
            echo "Error: Unsupported chart-source-type '$CHART_SOURCE_TYPE'. Use 'oci' or 'chartmuseum'."
            exit 1
            ;;
        esac

    - name: Configure Helm registry authentication
      if: inputs.chart-source-type == 'oci'
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
      run: |
        set -euo pipefail
        echo "::add-mask::$REGISTRY_PASSWORD"
        echo "Configuring Helm registry authentication for $REGISTRY"
        registry_host="$REGISTRY"
        if [ "$registry_host" = "docker.io" ]; then
          # Docker Hub's Helm/OCI endpoint requires this hostname for registry login.
          registry_host="registry-1.docker.io"
        fi
        # Feed the password over stdin so it never appears on the command line.
        printf '%s' "$REGISTRY_PASSWORD" | helm registry login "$registry_host" -u "$REGISTRY_USERNAME" --password-stdin

    - name: Prepare values file
      if: inputs.values != ''
      shell: bash
      env:
        VALUES: ${{ inputs.values }}
      run: |
        set -euo pipefail
        echo "Creating temporary values file..."
        printf '%s\n' "$VALUES" > /tmp/custom-values.yaml
        echo "Custom values file created."

    - name: Deploy Helm chart
      id: deploy
      shell: bash
      env:
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        CHART_NAME: ${{ inputs.chart-name }}
        CHART_VERSION: ${{ inputs.chart-version }}
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        CHART_REPO_URL: ${{ inputs.chart-repo-url }}
        CHART_REPO_USERNAME: ${{ inputs.chart-repo-username }}
        CHART_REPO_PASSWORD: ${{ inputs.chart-repo-password }}
        WAIT: ${{ inputs.wait }}
        TIMEOUT: ${{ inputs.timeout }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        VALUES_FILE: ${{ inputs.values-file }}
        VALUES: ${{ inputs.values }}
        SET_VALUES: ${{ inputs.set-values }}
        SET_STRING_VALUES: ${{ inputs.set-string-values }}
      run: |
        set -euo pipefail
        CHART_SOURCE=""
        CHART_URL=""

        if [ "$CHART_SOURCE_TYPE" = "oci" ]; then
          # Construct OCI chart URL
          if [ "$REGISTRY" != "docker.io" ]; then
            CHART_URL="oci://$REGISTRY/$REPOSITORY/$CHART_NAME:$CHART_VERSION"
          else
            CHART_URL="oci://$REPOSITORY/$CHART_NAME:$CHART_VERSION"
          fi
          CHART_SOURCE="${CHART_URL}"
        else
          # Deploy from a classic Helm chart repository (e.g., ChartMuseum)
          CHART_SOURCE="$CHART_NAME"
          CHART_URL="$CHART_REPO_URL"
        fi

        echo "chart-url=${CHART_URL}" >> "$GITHUB_OUTPUT"

        echo "Deploying Helm chart..."
        echo "Chart source type: ${CHART_SOURCE_TYPE}"
        echo "Chart URL: ${CHART_URL}"
        echo "Release name: $RELEASE_NAME"
        echo "Namespace: $NAMESPACE"

        # Build helm command as array to properly handle arguments with spaces and special characters
        HELM_ARGS=("helm" "upgrade" "--install" "$RELEASE_NAME" "${CHART_SOURCE}" "--namespace" "$NAMESPACE")

        if [ "$CHART_SOURCE_TYPE" = "chartmuseum" ]; then
          HELM_ARGS+=("--repo" "$CHART_REPO_URL")
          HELM_ARGS+=("--version" "$CHART_VERSION")
          if [ -n "$CHART_REPO_USERNAME" ]; then
            HELM_ARGS+=("--username" "$CHART_REPO_USERNAME")
          fi
          if [ -n "$CHART_REPO_PASSWORD" ]; then
            HELM_ARGS+=("--password" "$CHART_REPO_PASSWORD")
          fi
        fi

        # Add timeout and wait options
        if [ "$WAIT" == "true" ]; then
          HELM_ARGS+=("--wait")
        fi
        HELM_ARGS+=("--timeout" "$TIMEOUT")

        # Add image repository and tag if provided
        if [ -n "$IMAGE_REPOSITORY" ]; then
          HELM_ARGS+=("--set" "image.repository=$IMAGE_REPOSITORY")
        fi
        if [ -n "$IMAGE_TAG" ]; then
          HELM_ARGS+=("--set" "image.tag=$IMAGE_TAG")
        fi

        # Add values file if provided
        if [ -n "$VALUES_FILE" ]; then
          HELM_ARGS+=("--values" "$VALUES_FILE")
        fi
        if [ "$VALUES" != "" ]; then
          HELM_ARGS+=("--values" "/tmp/custom-values.yaml")
        fi

        # Add custom set values (regular values)
        if [ -n "$SET_VALUES" ]; then
          IFS=',' read -ra VALUES_ARR <<< "$SET_VALUES"
          for value in "${VALUES_ARR[@]}"; do
            HELM_ARGS+=("--set" "${value}")
          done
        fi

        # Add custom set-string values (secret values)
        # First try the environment variable (preferred), then fall back to input parameter
        secret_values=""
        if [ -n "${SECRET_VALUES:-}" ]; then
          secret_values="$SECRET_VALUES"
        elif [ -n "$SET_STRING_VALUES" ]; then
          secret_values="$SET_STRING_VALUES"
        fi

        if [ -n "$secret_values" ]; then
          echo "Processing secret values..."

          # Only process if we have actual content (not just whitespace)
          if [ -n "$(echo "$secret_values" | tr -d '[:space:]')" ]; then
            while [[ "$secret_values" == *","* ]]; do
              value="${secret_values%%,*}"
              if [ -n "$value" ]; then
                HELM_ARGS+=("--set-string" "$value")
              fi
              secret_values="${secret_values#*,}"
            done
            # Handle the last value (or only value if no commas)
            if [ -n "$secret_values" ]; then
              HELM_ARGS+=("--set-string" "$secret_values")
            fi
          else
            echo "No secret values to process"
          fi
        else
          echo "No secret values provided"
        fi

        echo "Running Helm upgrade/install..."
        "${HELM_ARGS[@]}"

        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Chart deployed — release: $RELEASE_NAME, namespace: $NAMESPACE"

    - name: Verify deployment
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "Verifying deployment..."

        echo "Helm release status:"
        helm status "$RELEASE_NAME" --namespace "$NAMESPACE"

        echo "Checking pods in namespace $NAMESPACE:"
        kubectl get pods -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"

        echo "Checking services:"
        kubectl get services -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"

        echo "Deployment verification completed!"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        CHART_SOURCE_TYPE: ${{ inputs.chart-source-type }}
      run: |
        echo "::error title=❌ [HELM] Deploy failed::Release '$RELEASE_NAME' in namespace '$NAMESPACE'. Checkpoints — 1) K8s context: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Helm deploy: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}. Check chart source ($CHART_SOURCE_TYPE), image tag, and resource quotas."

branding:
  icon: 'anchor'
  color: 'blue'
