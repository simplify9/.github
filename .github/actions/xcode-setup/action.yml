name: Simplify9 Xcode Setup
description: Prepare Xcode environment and CocoaPods for iOS build.
author: simplify9
inputs:
  xcodeVersion:
    description: "Xcode major or major.minor version selector (for example: 26 or 16.4)"
    required: false
    default: "26"
runs:
  using: composite
  steps:
    - name: Announce Xcode setup
      shell: bash
      run: |
        echo "::notice title=🍎 [IOS] Xcode Setup::Xcode version: ${{ inputs.xcodeVersion }}, CocoaPods: installing"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
        echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Install CocoaPods
      shell: bash
      run: sudo gem install cocoapods

    - name: Clean and Reinstall Pods
      shell: bash
      run: |
        echo "::group::🍎 [CHECKPOINT 1/2] Install CocoaPods"
        echo "Resetting CocoaPods integration..."
        cd ios
        pod deintegrate
        rm -rf Pods Podfile.lock
        pod install --repo-update

        echo "Verifying .xcconfig files:"
        find . -name "*.xcconfig"
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [IOS] CocoaPods installed::pod install completed"
        echo "::endgroup::"

    - name: Check .xcfilelist presence
      shell: bash
      run: |
        find . -name "*.xcfilelist"

    - name: List .xcconfig files
      shell: bash
      run: |
        echo "Listing all Pod target support files..."
        find ios/Pods/Target\ Support\ Files -name "*.xcconfig"

    - name: Select Xcode
      shell: bash
      run: |
        set -euo pipefail

        XCODE_VERSION="${{ inputs.xcodeVersion }}"
        CANDIDATES=(
          "/Applications/Xcode_${XCODE_VERSION}.app"
          "/Applications/Xcode${XCODE_VERSION}.app"
          "/Applications/Xcode-${XCODE_VERSION}.app"
          "/Applications/Xcode_${XCODE_VERSION}.0.app"
          "/Applications/Xcode${XCODE_VERSION}.0.app"
        )

        XCODE_APP=""
        for p in "${CANDIDATES[@]}"; do
          if [[ -d "$p" ]]; then
            XCODE_APP="$p"
            break
          fi
        done

        if [[ -z "${XCODE_APP}" ]]; then
          echo "ERROR: Could not find an Xcode app for version '${XCODE_VERSION}'."
          ls -d /Applications/Xcode*.app || true
          exit 1
        fi

        echo "Selecting Xcode: ${XCODE_APP}"
        sudo xcode-select -s "${XCODE_APP}/Contents/Developer"
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [IOS] Xcode selected::${XCODE_APP}"

    - name: Check Xcode version
      shell: bash
      run: xcodebuild -version

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [IOS] Xcode setup failed::Xcode version: ${{ inputs.xcodeVersion }}. Checkpoints — 1) CocoaPods: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Xcode selected: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}."

    - name: Write action summary
      if: always()
      shell: bash
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        cat >> "$GITHUB_STEP_SUMMARY" << "$EOF"
        ## 🍎 Xcode Setup

        | Field | Value |
        |-------|-------|
        | Xcode version | ${{ inputs.xcodeVersion }} |
        | Runner | ${{ runner.os }} |
        | Triggered by | ${{ github.actor }} |

        ## 📋 Checkpoint Summary

        | # | Checkpoint | Status |
        |---|------------|--------|
        | 1 | CocoaPods Installed | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |
        | 2 | Xcode Selected | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |
        $EOF
