name: 'Helm Chart Package and Push'
description: 'Package and publish Helm chart to OCI registry or ChartMuseum'
author: 'Simplify9'

inputs:
  chart-path:
    description: 'Path to the Helm chart directory'
    required: false
    default: './chart'
  chart-name:
    description: 'Name of the Helm chart (used for packaging filename)'
    required: true
  version:
    description: 'Chart version and appVersion'
    required: true
  registry:
    description: 'OCI registry URL (e.g., docker.io, registry.digitalocean.com, harbor.example.com)'
    required: false
    default: 'docker.io'
  repository:
    description: 'Repository path in the registry (e.g., simplify9/charts, my-org/helm-charts)'
    required: true
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password or token'
    required: true
  update-chart-yaml:
    description: 'Update Chart.yaml with version and appVersion'
    required: false
    default: 'true'
  package-destination:
    description: 'Directory to store packaged charts'
    required: false
    default: './helm-packages'
  update-dependencies:
    description: 'Update chart dependencies during package (--dependency-update)'
    required: false
    default: 'false'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'latest'
  image-repository:
    description: 'Docker image repository to set in values.yaml'
    required: false
  image-tag:
    description: 'Docker image tag to set in values.yaml'
    required: false
  update-image-values:
    description: 'Update image repository and tag in values.yaml'
    required: false
    default: 'false'
  publish-method:
    description: 'Chart publish method: oci or chartmuseum'
    required: false
    default: 'oci'
  chartmuseum-url:
    description: 'ChartMuseum base URL (required when publish-method is chartmuseum)'
    required: false
  chartmuseum-username:
    description: 'ChartMuseum username (required when publish-method is chartmuseum)'
    required: false
  chartmuseum-password:
    description: 'ChartMuseum password/token (required when publish-method is chartmuseum)'
    required: false

outputs:
  chart-package:
    description: 'Path to the packaged chart file'
    value: ${{ steps.package.outputs.package-path }}
  chart-url:
    description: 'Published chart location (OCI URL or ChartMuseum URL)'
    value: ${{ steps.push_oci.outputs.chart-url || steps.push_chartmuseum.outputs.chart-url }}

runs:
  using: 'composite'
  steps:
    - name: Announce chart package and push
      shell: bash
      run: |
        echo "::notice title=☸️ [HELM] Package and Push Chart::chart: ${{ inputs.chart-name }}:${{ inputs.version }}, source: ${{ inputs.chart-path }}, publish: ${{ inputs.publish-method }}"
        echo "📦 [HELM] Destination: ${{ inputs.package-destination }}, update Chart.yaml: ${{ inputs.update-chart-yaml }}"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"
        echo "CHECKPOINT_2_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Create package destination directory
      shell: bash
      run: |
        mkdir -p ${{ inputs.package-destination }}

    - name: Update Chart.yaml versions
      if: inputs.update-chart-yaml == 'true'
      shell: bash
      run: |
        echo "Updating Chart.yaml with version: ${{ inputs.version }}"
        sed -i "s/^version:.*/version: ${{ inputs.version }}/" ${{ inputs.chart-path }}/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: ${{ inputs.version }}/" ${{ inputs.chart-path }}/Chart.yaml
        
        echo "Updated Chart.yaml content:"
        cat ${{ inputs.chart-path }}/Chart.yaml

    - name: Update values.yaml image configuration
      if: inputs.update-image-values == 'true'
      shell: bash
      run: |
        VALUES_FILE="${{ inputs.chart-path }}/values.yaml"
        
        if [ -n "${{ inputs.image-repository }}" ]; then
          # Convert image repository to lowercase
          IMAGE_REPO_LOWER=$(echo "${{ inputs.image-repository }}" | tr '[:upper:]' '[:lower:]')
          echo "Updating image repository to: ${IMAGE_REPO_LOWER} (lowercase)"
          if grep -q "^image:" "$VALUES_FILE"; then
            # Update existing image.repository with lowercase value
            sed -i "/^image:/,/^[[:space:]]*repository:/ s|repository:.*|repository: ${IMAGE_REPO_LOWER}|" "$VALUES_FILE"
          else
            echo "Warning: image.repository not found in values.yaml"
          fi
        fi
        
        if [ -n "${{ inputs.image-tag }}" ]; then
          echo "Updating image tag to: ${{ inputs.image-tag }}"
          if grep -q "^image:" "$VALUES_FILE"; then
            # Update existing image.tag
            sed -i "/^image:/,/^[[:space:]]*tag:/ s|tag:.*|tag: \"${{ inputs.image-tag }}\"|" "$VALUES_FILE"
          else
            echo "Warning: image.tag not found in values.yaml"
          fi
        fi
        
        if [ "${{ inputs.update-image-values }}" == "true" ]; then
          echo "Updated values.yaml image section:"
          sed -n '/^image:/,/^[^[:space:]]/p' "$VALUES_FILE" | head -n -1
        fi

    - name: Package Helm chart
      id: package
      shell: bash
      run: |
        echo "::group::☸️ [CHECKPOINT 1/2] Package Helm Chart"
        echo "Packaging Helm chart from ${{ inputs.chart-path }}"
        if [ "${{ inputs.update-dependencies }}" = "true" ]; then
          echo "Running helm package with dependency update enabled"
          helm package ${{ inputs.chart-path }} --dependency-update --destination ${{ inputs.package-destination }}/
        else
          helm package ${{ inputs.chart-path }} --destination ${{ inputs.package-destination }}/
        fi
        
        PACKAGE_FILE="${{ inputs.package-destination }}/${{ inputs.chart-name }}-${{ inputs.version }}.tgz"
        echo "package-path=${PACKAGE_FILE}" >> $GITHUB_OUTPUT
        
        echo "Packaged chart: ${PACKAGE_FILE}"
        ls -la ${{ inputs.package-destination }}/
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [HELM] Chart packaged::${{ inputs.chart-name }}-${{ inputs.version }}.tgz"
        echo "::endgroup::"

    - name: Validate publish configuration
      shell: bash
      run: |
        publish_method="${{ inputs.publish-method }}"
        case "$publish_method" in
          oci|chartmuseum)
            ;;
          *)
            echo "Error: Unsupported publish-method '$publish_method'. Use 'oci' or 'chartmuseum'."
            exit 1
            ;;
        esac

        if [ "$publish_method" = "chartmuseum" ]; then
          if [ -z "${{ inputs.chartmuseum-url }}" ]; then
            echo "Error: chartmuseum-url is required when publish-method is chartmuseum."
            exit 1
          fi
          if [ -z "${{ inputs.chartmuseum-username }}" ]; then
            echo "Error: chartmuseum-username is required when publish-method is chartmuseum."
            exit 1
          fi
          if [ -z "${{ inputs.chartmuseum-password }}" ]; then
            echo "Error: chartmuseum-password is required when publish-method is chartmuseum."
            exit 1
          fi
        fi

    - name: Configure Helm registry authentication
      if: inputs.publish-method == 'oci'
      shell: bash
      run: |
        echo "::add-mask::${{ inputs.password }}"
        echo "🔐 Authenticating with OCI registry: ${{ inputs.registry }}..."
        registry_host="${{ inputs.registry }}"
        if [ "$registry_host" = "docker.io" ]; then
          # Docker Hub's Helm/OCI endpoint requires this hostname for registry login.
          registry_host="registry-1.docker.io"
        fi
        helm registry login "$registry_host" -u ${{ inputs.username }} -p ${{ inputs.password }}
        echo "✅ Registry authentication successful."

    - name: Push Helm chart to OCI registry
      if: inputs.publish-method == 'oci'
      id: push_oci
      shell: bash
      run: |
        PACKAGE_FILE="${{ inputs.package-destination }}/${{ inputs.chart-name }}-${{ inputs.version }}.tgz"
        
        if [ "${{ inputs.registry }}" != "docker.io" ]; then
          CHART_URL="oci://${{ inputs.registry }}/${{ inputs.repository }}"
        else
          CHART_URL="oci://${{ inputs.repository }}"
        fi
        
        echo "Pushing chart to: ${CHART_URL}"
        helm push "${PACKAGE_FILE}" "${CHART_URL}"
        
        echo "chart-url=${CHART_URL}/${{ inputs.chart-name }}:${{ inputs.version }}" >> $GITHUB_OUTPUT
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [HELM] Chart pushed (OCI)::${{ inputs.chart-name }}:${{ inputs.version }} → ${{ inputs.registry }}"

    - name: Push Helm chart to ChartMuseum
      if: inputs.publish-method == 'chartmuseum'
      id: push_chartmuseum
      shell: bash
      run: |
        CHARTMUSEUM_URL="${{ inputs.chartmuseum-url }}"
        CHARTMUSEUM_API_URL="${CHARTMUSEUM_URL%/}/api/charts"
        shopt -s nullglob
        chart_packages=("${{ inputs.package-destination }}"/*.tgz)

        if [ ${#chart_packages[@]} -eq 0 ]; then
          echo "Error: No packaged charts found under ${{ inputs.package-destination }}"
          exit 1
        fi

        echo "::add-mask::${{ inputs.chartmuseum-password }}"
        echo "📡 Uploading chart(s) to ChartMuseum: ${CHARTMUSEUM_API_URL}"
        for f in "${chart_packages[@]}"; do
          echo "🚀 Uploading '$(basename "$f")'..."
          curl --fail --show-error --silent --data-binary "@${f}" \
            "${CHARTMUSEUM_API_URL}" \
            --user "${{ inputs.chartmuseum-username }}:${{ inputs.chartmuseum-password }}"
          echo "✅ '$(basename "$f")' uploaded successfully."
        done

        echo "chart-url=${CHARTMUSEUM_URL%/}" >> $GITHUB_OUTPUT
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "::notice title=✅ [HELM] Chart pushed (ChartMuseum)::${{ inputs.chart-name }}:${{ inputs.version }} → ${{ inputs.chartmuseum-url }}"

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [HELM] Package/push failed::Chart '${{ inputs.chart-name }}:${{ inputs.version }}'. Checkpoints — 1) Packaged: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Pushed: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}. Check chart path and registry credentials."

    - name: Write action summary
      if: always()
      shell: bash
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        cat >> "$GITHUB_STEP_SUMMARY" << "$EOF"
        ## ☸️ Helm Chart Package and Push

        | Field | Value |
        |-------|-------|
        | Chart | \`${{ inputs.chart-name }}:${{ inputs.version }}\` |
        | Source | ${{ inputs.chart-path }} |
        | Publish method | ${{ inputs.publish-method }} |
        | Runner | ${{ runner.os }} |
        | Triggered by | ${{ github.actor }} |

        ## 📋 Checkpoint Summary

        | # | Checkpoint | Status |
        |---|------------|--------|
        | 1 | Chart Packaged | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |
        | 2 | Chart Pushed | ${CHECKPOINT_2_STATUS:-⏭️ Not reached} |
        $EOF
