# =============================================================================
# Helm Chart Package and Push
# =============================================================================
# Packages a Helm chart and publishes it to either an OCI registry (helm push)
# or a ChartMuseum instance (HTTP upload). Optionally rewrites Chart.yaml
# version/appVersion and the image repository/tag in values.yaml before packaging.
#
# Behaviour:
#   - Registry/ChartMuseum credentials are passed via env vars and read from
#     stdin (helm login --password-stdin) or curl --netrc-style env, never as a
#     literal command-line argument.
#   - publish-method selects oci (default) or chartmuseum; the unused path is
#     skipped via step-level if: conditions.
#   - Image repository values are lowercased before being written to values.yaml.
#
# Inputs:
#   chart-path            (optional)  Chart directory. Default './chart'.
#   chart-name            (required)  Chart name (used for the package filename).
#   version               (required)  Chart version and appVersion.
#   registry              (optional)  OCI registry URL. Default 'docker.io'.
#   repository            (required)  Repository path within the registry.
#   username              (required)  Registry username.
#   password              (required)  Registry password or token.
#   update-chart-yaml     (optional)  Update Chart.yaml versions. Default 'true'.
#   package-destination   (optional)  Output dir for packages. Default './helm-packages'.
#   update-dependencies   (optional)  Run helm package --dependency-update. Default 'false'.
#   helm-version          (optional)  Helm version to install. Default 'latest'.
#   image-repository      (optional)  Image repository to set in values.yaml.
#   image-tag             (optional)  Image tag to set in values.yaml.
#   update-image-values   (optional)  Update image repo/tag in values.yaml. Default 'false'.
#   publish-method        (optional)  'oci' or 'chartmuseum'. Default 'oci'.
#   chartmuseum-url       (optional)  ChartMuseum base URL (required for chartmuseum).
#   chartmuseum-username  (optional)  ChartMuseum username (required for chartmuseum).
#   chartmuseum-password  (optional)  ChartMuseum password/token (required for chartmuseum).
#
# Outputs (set on the success path):
#   chart-package  Path to the packaged chart file.
#   chart-url      Published chart location (OCI URL or ChartMuseum URL).
#
# Usage:
#   - name: Package and push Helm chart
#     uses: simplify9/.github/.github/actions/helm-package-push@main
#     with:
#       chart-name: my-app
#       version: ${{ needs.version.outputs.version }}
#       registry: registry.digitalocean.com
#       repository: my-org/charts
#       username: ${{ secrets.DO_REGISTRY_TOKEN }}
#       password: ${{ secrets.DO_REGISTRY_TOKEN }}
# =============================================================================
name: 'Helm Chart Package and Push'
author: 'Simplify9'
description: 'Package and publish Helm chart to OCI registry or ChartMuseum'

inputs:
  chart-path:
    description: 'Path to the Helm chart directory'
    required: false
    default: './chart'
  chart-name:
    description: 'Name of the Helm chart (used for packaging filename)'
    required: true
  version:
    description: 'Chart version and appVersion'
    required: true
  registry:
    description: 'OCI registry URL (e.g., docker.io, registry.digitalocean.com, harbor.example.com)'
    required: false
    default: 'docker.io'
  repository:
    description: 'Repository path in the registry (e.g., simplify9/charts, my-org/helm-charts)'
    required: true
  username:
    description: 'Registry username'
    required: true
  password:
    description: 'Registry password or token'
    required: true
  update-chart-yaml:
    description: 'Update Chart.yaml with version and appVersion'
    required: false
    default: 'true'
  package-destination:
    description: 'Directory to store packaged charts'
    required: false
    default: './helm-packages'
  update-dependencies:
    description: 'Update chart dependencies during package (--dependency-update)'
    required: false
    default: 'false'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'latest'
  image-repository:
    description: 'Docker image repository to set in values.yaml'
    required: false
  image-tag:
    description: 'Docker image tag to set in values.yaml'
    required: false
  update-image-values:
    description: 'Update image repository and tag in values.yaml'
    required: false
    default: 'false'
  publish-method:
    description: 'Chart publish method: oci or chartmuseum'
    required: false
    default: 'oci'
  chartmuseum-url:
    description: 'ChartMuseum base URL (required when publish-method is chartmuseum)'
    required: false
  chartmuseum-username:
    description: 'ChartMuseum username (required when publish-method is chartmuseum)'
    required: false
  chartmuseum-password:
    description: 'ChartMuseum password/token (required when publish-method is chartmuseum)'
    required: false

outputs:
  chart-package:
    description: 'Path to the packaged chart file'
    value: ${{ steps.package.outputs.package-path }}
  chart-url:
    description: 'Published chart location (OCI URL or ChartMuseum URL)'
    value: ${{ steps.push_oci.outputs.chart-url || steps.push_chartmuseum.outputs.chart-url }}

runs:
  using: 'composite'
  steps:
    - name: Initialize chart package and push
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "CHECKPOINT_1_STATUS=⏳ Pending"
          echo "CHECKPOINT_2_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Create package destination directory
      shell: bash
      env:
        PACKAGE_DESTINATION: ${{ inputs.package-destination }}
      run: |
        set -euo pipefail
        mkdir -p "$PACKAGE_DESTINATION"

    - name: Update Chart.yaml versions
      if: inputs.update-chart-yaml == 'true'
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        CHART_PATH: ${{ inputs.chart-path }}
      run: |
        set -euo pipefail
        echo "Updating Chart.yaml with version: $VERSION"
        sed -i "s/^version:.*/version: $VERSION/" "$CHART_PATH/Chart.yaml"
        sed -i "s/^appVersion:.*/appVersion: $VERSION/" "$CHART_PATH/Chart.yaml"

        echo "Updated Chart.yaml content:"
        cat "$CHART_PATH/Chart.yaml"

    - name: Update values.yaml image configuration
      if: inputs.update-image-values == 'true'
      shell: bash
      env:
        CHART_PATH: ${{ inputs.chart-path }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        UPDATE_IMAGE_VALUES: ${{ inputs.update-image-values }}
      run: |
        set -euo pipefail
        VALUES_FILE="$CHART_PATH/values.yaml"

        if [ -n "$IMAGE_REPOSITORY" ]; then
          # Convert image repository to lowercase
          IMAGE_REPO_LOWER=$(echo "$IMAGE_REPOSITORY" | tr '[:upper:]' '[:lower:]')
          echo "Updating image repository to: ${IMAGE_REPO_LOWER} (lowercase)"
          if grep -q "^image:" "$VALUES_FILE"; then
            # Update existing image.repository with lowercase value
            sed -i "/^image:/,/^[[:space:]]*repository:/ s|repository:.*|repository: ${IMAGE_REPO_LOWER}|" "$VALUES_FILE"
          else
            echo "::warning title=image.repository not updated::image.repository not found in values.yaml"
          fi
        fi

        if [ -n "$IMAGE_TAG" ]; then
          echo "Updating image tag to: $IMAGE_TAG"
          if grep -q "^image:" "$VALUES_FILE"; then
            # Update existing image.tag
            sed -i "/^image:/,/^[[:space:]]*tag:/ s|tag:.*|tag: \"${IMAGE_TAG}\"|" "$VALUES_FILE"
          else
            echo "::warning title=image.tag not updated::image.tag not found in values.yaml"
          fi
        fi

        if [ "$UPDATE_IMAGE_VALUES" == "true" ]; then
          echo "Updated values.yaml image section:"
          sed -n '/^image:/,/^[^[:space:]]/p' "$VALUES_FILE" | head -n -1
        fi

    - name: Package Helm chart
      id: package
      shell: bash
      env:
        CHART_PATH: ${{ inputs.chart-path }}
        CHART_NAME: ${{ inputs.chart-name }}
        VERSION: ${{ inputs.version }}
        PACKAGE_DESTINATION: ${{ inputs.package-destination }}
        UPDATE_DEPENDENCIES: ${{ inputs.update-dependencies }}
      run: |
        set -euo pipefail
        echo "::group::☸️ [CHECKPOINT 1/2] Package Helm Chart"
        echo "Packaging Helm chart from $CHART_PATH"
        if [ "$UPDATE_DEPENDENCIES" = "true" ]; then
          echo "Running helm package with dependency update enabled"
          helm package "$CHART_PATH" --dependency-update --destination "$PACKAGE_DESTINATION/"
        else
          helm package "$CHART_PATH" --destination "$PACKAGE_DESTINATION/"
        fi

        PACKAGE_FILE="$PACKAGE_DESTINATION/$CHART_NAME-$VERSION.tgz"
        echo "package-path=${PACKAGE_FILE}" >> "$GITHUB_OUTPUT"

        echo "Packaged chart: ${PACKAGE_FILE}"
        ls -la "$PACKAGE_DESTINATION/"
        echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Chart packaged — $CHART_NAME-$VERSION.tgz"
        echo "::endgroup::"

    - name: Validate publish configuration
      shell: bash
      env:
        PUBLISH_METHOD: ${{ inputs.publish-method }}
        CHARTMUSEUM_URL: ${{ inputs.chartmuseum-url }}
        CHARTMUSEUM_USERNAME: ${{ inputs.chartmuseum-username }}
        CHARTMUSEUM_PASSWORD: ${{ inputs.chartmuseum-password }}
      run: |
        set -euo pipefail
        case "$PUBLISH_METHOD" in
          oci|chartmuseum)
            ;;
          *)
            echo "Error: Unsupported publish-method '$PUBLISH_METHOD'. Use 'oci' or 'chartmuseum'."
            exit 1
            ;;
        esac

        if [ "$PUBLISH_METHOD" = "chartmuseum" ]; then
          if [ -z "$CHARTMUSEUM_URL" ]; then
            echo "Error: chartmuseum-url is required when publish-method is chartmuseum."
            exit 1
          fi
          if [ -z "$CHARTMUSEUM_USERNAME" ]; then
            echo "Error: chartmuseum-username is required when publish-method is chartmuseum."
            exit 1
          fi
          if [ -z "$CHARTMUSEUM_PASSWORD" ]; then
            echo "Error: chartmuseum-password is required when publish-method is chartmuseum."
            exit 1
          fi
        fi

    - name: Configure Helm registry authentication
      if: inputs.publish-method == 'oci'
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        USERNAME: ${{ inputs.username }}
        PASSWORD: ${{ inputs.password }}
      run: |
        set -euo pipefail
        echo "::add-mask::$PASSWORD"
        echo "🔐 Authenticating with OCI registry: $REGISTRY..."
        registry_host="$REGISTRY"
        if [ "$registry_host" = "docker.io" ]; then
          # Docker Hub's Helm/OCI endpoint requires this hostname for registry login.
          registry_host="registry-1.docker.io"
        fi
        printf '%s' "$PASSWORD" | helm registry login "$registry_host" -u "$USERNAME" --password-stdin
        echo "✅ Registry authentication successful."

    - name: Push Helm chart to OCI registry
      if: inputs.publish-method == 'oci'
      id: push_oci
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        CHART_NAME: ${{ inputs.chart-name }}
        VERSION: ${{ inputs.version }}
        PACKAGE_DESTINATION: ${{ inputs.package-destination }}
      run: |
        set -euo pipefail
        PACKAGE_FILE="$PACKAGE_DESTINATION/$CHART_NAME-$VERSION.tgz"

        if [ "$REGISTRY" != "docker.io" ]; then
          CHART_URL="oci://$REGISTRY/$REPOSITORY"
        else
          CHART_URL="oci://$REPOSITORY"
        fi

        echo "Pushing chart to: ${CHART_URL}"
        helm push "${PACKAGE_FILE}" "${CHART_URL}"

        echo "chart-url=${CHART_URL}/$CHART_NAME:$VERSION" >> "$GITHUB_OUTPUT"
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Chart pushed (OCI) — $CHART_NAME:$VERSION → $REGISTRY"

    - name: Push Helm chart to ChartMuseum
      if: inputs.publish-method == 'chartmuseum'
      id: push_chartmuseum
      shell: bash
      env:
        CHARTMUSEUM_URL: ${{ inputs.chartmuseum-url }}
        CHARTMUSEUM_USERNAME: ${{ inputs.chartmuseum-username }}
        CHARTMUSEUM_PASSWORD: ${{ inputs.chartmuseum-password }}
        CHART_NAME: ${{ inputs.chart-name }}
        VERSION: ${{ inputs.version }}
        PACKAGE_DESTINATION: ${{ inputs.package-destination }}
      run: |
        set -euo pipefail
        CHARTMUSEUM_API_URL="${CHARTMUSEUM_URL%/}/api/charts"
        shopt -s nullglob
        chart_packages=("$PACKAGE_DESTINATION"/*.tgz)

        if [ ${#chart_packages[@]} -eq 0 ]; then
          echo "Error: No packaged charts found under $PACKAGE_DESTINATION"
          exit 1
        fi

        echo "::add-mask::$CHARTMUSEUM_PASSWORD"
        echo "📡 Uploading chart(s) to ChartMuseum: ${CHARTMUSEUM_API_URL}"
        for f in "${chart_packages[@]}"; do
          echo "🚀 Uploading '$(basename "$f")'..."
          curl -sS --max-time 30 --retry 3 --retry-connrefused \
            --fail --show-error --data-binary "@${f}" \
            "${CHARTMUSEUM_API_URL}" \
            --user "${CHARTMUSEUM_USERNAME}:${CHARTMUSEUM_PASSWORD}"
          echo "✅ '$(basename "$f")' uploaded successfully."
        done

        echo "chart-url=${CHARTMUSEUM_URL%/}" >> "$GITHUB_OUTPUT"
        echo "CHECKPOINT_2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Chart pushed (ChartMuseum) — $CHART_NAME:$VERSION → $CHARTMUSEUM_URL"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        CHART_NAME: ${{ inputs.chart-name }}
        VERSION: ${{ inputs.version }}
      run: |
        echo "::error title=❌ [HELM] Package/push failed::Chart '$CHART_NAME:$VERSION'. Checkpoints — 1) Packaged: ${CHECKPOINT_1_STATUS:-⏭️ Not reached} | 2) Pushed: ${CHECKPOINT_2_STATUS:-⏭️ Not reached}. Check chart path and registry credentials."

branding:
  icon: 'anchor'
  color: 'blue'
