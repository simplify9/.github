# =============================================================================
# Check Critical Dependabot Vulnerabilities
# =============================================================================
# Queries the Dependabot Alerts REST API for open CRITICAL-severity alerts on
# the target repository and FAILS the step (non-zero exit) if any are found.
# This is the single mechanism reused at three call sites: the PR-time
# critical-vuln-gate reusable workflow (enforced via branch protection), the
# build-time gate embedded in every deploy/build reusable workflow, and a
# dependency of the dependabot-auto-merge workflow-template.
#
# Deliberately NOT actions/dependency-review-action: that action's private-repo
# enforcement guarantees have historically required a GitHub Advanced Security
# license, and this org is on the Team plan.
#
# IMPORTANT — confirmed by live testing (2026-07-12): the Dependabot Alerts API
# rejects the ephemeral Actions GITHUB_TOKEN outright ("Resource not accessible
# by integration"), even when the calling job grants `security-events: read`.
# This is a token-TYPE restriction, not a permission-scope one -- no amount of
# `permissions:` configuration on any caller fixes it. This action requires a
# real Personal Access Token or GitHub App installation token with "Dependabot
# alerts: read" instead, passed in via the `dependabot-alerts-token` input.
#
# PR-BRANCH VERIFICATION (npm only, added 2026-07-14): a critical alert only
# clears once its fix lands on the DEFAULT branch -- GitHub never re-scans a
# PR's own branch. That created a real deadlock: a PR that itself contains the
# fix for the only open critical alert could never merge, because the alert
# was still "open" by definition until that exact merge happened. When this
# step runs under `pull_request_target` (i.e. from critical-vuln-gate.yml, not
# the build-time embedded uses, which run on `push` and have no PR to compare
# against), it re-checks each open npm-ecosystem alert against the PR's own
# HEAD branch content: it reads the flagged package's *lockfile* (not the
# manifest -- manifests show a requested range, not the resolved version) at
# the PR head ref, and if every resolved occurrence of that package is outside
# the alert's vulnerable_version_range, that alert no longer counts against
# this PR. Anything unverifiable (non-npm ecosystem, no lockfile match, parse
# failure, missing github-token) fails closed -- stays blocking, same as
# today. This is pure static text parsing of the lockfile via the Contents
# API -- it never checks out or executes the PR's code, so it doesn't
# reintroduce the code-injection risk pull_request_target is normally
# dangerous for.
#
# The yarn.lock parser lives in the sibling parse_yarn_lock.py, not inline --
# a heredoc's closing delimiter (and a Python script's own column-0 top-level
# statements) are both incompatible with this step's YAML `run: |`
# block-scalar indentation rules. package-lock.json needs no such script
# since it's real JSON, handled inline via jq.
#
# LOCKFILE FALLBACK (added 2026-07-23): a PR can migrate package managers as
# part of its fix (e.g. delete package-lock.json, add yarn.lock + a
# `resolutions` pin) before the alert's recorded manifest_path catches up to
# reflect that -- confirmed live on gig-insureapp-survey-mobile#40, where the
# alert still pointed at a package-lock.json the PR had deleted, so the gate
# stayed blocking even though yarn.lock already resolved every flagged
# package to a patched version. If the alert's own manifest_path returns a
# CONFIRMED 404 at the PR head, this now also tries the sibling
# package-lock.json/yarn.lock in the same directory before giving up -- same
# directory scope as the original manifest, just a different filename, so it
# can't cross into an unrelated sub-package's lockfile in a monorepo.
# Whichever file actually supplied content is what gets parsed (by ITS format,
# not the alert's recorded one) and is logged explicitly so a passing gate is
# still auditable.
#
# IMPORTANT -- 404 only, never "empty content": the Contents API also returns
# HTTP 200 with `encoding: "none"` and an empty `.content` for a file that
# still EXISTS but exceeds its ~1MB inline-read cap (confirmed live against a
# real 1.7MB yarn.lock) -- indistinguishable from a deletion by content alone.
# Treating that as "deleted" would let a stale/coexisting sibling lockfile of
# a different package manager silently stand in for a real, still-vulnerable,
# merely-too-large manifest: a false clear on a genuinely open critical alert.
# The fetch loop checks the actual HTTP status before ever looking at content
# -- only a real 404 advances to the next candidate; a 200-with-encoding:none,
# a 403 "too large" (files over the API's ~100MB hard limit), a 200 whose body
# isn't a single "file" (a directory listing, symlink, or submodule), or any
# other non-2xx stops the search immediately and leaves the alert blocking.
#
# The per-alert semver check is also probed upfront (`npx semver 1.2.3 -r
# '>=1.0.0'` must print `1.2.3`) before trusting any of its "not vulnerable"
# results: the semver CLI prints nothing and exits non-zero both when a
# version is genuinely out of range AND when npx itself can't run at all (no
# network/registry), so an unprobed failure would silently clear every npm
# alert in the run instead of failing closed.
#
# Inputs:
#   dependabot-alerts-token  (required)  A PAT/App token (NOT GITHUB_TOKEN) with
#                             "Dependabot alerts: read" on the target repo.
#                             Custom secrets are not automatically available to
#                             a called reusable workflow -- every caller in the
#                             chain must explicitly forward this (there is no
#                             GITHUB_TOKEN-style fallback that works here).
#   repository    (optional)  owner/repo to check. Default: the calling repo.
#   github-token  (optional)  A token with `contents: read` on the target repo,
#                             used ONLY for the PR-branch verification above
#                             (secrets.GITHUB_TOKEN is fine -- composite
#                             actions can't read the secrets context directly,
#                             so the caller must pass it explicitly). Omit it
#                             and verification is skipped entirely -- alerts
#                             fail closed exactly as before this feature
#                             existed.
#
# Outputs (set on both pass and fail — unlike this repo's version/tag actions,
# the count is useful even when it causes a failure, e.g. for the caller's
# job summary):
#   critical-count  Number of open critical-severity alerts found, AFTER
#                   PR-branch verification (see above) has cleared any it
#                   could confirm are already fixed in this PR's branch.
# =============================================================================
name: 'Check Critical Dependabot Vulnerabilities'
author: 'Simplify9'
description: 'Fails if the repository has any open critical-severity Dependabot alert.'

inputs:
  dependabot-alerts-token:
    description: 'PAT/App token (NOT GITHUB_TOKEN) with "Dependabot alerts: read" on the target repository.'
    required: true
  repository:
    description: 'Target repository in owner/repo format. Defaults to the calling repository.'
    required: false
  github-token:
    description: 'Token with contents:read on the target repo, used only to verify npm alerts against the PR head branch. Omit to skip verification.'
    required: false

outputs:
  critical-count:
    description: 'Number of open critical-severity Dependabot alerts found (after PR-branch verification). Set on both pass and fail.'
    value: ${{ steps.check.outputs.critical-count }}

runs:
  using: "composite"
  steps:
    - name: Announce critical-vuln check
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository != '' && inputs.repository || github.repository }}
      run: |
        echo "::notice title=🔒 [VULN-GATE] Critical Vulnerability Check::repository: ${REPOSITORY}"
        echo "VULN_GATE_CP1_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Query Dependabot alerts and evaluate
      id: check
      shell: bash
      env:
        DEPENDABOT_TOKEN: ${{ inputs.dependabot-alerts-token }}
        REPOSITORY: ${{ inputs.repository != '' && inputs.repository || github.repository }}
        GITHUB_READ_TOKEN: ${{ inputs.github-token }}
        EVENT_NAME: ${{ github.event_name }}
        PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
      run: |
        set -uo pipefail
        echo "::add-mask::$DEPENDABOT_TOKEN"
        echo "::add-mask::$GITHUB_READ_TOKEN"
        echo "::group::🔒 [CHECKPOINT 1/1] Query Open Critical Dependabot Alerts"

        if [[ -z "$DEPENDABOT_TOKEN" ]]; then
          echo "::error title=❌ [VULN-GATE] Missing dependabot-alerts-token::${REPOSITORY} — this gate requires a PAT/App token with 'Dependabot alerts: read', forwarded explicitly by the caller (GITHUB_TOKEN cannot access this API regardless of granted permissions). Add a dependabot-alerts-token entry (set to the DEPENDABOT_ALERTS_TOKEN org secret) to this job's secrets block in the caller workflow. Fails closed until forwarded."
          echo "::endgroup::"
          exit 1
        fi

        # NOTE: this endpoint does NOT support page-number pagination (`page=N`
        # is rejected outright with HTTP 400 -- confirmed against a live repo).
        # It uses Link-header cursor pagination like most current GitHub list
        # endpoints: follow the `rel="next"` URL from the response headers
        # until there isn't one.
        url="https://api.github.com/repos/${REPOSITORY}/dependabot/alerts?state=open&severity=critical&per_page=100"
        total_critical=0
        summary_rows=""
        page_num=1
        alerts_file="$(mktemp)"
        echo "[]" > "$alerts_file"

        while [[ -n "$url" ]]; do
          response_file="$(mktemp)"
          headers_file="$(mktemp)"
          # IMPORTANT: `shell: bash` composite-action steps run as
          # `bash --noprofile --norc -e -o pipefail {0}` -- `-e` is baked into
          # the invocation itself and `set -uo pipefail` above does NOT (and
          # cannot) cancel it. Any command below that can legitimately return
          # non-zero (curl transport failure, a grep/pipeline finding no
          # match) MUST be guarded with `|| ...`/`|| true`, or the whole
          # script dies silently the instant that happens -- confirmed live:
          # this exact bug silently killed the gate on every real repo with
          # no Link "next" header, i.e. almost every real repo.
          curl_exit=0
          http_code="$(curl -sS \
            --max-time 30 \
            --retry 3 \
            --retry-connrefused \
            -D "$headers_file" \
            -o "$response_file" \
            -w '%{http_code}' \
            -H "Authorization: Bearer $DEPENDABOT_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "$url")" || curl_exit=$?

          if [[ $curl_exit -ne 0 ]]; then
            echo "::error title=❌ [VULN-GATE] Dependabot Alerts API request failed::Network/transport error (curl exit ${curl_exit}) querying ${REPOSITORY} on page ${page_num}. This gate fails closed on any error, including connectivity issues."
            rm -f "$response_file" "$headers_file"
            echo "::endgroup::"
            exit 1
          fi

          if [[ "$http_code" == "401" || "$http_code" == "403" ]]; then
            echo "::error title=❌ [VULN-GATE] Dependabot Alerts token rejected::${REPOSITORY} returned HTTP ${http_code}. The dependabot-alerts-token input must be a real PAT/App token with 'Dependabot alerts: read' -- GITHUB_TOKEN cannot access this API regardless of granted permissions, confirmed by live testing. This gate fails closed until a valid token is forwarded. Response: $(cat "$response_file")"
            rm -f "$response_file" "$headers_file"
            echo "::endgroup::"
            exit 1
          fi

          if [[ ! "$http_code" =~ ^2[0-9][0-9]$ ]]; then
            echo "::error title=❌ [VULN-GATE] Dependabot Alerts API call failed::HTTP ${http_code} on page ${page_num} for ${REPOSITORY}. Response: $(cat "$response_file")"
            rm -f "$response_file" "$headers_file"
            echo "::endgroup::"
            exit 1
          fi

          page_count="$(jq 'length' "$response_file" 2>/dev/null)" || page_count=0
          page_count="${page_count:-0}"
          if [[ "$page_count" -gt 0 ]]; then
            total_critical=$((total_critical + page_count))
            summary_rows+="$(jq -r '.[] | "| " + (.security_advisory.ghsa_id // "unknown") + " | " + (.dependency.package.name // "unknown") + " | [" + (.html_url // "") + "](" + (.html_url // "") + ") |"' "$response_file" 2>/dev/null)" || true
            summary_rows+=$'\n'
            # Retain full alert detail too (not just the count/summary line
            # above) -- needed by the PR-branch verification pass below.
            merged_alerts_file="$(mktemp)"
            jq -s '.[0] + .[1]' "$alerts_file" "$response_file" > "$merged_alerts_file" 2>/dev/null && mv "$merged_alerts_file" "$alerts_file" || rm -f "$merged_alerts_file"
          fi

          next_url="$(grep -i '^link:' "$headers_file" | grep -o '<[^>]*>; *rel="next"' | sed -E 's/^<(.*)>; *rel="next"$/\1/')" || true
          rm -f "$response_file" "$headers_file"

          if [[ -z "$next_url" ]]; then
            break
          fi
          url="$next_url"
          page_num=$((page_num + 1))
          if [[ "$page_num" -gt 10 ]]; then
            echo "::warning title=⚠️ [VULN-GATE] Pagination cap reached::Stopped after 10 pages (1000 alerts) for ${REPOSITORY} — true count may be higher."
            break
          fi
        done

        if [[ "$total_critical" -gt 0 ]]; then
          echo "::group::🔎 Verify PR branch already resolves flagged npm alerts"
          if [[ "$EVENT_NAME" != "pull_request_target" || -z "$PR_HEAD_SHA" ]]; then
            echo "Not a pull_request_target run with a PR head available -- skipping (this only applies to PR-time gates; build-time/push runs always evaluate the repo as merged, which is already correct)."
          elif [[ -z "$GITHUB_READ_TOKEN" ]]; then
            echo "::warning title=⚠️ [VULN-GATE] No github-token forwarded::Cannot verify whether this PR's branch already resolves flagged alerts -- skipping, all ${total_critical} alert(s) stay blocking."
          elif [[ "$(npx --yes semver 1.2.3 -r '>=1.0.0' 2>/dev/null)" != "1.2.3" ]]; then
            # The `semver` CLI prints the version + exits 0 when in-range, and
            # prints NOTHING + exits non-zero when out-of-range -- the per-alert
            # loop below treats empty output as "not vulnerable". If npx/semver
            # can't even run (no network, registry down, no node on the runner),
            # it produces that exact same empty-output/non-zero-exit signature,
            # which would otherwise silently read as "not vulnerable" for EVERY
            # npm alert this run and clear them all. Probing a known in-range
            # case upfront catches that failure mode before it can be confused
            # with a real range check, and fails closed for the whole PR-branch
            # verification pass instead (same as the missing-token case above).
            echo "::warning title=⚠️ [VULN-GATE] semver tool unavailable::Could not execute 'npx semver' (registry/network issue?) -- skipping PR-branch verification entirely this run, all ${total_critical} alert(s) stay blocking."
          else
            declare -A LOCKFILE_CACHE
            declare -A LOCKFILE_PATH_CACHE
            npm_alerts_json="$(jq -c '[.[] | select(.dependency.package.ecosystem == "npm")]' "$alerts_file" 2>/dev/null)" || npm_alerts_json="[]"
            npm_alert_count="$(printf '%s' "$npm_alerts_json" | jq 'length' 2>/dev/null)" || npm_alert_count=0
            cleared_count=0
            cleared_numbers=""

            for ((i = 0; i < npm_alert_count; i++)); do
              alert="$(printf '%s' "$npm_alerts_json" | jq -c ".[$i]")"
              alert_number="$(printf '%s' "$alert" | jq -r '.number')"
              pkg_name="$(printf '%s' "$alert" | jq -r '.dependency.package.name')"
              manifest_path="$(printf '%s' "$alert" | jq -r '.dependency.manifest_path // empty')"
              vuln_range_raw="$(printf '%s' "$alert" | jq -r '.security_vulnerability.vulnerable_version_range // empty')"
              # NOTE: tracked/excluded by .number (unique per repo), not
              # ghsa_id -- the same GHSA can legitimately appear as two
              # separate alert entries (e.g. the same package required via
              # two different manifest paths in a monorepo), and ghsa_id
              # alone would incorrectly clear/exclude both from the summary
              # if only one was actually resolved.
              ghsa="$(printf '%s' "$alert" | jq -r '.security_advisory.ghsa_id // "unknown"')"

              if [[ -z "$manifest_path" || -z "$vuln_range_raw" ]]; then
                echo "ℹ️ ${ghsa}: missing manifest path or vulnerable range -- stays blocking."
                continue
              fi

              # Cache lockfile fetches by the alert's manifest_path -- multiple
              # alerts commonly share the same lockfile. Pure read via the
              # Contents API, never executed -- safe under pull_request_target.
              if [[ -z "${LOCKFILE_CACHE[$manifest_path]+x}" ]]; then
                manifest_dir="${manifest_path%/*}"
                [[ "$manifest_dir" == "$manifest_path" ]] && manifest_dir=""
                # Try the alert's own manifest first, then sibling
                # package-lock.json/yarn.lock in the same directory -- covers
                # a mid-fix package-manager migration in either direction.
                candidates=("$manifest_path")
                for sibling in "package-lock.json" "yarn.lock"; do
                  candidate_path="${manifest_dir:+$manifest_dir/}${sibling}"
                  if [[ "$candidate_path" != "$manifest_path" ]]; then
                    candidates+=("$candidate_path")
                  fi
                done

                fetched_path=""
                lf_content=""
                for candidate_path in "${candidates[@]}"; do
                  enc_path="$(python3 -c "import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe='/@'))" "$candidate_path" 2>/dev/null)" || enc_path="$candidate_path"
                  lf_body_file="$(mktemp)"
                  lf_curl_exit=0
                  lf_http_code="$(curl -sS --max-time 30 --retry 2 --retry-connrefused -o "$lf_body_file" -w '%{http_code}' -H "Authorization: Bearer $GITHUB_READ_TOKEN" -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2022-11-28" "https://api.github.com/repos/${REPOSITORY}/contents/${enc_path}?ref=${PR_HEAD_SHA}" 2>/dev/null)" || lf_curl_exit=$?
                  if [[ $lf_curl_exit -ne 0 ]]; then
                    rm -f "$lf_body_file"
                    break
                  fi
                  # A 404 is the ONLY signal that means "genuinely not present,
                  # safe to try the next sibling" -- confirmed live (2026-07-23):
                  # the Contents API returns HTTP 200 with `encoding: "none"` and
                  # an EMPTY `.content` for a file that still exists but exceeds
                  # its ~1MB inline-read cap (real lockfiles routinely do), which
                  # is otherwise indistinguishable from a deleted file. Treating
                  # that the same as a 404 would let a stale/coexisting sibling
                  # lockfile of a different package manager stand in for a real,
                  # still-vulnerable, merely-too-large manifest -- a false clear
                  # on a genuinely open critical alert. So any non-404 failure
                  # (this size cap, a 403 "too large" on files >100MB, a 5xx,
                  # anything else non-2xx) stops the search entirely rather than
                  # advancing to the next candidate.
                  if [[ "$lf_http_code" == "404" ]]; then
                    rm -f "$lf_body_file"
                    continue
                  fi
                  if [[ "$lf_http_code" != "200" ]]; then
                    rm -f "$lf_body_file"
                    break
                  fi
                  # A 200 body isn't necessarily a single file: the Contents API
                  # returns a JSON ARRAY for a directory listing, and a
                  # non-"file" type (symlink/submodule) for other path kinds --
                  # neither is a confirmed absence of the original manifest, so
                  # neither should fall through to content extraction below
                  # (jq erroring on `.encoding`/`.content` against an array
                  # happens to degrade safely today, but only by accident).
                  lf_type="$(jq -r 'if type == "array" then "directory" else (.type // "unknown") end' "$lf_body_file" 2>/dev/null)" || lf_type="unknown"
                  if [[ "$lf_type" != "file" ]]; then
                    echo "::warning title=⚠️ [VULN-GATE] Unexpected content type at ${candidate_path}::PR head ${PR_HEAD_SHA} returned type '${lf_type}' (expected 'file') -- not a confirmed absence, so no sibling is substituted for it. Stays blocking."
                    rm -f "$lf_body_file"
                    break
                  fi
                  lf_encoding="$(jq -r '.encoding // empty' "$lf_body_file" 2>/dev/null)" || lf_encoding=""
                  if [[ "$lf_encoding" == "none" ]]; then
                    echo "::warning title=⚠️ [VULN-GATE] Lockfile too large to verify::${candidate_path} at PR head ${PR_HEAD_SHA} exceeds the Contents API's inline size cap -- this is NOT the same as the file being deleted, so no sibling is substituted for it. Stays blocking."
                    rm -f "$lf_body_file"
                    break
                  fi
                  candidate_content="$(jq -r '.content // empty' "$lf_body_file" 2>/dev/null | base64 -d 2>/dev/null)" || candidate_content=""
                  rm -f "$lf_body_file"
                  if [[ -n "$candidate_content" ]]; then
                    fetched_path="$candidate_path"
                    lf_content="$candidate_content"
                    if [[ "$candidate_path" != "$manifest_path" ]]; then
                      echo "::notice title=🔎 [VULN-GATE] Lockfile migrated::${manifest_path} no longer exists (confirmed 404) at PR head ${PR_HEAD_SHA} -- found ${candidate_path} in its place, using that instead."
                    fi
                    break
                  fi
                done
                LOCKFILE_CACHE["$manifest_path"]="$lf_content"
                LOCKFILE_PATH_CACHE["$manifest_path"]="$fetched_path"
              fi
              lockfile_content="${LOCKFILE_CACHE[$manifest_path]}"
              resolved_lockfile_path="${LOCKFILE_PATH_CACHE[$manifest_path]}"

              if [[ -z "$lockfile_content" ]]; then
                echo "ℹ️ ${ghsa}: could not read ${manifest_path}, nor a sibling package-lock.json/yarn.lock, from PR head ${PR_HEAD_SHA} -- stays blocking."
                continue
              fi

              # Resolved (locked) version, not the manifest's requested range
              # -- a package.json/pubspec range doesn't tell you what's
              # actually installed. Every occurrence matters: the same
              # package commonly resolves to different versions at different
              # points in the dependency tree (confirmed live: form-data
              # resolved to both 4.0.5 nested under axios and 2.3.3 at the
              # top level in the same lockfile) -- one unpatched occurrence
              # still means the vulnerability is present.
              versions_found=""
              if [[ "$resolved_lockfile_path" == *"package-lock.json" ]]; then
                versions_found="$(printf '%s' "$lockfile_content" | jq -r --arg suffix "node_modules/${pkg_name}" '(.packages // {}) | to_entries[] | select(.key | endswith($suffix)) | .value.version' 2>/dev/null)" || versions_found=""
              elif [[ "$resolved_lockfile_path" == *"yarn.lock" ]]; then
                versions_found="$(printf '%s' "$lockfile_content" | python3 "$GITHUB_ACTION_PATH/parse_yarn_lock.py" "$pkg_name" 2>/dev/null)" || versions_found=""
              else
                echo "ℹ️ ${ghsa}: unsupported lockfile type (${resolved_lockfile_path:-$manifest_path}) -- npm verification only supports package-lock.json/yarn.lock. Stays blocking."
                continue
              fi

              if [[ -z "$versions_found" ]]; then
                echo "ℹ️ ${ghsa}: could not locate ${pkg_name} in ${resolved_lockfile_path:-$manifest_path} at the PR head -- stays blocking."
                continue
              fi

              # Real semver-range evaluation (not string comparison) via the
              # battle-tested `semver` npm package -- GitHub's
              # vulnerable_version_range uses comma-separated AND clauses
              # (e.g. ">= 1.0.0, < 2.3.4"); node-semver ranges use spaces
              # instead of commas for the same thing.
              converted_range="${vuln_range_raw//, / }"
              still_vulnerable="false"
              while IFS= read -r v; do
                [[ -z "$v" ]] && continue
                match="$(npx --yes semver "$v" -r "$converted_range" 2>/dev/null)" || match=""
                if [[ -n "$match" ]]; then
                  still_vulnerable="true"
                fi
              done <<< "$versions_found"

              if [[ "$still_vulnerable" == "false" ]]; then
                cleared_count=$((cleared_count + 1))
                total_critical=$((total_critical - 1))
                cleared_numbers+="${alert_number}"$'\n'
                echo "::notice title=✅ [VULN-GATE] ${ghsa} resolved in this PR::${pkg_name} in ${resolved_lockfile_path} is patched in this branch (checked version(s): $(printf '%s' "$versions_found" | tr '\n' ' ')) -- no longer counted against this PR."
              else
                echo "::notice title=❌ [VULN-GATE] ${ghsa} still open::${pkg_name} in ${resolved_lockfile_path} still resolves to a vulnerable version in this branch."
              fi
            done

            if [[ "$cleared_count" -gt 0 ]]; then
              echo "::notice title=🔎 [VULN-GATE] PR-branch verification summary::${cleared_count} npm alert(s) auto-cleared because this PR's branch already resolves them. ${total_critical} alert(s) remain blocking."
              rebuilt_summary_rows="$(jq -r --arg cleared "$cleared_numbers" '
                ($cleared | rtrimstr("\n") | split("\n") | map(tonumber)) as $clearedlist
                | .[] | select(([.number] - $clearedlist) | length > 0)
                | "| " + (.security_advisory.ghsa_id // "unknown") + " | " + (.dependency.package.name // "unknown") + " | [" + (.html_url // "") + "](" + (.html_url // "") + ") |"
              ' "$alerts_file" 2>/dev/null)" || rebuilt_summary_rows=""
              summary_rows="${rebuilt_summary_rows}"$'\n'
            fi
          fi
          echo "::endgroup::"
        fi

        rm -f "$alerts_file"

        echo "critical-count=${total_critical}" >> "$GITHUB_OUTPUT"
        EOF="$(dd if=/dev/urandom bs=15 count=1 status=none | base64)"
        {
          echo "alert-summary<<$EOF"
          printf '%s\n' "$summary_rows"
          echo "$EOF"
        } >> "$GITHUB_OUTPUT"

        echo "::endgroup::"

        if [[ "$total_critical" -gt 0 ]]; then
          echo "VULN_GATE_CP1_STATUS=❌ CRITICAL ALERT FOUND" >> "$GITHUB_ENV"
          echo "::error title=❌ [VULN-GATE] Blocked by critical Dependabot alert(s)::${REPOSITORY} has ${total_critical} open CRITICAL-severity Dependabot alert(s) — this check/pipeline is blocked until they are resolved or dismissed."
          printf '%s\n' "$summary_rows"
          exit 1
        fi

        echo "VULN_GATE_CP1_STATUS=✅ PASSED" >> "$GITHUB_ENV"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository != '' && inputs.repository || github.repository }}
      run: |
        echo "::error title=❌ [VULN-GATE] Critical vulnerability gate failed::${REPOSITORY} is blocked — either the Dependabot Alerts API call failed, or an open CRITICAL-severity alert exists. Checkpoint — 1) Query alerts: ${VULN_GATE_CP1_STATUS:-⏭️ Not reached}. See the step above for affected package(s)/advisory ID(s)."

    - name: Write action summary
      if: always()
      shell: bash
      env:
        REPOSITORY: ${{ inputs.repository != '' && inputs.repository || github.repository }}
        CRITICAL_COUNT: ${{ steps.check.outputs.critical-count }}
      run: |
        {
          echo "## 🔒 Critical Dependabot Vulnerability Check"
          echo ""
          echo "| Field | Value |"
          echo "|-------|-------|"
          echo "| Repository | ${REPOSITORY} |"
          echo "| Open critical alerts found | ${CRITICAL_COUNT:-unknown} |"
          echo ""
          echo "## 📋 Checkpoint Summary"
          echo ""
          echo "| # | Checkpoint | Status |"
          echo "|---|------------|--------|"
          echo "| 1 | Query open critical Dependabot alerts | ${VULN_GATE_CP1_STATUS:-⏭️ Not reached} |"
        } >> "$GITHUB_STEP_SUMMARY"

branding:
  icon: 'shield'
  color: 'red'
