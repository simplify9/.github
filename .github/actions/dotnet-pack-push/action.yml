# =============================================================================
# Dotnet Pack and Push
# =============================================================================
# Packs .NET project(s) into NuGet packages and pushes them to a feed.
#
# Design (glob-honest, single resolved set):
#   - The `projects` input is resolved ONCE into an explicit list of .csproj
#     files using real bash globbing (globstar), excluding obj/ and bin/. The
#     glob is honoured EXACTLY — `**/*.csproj`, `src/**/*.csproj`,
#     `**/*.Sdk.csproj`, a concrete path, or a space-separated list all work.
#   - Each resolved project is packed with --no-build (the build action runs
#     first in the pipeline) into a single output directory, then every
#     resulting .nupkg is pushed with --skip-duplicate so re-runs are idempotent.
#   - An empty `projects` value is a graceful skip (these repos default it to ''
#     to mean "this service does not publish a package"); a NON-empty value that
#     matches nothing fails fast, so a typo can never silently publish nothing.
#   - Secret-safe — the NuGet API key is masked in the logs (::add-mask::)
#     before it is used. It is then handed to `dotnet nuget push --api-key`,
#     which is the only credential mechanism the CLI offers; the value itself is
#     never echoed. State is passed between this action's own steps via step
#     outputs (NOT $GITHUB_ENV), so the action never mutates the caller's job
#     environment.
#   - Every pack stamps -p:RepositoryUrl on the nuspec with the triggering
#     repo's URL (from the `github` context), regardless of what each .csproj
#     declares. GitHub Packages links a NuGet package to a repo's "Packages"
#     sidebar by reading this nuspec field, so without it the package only
#     shows under the org/user's Packages tab, unlinked from any repo.
#
# Inputs:
#   projects       (required) Path(s)/glob of .csproj to pack; pass several as a
#                  space- or newline-separated list (a YAML `|` block scalar is
#                  honoured in full, not just its first line). Empty = skip.
#   configuration  (optional) Build configuration (default: Release).
#   version        (optional) Semantic version for the NuGet package(s).
#   api-key        (required) API key for the NuGet feed.
#   nuget-source   (required) NuGet feed/source URL.
#
# Outputs:
#   packages-pushed  Number of packages successfully pushed (0 when skipped).
#   package-paths    Newline-separated paths of the pushed .nupkg files.
#
# Usage:
#   jobs:
#     publish:
#       runs-on: ubuntu-latest
#       steps:
#         - uses: actions/checkout@v7
#         - name: Pack and push
#           id: nuget
#           uses: simplify9/.github/.github/actions/dotnet-pack-push@main
#           with:
#             projects: '**/*.Sdk.csproj'
#             version: ${{ needs.version.outputs.version }}
#             api-key: ${{ secrets.NUGET_API_KEY }}
#             nuget-source: 'https://api.nuget.org/v3/index.json'
#         - run: echo "Pushed ${{ steps.nuget.outputs.packages-pushed }} package(s)"
# =============================================================================
name: 'Dotnet Pack and Push'
author: 'Simplify9'
description: 'Reusable action to pack .NET project(s) and push the resulting NuGet package(s) to a specified feed.'

inputs:
  projects:
    description: 'Path(s)/glob of .csproj file(s) to pack; pass several as a space- or newline-separated list (YAML `|` block). Empty value skips packing.'
    required: true
  configuration:
    description: 'Build configuration'
    required: false
    default: 'Release'
  version:
    description: 'Semantic version for the NuGet package'
    required: false
  api-key:
    description: 'API key for the NuGet feed'
    required: true
  nuget-source:
    description: 'NuGet feed/source URL'
    required: true

outputs:
  packages-pushed:
    description: 'Number of NuGet packages successfully pushed (0 when packing was skipped).'
    value: ${{ steps.push.outputs.packages-pushed }}
  package-paths:
    description: 'Newline-separated paths of the .nupkg files that were pushed.'
    value: ${{ steps.push.outputs.package-paths }}

runs:
  using: "composite"
  steps:
    - name: Pack NuGet packages
      id: pack
      shell: bash
      env:
        PROJECTS: ${{ inputs.projects }}
        CONFIGURATION: ${{ inputs.configuration }}
        VERSION: ${{ inputs.version }}
        REPO_URL: ${{ github.server_url }}/${{ github.repository }}
      run: |
        set -euo pipefail
        shopt -s globstar nullglob
        # Phase is published as a step output (not $GITHUB_ENV) so the trailing
        # "Report failure" step can name the failing phase without leaking a
        # variable into the caller's job environment.
        echo "phase=Pack" >> "$GITHUB_OUTPUT"
        echo "::group::🔷 [1/2] Pack NuGet Packages"

        # An empty / whitespace-only input means "this repo publishes nothing".
        if [[ -z "${PROJECTS//[[:space:]]/}" ]]; then
          echo "No 'projects' provided — skipping NuGet pack & push."
          echo "skip-pack=true" >> "$GITHUB_OUTPUT"
          echo "::endgroup::"
          exit 0
        fi

        # `projects` is a WHITESPACE-SEPARATED list of glob patterns
        # (e.g. `**/*.csproj  src/**/*.Sdk.csproj`). Each pattern is then
        # expanded by pathname globbing; a single glob can still MATCH a path
        # that contains spaces and it is preserved as one array element. (A
        # literal path that itself contains spaces cannot be passed as input,
        # because whitespace is what separates one pattern from the next.)
        declare -a PROJECT_SET=()
        # `read -d ''` consumes the WHOLE value (splitting on IFS = space/tab/
        # newline), so a multi-line YAML block scalar is honoured in full rather
        # than only its first line. Plain `read -ra` stops at the first newline,
        # which silently dropped every project after the first. It returns
        # non-zero at EOF, hence the `|| true` under `set -e`.
        read -rd '' -a PATTERNS <<< "$PROJECTS" || true
        for pattern in "${PATTERNS[@]}"; do
          for match in $pattern; do
            [[ "$match" == *"/obj/"* || "$match" == *"/bin/"* ]] && continue
            [[ "$match" == *.csproj && -f "$match" ]] || continue
            PROJECT_SET+=("$match")
          done
        done
        mapfile -t PROJECT_SET < <(printf '%s\n' "${PROJECT_SET[@]}" | awk 'NF && !seen[$0]++')

        if [[ ${#PROJECT_SET[@]} -eq 0 ]]; then
          echo "::error title=❌ [DOTNET] No packable projects::'projects' was set to '$PROJECTS' but no matching .csproj files were found."
          exit 1
        fi

        nupkg_dir="${RUNNER_TEMP:-/tmp}/nupkg"
        rm -rf "$nupkg_dir"; mkdir -p "$nupkg_dir"
        echo "nupkg-dir=$nupkg_dir" >> "$GITHUB_OUTPUT"

        echo "Packing ${#PROJECT_SET[@]} project(s) (${VERSION:-no explicit version}):"
        for project in "${PROJECT_SET[@]}"; do
          echo "→ $project"
          declare -a pack_args=("$project" --configuration "$CONFIGURATION" --no-build --output "$nupkg_dir")
          [[ -n "$VERSION" ]] && pack_args+=("-p:Version=$VERSION")
          # Stamps the nuspec <repository> element so GitHub Packages links the
          # published package to this repo's "Packages" sidebar (same purpose as
          # the org.opencontainers.image.source label on the Docker image).
          pack_args+=("-p:RepositoryUrl=$REPO_URL" "-p:RepositoryType=git")
          dotnet pack "${pack_args[@]}"
        done

        echo "✅ [1/2] Packed ${#PROJECT_SET[@]} project(s) into $nupkg_dir"
        echo "::endgroup::"

    - name: Push NuGet packages
      id: push
      if: ${{ steps.pack.outputs.skip-pack != 'true' }}
      shell: bash
      env:
        API_KEY: ${{ inputs.api-key }}
        NUGET_SOURCE: ${{ inputs.nuget-source }}
        NUPKG_DIR: ${{ steps.pack.outputs.nupkg-dir }}
      run: |
        set -euo pipefail
        echo "phase=Push" >> "$GITHUB_OUTPUT"
        echo "::add-mask::$API_KEY"
        echo "::group::🔷 [2/2] Push NuGet Packages"

        if [[ -z "$API_KEY" ]]; then
          echo "::error title=❌ [DOTNET] Missing API key::api-key input is required to push."
          exit 1
        fi
        if [[ -z "$NUGET_SOURCE" ]]; then
          echo "::error title=❌ [DOTNET] Missing feed::nuget-source input is required to push."
          exit 1
        fi

        shopt -s nullglob
        declare -a PACKAGES=("$NUPKG_DIR"/*.nupkg)
        if [[ ${#PACKAGES[@]} -eq 0 ]]; then
          echo "::error title=❌ [DOTNET] No packages::No .nupkg files were produced in $NUPKG_DIR."
          exit 1
        fi

        echo "Pushing ${#PACKAGES[@]} package(s) → $NUGET_SOURCE"
        pushed=0 failed=0
        declare -a pushed_paths=()
        for nupkg in "${PACKAGES[@]}"; do
          echo "→ $(basename "$nupkg")"
          # --skip-duplicate keeps re-runs idempotent (existing versions are a no-op).
          if dotnet nuget push "$nupkg" --api-key "$API_KEY" --source "$NUGET_SOURCE" --skip-duplicate; then
            pushed=$((pushed + 1))
            pushed_paths+=("$nupkg")
          else
            echo "::warning title=NuGet push failed::$(basename "$nupkg")"
            failed=$((failed + 1))
          fi
        done

        # Publish results as step outputs for downstream consumers (release
        # notes, asset upload, notifications) so they need not re-glob. Written
        # before the failure check below so a partial push still reports counts.
        echo "packages-pushed=$pushed" >> "$GITHUB_OUTPUT"
        {
          echo "package-paths<<__NUPKG_PATHS_EOF__"
          ((pushed > 0)) && printf '%s\n' "${pushed_paths[@]}"
          echo "__NUPKG_PATHS_EOF__"
        } >> "$GITHUB_OUTPUT"

        echo "Push summary: $pushed succeeded, $failed failed"
        if [[ $failed -gt 0 ]]; then
          echo "::error title=❌ [DOTNET] Push failed::$failed package(s) failed to push to $NUGET_SOURCE."
          exit 1
        fi
        echo "✅ [2/2] Pushed $pushed package(s) → $NUGET_SOURCE"
        echo "::endgroup::"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        PROJECTS: ${{ inputs.projects }}
        NUGET_SOURCE: ${{ inputs.nuget-source }}
        # Latest phase that actually ran: Push if it started, else Pack.
        BUILD_PHASE: ${{ steps.push.outputs.phase || steps.pack.outputs.phase || 'Pack' }}
      run: |
        echo "::error title=❌ [DOTNET] Pack/push failed::Failed during the '${BUILD_PHASE:-Pack}' phase. projects: ${PROJECTS}, feed: ${NUGET_SOURCE}."

branding:
  icon: 'package'
  color: 'blue'
