name: 'Tag Commit on GitHub Origin'
description: 'Reusable action to create a tag on the GitHub origin using the REST API.'
runs:
  using: "composite"
  steps:
    - name: Mask sensitive inputs
      shell: bash
      run: echo "::add-mask::${{ inputs.github-token }}"

    - name: Announce tag creation
      shell: bash
      run: |
        echo "::notice title=🏷️ [VERSION] Create Git Tag::Creating tag '${{ inputs.tag }}' on ${{ inputs.repository }} @ ${{ inputs.sha }}"
        echo "CHECKPOINT_1_STATUS=⏳ Pending" >> "$GITHUB_ENV"

    - name: Tag new version on GitHub origin
      run: |
        echo "::group::🏷️ [CHECKPOINT 1/1] Create Git Tag"
        # Validate inputs
        if [ -z "${{ inputs.github-token }}" ]; then
          echo "Error: GitHub token is required"
          exit 1
        fi
        
        if [ -z "${{ inputs.repository }}" ]; then
          echo "Error: Repository is required"
          exit 1
        fi
        
        if [ -z "${{ inputs.tag }}" ]; then
          echo "Error: Tag name is required"
          exit 1
        fi
        
        if [ -z "${{ inputs.sha }}" ]; then
          echo "Error: SHA is required"
          exit 1
        fi
        
        echo "Creating tag '${{ inputs.tag }}' for commit ${{ inputs.sha }} in repository ${{ inputs.repository }}"
        
        # Create the tag via GitHub API
        response=$(curl -s -w "%{http_code}" -X POST \
          -H "Authorization: token ${{ inputs.github-token }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/${{ inputs.repository }}/git/refs \
          -d "{\"ref\": \"refs/tags/${{ inputs.tag }}\", \"sha\": \"${{ inputs.sha }}\"}")
        
        # Extract HTTP status code (last 3 characters)
        http_code="${response: -3}"
        response_body="${response%???}"
        
        # Check if the request was successful
        if [[ "$http_code" =~ ^2[0-9][0-9]$ ]]; then
          echo "✅ Successfully created tag '${{ inputs.tag }}'"
          echo "Response: $response_body"
          echo "CHECKPOINT_1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
          echo "::notice title=✅ [VERSION] Tag created::Tag '${{ inputs.tag }}' on ${{ inputs.repository }}"
        else
          echo "❌ Failed to create tag. HTTP Status: $http_code"
          echo "Response: $response_body"
          echo "CHECKPOINT_1_STATUS=❌ FAILED" >> "$GITHUB_ENV"
          exit 1
        fi
        echo "::endgroup::"
      shell: bash

    - name: Report failure
      if: failure()
      shell: bash
      run: |
        echo "::error title=❌ [VERSION] Git tag creation failed::Failed to create tag '${{ inputs.tag }}' on ${{ inputs.repository }}. Check the GitHub token has repo write permissions and the SHA is valid. HTTP status is logged above."

    - name: Write action summary
      if: always()
      shell: bash
      run: |
        EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        cat >> "$GITHUB_STEP_SUMMARY" << "$EOF"
        ## 🏷️ Tag Commit on GitHub Origin

        | Field | Value |
        |-------|-------|
        | Repository | ${{ inputs.repository }} |
        | Tag | \`${{ inputs.tag }}\` |
        | Commit SHA | \`${{ inputs.sha }}\` |
        | Runner | ${{ runner.os }} |
        | Triggered by | ${{ github.actor }} |

        ## 📋 Checkpoint Summary

        | # | Checkpoint | Status |
        |---|------------|--------|
        | 1 | Create Git Tag | ${CHECKPOINT_1_STATUS:-⏭️ Not reached} |
        $EOF
inputs:
  github-token:
    description: 'GitHub token for authentication'
    required: true
  repository:
    description: 'GitHub repository in owner/repo format'
    required: true
  tag:
    description: 'Tag name to create'
    required: true
  sha:
    description: 'Commit SHA to tag'
    required: true
