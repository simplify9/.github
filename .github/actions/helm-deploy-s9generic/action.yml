# =============================================================================
# Helm Deploy to Kubernetes (s9 generic)
# =============================================================================
# Deploys a Helm chart to a Kubernetes cluster, either from an OCI registry or
# from a local chart directory (artifact-based deployment). Wraps
# `helm upgrade --install`, so it is naturally idempotent and safe for re-runs.
#
# Behaviour:
#   - Two modes — if `chart-path` is provided the chart is deployed from that
#     local directory; otherwise it is pulled from the configured OCI registry
#     (registry/repository/chart-name:chart-version).
#   - Idempotent — `helm upgrade --install` creates or updates the release.
#   - Secret-safe — kubeconfig and registry credentials are passed via env vars
#     (never on the command line); the registry password is fed over stdin and
#     masked in logs. Inline `values` are written to a private temp file
#     (mode 600) that is removed on exit.
#   - Resilient — when `atomic` is enabled a failed deploy is rolled back to the
#     previous release; the correct flag is selected per Helm major version
#     (`--atomic` on Helm 3, `--rollback-on-failure` on Helm 4+). On failure,
#     cluster diagnostics (pods & events) are dumped.
#
# Inputs:
#   chart-name          Name of the Helm chart (required for OCI mode).
#   chart-version       Version of the chart to deploy (required for OCI mode).
#   chart-path          (optional) Local chart dir; if set, deploys locally.
#   registry            (optional) OCI registry URL (default docker.io).
#   repository          (optional) Repository path in the registry (OCI mode).
#   registry-username   (optional) Registry username (OCI mode).
#   registry-password   (optional) Registry password/token (OCI mode).
#   kubeconfig          (required) Base64-encoded kubeconfig for cluster access.
#   release-name        (optional) Helm release name (default 'app').
#   namespace           (optional) Target namespace (default 'default').
#   image-repository    (optional) --set image.repository.
#   image-tag           (optional) --set image.tag.
#   values-file         (optional) Path to a values file (relative to chart).
#   values              (optional) Additional Helm values as a YAML string.
#   set-values          (optional) Additional --set values (comma-separated).
#   set-string-values   (optional) Additional --set-string values (comma-separated).
#   secret-set-string-values (optional) Secret --set-string values. Preferred,
#                       explicit replacement for the legacy SECRET_VALUES env var.
#   timeout             (optional) Helm timeout (default 10m).
#   wait                (optional) Wait for resources to be Ready (default true).
#   atomic              (optional) Roll back automatically on failure (default false).
#   create-namespace    (optional) Create namespace if missing (default true).
#   helm-version        (optional) Helm version to install (default latest).
#   kubectl-version     (optional) kubectl version to install (default latest).
#   debug               (optional) Enable --debug and extra tracing (default false).
#
# Secret --set-string values can be supplied three ways, in precedence order:
#   1. `secret-set-string-values` input    (preferred, explicit)
#   2. `SECRET_VALUES` step-level env var   (legacy contract, still honored)
#   3. `set-string-values` input           (fallback)
# The first non-empty source wins; all are applied as `helm --set-string`.
#
# Outputs (set on the success path):
#   chart-url        Full chart source URL (OCI URL or local:<path>).
#   deployed-image   Container image reference applied, when image-repository and
#                    image-tag inputs are both provided.
#
# Usage:
#   jobs:
#     deploy:
#       runs-on: ubuntu-latest
#       steps:
#         - name: Deploy Helm chart
#           id: deploy
#           uses: simplify9/.github/.github/actions/helm-deploy-s9generic@main
#           with:
#             chart-name: my-chart
#             chart-version: 1.2.3
#             registry: docker.io
#             repository: myorg
#             registry-username: ${{ secrets.REGISTRY_USERNAME }}
#             registry-password: ${{ secrets.REGISTRY_PASSWORD }}
#             kubeconfig: ${{ secrets.KUBECONFIG_B64 }}
#             release-name: my-app
#             namespace: production
#             atomic: 'true'
# =============================================================================
name: 'Helm Deploy to Kubernetes'
author: 'Simplify9'
description: 'Deploy Helm chart from OCI registry or local chart directory to a Kubernetes cluster'

inputs:
  chart-name:
    description: 'Name of the Helm chart. Required when deploying from an OCI registry (ignored in local chart-path mode).'
    required: false
  chart-version:
    description: 'Version of the Helm chart to deploy. Required when deploying from an OCI registry (ignored in local chart-path mode, where the version comes from Chart.yaml).'
    required: false
  chart-path:
    description: 'Local path to chart directory (for artifact-based deployment). If provided, will deploy from local chart instead of OCI registry.'
    required: false
  registry:
    description: 'OCI registry URL where the chart is stored (ignored if chart-path is provided)'
    required: false
    default: 'docker.io'
  repository:
    description: 'Repository path in the registry (ignored if chart-path is provided)'
    required: false
  registry-username:
    description: 'Registry username for authentication (ignored if chart-path is provided)'
    required: false
  registry-password:
    description: 'Registry password or token for authentication (ignored if chart-path is provided)'
    required: false
  kubeconfig:
    description: 'Base64 encoded kubeconfig for cluster access'
    required: true
  release-name:
    description: 'Helm release name'
    required: false
    default: 'app'
  namespace:
    description: 'Kubernetes namespace to deploy to'
    required: false
    default: 'default'
  image-repository:
    description: 'Docker image repository (for --set image.repository)'
    required: false
  image-tag:
    description: 'Docker image tag (for --set image.tag)'
    required: false
  values-file:
    description: 'Path to values file (relative to chart)'
    required: false
  values:
    description: 'Additional Helm values as YAML string'
    required: false
  set-values:
    description: 'Additional --set values (comma-separated: key1=value1,key2=value2)'
    required: false
  set-string-values:
    description: 'Additional --set-string values (comma-separated: key1=value1,key2=value2). Fallback source for secret string values.'
    required: false
  secret-set-string-values:
    description: 'Secret --set-string values (comma-separated: key1=value1,key2=value2). Preferred, explicit replacement for the legacy SECRET_VALUES env var. Applied as helm --set-string.'
    required: false
  timeout:
    description: 'Helm deployment timeout'
    required: false
    default: '10m'
  wait:
    description: 'Wait for deployment to complete'
    required: false
    default: 'true'
  atomic:
    description: "If 'true', roll back automatically when the deploy fails (--atomic on Helm 3, --rollback-on-failure on Helm 4+). Implies --wait. Default 'false' preserves the historical no-rollback behaviour; 'true' is recommended for production."
    required: false
    default: 'true'
  create-namespace:
    description: 'Create namespace if it does not exist'
    required: false
    default: 'true'
  helm-version:
    description: 'Helm version to install'
    required: false
    default: 'latest'
  kubectl-version:
    description: 'kubectl version to install'
    required: false
    default: 'latest'
  debug:
    description: 'Enable Helm --debug and extra tracing output'
    required: false
    default: 'false'

outputs:
  chart-url:
    description: 'Full OCI URL (or local:<path>) of the deployed chart. Set only on success.'
    value: ${{ steps.deploy.outputs.chart-url }}
  deployed-image:
    description: 'Container image reference (repository:tag) applied, when image-repository and image-tag inputs are both provided. Set only on success.'
    value: ${{ steps.deploy.outputs.deployed-image }}

runs:
  using: 'composite'
  steps:
    - name: Initialize Helm deployment
      shell: bash
      run: |
        set -euo pipefail
        {
          echo "HELM_S9GEN_CP1_STATUS=⏳ Pending"
          echo "HELM_S9GEN_CP2_STATUS=⏳ Pending"
        } >> "$GITHUB_ENV"

    - name: Validate inputs
      shell: bash
      env:
        CHART_PATH: ${{ inputs.chart-path }}
        CHART_NAME: ${{ inputs.chart-name }}
        CHART_VERSION: ${{ inputs.chart-version }}
        REPOSITORY: ${{ inputs.repository }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
      run: |
        set -euo pipefail
        echo "::group::🔎 Validate inputs"
        if [ -z "$CHART_PATH" ]; then
          # OCI registry deployment — validate required inputs.
          missing=""
          [ -z "$CHART_NAME" ] && missing="$missing chart-name"
          [ -z "$CHART_VERSION" ] && missing="$missing chart-version"
          [ -z "$REPOSITORY" ] && missing="$missing repository"
          [ -z "$REGISTRY_USERNAME" ] && missing="$missing registry-username"
          [ -z "$REGISTRY_PASSWORD" ] && missing="$missing registry-password"
          if [ -n "$missing" ]; then
            echo "Error: the following inputs are required when deploying from an OCI registry (chart-path not provided):${missing}"
            exit 1
          fi
          echo "[helm-deploy] Validation passed: MODE=OCI (chart-path NOT provided)"
        else
          echo "[helm-deploy] Validation passed: MODE=LOCAL (chart-path='$CHART_PATH')"
        fi
        echo "::endgroup::"

    - name: Set up Helm
      uses: azure/setup-helm@v5
      with:
        version: ${{ inputs.helm-version }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v5
      with:
        version: ${{ inputs.kubectl-version }}

    - name: Configure Kubernetes context
      shell: bash
      env:
        KUBECONFIG_B64: ${{ inputs.kubeconfig }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "::group::☸️ [CHECKPOINT 1/2] Configure Kubernetes Context"
        echo "Configuring Kubernetes context..."
        mkdir -p ~/.kube
        printf '%s' "$KUBECONFIG_B64" | base64 -d > ~/.kube/config
        chmod 600 ~/.kube/config

        echo "Current context:"
        kubectl config current-context

        echo "Cluster info:"
        kubectl cluster-info
        echo "HELM_S9GEN_CP1_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Kubernetes context configured — namespace: $NAMESPACE"
        echo "::endgroup::"

    - name: Configure Helm registry authentication
      if: inputs.chart-path == ''
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        REGISTRY_USERNAME: ${{ inputs.registry-username }}
        REGISTRY_PASSWORD: ${{ inputs.registry-password }}
      run: |
        set -euo pipefail
        echo "::group::🔑 Configure Helm OCI registry authentication"
        echo "::add-mask::$REGISTRY_PASSWORD"
        echo "Configuring Helm registry authentication for $REGISTRY"
        registry_host="$REGISTRY"
        if [ "$registry_host" = "docker.io" ]; then
          # Docker Hub's Helm/OCI endpoint requires this hostname for registry login.
          registry_host="registry-1.docker.io"
        fi
        # Feed the password over stdin so it never appears on the command line.
        printf '%s' "$REGISTRY_PASSWORD" | helm registry login "$registry_host" -u "$REGISTRY_USERNAME" --password-stdin
        echo "[helm-deploy] Registry authentication succeeded for $REGISTRY (repository='$REPOSITORY')"
        echo "::endgroup::"

    - name: Deploy Helm chart
      id: deploy
      shell: bash
      env:
        CHART_PATH: ${{ inputs.chart-path }}
        REGISTRY: ${{ inputs.registry }}
        REPOSITORY: ${{ inputs.repository }}
        CHART_NAME: ${{ inputs.chart-name }}
        CHART_VERSION: ${{ inputs.chart-version }}
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        DEBUG: ${{ inputs.debug }}
        WAIT: ${{ inputs.wait }}
        ATOMIC: ${{ inputs.atomic }}
        CREATE_NAMESPACE: ${{ inputs.create-namespace }}
        TIMEOUT: ${{ inputs.timeout }}
        IMAGE_REPOSITORY: ${{ inputs.image-repository }}
        IMAGE_TAG: ${{ inputs.image-tag }}
        VALUES_FILE: ${{ inputs.values-file }}
        VALUES: ${{ inputs.values }}
        SET_VALUES: ${{ inputs.set-values }}
        SET_STRING_VALUES: ${{ inputs.set-string-values }}
        # New explicit input for secret --set-string values. NOTE: the legacy
        # SECRET_VALUES env var is intentionally NOT declared here so that a
        # caller's inherited step-level SECRET_VALUES is not shadowed (it is read
        # directly from the environment below for backward compatibility).
        SECRET_SET_STRING_VALUES: ${{ inputs.secret-set-string-values }}
      run: |
        set -euo pipefail
        echo "::group::🚀 [CHECKPOINT 2/2] Deploy Helm chart"

        # Clean up any temporary files on exit (success or failure).
        VALUES_TMP=""
        HELM_LOG="$(mktemp)"
        cleanup() {
          [ -n "${VALUES_TMP:-}" ] && rm -f "$VALUES_TMP"
          [ -n "${HELM_LOG:-}" ] && rm -f "$HELM_LOG"
          return 0
        }
        trap cleanup EXIT

        # Append comma-separated key=value pairs to HELM_ARGS under the given
        # flag. Used for both --set and --set-string so the two paths share one
        # implementation. Each fragment is trimmed of surrounding whitespace
        # (handling YAML `>-` folded inputs, where commas are followed by spaces)
        # using parameter expansion — never xargs, which would mangle quotes and
        # collapse internal spaces. Empty / whitespace-only fragments are skipped.
        append_set_args() {
          local flag="$1" csv="$2" pair
          [ -z "$csv" ] && return 0
          local IFS=','
          read -ra _pairs <<< "$csv"
          for pair in "${_pairs[@]}"; do
            pair="${pair#"${pair%%[![:space:]]*}"}"   # strip leading whitespace
            pair="${pair%"${pair##*[![:space:]]}"}"   # strip trailing whitespace
            [ -z "$pair" ] && continue
            HELM_ARGS+=("$flag" "$pair")
          done
        }

        # Determine chart source.
        if [ -n "$CHART_PATH" ]; then
          # Deploy from local chart path (artifact-based deployment).
          CHART_SOURCE="$CHART_PATH"
          CHART_URL="local:${CHART_PATH}"
          echo "[helm-deploy] Decision: using LOCAL chart directory '${CHART_SOURCE}'"

          if [ ! -d "${CHART_SOURCE}" ]; then
            echo "Error: Chart directory not found: ${CHART_SOURCE}"
            ls -la .
            exit 1
          fi
          if [ ! -f "${CHART_SOURCE}/Chart.yaml" ]; then
            echo "Error: Chart.yaml not found in: ${CHART_SOURCE}"
            ls -la "${CHART_SOURCE}"
            exit 1
          fi
        else
          # Deploy from OCI registry.
          if [ "$REGISTRY" != "docker.io" ]; then
            CHART_SOURCE="oci://$REGISTRY/$REPOSITORY/$CHART_NAME:$CHART_VERSION"
          else
            CHART_SOURCE="oci://$REPOSITORY/$CHART_NAME:$CHART_VERSION"
          fi
          CHART_URL="$CHART_SOURCE"
          echo "[helm-deploy] Decision: using OCI chart '${CHART_SOURCE}'"
        fi

        echo "Deploying Helm chart..."
        echo "Chart source: ${CHART_SOURCE}"
        echo "Release name: $RELEASE_NAME"
        echo "Namespace: $NAMESPACE"

        # Build the helm command as an array so arguments with spaces / special
        # characters are passed safely.
        HELM_ARGS=("helm" "upgrade" "--install" "$RELEASE_NAME" "${CHART_SOURCE}" "--namespace" "$NAMESPACE")

        if [ "$CREATE_NAMESPACE" = "true" ]; then
          HELM_ARGS+=("--create-namespace")
        fi

        if [ "$DEBUG" = "true" ]; then
          HELM_ARGS+=("--debug")
          echo "[helm-deploy] Debug mode enabled (--debug)."
        fi

        if [ "$WAIT" = "true" ]; then
          HELM_ARGS+=("--wait")
          echo "[helm-deploy] Wait enabled: Helm will wait for resources to become Ready"
        else
          echo "[helm-deploy] Wait disabled: Helm will return after install/upgrade is submitted"
        fi

        echo "[helm-deploy] Requested timeout: $TIMEOUT"
        if [[ ! "$TIMEOUT" =~ ^[0-9]+[smh]$ ]]; then
          echo "[helm-deploy] WARNING: Timeout format '$TIMEOUT' may be invalid (expected e.g. 60s, 3m, 1h)"
        fi
        HELM_ARGS+=("--timeout" "$TIMEOUT")

        # Roll back automatically on failure. The flag was renamed in Helm 4
        # (--atomic -> --rollback-on-failure), so select it per major version.
        if [ "$ATOMIC" = "true" ]; then
          HELM_MAJOR="$(helm version --template '{{.Version}}' 2>/dev/null | sed -E 's/^v?([0-9]+).*/\1/')"
          if [ "${HELM_MAJOR:-3}" -ge 4 ]; then
            HELM_ARGS+=("--rollback-on-failure")
          else
            HELM_ARGS+=("--atomic")
          fi
          echo "[helm-deploy] Atomic enabled: failed deploy will roll back to the previous release"
        fi

        # Image overrides.
        if [ -n "$IMAGE_REPOSITORY" ]; then
          HELM_ARGS+=("--set" "image.repository=$IMAGE_REPOSITORY")
        fi
        if [ -n "$IMAGE_TAG" ]; then
          HELM_ARGS+=("--set" "image.tag=$IMAGE_TAG")
        fi

        # Values file(s). A file path is referenced as-is; inline `values` YAML is
        # written to a private temp file (mode 600) removed on exit by the trap.
        if [ -n "$VALUES_FILE" ]; then
          HELM_ARGS+=("--values" "$VALUES_FILE")
        fi
        if [ -n "$VALUES" ]; then
          VALUES_TMP="$(mktemp)"
          chmod 600 "$VALUES_TMP"
          printf '%s\n' "$VALUES" > "$VALUES_TMP"
          HELM_ARGS+=("--values" "$VALUES_TMP")
        fi

        # Custom --set values (non-secret).
        append_set_args "--set" "$SET_VALUES"

        # Secret --set-string values. Precedence (first non-empty wins):
        #   1) secret-set-string-values input  2) legacy SECRET_VALUES env
        #   3) set-string-values input
        secret_values="${SECRET_SET_STRING_VALUES:-}"
        [ -z "$secret_values" ] && secret_values="${SECRET_VALUES:-}"
        [ -z "$secret_values" ] && secret_values="${SET_STRING_VALUES:-}"
        if [ -n "${secret_values//[[:space:]]/}" ]; then
          echo "Processing secret values..."
          append_set_args "--set-string" "$secret_values"
        else
          echo "No secret values provided"
        fi

        # Best-effort deployed-image reference, derived only from the explicit,
        # generic image-repository / image-tag inputs (no caller-specific keys).
        if [ -n "$IMAGE_REPOSITORY" ] && [ -n "$IMAGE_TAG" ]; then
          echo "deployed-image=$IMAGE_REPOSITORY:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved image: $IMAGE_REPOSITORY:$IMAGE_TAG"
        fi

        echo "[helm-deploy] Final Helm argument count: ${#HELM_ARGS[@]}"
        if [ "$DEBUG" = "true" ]; then
          echo "[helm-deploy] Printing environment variables relevant to Helm (sanitized):"
          env | grep -E 'HELM_|KUBECONFIG' || true
        fi

        echo "[helm-deploy] Starting helm upgrade/install..."
        set +e
        "${HELM_ARGS[@]}" 2>&1 | tee "$HELM_LOG"
        HELM_CODE=${PIPESTATUS[0]}
        set -e
        echo "[helm-deploy] Helm exit code: ${HELM_CODE}"

        if [ "${HELM_CODE}" -ne 0 ]; then
          echo "::endgroup::"
          echo "::group::🩺 Failure diagnostics"
          echo "[helm-deploy] Helm upgrade failed. Last 60 lines of output:" >&2
          tail -60 "$HELM_LOG" >&2 || true
          echo "[helm-deploy] Cluster diagnostics (pods & recent events):" >&2
          kubectl get pods -n "$NAMESPACE" || true
          kubectl get events -n "$NAMESPACE" --sort-by=.lastTimestamp | tail -30 || true
          echo "::endgroup::"
          exit "${HELM_CODE}"
        fi

        # Outputs are set only after a successful deploy.
        echo "chart-url=${CHART_URL}" >> "$GITHUB_OUTPUT"
        echo "HELM_S9GEN_CP2_STATUS=✅ PASSED" >> "$GITHUB_ENV"
        echo "✅ Chart deployed — release: $RELEASE_NAME, namespace: $NAMESPACE"
        echo "::endgroup::"

    - name: Verify deployment
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        set -euo pipefail
        echo "::group::🔍 Verify deployment"
        echo "Verifying deployment..."

        echo "Helm release status:"
        helm status "$RELEASE_NAME" --namespace "$NAMESPACE"

        echo "Checking pods in namespace $NAMESPACE:"
        kubectl get pods -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"

        echo "Checking services:"
        kubectl get services -n "$NAMESPACE" -l "app.kubernetes.io/instance=$RELEASE_NAME"

        echo "Deployment verification completed!"
        echo "::endgroup::"

    - name: Write deployment summary
      if: always()
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
        CHART_NAME: ${{ inputs.chart-name }}
        CHART_VERSION: ${{ inputs.chart-version }}
        CHART_PATH: ${{ inputs.chart-path }}
        CHART_URL: ${{ steps.deploy.outputs.chart-url }}
        DEPLOYED_IMAGE: ${{ steps.deploy.outputs.deployed-image }}
        DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
      run: |
        set -euo pipefail
        if [ "$DEPLOY_OUTCOME" = "success" ]; then
          status="✅ Succeeded"
        else
          status="❌ Failed"
        fi
        if [ -n "$CHART_PATH" ]; then
          mode="local (${CHART_PATH})"
        else
          mode="oci"
        fi
        {
          echo "## ☸️ Helm Deploy"
          echo ""
          echo "| Field | Value |"
          echo "| --- | --- |"
          echo "| Status | ${status} |"
          echo "| Release | \`${RELEASE_NAME}\` |"
          echo "| Namespace | \`${NAMESPACE}\` |"
          echo "| Chart | \`${CHART_NAME:-n/a}:${CHART_VERSION:-n/a}\` |"
          echo "| Mode | ${mode} |"
          echo "| Chart URL | \`${CHART_URL:-n/a}\` |"
          echo "| Image | \`${DEPLOYED_IMAGE:-n/a}\` |"
          echo "| K8s context | ${HELM_S9GEN_CP1_STATUS:-⏭️ Not reached} |"
          echo "| Helm deploy | ${HELM_S9GEN_CP2_STATUS:-⏭️ Not reached} |"
        } >> "$GITHUB_STEP_SUMMARY"

    - name: Report failure
      if: failure()
      shell: bash
      env:
        RELEASE_NAME: ${{ inputs.release-name }}
        NAMESPACE: ${{ inputs.namespace }}
      run: |
        echo "::error title=❌ [HELM] Deploy failed::Release '$RELEASE_NAME' in namespace '$NAMESPACE'. Checkpoints — 1) K8s context: ${HELM_S9GEN_CP1_STATUS:-⏭️ Not reached} | 2) Helm deploy: ${HELM_S9GEN_CP2_STATUS:-⏭️ Not reached}. Check chart source, image tag, and resource quotas."

    - name: Helm registry logout
      if: always() && inputs.chart-path == ''
      shell: bash
      env:
        REGISTRY: ${{ inputs.registry }}
      run: |
        # Best-effort cleanup so registry credentials do not linger in the helm
        # config on the runner (mostly moot on ephemeral GitHub-hosted runners,
        # but important on self-hosted ones).
        registry_host="$REGISTRY"
        if [ "$registry_host" = "docker.io" ]; then
          registry_host="registry-1.docker.io"
        fi
        helm registry logout "$registry_host" 2>/dev/null || true

branding:
  icon: 'anchor'
  color: 'blue'
