# Dependabot config for this .github repo itself — github-actions only, no
# application code lives here. Target branch is main (this repo has no
# develop branch).
version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    target-branch: "main"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "06:00"
      timezone: "Asia/Amman"
    cooldown:
      default-days: 3
      semver-patch-days: 1
      semver-minor-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "github-actions"
