# Dependabot config for infra/Helm-chart repos with no application package manifest.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "Asia/Amman"
    cooldown:
      default-days: 3
      semver-patch-days: 1
      semver-minor-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "Asia/Amman"
    cooldown:
      default-days: 3
      semver-patch-days: 1
      semver-minor-days: 3
      semver-major-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
