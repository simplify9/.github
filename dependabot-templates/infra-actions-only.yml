# Dependabot config for infra/Helm-chart repos with no application package manifest.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "github-actions"

  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"
