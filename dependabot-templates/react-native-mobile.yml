# Dependabot config for React Native mobile repos (npm + fastlane Gemfile).
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 10
    groups:
      npm-patch:
        update-types: ["patch"]
      npm-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "npm"

  - package-ecosystem: "bundler"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "fastlane"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "github-actions"
