# Dependabot config for Flutter mobile repos.
version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 10
    groups:
      pub-patch:
        update-types: ["patch"]
      pub-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "pub"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "Asia/Amman"
    open-pull-requests-limit: 5
    groups:
      actions-patch:
        update-types: ["patch"]
      actions-minor:
        update-types: ["minor"]
    labels:
      - "dependencies"
      - "github-actions"
