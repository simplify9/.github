# Dependabot config for Flutter mobile repos.
version: 2
updates:
  - package-ecosystem: "pub"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    groups:
      pub-minor-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "pub"

  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "{{TARGET_BRANCH}}"
    schedule:
      interval: "weekly"
      day: "wednesday"
      time: "06:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types: ["minor", "patch"]
    labels:
      - "dependencies"
      - "github-actions"
