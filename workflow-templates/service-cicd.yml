# =============================================================================
# Build and Publish Artifacts CI/CD Caller — Template for service repositories
# =============================================================================
#
# USAGE:
#   Copy this file to your service repo at:
#     .github/workflows/{service-name}-cicd.yml
#
#   Replace all values marked with # REPLACE with your service-specific values.
#
# PREREQUISITES (this template assumes the repo already contains):
#   - A Dockerfile           (default path: ./Dockerfile)
#   - A Helm chart directory  (default path: ./chart, with Chart.yaml + values.yaml)
#   The chart-name input MUST exactly match the `name:` field in Chart.yaml.
#
# WHAT IT DOES:
#   Computes a semantic version from git tags, optionally publishes NuGet
#   packages, builds and pushes a Docker image, packages the Helm chart and
#   publishes it, then tags the commit — all via the Simplify9 reusable workflow.
#
# CHART PUBLISH METHOD (required — there is no default):
#   github-oci  → publishes the chart to GHCR as an OCI artifact
#                 (oci://ghcr.io/<owner>/charts/<chart-name>). No extra secrets
#                 needed; uses the built-in GITHUB_TOKEN.
#   chartmuseum → publishes the chart to a ChartMuseum repository. Requires
#                 chart-repo-url + the chartmuseum-username / chartmuseum-password
#                 secrets (see the commented block below).
#
# INPUTS (only the commonly-overridden values are declared here — see the
#   reusable workflow for the full, documented input reference):
#   https://github.com/simplify9/.github/blob/main/.github/workflows/reusable-build-and-publish-artifacts.yml
# =============================================================================
name: Build and Publish Artifacts            # REPLACE: e.g. "My Service CI/CD"
run-name: build-${{ github.ref_name }}-${{ github.run_number }}

on:
  push:
    branches: [main]                         # REPLACE if your release branch differs
  workflow_dispatch:

# The reusable workflow tags the repo (contents: write) and pushes the image +
# chart to GHCR (packages: write). These grants are the ceiling — the reusable's
# own per-job permissions narrow them further.
permissions:
  contents: write
  packages: write

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    uses: simplify9/.github/.github/workflows/reusable-build-and-publish-artifacts.yml@main
    with:
      # ── Helm chart ──────────────────────────────────────────────────────────
      chart-name: my-service                 # REPLACE: must match Chart.yaml name:
      chart-publish-method: github-oci       # REPLACE if needed: 'github-oci' or 'chartmuseum'
      # chart-path: ./chart                  # uncomment to override (default: ./chart)

      # ── For ChartMuseum, switch the method above and uncomment this: ─────────
      # chart-repo-url: https://charts.sf9.io   # REPLACE: your ChartMuseum base URL

      # ── Versioning ──────────────────────────────────────────────────────────
      major-version: '1'                     # REPLACE: SemVer major
      minor-version: '0'                     # REPLACE: SemVer minor

      # ── Docker (uncomment to override defaults) ─────────────────────────────
      # dockerfile-path: ./Dockerfile
      # docker-context: .
      # docker-platforms: linux/amd64
      # container-registry: ghcr.io          # e.g. docker.io, registry.digitalocean.com
      # image-name: my-org/my-service        # defaults to the GitHub repository name

      # ── NuGet (omit/leave commented to skip NuGet publishing entirely) ───────
      # dotnet-version: '8.0.x'
      # nuget-projects: 'src/**/*.csproj'    # glob of projects to pack and push
      # run-tests: 'true'
      # test-projects: '**/*UnitTests/*.csproj'
    secrets:
      # github-oci + GHCR works out of the box with the built-in token below.
      github-token: ${{ secrets.GITHUB_TOKEN }}

      # ── Push the Docker image to a NON-GHCR registry? Provide these: ─────────
      # registry-username: ${{ secrets.REGISTRY_USERNAME }}
      # registry-password: ${{ secrets.REGISTRY_PASSWORD }}

      # ── Required only when chart-publish-method is 'chartmuseum': ────────────
      # chartmuseum-username: ${{ secrets.CHARTMUSEUM_USERNAME }}
      # chartmuseum-password: ${{ secrets.CHARTMUSEUM_PASSWORD }}

      # ── Required only when publishing NuGet packages: ────────────────────────
      # nuget-api-key: ${{ secrets.NUGET_API_KEY }}
      # nuget-source: ${{ secrets.NUGET_SOURCE }}   # defaults to nuget.org v3
