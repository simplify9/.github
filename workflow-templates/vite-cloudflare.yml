# =============================================================================
# Vite + Cloudflare Workers — Caller template for web app repositories
# =============================================================================
#
# USAGE:
#   Copy this file to your app repo at:
#     .github/workflows/{app-name}-www.yml
#
#   Replace all values marked with # REPLACE with your app-specific values.
#
# WHAT IT DOES:
#   Builds a Vite single-page app and deploys it to Cloudflare Workers static
#   assets. SPA routing is handled natively by Cloudflare (unmatched routes are
#   served index.html from the edge) — no custom Worker script required.
#
# BRANCHES:
#   develop → deploy-develop job    → environment "develop"    (develop)
#   main    → deploy-production job  → environment "production" (Production)
#
# INPUTS (only the required values are declared below — see the reusable
#   workflow for the full, documented input reference incl. node_version,
#   package_manager, run_lint, assets_dir, pre_build_commands, etc.):
#   https://github.com/simplify9/.github/blob/main/.github/workflows/vite-cloudflare-worker.yml
# =============================================================================
name: Deploy WWW                             # REPLACE: e.g. "Deploy StrandExpress WWW"
run-name: Deploy WWW (${{ github.ref_name == 'develop' && 'develop' || 'Production' }})

on:
  push:
    branches: [develop, main]
  workflow_dispatch:

# The reusable workflow only checks out the repo and deploys via the Cloudflare
# API token; no write scopes are needed.
permissions:
  contents: read
  security-events: read

concurrency:
  group: vite-cf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  Dev:
    if: github.ref == 'refs/heads/develop'
    uses: simplify9/.github/.github/workflows/vite-cloudflare-worker.yml@main
    with:
      route: |                               # REPLACE: one route/custom domain per line
        stg.example.com
        www-stg.example.com
      project_name: "example-www"            # REPLACE: base Worker project name
      environment: "develop"
      # ── Optional overrides (uncomment to change defaults) ───────────────────
      # node_version: "24"
      # package_manager: "yarn"              # npm | yarn | pnpm
      # run_lint: true
      # build_script: "build"
      # assets_dir: "dist"                   # Vite build output directory
      # compatibility_date: "2026-05-01"
      # pre_build_commands: |
      #   echo "Generating assets" && ./scripts/gen-assets.sh
    secrets:
      cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      dependabot-alerts-token: ${{ secrets.DEPENDABOT_ALERTS_TOKEN }}

  Prod:
    if: github.ref == 'refs/heads/main'
    uses: simplify9/.github/.github/workflows/vite-cloudflare-worker.yml@main
    with:
      route: |                               # REPLACE: one route/custom domain per line
        example.com
        www.example.com
      project_name: "example-www"            # REPLACE: base Worker project name
      environment: "production"
      # ── Optional overrides (uncomment to change defaults) ───────────────────
      # node_version: "24"
      # package_manager: "yarn"              # npm | yarn | pnpm
      # run_lint: true
      # build_script: "build"
      # assets_dir: "dist"                   # Vite build output directory
      # compatibility_date: "2026-05-01"
      # pre_build_commands: |
      #   echo "Generating assets" && ./scripts/gen-assets.sh
    secrets:
      cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      dependabot-alerts-token: ${{ secrets.DEPENDABOT_ALERTS_TOKEN }}
